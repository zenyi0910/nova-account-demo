<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星運娛樂城 - 優惠活動</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-red:#76090a;--brown:#452201;--gold:#f4b63f;--teal:#2bb5a0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg-red);color:#fff;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:url('https://www.kcfgmtb.com/assets/login_bg-Bi1SMT6m.png') center top/auto 100% repeat-x;position:relative;display:flex;flex-direction:column}
.header{background:rgba(0,0,0,.35);backdrop-filter:blur(8px);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)}
.header-back{background:none;border:none;cursor:pointer;color:#fff;padding:4px}
.header-back svg{width:20px;height:20px}
.header-title{font-size:16px;font-weight:600;color:var(--gold);flex:1;text-align:center}
.header-right{width:28px}
.content{flex:1;overflow-y:auto;padding:14px 14px 10px}
.promo-tabs{display:flex;gap:0;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.promo-tabs::-webkit-scrollbar{display:none}
.promo-tab{padding:6px 14px;font-size:11px;font-weight:500;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;white-space:nowrap;border-radius:16px;transition:all .2s;font-family:inherit}
.promo-tab.active{color:var(--brown);background:var(--gold);font-weight:600}
.promo-card{border-radius:14px;padding:3px;background:rgba(250,250,250,.9);margin-bottom:12px;cursor:pointer;transition:transform .15s}
.promo-card:active{transform:scale(.98)}
.promo-img{width:100%;aspect-ratio:16/7;border-radius:11px 11px 0 0;overflow:hidden;position:relative}
.promo-img-bg{width:100%;height:100%;display:block}
.promo-badge{position:absolute;top:8px;left:8px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600}
.badge-hot{background:#e74c3c;color:#fff}
.badge-new{background:var(--teal);color:#fff}
.badge-limit{background:var(--gold);color:var(--brown)}
.promo-body{padding:12px 14px}
.promo-title{font-size:14px;font-weight:600;color:var(--brown)}
.promo-desc{font-size:11px;color:rgba(69,34,1,.5);margin-top:4px;line-height:1.5}
.promo-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.promo-time{font-size:10px;color:rgba(69,34,1,.3);display:flex;align-items:center;gap:4px}
.promo-time svg{width:12px;height:12px}
.promo-btn{padding:6px 16px;border-radius:9999px;border:none;background:var(--teal);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.promo-btn:active{opacity:.8}
.empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,.2)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px}
.empty-state p{font-size:13px}
.tab-bar{display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.06);padding:6px 0 env(safe-area-inset-bottom,8px);position:sticky;bottom:0;z-index:50}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 10px;color:rgba(255,255,255,.3);transition:color .15s;background:none;border:none;font-family:inherit;text-decoration:none}
.tab-item.active{color:var(--gold)}
.tab-item svg{width:20px;height:20px}
.tab-item span{font-size:9px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="header-back" onclick="window.location.href='nova-frontend.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="header-title">優惠活動</div>
    <div class="header-right"></div>
  </div>
  <div class="content">
    <div class="promo-tabs">
      <button class="promo-tab active" onclick="filterPromo(this,'all')">全部</button>
      <button class="promo-tab" onclick="filterPromo(this,'deposit')">儲值優惠</button>
      <button class="promo-tab" onclick="filterPromo(this,'rebate')">返水</button>
      <button class="promo-tab" onclick="filterPromo(this,'daily')">每日活動</button>
      <button class="promo-tab" onclick="filterPromo(this,'vip')">VIP 專屬</button>
      <button class="promo-tab" onclick="filterPromo(this,'special')">限時活動</button>
    </div>
    <div id="promoList"></div>
  </div>
  <div class="tab-bar">
    <button class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg><span>其他</span></button>
    <button class="tab-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span>活動</span></button>
    <a class="tab-item" href="nova-frontend.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>大廳</span></a>
    <a class="tab-item" href="nova-deposit.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg><span>商城</span></a>
    <a class="tab-item" href="nova-profile.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></a>
  </div>
</div>
<script>
const promos=[
{title:'首儲加碼 最高翻倍',desc:'首次儲值享額外 100% 加碼，最高贈送 50,000 點。新會員限定，把握機會！',cat:'deposit',badge:'hot',bg:'linear-gradient(135deg,#c41230,#8b0a1e)',time:'長期活動'},
{title:'每日簽到 領取獎勵',desc:'連續簽到 7 天送 VIP 體驗券，每日登入即可領取簽到獎勵。',cat:'daily',badge:'',bg:'linear-gradient(135deg,#1a3a6a,#2a5a9a)',time:'長期活動'},
{title:'電子遊戲 0.8% 返水',desc:'所有電子遊戲有效投注享 0.8% 無上限返水，每日自動結算。',cat:'rebate',badge:'',bg:'linear-gradient(135deg,#2a6a3a,#1a4a2a)',time:'長期活動'},
{title:'真人百家樂 0.5% 返水',desc:'真人遊戲有效投注享 0.5% 返水，VIP 等級越高返水比例越高。',cat:'rebate',badge:'',bg:'linear-gradient(135deg,#4a1060,#7a2090)',time:'長期活動'},
{title:'紅包雨 隨機掉落',desc:'每日 12:00、18:00、21:00 三個時段隨機掉落紅包，手快有手慢無！',cat:'special',badge:'limit',bg:'linear-gradient(135deg,#c44125,#8b2a10)',time:'2026/05/01 - 05/31'},
{title:'VIP 生日禮金',desc:'VIP3 以上會員生日當月可領取專屬禮金，最高 88,888 點。',cat:'vip',badge:'new',bg:'linear-gradient(135deg,#6a4a1a,#4a3a0a)',time:'長期活動'},
{title:'好友推薦 雙重獎勵',desc:'推薦好友註冊並首儲，雙方各得 500 點獎勵金。推薦越多賺越多！',cat:'deposit',badge:'',bg:'linear-gradient(135deg,#1a5a6a,#0a3a4a)',time:'長期活動'},
{title:'週末加碼 儲值送 15%',desc:'每週六、日儲值滿 3,000 即享額外 15% 加碼，上限 10,000。',cat:'deposit',badge:'hot',bg:'linear-gradient(135deg,#8b6a0a,#6a4a00)',time:'每週六日'},
{title:'VIP 專屬返水加碼',desc:'VIP5 以上會員所有遊戲返水額外 +0.3%，尊榮禮遇。',cat:'vip',badge:'',bg:'linear-gradient(135deg,#3a1a5a,#5a2a7a)',time:'長期活動'},
{title:'體育週末加碼',desc:'週末體育投注有效流水達 10,000，額外贈送 888 獎勵金。',cat:'special',badge:'limit',bg:'linear-gradient(135deg,#0a4a2a,#1a6a3a)',time:'2026/05/01 - 05/31'}
];
let currentCat='all';
function filterPromo(el,cat){document.querySelectorAll('.promo-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');currentCat=cat;renderPromos();}
function renderPromos(){
  const list=currentCat==='all'?promos:promos.filter(p=>p.cat===currentCat);
  if(!list.length){document.getElementById('promoList').innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15h8M9 9h.01M15 9h.01"/></svg><p>目前沒有此分類的活動</p></div>';return;}
  document.getElementById('promoList').innerHTML=list.map(p=>{
    const badgeHTML=p.badge==='hot'?'<div class="promo-badge badge-hot">HOT</div>':p.badge==='new'?'<div class="promo-badge badge-new">NEW</div>':p.badge==='limit'?'<div class="promo-badge badge-limit">限時</div>':'';
    return `<div class="promo-card" onclick="alert('活動詳情：${p.title}')"><div class="promo-img"><div class="promo-img-bg" style="background:${p.bg}"></div>${badgeHTML}</div><div class="promo-body"><div class="promo-title">${p.title}</div><div class="promo-desc">${p.desc}</div><div class="promo-footer"><div class="promo-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${p.time}</div><button class="promo-btn" onclick="event.stopPropagation();alert('參加活動')">立即參加</button></div></div></div>`;
  }).join('');
}
renderPromos();
</script>
</body>
</html>
