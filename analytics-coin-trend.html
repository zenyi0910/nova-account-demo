<style>
*{margin:0;padding:0;box-sizing:border-box}

.layout{display:flex;min-height:100vh}

.sidebar.collapsed{width:60px}.sidebar.collapsed .sidebar-logo-text{display:none}.sidebar.collapsed .menu-item{justify-content:center;padding:12px 0;font-size:0;overflow:hidden}.sidebar.collapsed .menu-item svg{font-size:initial;width:20px;height:20px}.sidebar.collapsed .menu-item span{display:none}.sidebar.collapsed .menu-group-title{display:none}.sidebar.collapsed .sidebar-user-info{display:none}.sidebar.collapsed .sidebar-user{justify-content:center;padding:12px 0}.main.sidebar-collapsed{margin-left:60px}

.sidebar-logo-icon{width:40px;height:40px;flex-shrink:0}.sidebar-logo-icon img{width:40px;height:40px;display:block}
.sidebar-logo-text{display:flex;flex-direction:column;line-height:1.2}

.sidebar-footer{padding:0;border-top:1px solid rgba(148,163,184,.15)}

.main{margin-left:240px;flex:1;display:flex;flex-direction:column}
.topbar{height:56px;background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(148,163,184,.12);display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:5;gap:12px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid transparent;transition:all .2s;font-weight:500;height:44px}
.btn-primary{background:#2563EB;color:#fff;border:none;font-weight:700;padding:10px 32px}.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:#fff;color:#64748B;border:1px solid #E5E7EB}.btn-outline:hover{background:#F9FAFB}
.table-wrap{overflow-x:auto;border-radius:8px}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#D0D5DD;border-radius:3px}
.mobile-menu-btn{display:none;width:36px;height:36px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;align-items:center;justify-content:center;cursor:pointer;color:#64748B;flex-shrink:0}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
@media(max-width:768px){html,body{overflow-x:hidden;max-width:100vw}.sidebar{width:240px;transform:translateX(-100%);position:fixed;z-index:100}.sidebar.mobile-open{transform:translateX(0)}.main{margin-left:0}.topbar{padding:0 16px}.content{padding:16px}.filter-row{flex-direction:column}.filter-input,.filter-select{width:100%}.mobile-menu-btn{display:flex}.table-wrap{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:calc(100vw - 32px)}table{min-width:600px}.filter-section{overflow:hidden}}
.trend-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}.trend-item{background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.6);border-radius:12px;padding:20px;text-align:center}.trend-item h4{font-size:12px;color:#64748B;margin-bottom:8px}.trend-item .val{font-size:24px;font-weight:700;color:#0F172A}@media(max-width:768px){.trend-summary{grid-template-columns:1fr}}

.user-popover{display:none;position:fixed;left:248px;bottom:12px;background:#fff;border:1px solid rgba(148,163,184,.15);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.12);min-width:220px;z-index:100;overflow:hidden}
.user-popover.show{display:block}
.popover-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:#374151;cursor:pointer;transition:all .15s}
.popover-item:hover{background:#F3F4F6}
.popover-logout{color:#3B82F6}
.popover-divider{height:1px;background:#E5E7EB;margin:4px 0}
.popover-user{display:flex;align-items:center;gap:10px;padding:10px 16px}
.popover-avatar{width:32px;height:32px;border-radius:50%;background:#EAB308;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;flex-shrink:0}
.popover-user-info{display:flex;flex-direction:column}
.popover-user-name{font-size:13px;font-weight:600;color:#111827}
.popover-user-email{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px}.sidebar-footer{flex-shrink:0;border-top:1px solid rgba(148,163,184,.15)}.sidebar-header{flex-shrink:0}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="analyticsSidebar"></aside>
<script src="components/analytics-sidebar.js"></script>
<div class="main">
<div class="topbar"><button class="mobile-menu-btn" onclick="document.getElementById('analyticsSidebar').classList.add('mobile-open');document.getElementById('sidebarOverlay').classList.add('show')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><div class="breadcrumb"><span>金幣數據分析</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg><span class="current">金幣總量趨勢</span></div><div class="topbar-right"><div class="topbar-icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></div><div class="topbar-icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div></div></div>

<div class="filter-group"><label class="filter-label">日期範圍</label><div class="date-picker-wrap" style="position:relative"><div class="date-picker-trigger filter-input" style="cursor:pointer;display:flex;align-items:center;gap:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="date-display">2026/05/01 - 2026/05/31</span></div></div></div>
<div class="filter-group"><label class="filter-label">VIP 等級 <span class="info-tip" style="position:relative;display:inline-block;cursor:pointer" onmouseenter="this.querySelector('.tip-box').style.display='block'" onmouseleave="this.querySelector('.tip-box').style.display='none'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" style="vertical-align:middle"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><span class="tip-box" style="display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;font-size:12px;padding:6px 10px;border-radius:6px;white-space:nowrap;z-index:50">統計當日該玩家的VIP等級<span style="position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1E293B"></span></span></span></label><select class="filter-select"><option>全部 VIP</option><option>VIP 1</option><option>VIP 2</option><option>VIP 3</option></select></div>
<button class="btn btn-primary" style="padding:10px 48px">查詢</button><button class="btn btn-outline" style="padding:10px 32px">重置</button></div>
<div style="margin-top:12px;display:flex;gap:4px"><button class="gran-btn active" onclick="switchGran(this)">日</button><button class="gran-btn" onclick="switchGran(this)">週</button><button class="gran-btn" onclick="switchGran(this)">月</button><button class="gran-btn" onclick="switchGran(this)">年</button></div></div>
<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div class="card-title"><span>金幣總量趨勢</span></div><button class="btn btn-outline" style="font-size:12px;padding:6px 12px" onclick="exportCSV()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 匯出</button></div><div class="card-desc">系統貨幣流通與儲備構成分析</div>
<div class="chart-legend" style="display:flex;gap:20px;margin-bottom:12px;font-size:12px;justify-content:center"><span class="legend-item" style="display:flex;align-items:center;gap:4px;cursor:pointer" onclick="toggleDataset(0,this)"><span style="width:8px;height:8px;background:#F97316;border-radius:50%"></span>金幣數值</span><span class="legend-item" style="display:flex;align-items:center;gap:4px;cursor:pointer" onclick="toggleDataset(1,this)"><span style="width:8px;height:8px;background:#8B5CF6;border-radius:50%"></span>星幣數值</span></div>
<div style="height:340px;position:relative"><div style="position:absolute;top:0;left:0;font-size:12px;color:#94A3B8">幣量</div><canvas id="coinChart" style="padding-top:20px"></canvas></div></div></div>

</div>
<style>
.gran-btn{padding:8px 24px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:#64748B;transition:all .2s}
.gran-btn.active{background:#2563EB;color:#fff;border-color:#2563EB}
.gran-btn:hover:not(.active){background:#F9FAFB}
tfoot td{border-bottom:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
function switchGran(btn){
  btn.parentNode.querySelectorAll('.gran-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const map={'日':'day','週':'week','月':'month','年':'year'};
  switchGranChart(map[btn.textContent]);
}
function exportCSV(){
  const active=document.querySelector('.gran-btn.active').textContent;
  const map={'日':'day','週':'week','月':'month','年':'year'};
  const d=granData[map[active]];
  let csv='日期,金幣數值,星幣數值,合計\n';
  d.labels.forEach((l,i)=>{csv+=l+','+d.gold[i]+','+d.star[i]+','+(d.gold[i]+d.star[i])+'\n';});
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='金幣總量趨勢_'+active+'.csv';
  a.click();
}
// Chart.js
const granData={
  day:{labels:['5/1','5/2','5/3','5/4','5/5','5/6','5/7','5/8','5/9','5/10','5/11','5/12','5/13','5/14','5/15','5/16','5/17','5/18','5/19','5/20','5/21','5/22','5/23','5/24','5/25','5/26','5/27','5/28','5/29','5/30','5/31'],gold:[2810000000,2815000000,2808000000,2615751056,2812000000,2798000000,2820000000,2805000000,2830000000,2818000000,2790000000,2825000000,2800000000,2815000000,2835000000,2810000000,2795000000,2820000000,2840000000,2805000000,2812000000,2830000000,2798000000,2815000000,2825000000,2808000000,2820000000,2835000000,2810000000,2812000000,2818000000],star:[37500000,37000000,37000000,38753444,36000000,37000000,37500000,36500000,38000000,37200000,36800000,37500000,37000000,37200000,38000000,37500000,36500000,37000000,38500000,37000000,36000000,37500000,37200000,36800000,37500000,37000000,38000000,37500000,36500000,36000000,37200000]},
  week:{labels:['5/3','5/10','5/17','5/24','5/31'],gold:[2780000000,2820000000,2805000000,2830000000,2812000000],star:[36000000,37500000,37200000,38000000,36500000]},
  month:{labels:['1月','2月','3月','4月','5月','6月'],gold:[2500000000,2600000000,2700000000,2750000000,2800000000,2812000000],star:[30000000,32000000,34000000,35000000,37000000,36000000]},
  year:{labels:['2024年','2025年','2026年'],gold:[1800000000,2500000000,2812000000],star:[20000000,30000000,36000000]}
};
let coinChart=new Chart(document.getElementById('coinChart'),{type:'bar',data:{labels:granData.day.labels,datasets:[{label:'金幣數值',data:granData.day.gold,backgroundColor:'#F97316',hoverBackgroundColor:'#EA580C',stack:'stack'},{label:'星幣數值',data:granData.day.star,backgroundColor:'#8B5CF6',hoverBackgroundColor:'#7C3AED',stack:'stack'}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{enabled:false,mode:'index',intersect:false,external:function(context){let el=document.getElementById('chartTooltip');if(!el){el=document.createElement('div');el.id='chartTooltip';el.style.cssText='position:absolute;pointer-events:none;background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:12px 16px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:99;min-width:220px';document.body.appendChild(el);}const tooltip=context.tooltip;if(tooltip.opacity===0){el.style.display='none';return;}el.style.display='block';const items=tooltip.dataPoints||[];let html='<div style="color:#94A3B8;font-size:12px;margin-bottom:10px">'+tooltip.title[0]+'</div>';items.forEach((item)=>{html+='<div style="display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:4px"><span style="display:flex;align-items:center;gap:6px;color:#64748B"><span style="width:8px;height:8px;border-radius:50%;background:'+item.dataset.backgroundColor+'"></span>'+item.dataset.label+'</span><span style="font-weight:600;color:#1E293B">'+item.raw.toLocaleString()+'</span></div>';});const total=items.reduce((s,i)=>s+i.raw,0);html+='<div style="border-top:1px solid #F1F5F9;margin:8px 0"></div><div style="display:flex;justify-content:space-between;align-items:center;gap:16px"><span style="color:#64748B">全部 UID 持幣總額</span><span style="font-weight:600;color:#1E293B">'+total.toLocaleString()+'</span></div>';el.innerHTML=html;const pos=context.chart.canvas.getBoundingClientRect();el.style.left=pos.left+window.scrollX+tooltip.caretX+'px';el.style.top=pos.top+window.scrollY+tooltip.caretY-el.offsetHeight-10+'px';}}},scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,title:{display:false},ticks:{callback:function(v){if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(0)+'M';return v}},grid:{color:'#E5E7EB',borderDash:[3,3]}}}},plugins:[{id:'barShadow',beforeDatasetsDraw(chart){const active=chart.getActiveElements();if(!active.length)return;const{ctx}=chart;const el=active[0];const meta=chart.getDatasetMeta(0);const bar=meta.data[el.index];if(!bar)return;ctx.save();ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(bar.x-bar.width/2-4,chart.chartArea.top,bar.width+8,chart.chartArea.bottom-chart.chartArea.top);ctx.restore();}}]});
// 幣量 label - now using HTML element above, remove plugin
Chart.register({id:'yTopLabel',afterDraw(chart){}});
function switchGranChart(gran){
  const d=granData[gran];
  coinChart.data.labels=d.labels;
  coinChart.data.datasets[0].data=d.gold;
  coinChart.data.datasets[1].data=d.star;
  coinChart.update();
}
function toggleDataset(idx,el){
  const meta=coinChart.getDatasetMeta(idx);
  meta.hidden=!meta.hidden;
  el.style.opacity=meta.hidden?'0.4':'1';
  coinChart.update();
}
</script>
<script src="components/date-picker.js"></script>
</body>
</html>
