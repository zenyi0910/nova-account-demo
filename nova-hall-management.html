<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 娛樂廳管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#fff;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid oklch(0.922 0 0);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid oklch(0.922 0 0);display:flex;align-items:center;gap:10px;flex-shrink:0}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid oklch(0.922 0 0);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}

/* Tabs */
.hall-tabs{display:flex;gap:0;border-bottom:1px solid oklch(0.922 0 0);margin-bottom:20px}
.hall-tab{padding:10px 20px;font-size:13px;font-weight:500;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.hall-tab:hover{color:#374151}
.hall-tab.active{color:#393939;border-bottom-color:#393939;font-weight:600}
.hall-tab .tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#F3F4F6;font-size:10px;font-weight:600;color:#6B7280;margin-left:6px}
.hall-tab.active .tab-badge{background:#393939;color:#fff}

/* Hall Panel */
.hall-panel{display:none}
.hall-panel.active{display:block}

/* Info Banner */
.info-banner{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:rgba(57,57,57,0.03);border:1px solid oklch(0.922 0 0);border-radius:10px;margin-bottom:20px;font-size:12px;color:#475569}
.info-banner svg{width:16px;height:16px;color:#6B7280;flex-shrink:0;margin-top:1px}

/* Control Cards */
.ctrl-card{background:#fff;border:1px solid oklch(0.922 0 0);border-radius:10px;padding:18px 20px;margin-bottom:16px}
.ctrl-card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ctrl-card-header svg{width:16px;height:16px;color:#6B7280}
.ctrl-card-header h3{font-size:14px;font-weight:600;color:#111827}
.ctrl-card-header .spacer{flex:1}

/* Toggle Switch */
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{position:relative;width:36px;height:20px;border-radius:10px;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:oklch(0.777 0.152 181.912)}
.toggle.off{background:#D1D5DB}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:18px}
.toggle.off::after{left:2px}
.toggle-text{font-size:12px;font-weight:500}
.toggle-text.on{color:oklch(0.704 0.14 182.503)}
.toggle-text.off{color:#9CA3AF}

/* Status Row */
.status-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(57,57,57,0.03);border-radius:8px;margin-bottom:10px}
.status-row label{font-size:13px;color:#374151;font-weight:500;min-width:100px}
.status-row .spacer{flex:1}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500}
.status-badge.online{background:#DCFCE7;color:#166534}
.status-badge.maint{background:#FEF3C7;color:#92400E}
.status-badge.offline{background:#FEE2E2;color:#991B1B}
.status-badge.upcoming{background:#DBEAFE;color:#1E40AF}
.status-dot{width:6px;height:6px;border-radius:50%}
.status-dot.online{background:#16A34A}
.status-dot.maint{background:#D97706}
.status-dot.offline{background:#DC2626}
.status-dot.upcoming{background:#2563EB}

/* Buttons */
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn svg{width:14px;height:14px}
.btn-primary{background:#393939;color:#fff}
.btn-primary:hover{background:#1a1a1a}
.btn-outline{border:1px solid oklch(0.922 0 0);background:#fff;color:#374151}
.btn-outline:hover{background:#F9FAFB}
.btn-danger{border:1px solid #FCA5A5;background:#fff;color:#DC2626}
.btn-danger:hover{background:#FEF2F2}
.btn-success{border:1px solid #86EFAC;background:#fff;color:#059669}
.btn-success:hover{background:#F0FDF4}
.btn-sm{padding:5px 10px;font-size:11px}

/* Schedule */
.schedule-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;margin-bottom:8px}
.schedule-item svg{width:14px;height:14px;color:#D97706;flex-shrink:0}
.schedule-info{flex:1;font-size:12px;color:#92400E}
.schedule-time{font-weight:600}
.schedule-action{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.schedule-action.off{background:#FEE2E2;color:#991B1B}
.schedule-action.on{background:#DCFCE7;color:#166534}

/* Currency Grid */
.currency-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.currency-card{padding:14px 16px;border-radius:8px;border:1px solid oklch(0.922 0 0);background:#fff}
.currency-card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.currency-card-header .coin-dot{width:8px;height:8px;border-radius:50%}
.coin-dot.gold{background:#D97706}
.coin-dot.star{background:#7C3AED}
.currency-card-header h4{font-size:13px;font-weight:600;color:#111827}
.currency-card-header .coin-status{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px}
.coin-status.on{background:#DCFCE7;color:#166534}
.coin-status.off{background:#FEE2E2;color:#991B1B}
.currency-field{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.currency-field label{font-size:11px;color:#6B7280;min-width:60px}
.currency-field span{font-size:12px;color:#374151;font-weight:500}

/* Game Table */
.game-table{width:100%;border-collapse:collapse}
.game-table th{background:rgba(57,57,57,0.05);padding:8px 12px;text-align:left;font-size:11px;font-weight:500;color:#393939;border-bottom:1px solid oklch(0.922 0 0)}
.game-table td{padding:8px 12px;border-bottom:1px solid oklch(0.922 0 0);font-size:12px;vertical-align:middle}
.game-table tr:last-child td{border-bottom:none}
.game-table tr:hover td{background:rgba(243,244,246,0.4)}
.game-name-link{color:oklch(0.546 0.245 262.881);font-weight:500;cursor:pointer}
.game-name-link:hover{text-decoration:underline}
.override-val{color:#D97706;font-weight:500}
.original-val{color:#9CA3AF;font-size:11px;text-decoration:line-through;margin-left:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90vw;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid oklch(0.922 0 0)}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B7280;font-size:18px}
.modal-close:hover{background:#F3F4F6}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid oklch(0.922 0 0);display:flex;justify-content:flex-end;gap:8px}

/* Form */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid oklch(0.922 0 0);border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#393939;box-shadow:0 0 0 2px rgba(57,57,57,.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:#6B7280;margin-top:4px}
.form-note{padding:10px 12px;background:rgba(57,57,57,0.03);border:1px solid oklch(0.922 0 0);border-radius:6px;font-size:12px;color:#475569;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.form-note svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;color:#6B7280}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:9999;transform:translateX(120%);opacity:0;transition:all .3s;visibility:hidden}
.toast.show{transform:translateX(0);opacity:1;visibility:visible}
.toast.success{background:#393939}
.toast.error{background:#DC2626}
.toast.warning{background:#D97706}

/* Responsive */
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
.sidebar{transition:transform .3s cubic-bezier(.25,.1,.25,1)}
.main{transition:margin-left .3s cubic-bezier(.25,.1,.25,1)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed;z-index:100}
.sidebar.show{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.main{margin-left:0}
.topbar{padding:0 12px}
.content{padding:12px}
.currency-grid{grid-template-columns:1fr}
.form-row{grid-template-columns:1fr}
.hall-tabs{overflow-x:auto}
}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>

<div class="main">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebarMobile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">遊戲管理</a><span class="sep">&gt;</span><span class="current">娛樂廳管理</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <h1>娛樂廳管理</h1>
      <div class="spacer"></div>
      <button class="btn btn-primary" onclick="openScheduleModal('')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>新增排程</button>
    </div>

    <!-- Info Banner -->
    <div class="info-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <div>娛樂廳的開關與幣種設定會<strong>優先覆蓋</strong>廳內所有遊戲，但不會修改遊戲本身的原始設定值。取消廳級覆蓋後，遊戲自動恢復原始設定。</div>
    </div>

    <!-- Hall Tabs -->
    <div class="hall-tabs" id="hallTabs"></div>

    <!-- Hall Panels -->
    <div id="hallPanels"></div>
  </div>
</div>

<!-- Schedule Modal -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <div class="modal-header"><h3>排程開關設定</h3><button class="modal-close" onclick="closeModal('scheduleModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span>排程到達指定時間後，系統自動切換娛樂廳狀態，無需手動設定維護中。</span></div>
      <div class="form-row">
        <div class="form-group"><label>動作</label><select id="schedAction"><option value="off">關閉娛樂廳</option><option value="on">開啟娛樂廳</option></select></div>
        <div class="form-group"><label>目標廳</label><select id="schedHall"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>開始時間</label><input type="datetime-local" id="schedStart"></div>
        <div class="form-group"><label>結束時間（選填）</label><input type="datetime-local" id="schedEnd"><div class="form-hint">留空表示手動恢復</div></div>
      </div>
      <div class="form-group"><label>備註</label><input type="text" id="schedNote" placeholder="例：例行維護、版本更新"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('scheduleModal')">取消</button><button class="btn btn-primary" onclick="saveSchedule()">儲存排程</button></div>
  </div>
</div>

<!-- Currency Modal -->
<div class="modal-overlay" id="currencyModal">
  <div class="modal">
    <div class="modal-header"><h3>幣種設定</h3><button class="modal-close" onclick="closeModal('currencyModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span>此處設定會覆蓋廳內所有遊戲的幣種參數。遊戲原始設定不受影響，取消覆蓋後自動恢復。</span></div>
      <div class="form-group"><label>目標廳</label><select id="currHall"></select></div>
      <div style="margin-top:14px">
        <div class="currency-card-header"><div class="coin-dot gold"></div><h4>金幣設定</h4></div>
        <div class="form-row">
          <div class="form-group"><label>最低投注</label><input type="number" id="goldMin" placeholder="10"></div>
          <div class="form-group"><label>最高投注</label><input type="number" id="goldMax" placeholder="100000"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>兌換比率</label><input type="text" id="goldRate" placeholder="1:1"><div class="form-hint">金幣:遊戲幣</div></div>
          <div class="form-group"><label>狀態</label><select id="goldStatus"><option value="on">啟用</option><option value="off">停用</option></select></div>
        </div>
      </div>
      <div style="margin-top:18px;padding-top:14px;border-top:1px solid oklch(0.922 0 0)">
        <div class="currency-card-header"><div class="coin-dot star"></div><h4>星幣設定</h4></div>
        <div class="form-row">
          <div class="form-group"><label>最低投注</label><input type="number" id="starMin" placeholder="100"></div>
          <div class="form-group"><label>最高投注</label><input type="number" id="starMax" placeholder="50000"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>兌換比率</label><input type="text" id="starRate" placeholder="10:1"><div class="form-hint">星幣:遊戲幣</div></div>
          <div class="form-group"><label>狀態</label><select id="starStatus"><option value="on">啟用</option><option value="off">停用</option></select></div>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('currencyModal')">取消</button><button class="btn btn-primary" onclick="saveCurrency()">儲存設定</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === Data Model (based on actual Nova system: halls=VA/YGR, cats=電動/街機/未分類) ===
const halls = [
  {
    id: 'VA', name: 'VA 娛樂城', status: 'on',
    gold: {enabled:true, min:10, max:100000, rate:'1:1'},
    star: {enabled:true, min:100, max:50000, rate:'10:1'},
    schedules: [{action:'off',start:'2026-05-10T03:00',end:'2026-05-10T05:00',note:'例行維護'}],
    games: [
      {name:'埃及三秘寶',cat:'電動',status:'即將上線',vip:'不限制',goldMin:10,goldMax:80000,starMin:100,starMax:40000},
      {name:'財神倍倍發 X4096',cat:'電動',status:'即將上線',vip:'不限制',goldMin:10,goldMax:80000,starMin:100,starMax:40000},
      {name:'印加祖瑪 豪華版',cat:'電動',status:'停用中',vip:'不限制',goldMin:10,goldMax:50000,starMin:0,starMax:0},
      {name:'財富金幣',cat:'電動',status:'使用中',vip:'不限制',goldMin:10,goldMax:100000,starMin:100,starMax:50000},
      {name:'阿茲特克神話',cat:'電動',status:'使用中',vip:'不限制',goldMin:10,goldMax:100000,starMin:100,starMax:50000},
      {name:'自摸無雙 2',cat:'電動',status:'使用中',vip:'不限制',goldMin:5,goldMax:50000,starMin:50,starMax:25000},
      {name:'自摸無雙3',cat:'電動',status:'使用中',vip:'不限制',goldMin:5,goldMax:50000,starMin:50,starMax:25000},
      {name:'法老祕寶',cat:'電動',status:'使用中',vip:'不限制',goldMin:10,goldMax:80000,starMin:100,starMax:40000},
      {name:'印加女神',cat:'電動',status:'使用中',vip:'不限制',goldMin:10,goldMax:80000,starMin:100,starMax:40000},
      {name:'星運雷神',cat:'電動',status:'使用中',vip:'VIP1',goldMin:20,goldMax:120000,starMin:200,starMax:60000},
      {name:'爆礦傳奇',cat:'未分類',status:'使用中',vip:'不限制',goldMin:10,goldMax:100000,starMin:0,starMax:0},
      {name:'星運賽特',cat:'未分類',status:'使用中',vip:'不限制',goldMin:10,goldMax:100000,starMin:0,starMax:0},
      {name:'自摸無雙',cat:'未分類',status:'使用中',vip:'不限制',goldMin:5,goldMax:50000,starMin:0,starMax:0},
      {name:'自摸無雙 5',cat:'未分類',status:'使用中',vip:'不限制',goldMin:5,goldMax:50000,starMin:0,starMax:0}
    ]
  },
  {
    id: 'YGR', name: 'YGR 娛樂城', status: 'on',
    gold: {enabled:true, min:10, max:80000, rate:'1:1'},
    star: {enabled:true, min:100, max:30000, rate:'10:1'},
    schedules: [],
    games: [

function renderAll() {
  renderTabs();
  renderPanels();
}

function renderTabs() {
  const container = document.getElementById('hallTabs');
  container.innerHTML = halls.map((h, i) => {
    const onCount = h.games.filter(g => g.status === '使用中').length;
    return `<div class="hall-tab ${i===0?'active':''}" onclick="switchTab('${h.id}')">${h.name}<span class="tab-badge">${onCount}/${h.games.length}</span></div>`;
  }).join('');
}

function renderPanels() {
  const container = document.getElementById('hallPanels');
  container.innerHTML = halls.map((h, i) => `
    <div class="hall-panel ${i===0?'active':''}" id="panel-${h.id}">
      ${renderHallContent(h)}
    </div>
  `).join('');
}

function renderHallContent(hall) {
  const statusClass = hall.status === 'on' ? 'online' : 'offline';
  const statusText = hall.status === 'on' ? '運行中' : '已關閉';

  // Schedules
  let schedHtml = '<div style="color:#9CA3AF;font-size:12px;padding:8px 0">尚無排程</div>';
  if (hall.schedules.length > 0) {
    schedHtml = hall.schedules.map((s, si) => `
      <div class="schedule-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div class="schedule-info">
          <span class="schedule-time">${fmtDT(s.start)}</span>
          ${s.end ? ' ~ <span class="schedule-time">' + fmtDT(s.end) + '</span>' : ' (手動恢復)'}
          <span class="schedule-action ${s.action}">${s.action==='off'?'關閉':'開啟'}</span>
          ${s.note ? '<span style="margin-left:6px;color:#6B7280;font-style:italic">'+s.note+'</span>' : ''}
        </div>
        <button class="btn btn-sm btn-outline" onclick="delSchedule('${hall.id}',${si})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    `).join('');
  }

  // Games table
  const gamesHtml = hall.games.map(g => {
    const goldOv = hall.gold.enabled && (g.goldMin !== hall.gold.min || g.goldMax !== hall.gold.max);
    const starOv = hall.star.enabled && g.starMin > 0 && (g.starMin !== hall.star.min || g.starMax !== hall.star.max);
    const sBadge = g.status === '使用中' ? 'online' : g.status === '維護中' ? 'maint' : g.status === '停用中' ? 'offline' : 'upcoming';
    return `<tr>
      <td><span class="game-name-link">${g.name}</span></td>
      <td>${g.cat}</td>
      <td><span class="status-badge ${sBadge}"><span class="status-dot ${sBadge}"></span>${g.status}</span></td>
      <td>${g.vip}</td>
      <td>${goldOv ? '<span class="override-val">$'+hall.gold.min.toLocaleString()+'~$'+hall.gold.max.toLocaleString()+'</span><span class="original-val">$'+g.goldMin.toLocaleString()+'~$'+g.goldMax.toLocaleString()+'</span>' : '$'+g.goldMin.toLocaleString()+'~$'+g.goldMax.toLocaleString()}</td>
      <td>${g.starMin > 0 ? (starOv ? '<span class="override-val">$'+hall.star.min.toLocaleString()+'~$'+hall.star.max.toLocaleString()+'</span><span class="original-val">$'+g.starMin.toLocaleString()+'~$'+g.starMax.toLocaleString()+'</span>' : '$'+g.starMin.toLocaleString()+'~$'+g.starMax.toLocaleString()) : '<span style="color:#9CA3AF">-</span>'}</td>
    </tr>`;
  }).join('');

  return `
    <!-- Status & Quick Toggle -->
    <div class="ctrl-card">
      <div class="ctrl-card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <h3>廳狀態與快速操作</h3>
        <div class="spacer"></div>
        <span class="status-badge ${statusClass}"><span class="status-dot ${statusClass}"></span>${statusText}</span>
      </div>
      <div class="status-row">
        <label>即時開關</label>
        <div class="toggle-wrap">
          <button class="toggle ${hall.status}" onclick="toggleHall('${hall.id}')"></button>
          <span class="toggle-text ${hall.status}">${hall.status==='on'?'啟用':'停用'}</span>
        </div>
        <div class="spacer"></div>
        <button class="btn btn-sm ${hall.status==='on'?'btn-danger':'btn-success'}" onclick="toggleHall('${hall.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
          ${hall.status==='on'?'立即關閉':'立即開啟'}
        </button>
        <button class="btn btn-sm btn-outline" onclick="openScheduleModal('${hall.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          排程開關
        </button>
        <button class="btn btn-sm btn-outline" onclick="openCurrencyModal('${hall.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 100 4h4a2 2 0 110 4H8"/><path d="M12 18V6"/></svg>
          幣種設定
        </button>
      </div>
    </div>

    <!-- Schedules -->
    <div class="ctrl-card">
      <div class="ctrl-card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <h3>排程列表</h3>
      </div>
      ${schedHtml}
    </div>

    <!-- Currency Overview -->
    <div class="ctrl-card">
      <div class="ctrl-card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 100 4h4a2 2 0 110 4H8"/><path d="M12 18V6"/></svg>
        <h3>幣種設定（廳級覆蓋）</h3>
      </div>
      <div class="currency-grid">
        <div class="currency-card">
          <div class="currency-card-header"><div class="coin-dot gold"></div><h4>金幣</h4><span class="coin-status ${hall.gold.enabled?'on':'off'}">${hall.gold.enabled?'啟用':'停用'}</span></div>
          <div class="currency-field"><label>投注範圍</label><span>${hall.gold.enabled?'$'+hall.gold.min.toLocaleString()+' ~ $'+hall.gold.max.toLocaleString():'-'}</span></div>
          <div class="currency-field"><label>兌換比率</label><span>${hall.gold.rate||'-'}</span></div>
        </div>
        <div class="currency-card">
          <div class="currency-card-header"><div class="coin-dot star"></div><h4>星幣</h4><span class="coin-status ${hall.star.enabled?'on':'off'}">${hall.star.enabled?'啟用':'停用'}</span></div>
          <div class="currency-field"><label>投注範圍</label><span>${hall.star.enabled?'$'+hall.star.min.toLocaleString()+' ~ $'+hall.star.max.toLocaleString():'-'}</span></div>
          <div class="currency-field"><label>兌換比率</label><span>${hall.star.rate||'-'}</span></div>
        </div>
      </div>
    </div>

    <!-- Game List -->
    <div class="ctrl-card">
      <div class="ctrl-card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <h3>廳內遊戲（${hall.games.length}）</h3>
        <div class="spacer"></div>
        <span style="font-size:11px;color:#6B7280">覆蓋值以橘色標示，刪除線為原始值</span>
      </div>
      <div style="overflow-x:auto">
        <table class="game-table">
          <thead><tr><th>遊戲名稱</th><th>種類</th><th>狀態</th><th>VIP限制</th><th>金幣投注範圍</th><th>星幣投注範圍</th></tr></thead>
          <tbody>${gamesHtml}</tbody>
        </table>
      </div>
    </div>
  `;
}

// === Interactions ===
function switchTab(id) {
  document.querySelectorAll('.hall-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.hall-panel').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function toggleHall(id) {
  const hall = halls.find(h => h.id === id);
  hall.status = hall.status === 'on' ? 'off' : 'on';
  renderPanels();
  // Keep current tab active
  document.querySelectorAll('.hall-tab').forEach(t => {
    if (t.textContent.includes(hall.name)) t.click();
  });
  showToast(hall.name + (hall.status === 'on' ? ' 已開啟' : ' 已關閉'), hall.status === 'on' ? 'success' : 'warning');
}

function openScheduleModal(hallId) {
  const select = document.getElementById('schedHall');
  select.innerHTML = halls.map(h => `<option value="${h.id}" ${h.id===hallId?'selected':''}>${h.name}</option>`).join('');
  document.getElementById('schedStart').value = '';
  document.getElementById('schedEnd').value = '';
  document.getElementById('schedNote').value = '';
  document.getElementById('scheduleModal').classList.add('show');
}

function openCurrencyModal(hallId) {
  const hall = halls.find(h => h.id === hallId);
  const select = document.getElementById('currHall');
  select.innerHTML = halls.map(h => `<option value="${h.id}" ${h.id===hallId?'selected':''}>${h.name}</option>`).join('');
  document.getElementById('goldMin').value = hall.gold.min || '';
  document.getElementById('goldMax').value = hall.gold.max || '';
  document.getElementById('goldRate').value = hall.gold.rate || '';
  document.getElementById('goldStatus').value = hall.gold.enabled ? 'on' : 'off';
  document.getElementById('starMin').value = hall.star.min || '';
  document.getElementById('starMax').value = hall.star.max || '';
  document.getElementById('starRate').value = hall.star.rate || '';
  document.getElementById('starStatus').value = hall.star.enabled ? 'on' : 'off';
  document.getElementById('currencyModal').classList.add('show');
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function saveSchedule() {
  const hallId = document.getElementById('schedHall').value;
  const action = document.getElementById('schedAction').value;
  const start = document.getElementById('schedStart').value;
  const end = document.getElementById('schedEnd').value;
  const note = document.getElementById('schedNote').value;
  if (!start) { showToast('請選擇開始時間', 'error'); return; }
  const hall = halls.find(h => h.id === hallId);
  hall.schedules.push({action, start, end, note});
  closeModal('scheduleModal');
  renderAll();
  switchToTab(hallId);
  showToast('排程已新增：' + hall.name, 'success');
}

function saveCurrency() {
  const hallId = document.getElementById('currHall').value;
  const hall = halls.find(h => h.id === hallId);
  hall.gold.min = parseInt(document.getElementById('goldMin').value) || 0;
  hall.gold.max = parseInt(document.getElementById('goldMax').value) || 0;
  hall.gold.rate = document.getElementById('goldRate').value;
  hall.gold.enabled = document.getElementById('goldStatus').value === 'on';
  hall.star.min = parseInt(document.getElementById('starMin').value) || 0;
  hall.star.max = parseInt(document.getElementById('starMax').value) || 0;
  hall.star.rate = document.getElementById('starRate').value;
  hall.star.enabled = document.getElementById('starStatus').value === 'on';
  closeModal('currencyModal');
  renderAll();
  switchToTab(hallId);
  showToast('幣種設定已更新：' + hall.name, 'success');
}

function delSchedule(hallId, idx) {
  const hall = halls.find(h => h.id === hallId);
  hall.schedules.splice(idx, 1);
  renderAll();
  switchToTab(hallId);
  showToast('排程已刪除', 'warning');
}

function switchToTab(id) {
  document.querySelectorAll('.hall-tab').forEach((t, i) => {
    t.classList.toggle('active', halls[i].id === id);
  });
  document.querySelectorAll('.hall-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
}

function fmtDT(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

// Sidebar
function toggleSidebarMobile() {
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    document.querySelector('.sidebar').classList.toggle('show');
    let ov = document.querySelector('.sidebar-overlay');
    if (!ov) { ov = document.createElement('div'); ov.className = 'sidebar-overlay'; document.body.appendChild(ov); ov.addEventListener('click', function(){ document.querySelector('.sidebar').classList.remove('show'); ov.classList.remove('show'); }); }
    ov.classList.toggle('show');
  } else {
    document.body.classList.toggle('sidebar-collapsed');
  }
}
function toggleUserMenu(){const el=document.querySelector('.sidebar-user');el.classList.toggle('open');event.stopPropagation();}
document.addEventListener('click',function(e){const u=document.querySelector('.sidebar-user');if(u&&!u.contains(e.target))u.classList.remove('open');});
function toggleSub(id){const el=document.getElementById(id);el.classList.toggle('open');const chev=el.previousElementSibling?.querySelector('.sidebar-chevron');if(chev)chev.classList.toggle('open');}

// Init
renderAll();
</script>
