<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 娛樂廳管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}

/* Hall Cards */
.hall-card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;margin-bottom:16px;overflow:hidden;transition:box-shadow .2s}
.hall-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hall-header{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;user-select:none}
.hall-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hall-icon.live{background:#FEF3C7;color:#D97706}
.hall-icon.slot{background:#DBEAFE;color:#2563EB}
.hall-icon.chess{background:#D1FAE5;color:#059669}
.hall-icon.fish{background:#E0E7FF;color:#4F46E5}
.hall-icon.sport{background:#FCE7F3;color:#DB2777}
.hall-info{flex:1;min-width:0}
.hall-name{font-size:15px;font-weight:600;color:#111827}
.hall-desc{font-size:12px;color:#6B7280;margin-top:2px}
.hall-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.hall-badge{font-size:10px;padding:2px 8px;border-radius:9999px;font-weight:500}
.hall-badge.gold{background:#FEF3C7;color:#92400E}
.hall-badge.star{background:#EDE9FE;color:#6D28D9}
.hall-badge.count{background:#F3F4F6;color:#374151}
.hall-controls{display:flex;align-items:center;gap:16px}
.hall-status{display:flex;align-items:center;gap:6px}
.hall-status-dot{width:8px;height:8px;border-radius:50%}
.hall-status-dot.on{background:#10B981}
.hall-status-dot.off{background:#EF4444}
.hall-status-dot.scheduled{background:#F59E0B}
.hall-status-text{font-size:12px;font-weight:500}
.hall-status-text.on{color:#059669}
.hall-status-text.off{color:#DC2626}
.hall-status-text.scheduled{color:#D97706}
.hall-expand{width:28px;height:28px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s,background .15s}
.hall-expand:hover{background:#F3F4F6}
.hall-expand.open{transform:rotate(180deg)}
.hall-expand svg{width:16px;height:16px;color:#6B7280}

/* Hall Body (expandable) */
.hall-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.25,.1,.25,1)}
.hall-body.open{max-height:2000px}
.hall-body-inner{padding:0 20px 20px;border-top:1px solid #F3F4F6}

/* Control Sections */
.ctrl-section{margin-top:16px}
.ctrl-title{font-size:12px;font-weight:600;color:#6B7280;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ctrl-title svg{width:14px;height:14px}
.ctrl-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#F9FAFB;border-radius:8px;margin-bottom:8px}
.ctrl-row label{font-size:13px;color:#374151;min-width:80px;font-weight:500}
.ctrl-row .spacer{flex:1}

/* Toggle Switch */
.toggle{position:relative;width:40px;height:22px;border-radius:11px;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:#26A69A}
.toggle.off{background:#D1D5DB}
.toggle::after{content:'';position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:20px}
.toggle.off::after{left:2px}

/* Quick Action Buttons */
.btn-quick{padding:6px 12px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-quick:hover{background:#F3F4F6}
.btn-quick.danger{border-color:#FCA5A5;color:#DC2626}
.btn-quick.danger:hover{background:#FEF2F2}
.btn-quick.success{border-color:#86EFAC;color:#059669}
.btn-quick.success:hover{background:#F0FDF4}
.btn-quick svg{width:12px;height:12px}

/* Schedule */
.schedule-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;margin-bottom:8px}
.schedule-row svg{width:14px;height:14px;color:#D97706;flex-shrink:0}
.schedule-info{flex:1;font-size:12px;color:#92400E}
.schedule-time{font-weight:600}
.btn-schedule{padding:5px 10px;border-radius:5px;border:1px solid #FDE68A;background:#FEF3C7;font-size:11px;cursor:pointer;font-family:inherit;color:#92400E;font-weight:500}
.btn-schedule:hover{background:#FDE68A}
.btn-del-schedule{padding:4px;border:none;background:none;cursor:pointer;color:#D97706}
.btn-del-schedule:hover{color:#DC2626}

/* Currency Settings */
.currency-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.currency-card{padding:14px;border-radius:8px;border:1px solid #E5E7EB;background:#fff}
.currency-card h4{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.currency-card h4 .coin-icon{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
.coin-gold{background:#FEF3C7;color:#D97706}
.coin-star{background:#EDE9FE;color:#7C3AED}
.currency-field{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.currency-field label{font-size:11px;color:#6B7280;min-width:70px}
.currency-field input{width:100px;padding:5px 8px;border:1px solid #E5E7EB;border-radius:5px;font-size:12px;font-family:inherit;background:#F9FAFB}
.currency-field input:focus{outline:none;border-color:#3B82F6;box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.currency-field .unit{font-size:11px;color:#9CA3AF}

/* Override indicator */
.override-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.override-badge svg{width:10px;height:10px}

/* Game list inside hall */
.hall-games{margin-top:16px}
.hall-games-title{font-size:12px;font-weight:600;color:#6B7280;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.game-list{border:1px solid #E5E7EB;border-radius:8px;overflow:hidden}
.game-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px}
.game-row:last-child{border-bottom:none}
.game-row:hover{background:#FAFAFA}
.game-name{font-weight:500;min-width:120px}
.game-provider{color:#6B7280;font-size:12px;min-width:80px}
.game-override{font-size:11px;color:#6B7280;display:flex;align-items:center;gap:4px}
.game-override .overridden{color:#D97706;font-weight:500}
.game-original{font-size:11px;color:#9CA3AF;text-decoration:line-through}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90vw;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #E5E7EB}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B7280}
.modal-close:hover{background:#F3F4F6}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid #E5E7EB;display:flex;justify-content:flex-end;gap:8px}
.btn-primary{padding:8px 16px;border-radius:6px;border:none;background:#1F2937;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:#111827}
.btn-secondary{padding:8px 16px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;color:#374151;font-size:13px;cursor:pointer;font-family:inherit}
.btn-secondary:hover{background:#F3F4F6}

/* Form in modal */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:13px;font-family:inherit;background:#F9FAFB}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#3B82F6;box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:#6B7280;margin-top:4px}
.form-note{padding:10px 12px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;font-size:12px;color:#1E40AF;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.form-note svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:9999;transform:translateX(120%);opacity:0;transition:all .3s;visibility:hidden}
.toast.show{transform:translateX(0);opacity:1;visibility:visible}
.toast.success{background:linear-gradient(135deg,#10B981,#059669)}
.toast.error{background:linear-gradient(135deg,#EF4444,#DC2626)}
.toast.warning{background:linear-gradient(135deg,#F59E0B,#D97706)}

/* Priority indicator */
.priority-diagram{padding:14px;background:#F9FAFB;border-radius:8px;border:1px solid #E5E7EB;margin-bottom:16px}
.priority-flow{display:flex;align-items:center;gap:8px;justify-content:center}
.priority-box{padding:8px 14px;border-radius:6px;font-size:12px;font-weight:500;text-align:center}
.priority-box.hall{background:#DBEAFE;color:#1D4ED8;border:1px solid #93C5FD}
.priority-box.game{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.priority-arrow{color:#9CA3AF;font-size:16px}
.priority-label{font-size:10px;color:#6B7280;text-align:center;margin-top:4px}

/* Responsive */
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
.sidebar{transition:transform .3s cubic-bezier(.25,.1,.25,1)}
.main{transition:margin-left .3s cubic-bezier(.25,.1,.25,1)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed;z-index:100}
.sidebar.show{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.main{margin-left:0}
.topbar{padding:0 12px}
.content{padding:12px}
.currency-grid{grid-template-columns:1fr}
.form-row{grid-template-columns:1fr}
.hall-controls{gap:8px}
}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>

<div class="main">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebarMobile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">遊戲管理</a><span class="sep">&gt;</span><span class="current">娛樂廳管理</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <h1>娛樂廳管理</h1>
      <div class="spacer"></div>
    </div>

    <!-- Priority Diagram -->
    <div class="priority-diagram">
      <div class="priority-flow">
        <div><div class="priority-box hall">娛樂廳設定</div><div class="priority-label">優先覆蓋</div></div>
        <div class="priority-arrow">→</div>
        <div><div class="priority-box game">單一遊戲設定</div><div class="priority-label">保留原始值</div></div>
      </div>
      <p style="text-align:center;font-size:11px;color:#6B7280;margin-top:8px">娛樂廳的開關/幣種設定會覆蓋廳內所有遊戲，但不會修改遊戲本身的原始設定值</p>
    </div>

    <!-- Hall Cards rendered by JS -->
    <div id="hallContainer"></div>
  </div>
</div>

<!-- Schedule Modal -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <div class="modal-header"><h3>排程開關設定</h3><button class="modal-close" onclick="closeModal('scheduleModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span>排程到達指定時間後，系統會自動切換娛樂廳的開關狀態，無需手動設定維護中。</span></div>
      <div class="form-row">
        <div class="form-group"><label>動作</label><select id="schedAction"><option value="off">關閉娛樂廳</option><option value="on">開啟娛樂廳</option></select></div>
        <div class="form-group"><label>目標廳</label><select id="schedHall"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>開始時間</label><input type="datetime-local" id="schedStart"></div>
        <div class="form-group"><label>結束時間（選填）</label><input type="datetime-local" id="schedEnd"><div class="form-hint">留空表示手動恢復</div></div>
      </div>
      <div class="form-group"><label>備註</label><input type="text" id="schedNote" placeholder="例：例行維護、版本更新"></div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal('scheduleModal')">取消</button><button class="btn-primary" onclick="saveSchedule()">儲存排程</button></div>
  </div>
</div>

<!-- Currency Modal -->
<div class="modal-overlay" id="currencyModal">
  <div class="modal">
    <div class="modal-header"><h3>幣種設定</h3><button class="modal-close" onclick="closeModal('currencyModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span>此處設定會覆蓋廳內所有遊戲的幣種參數。遊戲原始設定不受影響，取消覆蓋後自動恢復。</span></div>
      <div class="form-group"><label>目標廳</label><select id="currHall"></select></div>
      <div style="margin-top:14px">
        <h4 style="font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span class="coin-icon coin-gold" style="width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px">G</span> 金幣設定</h4>
        <div class="form-row">
          <div class="form-group"><label>最低投注</label><input type="number" id="goldMin" placeholder="10"></div>
          <div class="form-group"><label>最高投注</label><input type="number" id="goldMax" placeholder="100000"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>兌換比率</label><input type="text" id="goldRate" placeholder="1:1"><div class="form-hint">金幣:遊戲幣</div></div>
          <div class="form-group"><label>狀態</label><select id="goldStatus"><option value="on">啟用</option><option value="off">停用</option></select></div>
        </div>
      </div>
      <div style="margin-top:18px;padding-top:14px;border-top:1px solid #E5E7EB">
        <h4 style="font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span class="coin-icon coin-star" style="width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px">S</span> 星幣設定</h4>
        <div class="form-row">
          <div class="form-group"><label>最低投注</label><input type="number" id="starMin" placeholder="100"></div>
          <div class="form-group"><label>最高投注</label><input type="number" id="starMax" placeholder="50000"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>兌換比率</label><input type="text" id="starRate" placeholder="10:1"><div class="form-hint">星幣:遊戲幣</div></div>
          <div class="form-group"><label>狀態</label><select id="starStatus"><option value="on">啟用</option><option value="off">停用</option></select></div>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal('currencyModal')">取消</button><button class="btn-primary" onclick="saveCurrency()">儲存設定</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === Data Model ===
const halls = [
  {
    id: 'live', name: '真人娛樂廳', desc: '百家樂、龍虎、輪盤等真人遊戲',
    icon: 'live', status: 'on', 
    gold: {enabled:true, min:100, max:500000, rate:'1:1'},
    star: {enabled:true, min:1000, max:200000, rate:'10:1'},
    schedules: [{action:'off',start:'2026-05-10T03:00',end:'2026-05-10T05:00',note:'例行維護'}],
    games: [
      {name:'百家樂 A廳',provider:'AG',status:'online',goldMin:100,goldMax:500000,starMin:1000,starMax:200000},
      {name:'百家樂 B廳',provider:'DG',status:'online',goldMin:100,goldMax:300000,starMin:500,starMax:150000},
      {name:'龍虎鬥',provider:'AG',status:'online',goldMin:50,goldMax:200000,starMin:500,starMax:100000},
      {name:'輪盤',provider:'EVO',status:'online',goldMin:200,goldMax:100000,starMin:2000,starMax:50000}
    ]
  },
  {

// === Render ===
function renderHalls() {
  const container = document.getElementById('hallContainer');
  container.innerHTML = halls.map((hall, idx) => {
    const statusClass = hall.status === 'on' ? 'on' : (hall.schedules.length > 0 ? 'scheduled' : 'off');
    const statusText = hall.status === 'on' ? '運行中' : (hall.schedules.length > 0 ? '排程中' : '已關閉');
    const gameCount = hall.games.length;
    const onlineCount = hall.games.filter(g => g.status === 'online').length;

    let schedulesHtml = '';
    if (hall.schedules.length > 0) {
      schedulesHtml = hall.schedules.map((s, si) => `
        <div class="schedule-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <div class="schedule-info">
            <span class="schedule-time">${formatDateTime(s.start)}</span>
            ${s.end ? ' ~ <span class="schedule-time">' + formatDateTime(s.end) + '</span>' : ' (手動恢復)'}
            <span style="margin-left:8px;color:#6B7280">${s.action === 'off' ? '⏸ 關閉' : '▶ 開啟'}</span>
            ${s.note ? '<span style="margin-left:6px;font-style:italic">(' + s.note + ')</span>' : ''}
          </div>
          <button class="btn-del-schedule" onclick="deleteSchedule('${hall.id}',${si})" title="刪除排程"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      `).join('');
    }

    return `
    <div class="hall-card" id="hall-${hall.id}">
      <div class="hall-header" onclick="toggleHall('${hall.id}')">
        <div class="hall-icon ${hall.icon}">${getHallEmoji(hall.icon)}</div>
        <div class="hall-info">
          <div class="hall-name">${hall.name}</div>
          <div class="hall-desc">${hall.desc}</div>
          <div class="hall-badges">
            ${hall.gold.enabled ? '<span class="hall-badge gold">金幣</span>' : ''}
            ${hall.star.enabled ? '<span class="hall-badge star">星幣</span>' : ''}
            <span class="hall-badge count">${onlineCount}/${gameCount} 遊戲上線</span>
          </div>
        </div>
        <div class="hall-controls" onclick="event.stopPropagation()">
          <div class="hall-status">
            <div class="hall-status-dot ${statusClass}"></div>
            <span class="hall-status-text ${statusClass}">${statusText}</span>
          </div>
          <button class="toggle ${hall.status}" onclick="toggleHallStatus('${hall.id}')" title="快速開關"></button>
          <button class="hall-expand" id="expand-${hall.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>
        </div>
      </div>
      <div class="hall-body" id="body-${hall.id}">
        <div class="hall-body-inner">
          <!-- Quick Actions -->
          <div class="ctrl-section">
            <div class="ctrl-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>快速操作</div>
            <div class="ctrl-row">
              <button class="btn-quick ${hall.status === 'on' ? 'danger' : 'success'}" onclick="quickToggle('${hall.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
                ${hall.status === 'on' ? '立即關閉' : '立即開啟'}
              </button>
              <button class="btn-quick" onclick="openScheduleModal('${hall.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                新增排程
              </button>
              <button class="btn-quick" onclick="openCurrencyModal('${hall.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 100 4h4a2 2 0 110 4H8"/><path d="M12 18V6"/></svg>
                幣種設定
              </button>
              <div class="spacer"></div>
              <div class="override-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>廳級覆蓋中</div>
            </div>
          </div>

          <!-- Schedules -->
          <div class="ctrl-section">
            <div class="ctrl-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>排程列表</div>
            ${schedulesHtml || '<div class="ctrl-row" style="color:#9CA3AF;font-size:12px">尚無排程</div>'}
          </div>

          <!-- Currency Overview -->
          <div class="ctrl-section">
            <div class="ctrl-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 100 4h4a2 2 0 110 4H8"/><path d="M12 18V6"/></svg>幣種設定概覽</div>
            <div class="currency-grid">
              <div class="currency-card">
                <h4><span class="coin-icon coin-gold">G</span> 金幣 <span style="font-size:10px;font-weight:400;color:${hall.gold.enabled?'#059669':'#DC2626'}">${hall.gold.enabled?'啟用':'停用'}</span></h4>
                <div class="currency-field"><label>投注範圍</label><span style="font-size:12px">${hall.gold.enabled ? '$'+hall.gold.min.toLocaleString()+' ~ $'+hall.gold.max.toLocaleString() : '-'}</span></div>
                <div class="currency-field"><label>兌換比率</label><span style="font-size:12px">${hall.gold.rate || '-'}</span></div>
              </div>
              <div class="currency-card">
                <h4><span class="coin-icon coin-star">S</span> 星幣 <span style="font-size:10px;font-weight:400;color:${hall.star.enabled?'#059669':'#DC2626'}">${hall.star.enabled?'啟用':'停用'}</span></h4>
                <div class="currency-field"><label>投注範圍</label><span style="font-size:12px">${hall.star.enabled ? '$'+hall.star.min.toLocaleString()+' ~ $'+hall.star.max.toLocaleString() : '-'}</span></div>
                <div class="currency-field"><label>兌換比率</label><span style="font-size:12px">${hall.star.rate || '-'}</span></div>
              </div>
            </div>
          </div>

          <!-- Games in this hall -->
          <div class="hall-games">
            <div class="hall-games-title"><span>廳內遊戲（${gameCount}）</span><span style="font-size:11px;color:#9CA3AF">廳級設定覆蓋中的值以橘色標示</span></div>
            <div class="game-list">
              ${hall.games.map(g => {
                const isOverridden = hall.status === 'on';
                const goldOverridden = hall.gold.enabled && (g.goldMin !== hall.gold.min || g.goldMax !== hall.gold.max);
                const starOverridden = hall.star.enabled && g.starMin > 0 && (g.starMin !== hall.star.min || g.starMax !== hall.star.max);
                return `<div class="game-row">
                  <span class="game-name">${g.name}</span>
                  <span class="game-provider">${g.provider}</span>
                  <span style="flex:1"></span>
                  ${goldOverridden ? '<span class="game-override"><span class="overridden">金幣 $'+hall.gold.min.toLocaleString()+'~$'+hall.gold.max.toLocaleString()+'</span> <span class="game-original">原:$'+g.goldMin.toLocaleString()+'~$'+g.goldMax.toLocaleString()+'</span></span>' : '<span class="game-override">金幣 $'+g.goldMin.toLocaleString()+'~$'+g.goldMax.toLocaleString()+'</span>'}
                  ${starOverridden ? '<span class="game-override" style="margin-left:10px"><span class="overridden">星幣 $'+hall.star.min.toLocaleString()+'~$'+hall.star.max.toLocaleString()+'</span> <span class="game-original">原:$'+g.starMin.toLocaleString()+'~$'+g.starMax.toLocaleString()+'</span></span>' : (g.starMin > 0 ? '<span class="game-override" style="margin-left:10px">星幣 $'+g.starMin.toLocaleString()+'~$'+g.starMax.toLocaleString()+'</span>' : '')}
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function getHallEmoji(icon) {
  const map = {live:'🎰',slot:'🎮',chess:'♟',fish:'🐟',sport:'⚽'};
  return map[icon] || '🎲';
}

function formatDateTime(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}

// === Interactions ===
function toggleHall(id) {
  const body = document.getElementById('body-' + id);
  const btn = document.getElementById('expand-' + id);
  body.classList.toggle('open');
  btn.classList.toggle('open');
}

function toggleHallStatus(id) {
  const hall = halls.find(h => h.id === id);
  hall.status = hall.status === 'on' ? 'off' : 'on';
  renderHalls();
  showToast(hall.name + (hall.status === 'on' ? ' 已開啟' : ' 已關閉'), hall.status === 'on' ? 'success' : 'warning');
}

function quickToggle(id) {
  toggleHallStatus(id);
}

function openScheduleModal(hallId) {
  const select = document.getElementById('schedHall');
  select.innerHTML = halls.map(h => `<option value="${h.id}" ${h.id===hallId?'selected':''}>${h.name}</option>`).join('');
  document.getElementById('schedStart').value = '';
  document.getElementById('schedEnd').value = '';
  document.getElementById('schedNote').value = '';
  document.getElementById('scheduleModal').classList.add('show');
}

function openCurrencyModal(hallId) {
  const hall = halls.find(h => h.id === hallId);
  const select = document.getElementById('currHall');
  select.innerHTML = halls.map(h => `<option value="${h.id}" ${h.id===hallId?'selected':''}>${h.name}</option>`).join('');
  document.getElementById('goldMin').value = hall.gold.min || '';
  document.getElementById('goldMax').value = hall.gold.max || '';
  document.getElementById('goldRate').value = hall.gold.rate || '';
  document.getElementById('goldStatus').value = hall.gold.enabled ? 'on' : 'off';
  document.getElementById('starMin').value = hall.star.min || '';
  document.getElementById('starMax').value = hall.star.max || '';
  document.getElementById('starRate').value = hall.star.rate || '';
  document.getElementById('starStatus').value = hall.star.enabled ? 'on' : 'off';
  document.getElementById('currencyModal').classList.add('show');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function saveSchedule() {
  const hallId = document.getElementById('schedHall').value;
  const action = document.getElementById('schedAction').value;
  const start = document.getElementById('schedStart').value;
  const end = document.getElementById('schedEnd').value;
  const note = document.getElementById('schedNote').value;
  if (!start) { showToast('請選擇開始時間', 'error'); return; }
  const hall = halls.find(h => h.id === hallId);
  hall.schedules.push({action, start, end, note});
  closeModal('scheduleModal');
  renderHalls();
  showToast('排程已新增：' + hall.name, 'success');
}

function saveCurrency() {
  const hallId = document.getElementById('currHall').value;
  const hall = halls.find(h => h.id === hallId);
  hall.gold.min = parseInt(document.getElementById('goldMin').value) || 0;
  hall.gold.max = parseInt(document.getElementById('goldMax').value) || 0;
  hall.gold.rate = document.getElementById('goldRate').value;
  hall.gold.enabled = document.getElementById('goldStatus').value === 'on';
  hall.star.min = parseInt(document.getElementById('starMin').value) || 0;
  hall.star.max = parseInt(document.getElementById('starMax').value) || 0;
  hall.star.rate = document.getElementById('starRate').value;
  hall.star.enabled = document.getElementById('starStatus').value === 'on';
  closeModal('currencyModal');
  renderHalls();
  showToast('幣種設定已更新：' + hall.name, 'success');
}

function deleteSchedule(hallId, idx) {
  const hall = halls.find(h => h.id === hallId);
  hall.schedules.splice(idx, 1);
  renderHalls();
  showToast('排程已刪除', 'warning');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

// Sidebar & mobile
function toggleSidebarMobile() {
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    document.querySelector('.sidebar').classList.toggle('show');
    let ov = document.querySelector('.sidebar-overlay');
    if (!ov) { ov = document.createElement('div'); ov.className = 'sidebar-overlay'; document.body.appendChild(ov); ov.addEventListener('click', function(){ document.querySelector('.sidebar').classList.remove('show'); ov.classList.remove('show'); }); }
    ov.classList.toggle('show');
  } else {
    document.body.classList.toggle('sidebar-collapsed');
  }
}
function toggleUserMenu(){const el=document.querySelector('.sidebar-user');el.classList.toggle('open');event.stopPropagation();}
document.addEventListener('click',function(e){const u=document.querySelector('.sidebar-user');if(u&&!u.contains(e.target))u.classList.remove('open');});
function toggleSub(id){const el=document.getElementById(id);el.classList.toggle('open');const chev=el.previousElementSibling?.querySelector('.sidebar-chevron');if(chev)chev.classList.toggle('open');}

// Init
renderHalls();
</script>
