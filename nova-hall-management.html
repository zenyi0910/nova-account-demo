<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 娛樂廳管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F8F9FB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid oklch(0.922 0 0);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden;transition:transform .3s}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid oklch(0.922 0 0);display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;cursor:pointer}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-sub{font-size:10px;color:#9CA3AF;font-weight:500}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E0E7FF;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#4338CA;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:#6B7280}
.user-chevron{width:14px;height:14px;color:#9CA3AF;transform:rotate(180deg);transition:transform .2s}
.sidebar-user.open .user-chevron{transform:rotate(0deg);color:#4338CA}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200}
.sidebar-user.open .user-popover{display:block}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .3s}
.topbar{background:#fff;border-bottom:1px solid oklch(0.922 0 0);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.content{padding:24px;flex:1;max-width:1200px}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h4{font-size:18px;font-weight:600;color:#111827}
.page-header .desc{font-size:12px;color:#6B7280;margin-left:8px}
.hall-card{background:#fff;border:1px solid oklch(0.922 0 0);border-radius:12px;margin-bottom:20px;overflow:hidden;transition:box-shadow .2s}
.hall-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}
.hall-selector{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:#fff;border:1px solid oklch(0.922 0 0);border-radius:8px}
.hall-selector label{font-size:13px;font-weight:600;color:#374151}
.hall-selector select{padding:7px 12px;border:1px solid oklch(0.922 0 0);border-radius:6px;font-size:13px;font-family:inherit;min-width:200px}
.hall-selector select:focus{outline:none;border-color:#393939}
.hall-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid oklch(0.922 0 0);background:rgba(57,57,57,0.015)}
.hall-header .hall-name{font-size:15px;font-weight:600;color:#111827}
.hall-header .hall-meta{font-size:11px;color:#6B7280;margin-left:4px}
.hall-header .spacer{flex:1}
.hall-status{display:flex;align-items:center;gap:6px}
.hall-status .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hall-status .dot.on{background:#22C55E}
.hall-status .dot.off{background:#EF4444}
.hall-status .label{font-size:12px;font-weight:500}
.hall-status .label.on{color:#166534}
.hall-status .label.off{color:#991B1B}
.toggle{position:relative;width:36px;height:20px;border-radius:10px;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:oklch(0.777 0.152 181.912)}
.toggle.off{background:#D1D5DB}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:18px}
.toggle.off::after{left:2px}
.hall-body{padding:20px}
.hall-sections{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sec-card{border:1px solid oklch(0.922 0 0);border-radius:8px;padding:14px 16px}
.sec-card.gold{border-left:3px solid #D97706}
.sec-card.star{border-left:3px solid #7C3AED}
.sec-card.sched{border-left:3px solid #2563EB;grid-column:1/-1}
.sec-title{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:13px;font-weight:600;color:#111827}
.sec-title .icon{width:16px;height:16px;color:#6B7280}
.sec-title .sec-badge{margin-left:auto;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px}
.sec-badge.on{background:#DCFCE7;color:#166534}
.sec-badge.off{background:#FEE2E2;color:#991B1B}
.curr-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.curr-field{display:flex;flex-direction:column;gap:2px}
.curr-field label{font-size:10px;color:#6B7280;font-weight:500}
.curr-field .val{font-size:13px;color:#374151;font-weight:500}
.sched-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#F8FAFC;border-radius:6px;margin-bottom:6px}
.sched-item:last-child{margin-bottom:0}
.sched-item .sched-icon{width:14px;height:14px;color:#2563EB;flex-shrink:0}
.sched-item .sched-text{flex:1;font-size:12px;color:#374151}
.sched-item .sched-time{font-weight:600;color:#1E40AF}
.sched-action{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;display:inline-block}
.sched-action.off{background:#FEE2E2;color:#991B1B}
.sched-action.on{background:#DCFCE7;color:#166534}
.sched-item .del-btn{width:20px;height:20px;border-radius:4px;border:none;background:none;cursor:pointer;color:#9CA3AF;display:flex;align-items:center;justify-content:center}
.sched-item .del-btn:hover{background:#FEE2E2;color:#DC2626}
.sched-empty{font-size:12px;color:#9CA3AF;padding:8px 0}
.add-sched-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#2563EB;cursor:pointer;padding:4px 8px;border-radius:4px;border:1px dashed #93C5FD;background:none;margin-top:8px;font-family:inherit}
.add-sched-btn:hover{background:#EFF6FF}
.game-section{margin-top:24px}
.game-section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.game-section-header h5{font-size:14px;font-weight:600;color:#111827}
.game-section-header .count{font-size:11px;color:#6B7280;background:#F3F4F6;padding:2px 8px;border-radius:10px}
.filter-bar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:6px 10px;border:1px solid oklch(0.922 0 0);border-radius:6px;font-size:12px;font-family:inherit;min-width:140px}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:#393939}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid oklch(0.922 0 0);border-radius:8px;overflow:hidden}
.data-table th{background:rgba(57,57,57,0.04);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:#393939;border-bottom:1px solid oklch(0.922 0 0);white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid oklch(0.95 0 0);font-size:12px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(243,244,246,0.5)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-on{background:#DCFCE7;color:#166534}
.badge-off{background:#FEE2E2;color:#991B1B}
.badge-maint{background:#FEF3C7;color:#92400E}
.badge-soon{background:#DBEAFE;color:#1E40AF}
.override-indicator{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#D97706;font-weight:500;padding:1px 6px;border-radius:3px;background:rgba(217,119,6,0.08)}
.inherit-indicator{font-size:10px;color:#9CA3AF}
.val.override{color:#D97706;font-weight:600}
.orig{font-size:10px;color:#9CA3AF;text-decoration:line-through}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn svg{width:14px;height:14px}
.btn-primary{background:#393939;color:#fff}
.btn-primary:hover{background:#1a1a1a}
.btn-outline{border:1px solid oklch(0.922 0 0);background:#fff;color:#374151}
.btn-outline:hover{background:#F9FAFB}
.btn-danger{background:#DC2626;color:#fff}
.btn-danger:hover{background:#B91C1C}
.btn-sm{padding:5px 10px;font-size:11px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid oklch(0.922 0 0)}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B7280;font-size:18px}
.modal-close:hover{background:#F3F4F6}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid oklch(0.922 0 0);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid oklch(0.922 0 0);border-radius:6px;font-size:13px;font-family:inherit}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:#6B7280;margin-top:4px}
.info-box{padding:10px 12px;background:rgba(37,99,235,0.04);border:1px solid rgba(37,99,235,0.15);border-radius:6px;font-size:12px;color:#1E40AF;margin-bottom:14px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:9999;transform:translateX(120%);opacity:0;transition:all .3s;visibility:hidden}
.toast.show{transform:translateX(0);opacity:1;visibility:visible}
.toast.success{background:#393939}
.toast.error{background:#DC2626}
.toast.warning{background:#D97706}
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
@media(max-width:900px){.hall-sections{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{transform:translateX(-100%);position:fixed;z-index:100}.sidebar.show{transform:translateX(0)}.main{margin-left:0}.content{padding:12px}}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>
<div class="main">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebarMobile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">遊戲管理</a><span class="sep">&gt;</span><span class="current">娛樂廳管理</span></div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <h4>娛樂廳管理</h4>
      <span class="desc">廳級設定優先覆蓋個別遊戲，取消覆蓋後遊戲恢復原始設定</span>
      <span style="flex:1"></span>
      <button class="btn btn-primary" onclick="showToast('共用設定（Demo）','success')">共用設定</button>
    </div>
    <div id="hallCards"></div>
    <div class="hall-selector">
      <label>選擇娛樂城</label>
      <select id="hallSelect" onchange="switchHall()"></select>
    </div>
    <div id="hallDetail"></div>
    <div class="game-section">
      <div class="game-section-header">
        <h5>遊戲列表</h5>
        <span class="count" id="gameCount">28 筆</span>
      </div>
      <div class="filter-bar">
        <input type="text" placeholder="搜尋遊戲名稱..." id="filterName" oninput="filterGames()">
        <select id="filterHall" onchange="filterGames()"><option value="">所有娛樂城</option></select>
        <select id="filterStatus" onchange="filterGames()"><option value="">所有狀態</option><option>使用中</option><option>停用中</option><option>維護中</option><option>即將上線</option></select>
        <select id="filterCat" onchange="filterGames()"><option value="">所有種類</option></select>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>序號</th><th>娛樂城</th><th>種類</th><th>遊戲名稱</th><th>狀態</th><th>VIP</th><th>金幣投注</th><th>星幣投注</th><th>覆蓋狀態</th><th>操作</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<!-- Modal: 排程設定 -->
<div class="modal-overlay" id="schedModal">
  <div class="modal">
    <div class="modal-header"><h3>新增排程</h3><button class="modal-close" onclick="closeModal('schedModal')">&times;</button></div>
    <div class="modal-body">
      <div class="info-box">排程到達指定時間後自動執行開關動作，不需手動設定維護中即可快速關閉</div>
      <div class="form-group"><label>目標娛樂城</label><select id="sHall"><option value="VA">VA 娛樂城</option><option value="YGR">YGR 娛樂城</option></select></div>
      <div class="form-group"><label>動作</label><select id="sAction"><option value="off">關閉</option><option value="on">開啟</option></select></div>
      <div class="form-row">
        <div class="form-group"><label>開始時間</label><input type="datetime-local" id="sStart"></div>
        <div class="form-group"><label>結束時間（選填）</label><input type="datetime-local" id="sEnd"><div class="form-hint">留空表示手動恢復</div></div>
      </div>
      <div class="form-group"><label>備註</label><input type="text" id="sNote" placeholder="例：例行維護、版本更新"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('schedModal')">取消</button><button class="btn btn-primary" onclick="addSchedule()">新增排程</button></div>
  </div>
</div>
<!-- Modal: 幣種覆蓋設定 -->
<div class="modal-overlay" id="currModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header"><h3 id="currModalTitle">幣種設定</h3><button class="modal-close" onclick="closeModal('currModal')">&times;</button></div>
    <div class="modal-body">
      <div class="info-box">廳級幣種設定會覆蓋該廳所有遊戲的投注範圍。取消覆蓋後，遊戲自動恢復各自原始設定。</div>
      <div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px"><div style="width:8px;height:8px;border-radius:50%;background:#D97706"></div><span style="font-size:13px;font-weight:600">金幣設定</span></div>
        <div class="form-row"><div class="form-group"><label>最低投注</label><input type="number" id="cGoldMin" placeholder="10"></div><div class="form-group"><label>最高投注</label><input type="number" id="cGoldMax" placeholder="100000"></div></div>
        <div class="form-row"><div class="form-group"><label>兌換比率</label><input type="text" id="cGoldRate" placeholder="1:1"><div class="form-hint">金幣:遊戲幣</div></div><div class="form-group"><label>狀態</label><select id="cGoldStatus"><option value="on">啟用</option><option value="off">停用</option></select></div></div>
      </div>
      <div style="padding-top:14px;border-top:1px solid oklch(0.922 0 0)">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px"><div style="width:8px;height:8px;border-radius:50%;background:#7C3AED"></div><span style="font-size:13px;font-weight:600">星幣設定</span></div>
        <div class="form-row"><div class="form-group"><label>最低投注</label><input type="number" id="cStarMin" placeholder="100"></div><div class="form-group"><label>最高投注</label><input type="number" id="cStarMax" placeholder="50000"></div></div>
        <div class="form-row"><div class="form-group"><label>兌換比率</label><input type="text" id="cStarRate" placeholder="10:1"><div class="form-hint">星幣:遊戲幣</div></div><div class="form-group"><label>狀態</label><select id="cStarStatus"><option value="on">啟用</option><option value="off">停用</option></select></div></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('currModal')">取消</button><button class="btn btn-primary" onclick="saveCurr()">儲存設定</button></div>
  </div>
</div>
<!-- Modal: 快速開關確認 -->
<div class="modal-overlay" id="toggleConfirm">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><h3>確認操作</h3><button class="modal-close" onclick="closeModal('toggleConfirm')">&times;</button></div>
    <div class="modal-body"><p id="toggleMsg" style="font-size:13px;color:#374151;line-height:1.6"></p></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('toggleConfirm')">取消</button><button class="btn btn-danger" id="toggleConfirmBtn" onclick="confirmToggle()">確認</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/hall-management.js"></script>
</body>
</html>
