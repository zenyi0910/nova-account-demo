<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>星運娛樂城 - 排行榜</title>
<link rel="stylesheet" href="css/frontend.css">
<style>
.rank-tabs{display:flex;gap:0;background:#fff;border-radius:12px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.rank-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer;transition:all .2s}
.rank-tab.active{background:#991b1b;color:#fff}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:20px;padding:16px 0}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.podium-item.first{order:2}
.podium-item.second{order:1}
.podium-item.third{order:3}
.podium-avatar{width:48px;height:48px;border-radius:50%;background:#e2e8f0;border:3px solid #fbbf24;overflow:hidden;display:flex;align-items:center;justify-content:center}
.podium-item.first .podium-avatar{width:60px;height:60px;border-color:#fbbf24}
.podium-item.second .podium-avatar{border-color:#94a3b8}
.podium-item.third .podium-avatar{border-color:#d97706}
.podium-avatar svg{width:60%;height:60%;color:#94a3b8}
.podium-name{font-size:11px;font-weight:600;color:#1e293b;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-score{font-size:10px;color:#f59e0b;font-weight:700}
.podium-rank{font-size:18px;font-weight:900;color:#fbbf24}
.podium-item.second .podium-rank{color:#94a3b8}
.podium-item.third .podium-rank{color:#d97706}
.rank-list{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.rank-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f8fafc}
.rank-row:last-child{border-bottom:none}
.rank-num{width:24px;font-size:14px;font-weight:700;color:#64748b;text-align:center}
.rank-avatar-sm{width:32px;height:32px;border-radius:50%;background:#e2e8f0;margin:0 10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.rank-avatar-sm svg{width:60%;height:60%;color:#94a3b8}
.rank-name{flex:1;font-size:13px;font-weight:500;color:#1e293b}
.rank-score{font-size:13px;font-weight:700;color:#f59e0b}
</style>
</head>
