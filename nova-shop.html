<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>商城 — 星運娛樂城</title>
<link rel="stylesheet" href="css/frontend.css?v=4571e59">
</head>
<body>
<div class="mobile-frame">
<div class="subpage-overlay" onclick="if(event.target===this)window.location.href='nova-lobby.html'">
<div class="subpage-dialog">
<div class="subpage-header">
<h2>商城</h2>
</div>
<div class="subpage-tabs">
<button class="active" onclick="switchTab(this)">儲值優惠</button>
<button onclick="switchTab(this)">儲值紀錄</button>
<button onclick="switchTab(this)">文件夾</button>
</div>
<div class="store-section">
<div class="store-quick">
<div class="store-card-item">
<img src="assets/icon_coin_gold.png" style="width:28px;height:28px;margin-bottom:4px">
<div class="amount">51,500</div>
<button class="price-btn">$ 500</button>
<div class="bonus">贈 3%</div>
</div>
<div class="store-card-item">
<img src="assets/icon_coin_gold.png" style="width:28px;height:28px;margin-bottom:4px">
<div class="amount">104,000</div>
<button class="price-btn">$ 1,000</button>
<div class="bonus">贈 4%</div>
</div>
<div class="store-card-item">
<img src="assets/icon_coin_gold.png" style="width:28px;height:28px;margin-bottom:4px">
<div class="amount">515</div>
<button class="price-btn">$ 5</button>
<div class="bonus">贈 15</div>
</div>
<div class="store-card-item">
<img src="assets/icon_coin_gold.png" style="width:28px;height:28px;margin-bottom:4px">
<div class="amount">5,150</div>
<button class="price-btn">$ 50</button>
<div class="bonus">贈 150</div>
</div>
</div>
</div>
<div class="store-category">
<h3>一般儲值</h3>
<div class="store-method">
<button>線上轉點</button>
<button>電信帳單</button>
<button>Gash錢包扣點</button>
<button>Gash點數卡</button>
<button>7-11即時儲</button>
<button>行動支付</button>
</div>
</div>
<div class="subpage-bottom-close"><button onclick="window.location.href='nova-lobby.html'">關閉</button></div>
</div>
</div>
</div>
<script>
function switchTab(el){document.querySelectorAll('.subpage-tabs button').forEach(b=>b.classList.remove('active'));el.classList.add('active')}
</script>
</body>
</html>
