<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 儲值金額表 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F8F9FB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid oklch(0.922 0 0);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-sub{font-size:10px;color:#9CA3AF;font-weight:500}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;cursor:pointer}
.sidebar-user .user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.user-chevron{width:14px;height:14px;color:#9CA3AF;margin-left:auto;flex-shrink:0;transition:transform .2s}
.sidebar-user.open .user-chevron{transform:rotate(180deg)}
.user-popover{display:none;position:absolute;bottom:100%;left:12px;right:12px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200;margin-bottom:8px}
.sidebar-user.open .user-popover{display:block}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none;transition:background .15s}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid oklch(0.922 0 0);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header h4{font-size:18px;font-weight:600;color:#111827}
.tips-box{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(37,99,235,0.04);border:1px solid rgba(37,99,235,0.15);border-radius:8px;font-size:13px;color:#1E40AF;margin-bottom:16px}
.tips-box svg{color:#2563EB;flex-shrink:0}
.tips-box span{font-weight:600;color:#1E40AF}
.user-avatar{width:36px;height:36px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-weight:600;color:#4338CA;font-size:14px;cursor:pointer;margin-left:auto}

/* Filter */
.filter-bar{display:flex;align-items:flex-end;gap:12px;margin-bottom:20px}
.filter-field label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px}
.filter-field select{padding:8px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:13px;color:#374151;background:#fff;min-width:180px}
.filter-actions{display:flex;gap:8px;margin-left:auto}
.btn-primary{padding:8px 16px;background:#111827;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-primary:hover{background:#374151}
.btn-secondary{padding:8px 16px;background:#F3F4F6;color:#111827;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-secondary:hover{background:#E5E7EB}
.btn-add{padding:8px 16px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-add:hover{background:#047857}

/* Table */
.tbl-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.tbl-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #E5E7EB}
.tbl-info{font-size:13px;color:#6B7280}
.flat-table{width:100%;border-collapse:collapse}
.flat-table th{background:#F9FAFB;padding:10px 16px;text-align:left;font-weight:600;font-size:12px;color:#6B7280;border-bottom:1px solid #E5E7EB}
.flat-table td{padding:10px 16px;border-bottom:1px solid #F3F4F6;font-size:13px;color:#374151;vertical-align:middle}
.flat-table tr:last-child td{border-bottom:none}
.flat-table tr:hover{background:#FAFBFF}

/* Left border indicators — clean grouped lines */
.flat-table td.col-lines{padding:0;width:20px;position:relative}
.line-prov{position:absolute;left:4px;top:0;bottom:0;width:3px;border-radius:1.5px;background:#E5E7EB}
.line-method{position:absolute;left:11px;top:0;bottom:0;width:1.5px;background:#F3F4F6}
/* First/last row rounding */
.row-first .line-prov{top:50%;border-radius:1.5px 1.5px 0 0}
.row-last .line-prov{bottom:50%;border-radius:0 0 1.5px 1.5px}
.row-only .line-prov{top:50%;bottom:50%;height:auto;border-radius:1.5px}

/* Provider group header */
.prov-header{cursor:pointer;background:#FAFBFF}
.prov-header:hover{background:#EEF2FF}
.prov-header td{font-weight:600;color:#111827;padding:12px 16px}
.prov-toggle{display:inline-flex;align-items:center;gap:8px}
.prov-chevron{display:inline-flex;transition:transform .2s;color:#6B7280}
.prov-chevron.open{transform:none}
.prov-name{font-size:13px;font-weight:600;color:#111827}
.prov-code{font-size:11px;color:#9CA3AF;font-weight:400;margin-left:6px}
.prov-count{font-size:12px;color:#6B7280;font-weight:400;margin-left:12px}
.prov-cell{vertical-align:middle;background:#FAFBFF;border-right:1px solid #E5E7EB;cursor:pointer;padding:8px 10px !important;text-align:center;width:90px}
.prov-cell:hover{background:#EEF2FF}
.prov-cell .prov-name{display:block;font-size:12px;margin-top:4px}
.prov-cell .prov-code{display:block;margin-left:0;margin-top:2px}
.prov-cell .prov-chevron{margin-bottom:2px}
.prov-cell .prov-count{display:block;font-size:11px;color:#9CA3AF;margin-top:4px}

/* Status */
.status-on{color:#059669;font-size:12px;font-weight:500}
.status-off{color:#DC2626;font-size:12px;font-weight:500}

/* Toggle switch (shared component) */
.toggle{position:relative;width:36px;height:20px;border-radius:10px;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:oklch(0.777 0.152 181.912)}
.toggle.off{background:#D1D5DB}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:18px}
.toggle.off::after{left:2px}

/* Badge (shared component) */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500}
.badge-on{background:#D1FAE5;color:#065F46}
.badge-off{background:#FEE2E2;color:#991B1B}

/* Channel badges */
.ch-list{display:flex;flex-wrap:wrap;gap:4px}
.ch-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.ch-badge.off{background:#F9FAFB;color:#9CA3AF;border-color:#E5E7EB}
.ch-dot{width:6px;height:6px;border-radius:50%;background:#10B981}
.ch-dot.off{background:#D1D5DB}

/* Actions — spread left/right */
.act-cell{display:flex;align-items:center;justify-content:space-between}

/* Modal — use shared component styles */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal.expanded{max-width:100vw;max-height:100vh;width:100vw;height:100vh;border-radius:0}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #E5E7EB}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close,.modal-expand{background:none;border:none;font-size:18px;cursor:pointer;color:#6B7280;padding:4px 8px;border-radius:4px}
.modal-close:hover,.modal-expand:hover{background:#F3F4F6}
.modal-body{padding:24px}
.modal-footer{display:flex;justify-content:flex-end;gap:12px;padding:16px 24px;border-top:1px solid #E5E7EB}
.btn{padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-dark{background:#1F2937;color:#fff;border:none}
.btn-dark:hover{background:#111827}
.btn-outline{background:#fff;color:#374151;border:1px solid #D1D5DB}
.btn-outline:hover{background:#F9FAFB}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#374151;margin-bottom:4px;font-weight:500}
.form-control{width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:8px;font-size:13px;background:#fff;font-family:inherit}
.form-row{display:flex;gap:16px;margin-bottom:0}
.form-row .form-group{flex:1}
.bp-info-card{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:16px}
.bp-info-card h5{margin:0 0 12px;font-size:14px;color:#374151}
.bp-info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F3F4F6;font-size:13px}
.bp-info-row:last-child{border-bottom:none}
.bp-label{color:#6B7280}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:#F9FAFB;padding:10px 12px;text-align:left;font-weight:600;color:#374151;border-bottom:1px solid #E5E7EB}
.data-table td{padding:10px 12px;border-bottom:1px solid #F3F4F6;color:#374151}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js?v=4"></script>

<div class="main">
  <div class="topbar">
    <nav class="breadcrumb">
      <a href="#">首頁</a><span class="sep">/</span>
      <a href="nova-payment-management.html">帳務管理</a><span class="sep">/</span>
      <span class="current">儲值金額表</span>
    </nav>
    <div class="user-avatar" style="margin-left:auto;display:none">C</div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <h4>儲值金額表</h4>
      <span id="btnAdd" style="margin-left:auto"></span>
    </div>
    <div class="tips-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M12 2v5"/><path d="M14.829 15.998a3 3 0 1 1-5.658 0"/><path d="M20.92 14.606A1 1 0 0 1 20 16H4a1 1 0 0 1-.92-1.394l3-7A1 1 0 0 1 7 7h10a1 1 0 0 1 .92.606z"/></svg>
      <span>Tips</span> 該功能僅支援金幣類型。
    </div>
    <div class="filter-bar">
      <div class="filter-field"><label>供應商</label><select id="providerFilter"><option value="all">全部供應商</option></select></div>
      <div class="filter-field"><label>狀態</label><select id="billingFilter"><option value="all">選擇啟用狀態</option><option value="on">啟用中</option><option value="off">停用中</option></select></div>
      <div class="filter-actions" id="filterBtns"></div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-header">
        <span class="tbl-info" id="tblInfo"></span>
      </div>
      <table class="flat-table">
        <thead><tr><th>支付方式</th><th>付款通道</th><th>狀態</th><th style="width:80px">操作</th></tr></thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h3 id="detailTitle">儲值金額表明細</h3><div style="display:flex;gap:4px"><button class="modal-expand" onclick="toggleExpand(this)">⤢</button><button class="modal-close" onclick="closeModal()">&times;</button></div></div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<script src="js/components.js?v=2"></script>
<script src="js/billing-plans-v2.js?v=3"></script>
</body>
</html>
