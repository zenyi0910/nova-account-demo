<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 用戶查詢</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}

.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub .sidebar-item{transform:translateY(-4px);opacity:0;transition:transform .3s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub.open .sidebar-item{transform:translateY(0);opacity:1}
.sidebar-sub.open .sidebar-item:nth-child(1){transition-delay:0.03s}
.sidebar-sub.open .sidebar-item:nth-child(2){transition-delay:0.06s}
.sidebar-sub.open .sidebar-item:nth-child(3){transition-delay:0.09s}
.sidebar-sub.open .sidebar-item:nth-child(4){transition-delay:0.12s}
.sidebar-sub.open .sidebar-item:nth-child(5){transition-delay:0.15s}
.sidebar-sub.open .sidebar-item:nth-child(6){transition-delay:0.18s}
.sidebar-sub.open .sidebar-item:nth-child(7){transition-delay:0.21s}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item:hover{color:#111827}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}
.btn-batch,.btn-export,.btn-secondary{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-secondary{background:#6B7280;color:#fff;border:none}
.btn-secondary:hover{background:#4B5563}
.btn-secondary svg{width:16px;height:16px}
.btn-batch{background:#fff;color:#374151;border:1px solid #D1D5DB}
.btn-batch:hover{background:#F3F4F6;border-color:#9CA3AF}
.btn-batch svg{width:16px;height:16px}
.btn-export{background:#1F2937;color:#fff;border:none}
.btn-export:hover{background:#111827}
.btn-export svg{width:16px;height:16px}
.filter-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-actions{order:999;margin-left:auto;display:flex;gap:8px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px;max-width:200px}
.filter-group.filter-wide{min-width:280px;max-width:360px}
.filter-group label{font-size:11px;font-weight:500;color:#6B7280}
.filter-input{display:flex;align-items:center;gap:6px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:7px 10px;font-size:13px;color:#374151;min-width:130px}
.filter-input svg{width:14px;height:14px;color:#9CA3AF;flex-shrink:0}
.filter-input input{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;width:100%}
.filter-input input::placeholder{color:#9CA3AF}
.filter-input select{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;cursor:pointer;-webkit-appearance:none;width:100%}
.btn-search{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#fff;background:#1F2937}
.btn-search:hover{background:#111827}
.btn-search svg{width:14px;height:14px}
.btn-reset{padding:7px 14px;border-radius:6px;border:1px solid #E5E7EB;cursor:pointer;font-size:13px;font-family:inherit;color:#374151;background:#fff}
.btn-reset:hover{background:#F3F4F6}
.btn-advanced{display:flex;align-items:center;gap:4px;background:none;border:none;color:#6B7280;font-size:13px;cursor:pointer;padding:7px 8px;font-family:inherit}
.btn-advanced:hover{color:#374151}
.btn-advanced svg{width:14px;height:14px;transition:transform .2s}
.btn-advanced.open svg{transform:rotate(180deg)}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.data-table th{background:#F5F5F5;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;border-bottom:1px solid #E5E7EB}
.data-table td{padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:#FAFAFA}
.toggle{position:relative;width:36px;height:20px;border-radius:10px;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:#26A69A}
.toggle.off{background:#D1D5DB}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:18px}
.toggle.off::after{left:2px}
.toggle-label{font-size:11px;margin-left:4px}
.toggle-label.on{color:#16a34a}
.toggle-label.off{color:#9CA3AF}
.btn-edit{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px;border-radius:4px}
.btn-edit:hover{color:#374151}
.btn-edit svg{width:16px;height:16px}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500}
.status-online{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.status-online::before{content:'';width:6px;height:6px;border-radius:50%;background:#22C55E}
.status-maint{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.status-maint::before{content:'';width:6px;height:6px;border-radius:50%;background:#F59E0B}
.status-offline{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}
.status-offline::before{content:'';width:6px;height:6px;border-radius:50%;background:#EF4444}
.pagination-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;color:#6B7280}
.pagination-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:8px 0;font-size:12px;color:#6B7280}
.pagination-pages{display:flex;align-items:center;gap:4px}
.pagination-pages button{min-width:28px;height:28px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#374151;display:flex;align-items:center;justify-content:center}
.pagination-pages button:hover{background:#F3F4F6;border-color:#D1D5DB}
.pagination-pages button.active{background:#1F2937;color:#fff;border-color:#1F2937}
.pagination-pages button:disabled{opacity:.4;cursor:not-allowed}
.source-badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;background:#134E4A;color:#fff}


.sidebar-user{position:relative;cursor:pointer}
.user-chevron{width:14px;height:14px;color:#9CA3AF;margin-left:auto;flex-shrink:0;transition:transform .2s}
.sidebar-user.open .user-chevron{transform:rotate(0deg);color:#4338CA}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200;opacity:0;transform:translateX(-4px);transition:opacity .2s ease,transform .2s ease}
.sidebar-user.open .user-popover{display:block;opacity:1;transform:translateX(0)}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none;transition:background .15s}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
.sidebar{transition:transform .3s cubic-bezier(.25,.1,.25,1)}
.main{transition:margin-left .3s cubic-bezier(.25,.1,.25,1)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed;z-index:100;transition:transform .3s}
.sidebar.show{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.main{margin-left:0}
.topbar{padding:0 12px}
.content{padding:12px}
.filter-card{flex-direction:column;}
.filter-group{max-width:100%}
.filter-actions{margin-left:0;width:100%;justify-content:flex-start}
.filter-group{width:100%}
.filter-input{width:100%}
.data-table{display:block;overflow-x:auto;white-space:nowrap}
}
.filter-error{font-size:11px;color:#DC2626;margin-top:3px;display:none}
.filter-group.has-error .filter-error{display:block}
.filter-group.has-error .filter-input{border-color:#DC2626}

/* Sticky Filter Collapse */
.filter-fab{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:50;height:32px;padding:0 16px;border-radius:16px;background:#fff;color:#374151;border:1px solid #E5E7EB;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.08);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;font-size:12px;font-weight:500;font-family:inherit}
.filter-fab.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.filter-fab:hover{background:#F9FAFB;border-color:#D1D5DB;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.filter-fab svg{width:14px;height:14px;color:#6B7280}

.filter-card.sticky-open{position:fixed;top:52px;left:250px;right:0;z-index:45;margin:0;border-radius:0 0 10px 10px;border-top:none;box-shadow:0 8px 24px rgba(0,0,0,.08);animation:filterSlideDown .3s cubic-bezier(.25,.1,.25,1);padding:12px 20px}
@keyframes filterSlideDown{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}
.sidebar-collapsed .filter-card.sticky-open{left:0}

/* Batch dropdown */
.batch-dropdown{position:relative;display:inline-block}
.batch-dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:1px solid #E5E7EB;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:160px;z-index:100;padding:4px 0}
.batch-dropdown-menu.show{display:block}
.batch-dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:13px;color:#374151;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .15s}
.batch-dropdown-item:hover{background:#F3F4F6}
.batch-dropdown-item svg{width:16px;height:16px;color:#6B7280;flex-shrink:0}

/* Date Range Picker */
.date-picker-wrap{position:relative}
.date-picker-trigger{display:flex;align-items:center;gap:8px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:7px 12px;font-size:13px;color:#374151;cursor:pointer;min-width:180px;white-space:nowrap}
.date-picker-trigger svg{width:16px;height:16px;color:#6B7280;flex-shrink:0}
.date-picker-trigger:hover{border-color:#3B82F6}
.date-picker-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:1000;background:#fff;border:1px solid #E5E7EB;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.12);padding:16px}
.date-picker-panel.show{display:flex;gap:12px}
.date-picker-left{display:flex;flex-direction:column;width:224px}
.date-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.date-cal-header span{font-size:13px;font-weight:600;color:#1F2937}
.date-cal-header button{background:none;border:none;cursor:pointer;color:#6B7280;font-size:16px;padding:2px 6px;border-radius:4px}
.date-cal-header button:hover{background:#F3F4F6}
.date-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.date-cal-grid .day-header{font-size:11px;color:#9CA3AF;padding:4px 0;font-weight:500}
.date-cal-grid .day{font-size:12px;padding:5px 0;border-radius:4px;cursor:pointer;color:#374151}
.date-cal-grid .day:hover{background:#EFF6FF}
.date-cal-grid .day.disabled{color:#D1D5DB;cursor:not-allowed;pointer-events:none}
.date-cal-grid .day.other-month{color:#D1D5DB}
.date-cal-grid .day.in-range{background:#DBEAFE;color:#1E40AF}
.date-cal-grid .day.range-start,.date-cal-grid .day.range-end{background:#2563EB;color:#fff;border-radius:50%}
.date-cal-grid .day.today{font-weight:700;box-shadow:inset 0 0 0 1px #3B82F6}
.date-time-row{display:flex;align-items:center;gap:8px;padding-top:10px;margin-top:10px;border-top:1px solid #E5E7EB}
.date-time-group{display:flex;align-items:center;gap:4px;font-size:12px;color:#6B7280}
.date-time-group label{font-weight:500;white-space:nowrap;font-size:10px;color:#9CA3AF}
.date-time-input{width:32px;height:26px;border:1px solid #E5E7EB;border-radius:4px;text-align:center;font-size:12px;font-weight:500;color:#374151;padding:0}
.date-time-input:focus{outline:none;border-color:#3B82F6}
.date-time-sep{font-size:12px;font-weight:600;color:#9CA3AF}
.date-time-dash{font-size:12px;color:#9CA3AF;padding:0 4px}
.date-quick-select{width:80px;display:flex;flex-direction:column;gap:4px;border-left:1px solid #E5E7EB;padding-left:12px}
.date-quick-title{font-size:10px;font-weight:600;color:#9CA3AF;margin-bottom:2px}
.date-quick-btn{padding:5px 8px;border:1px solid #E5E7EB;border-radius:5px;background:#fff;font-size:12px;color:#374151;cursor:pointer;transition:all .15s;text-align:left;font-weight:500;white-space:nowrap}
.date-quick-btn:hover{background:#EFF6FF;border-color:#3B82F6;color:#2563EB}
.date-quick-btn.active{background:#EFF6FF;border-color:#3B82F6;color:#2563EB}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>


<!-- Filter FAB (appears on scroll) -->
<button class="filter-fab" id="filterFab" title="回到頂部搜尋">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
</button>

<div class="main">
  <div class="topbar">
    <button class="topbar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">用戶管理</a><span class="sep">&gt;</span><span class="current">用戶查詢</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header">
      <h1>用戶查詢</h1>
      <div class="spacer"></div>
      <button class="btn-batch" id="batchBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>批次操作</button>
      <button class="btn-export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>匯出報表</button>
    </div>
    <div class="filter-card">
      <div class="filter-group filter-wide" data-rule="account"><label>帳號</label><div class="filter-input"><input type="text" placeholder="搜尋帳號（可以輸入多個，請以半形逗號隔開）"></div><div class="filter-error"></div></div>
      <div class="filter-group"><label>狀態</label><div class="filter-input"><select><option value="">全部狀態</option><option>啟用</option><option>停用</option><option>凍結</option></select></div></div>
      <div class="filter-group"><label>所屬公會</label><div class="filter-input"><select><option value="">請選擇所屬公會</option><option>Elina公會</option><option>龍之谷</option><option>星辰戰隊</option><option>皇家俱樂部</option><option>蛋捲公會</option></select></div></div>
      <div class="filter-group" data-rule="nickname"><label>暱稱</label><div class="filter-input"><input type="text" placeholder="搜尋暱稱"></div><div class="filter-error"></div></div>
      <div class="filter-group" data-rule="phone"><label>手機號碼</label><div class="filter-input"><input type="text" placeholder="搜尋手機號碼"></div><div class="filter-error"></div></div>
      <div class="filter-group"><label>註冊來源</label><div class="filter-input"><select><option value="">請選擇註冊來源</option><option>手機</option><option>LINE</option><option>Telegram</option><option>OpenXin</option></select></div></div>

// Field validation
document.querySelector('.btn-search')?.addEventListener('click', function(e) {
  let valid = true;
  document.querySelectorAll('.filter-error').forEach(el => el.textContent = '');
  document.querySelectorAll('.filter-group[data-rule]').forEach(group => {
    const rule = group.dataset.rule;
    const input = group.querySelector('input');
    if (!input) return;
    const val = input.value.trim();
    if (!val) return;
    let errorMsg = '';
    switch(rule) {
      case 'account':
        const accounts = val.split(',').map(s => s.trim()).filter(s => s);
        for (const acc of accounts) {
          if (!/^[a-zA-Z0-9_]{2,20}$/.test(acc)) { errorMsg = '帳號格式：2~20字元英數底線'; break; }
        }
        break;
      case 'nickname':
        if (val.length < 1 || val.length > 16) errorMsg = '暱稱長度：1~16字元';
        break;
      case 'order':
        if (!/^[a-zA-Z0-9_-]{4,30}$/.test(val)) errorMsg = '編號格式：4~30字元英數';
        break;
      case 'phone':
        if (!/^09\d{8}$/.test(val)) errorMsg = '格式：09開頭共10碼';
        break;
      case 'date':
        if (val.includes('~')) {
          const parts = val.split('~').map(s => s.trim());
          const dateRe = /^\d{4}-\d{2}-\d{2}$/;
          if (!dateRe.test(parts[0]) || !dateRe.test(parts[1])) errorMsg = '格式：YYYY-MM-DD ~ YYYY-MM-DD';
          else if (parts[0] > parts[1]) errorMsg = '開始日期不可大於結束日期';
        } else {
          if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) errorMsg = '格式：YYYY-MM-DD ~ YYYY-MM-DD';
        }
        break;
      case 'keyword':
        if (val.length < 1) errorMsg = '請輸入搜尋內容';
        break;
      case 'amount':
        if (!/^\d+(\.\d{1,2})?$/.test(val)) errorMsg = '請輸入有效金額';
        break;
    }
    if (errorMsg) {
      valid = false;
      const errEl = group.querySelector('.filter-error');
      if (errEl) errEl.textContent = errorMsg;
    }
  });
});

// === User Data Generation & Pagination ===
(function(){
  const TOTAL = 847;
  const nicknames = ['玩家','用戶','會員','新手','高手','大師','俠客','遊俠'];
  const guilds = ['','','','','','','Elina公會','公會_A','公會_B','公會_C','公會_D','龍之谷','星辰戰隊','皇家俱樂部','蛋捲公會'];
  const sources = [{name:'手機',cls:'source-phone'},{name:'LINE',cls:'source-line'},{name:'Telegram',cls:'source-telegram'},{name:'OpenXin',cls:'source-openxin'}];
  const statuses = [{name:'啟用',cls:'status-online'},{name:'停用',cls:'status-offline'},{name:'凍結',cls:'status-maint'}];

  // 產生固定隨機資料
  function seededRand(seed){ return function(){ seed=(seed*16807)%2147483647; return(seed-1)/2147483646; }; }
  const rand = seededRand(42);
  window.allUsers = [];
  for(let i=0;i<TOTAL;i++){
    const r = rand;
    const suffixes = ['001','888','999','520','168','666']; const nick = nicknames[Math.floor(r()*nicknames.length)] + suffixes[Math.floor(r()*suffixes.length)] + String(Math.floor(r()*9000)+1000);
    const guildIdx = Math.floor(r()*guilds.length);
    const acct = String.fromCharCode(65+Math.floor(r()*26)) + String.fromCharCode(97+Math.floor(r()*26)) + String.fromCharCode(97+Math.floor(r()*26)) + Math.floor(r()*9000+1000);
    const src = sources[Math.floor(r()*sources.length)];
    const hasPhone = r()>0.4;
const phone = hasPhone ? '09'+String(Math.floor(r()*90000000+10000000)) : '-';
    const vip = Math.floor(r()*6)+1;
    const levels = ['預設','預設','預設','預設','VVIP','貴賓','高風險','觀察中'];
    const level = levels[Math.floor(r()*levels.length)];
    const baseDate = new Date(2025,6,1);
    const regDate = new Date(baseDate.getTime() + Math.floor(r()*300)*86400000);
    const lastLogin = new Date(regDate.getTime() + Math.floor(r()*60)*86400000);
    const statusIdx = r()<0.82?0:(r()<0.6?1:2);
    allUsers.push({nick,guild:guilds[guildIdx],acct,src,phone,vip,level,regDate,lastLogin,status:statuses[statusIdx]});
  }
  // 按註冊時間降序
  allUsers.sort((a,b)=>b.regDate-a.regDate);

  // Handle URL param ?level=XXX
  const urlParams = new URLSearchParams(window.location.search);
  const levelParam = urlParams.get('level');
  if (levelParam) {
    const levelSelect = document.getElementById('levelFilter');
    if (levelSelect) {
      for (let opt of levelSelect.options) {
        if (opt.value === levelParam || opt.textContent === levelParam) { opt.selected = true; break; }
      }
    }
  }

  let currentPage = 1;
  let pageSize = 20;
  const tbody = document.getElementById('userTableBody');
  const info = document.getElementById('paginationInfo');
  const footer = document.getElementById('paginationFooter');
  const pageSizeSelect = document.getElementById('pageSizeSelect');

  function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

  function render(){
    const totalPages = Math.ceil(TOTAL/pageSize);
    if(currentPage>totalPages) currentPage=totalPages;
    const start = (currentPage-1)*pageSize;
    const end = Math.min(start+pageSize, TOTAL);
    const slice = allUsers.slice(start, end);

    tbody.innerHTML = slice.map((u, i) => `<tr>
      <td><a href="#" style="color:#0D9488;text-decoration:none;font-weight:500">${u.nick}</a></td>
      <td>${u.guild?'<a href="#" style="color:#059669;text-decoration:none">'+u.guild+'</a>':'<span style="color:#D1D5DB">-</span>'}</td>
      <td style="font-family:monospace;font-size:12px">${u.acct}</td>
      <td><span class="source-badge">${u.src.name}</span></td>
      <td style="color:${u.phone==='-'?'#9CA3AF':'#374151'}">${u.phone==='—'||u.phone==='-'?'未綁定':u.phone}</td>
      <td>VIP ${u.vip}</td>
      <td style="color:#6B7280;font-size:12px">${fmtDate(u.regDate)}</td>
      <td style="color:#6B7280;font-size:12px">${fmtDate(u.lastLogin)}</td>
      <td><span class="status-badge ${u.status.cls}">${u.status.name}</span></td>
      <td><button onclick="showActionMenu(event,${start + i})" style="background:none;border:none;cursor:pointer;padding:4px;color:#6B7280"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button></td>
    </tr>`).join('');

    info.textContent = `第 ${currentPage} 頁，共 ${TOTAL.toLocaleString()} 筆資料`;

    // Pagination buttons
    let pages = '';
    pages += `<button ${currentPage<=1?'disabled':''} data-p="${currentPage-1}">&lt;</button>`;
    const maxBtns = 7;
    let pStart = Math.max(1, currentPage - 3);
    let pEnd = Math.min(totalPages, pStart + maxBtns - 1);
    if(pEnd - pStart < maxBtns-1) pStart = Math.max(1, pEnd - maxBtns + 1);
    if(pStart>1){ pages+=`<button data-p="1">1</button>`; if(pStart>2) pages+=`<span style="padding:0 4px">...</span>`; }
    for(let p=pStart;p<=pEnd;p++) pages+=`<button data-p="${p}" class="${p===currentPage?'active':''}">${p}</button>`;
    if(pEnd<totalPages){ if(pEnd<totalPages-1) pages+=`<span style="padding:0 4px">...</span>`; pages+=`<button data-p="${totalPages}">${totalPages}</button>`; }
    pages += `<button ${currentPage>=totalPages?'disabled':''} data-p="${currentPage+1}">&gt;</button>`;

    footer.innerHTML = `<span>顯示 ${start+1}-${end} 筆，共 ${TOTAL.toLocaleString()} 筆</span><div class="pagination-pages">${pages}</div>`;
    footer.querySelectorAll('button[data-p]').forEach(btn=>{
      btn.addEventListener('click',function(){ currentPage=+this.dataset.p; render(); window.scrollTo({top:0,behavior:'smooth'}); });
    });
  }

  pageSizeSelect.addEventListener('change',function(){ pageSize=+this.value; currentPage=1; render(); });
  render();
})();

// === Batch Operation Mode ===
(function(){
  const btn = document.getElementById('batchBtn');
  if(!btn) return;
  let batchMode = false;
  const pageHeader = document.querySelector('.page-header');
  const exportBtn = document.querySelector('.btn-export');

  // Create batch action buttons (hidden by default, inserted into page-header)
  const batchActions = document.createElement('span');
  batchActions.id = 'batchActions';
  batchActions.style.cssText = 'display:none;align-items:center;gap:6px';
  batchActions.innerHTML = `
    <button id="batchClose" class="btn-batch" style="background:#6B7280;color:#fff;border-color:#6B7280">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>關閉批次操作</button>
    <button id="batchStatus" class="btn-batch" style="background:#3B82F6;color:#fff;border-color:#3B82F6">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>狀態調整(<span id="batchStatusCount">0</span>)</button>
    <button id="batchVip" class="btn-batch" style="background:#6366F1;color:#fff;border-color:#6366F1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>VIP等級調整(<span id="batchVipCount">0</span>)</button>
  `;
  // Insert into page-header, before export button
  pageHeader.insertBefore(batchActions, exportBtn);

  function getSelectedCount(){
    return document.querySelectorAll('.batch-checkbox:checked').length;
  }
  function updateCounts(){
    const c = getSelectedCount();
    document.getElementById('batchStatusCount').textContent = c;
    document.getElementById('batchVipCount').textContent = c;
  }

  function enterBatchMode(){
    batchMode = true;
    btn.style.display = 'none';
    batchActions.style.display = 'flex';
    // Add checkbox column to table
    const table = document.querySelector('.data-table');
    const headerRow = table.querySelector('thead tr');
    const thCheck = document.createElement('th');
    thCheck.style.cssText = 'width:40px;text-align:center';
    thCheck.innerHTML = '<label style="cursor:pointer"><input type="checkbox" id="batchSelectAll" style="width:16px;height:16px;cursor:pointer;accent-color:#6366F1"></label>';
    headerRow.insertBefore(thCheck, headerRow.firstChild);
    // Add checkboxes to each row
    table.querySelectorAll('tbody tr').forEach(tr => {
      const td = document.createElement('td');
      td.style.cssText = 'text-align:center';
      td.innerHTML = '<input type="checkbox" class="batch-checkbox" style="width:16px;height:16px;cursor:pointer;accent-color:#6366F1">';
      tr.insertBefore(td, tr.firstChild);
    });
    // Select all handler
    document.getElementById('batchSelectAll').addEventListener('change', function(){
      document.querySelectorAll('.batch-checkbox').forEach(cb => { cb.checked = this.checked; });
      updateCounts();
    });
    // Individual checkbox handler
    table.addEventListener('change', function(e){
      if(e.target.classList.contains('batch-checkbox')){
        updateCounts();
        const all = document.querySelectorAll('.batch-checkbox');
        const checked = document.querySelectorAll('.batch-checkbox:checked');
        document.getElementById('batchSelectAll').checked = all.length === checked.length;
      }
    });
  }

  function exitBatchMode(){
    batchMode = false;
    btn.style.display = 'flex';
    batchActions.style.display = 'none';
    // Remove checkbox column
    const table = document.querySelector('.data-table');
    const headerRow = table.querySelector('thead tr');
    if(headerRow.firstChild && headerRow.firstChild.querySelector('#batchSelectAll')){
      headerRow.removeChild(headerRow.firstChild);
    }
    table.querySelectorAll('tbody tr').forEach(tr => {
      const first = tr.firstChild;
      if(first && first.querySelector('.batch-checkbox')){
        tr.removeChild(first);
      }
    });
  }

  btn.addEventListener('click', enterBatchMode);
  document.getElementById('batchClose').addEventListener('click', exitBatchMode);

  // Batch status adjustment dialog
  document.getElementById('batchStatus').addEventListener('click', function(){
    const count = getSelectedCount();
    if(count === 0){ alert('請先勾選要調整的用戶'); return; }
    const choice = prompt('批次狀態調整（已選 '+count+' 位用戶）\n\n請輸入目標狀態：\n1. 啟用\n2. 停用\n3. 凍結');
    if(choice){
      const statusMap = {'1':'啟用','2':'停用','3':'凍結'};
      const target = statusMap[choice] || choice;
      alert('已將 '+count+' 位用戶狀態調整為「'+target+'」');
      exitBatchMode();
    }
  });

  // Batch VIP adjustment dialog
  document.getElementById('batchVip').addEventListener('click', function(){
    const count = getSelectedCount();
    if(count === 0){ alert('請先勾選要調整的用戶'); return; }
    const choice = prompt('批次VIP等級調整（已選 '+count+' 位用戶）\n\n請輸入目標VIP等級 (1-6)：');
    if(choice && +choice >= 1 && +choice <= 6){
      alert('已將 '+count+' 位用戶VIP等級調整為 VIP '+choice);
      exitBatchMode();
    }
  });
})();

          <p style="font-size:14px;color:#111827;margin:4px 0 0">否</p>

        <div>

          <button style="padding:0 16px;border:none;background:#fff;font-size:12px;font-weight:500;color:#393939;border-radius:8px;cursor:pointer;height:calc(100% - 1px);box-shadow:0 1px 2px rgba(0,0,0,0.05)">金幣</button>
          <button style="padding:0 16px;border:none;background:transparent;font-size:12px;font-weight:500;color:#393939;border-radius:8px;cursor:pointer;height:calc(100% - 1px)">星幣</button>

      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        <div style="background:#fff;border-radius:10px;padding:16px"><div style="font-size:18px;font-weight:700">$1,000</div><div style="font-size:12px;color:#6B7280;margin-top:4px">當前餘額</div></div>
        <div style="background:#fff;border-radius:10px;padding:16px"><div style="font-size:18px;font-weight:700">$0</div><div style="font-size:12px;color:#6B7280;margin-top:4px">保險箱金額</div></div>
        <div style="background:#fff;border-radius:10px;padding:16px"><div style="font-size:18px;font-weight:700">$0</div><div style="font-size:12px;color:#6B7280;margin-top:4px">凍結金額</div></div>

      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px">
        <div style="background:#fff;border-radius:10px;padding:16px"><div style="font-size:18px;font-weight:700;color:#0D9488">$0</div><div style="font-size:12px;color:#6B7280;margin-top:4px">總儲值金額</div></div>
        <div style="background:#fff;border-radius:10px;padding:16px"><div style="font-size:18px;font-weight:700">0</div><div style="font-size:12px;color:#6B7280;margin-top:4px">儲值次數</div></div>

        <div style="background:#fff;border-radius:10px;padding:16px"><div style="font-size:18px;font-weight:700">$0</div><div style="font-size:12px;color:#6B7280;margin-top:4px">最後一筆儲值金額</div></div>
        <div style="background:#fff;border-radius:10px;padding:16px"><div style="font-size:18px;font-weight:700">-</div><div style="font-size:12px;color:#6B7280;margin-top:4px">最後一筆儲值時間</div></div>
      </div>
    </div>
    `;
}


// === Action Menu (操作功能) ===
function showActionMenu(e, idx) {
  e.stopPropagation();
  let menu = document.getElementById('actionMenu');
  if(!menu) {
    menu = document.createElement('div');
    menu.id = 'actionMenu';
    menu.style.cssText = 'position:fixed;z-index:999;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:6px 0;min-width:160px;display:none';
    menu.innerHTML = `
      <div style="padding:8px 14px;font-size:12px;font-weight:600;color:#6B7280">操作功能</div>
      <div class="action-item" data-action="detail" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#2563EB;transition:background .15s"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>檢視詳情</div>
      <div class="action-item" data-action="status" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#374151;transition:background .15s"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>狀態管理</div>
      <div class="action-item" data-action="vip" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#374151;transition:background .15s"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2"><path d="M2 4l3 12h14l3-12-5 4-5-6-5 6z"/><path d="M5 16h14v2H5z"/></svg>VIP管理</div>
      <div class="action-item" data-action="manual" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#374151;transition:background .15s"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0D9488" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>人工存提</div>
      <div class="action-item" data-action="level" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#374151;transition:background .15s"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="2"><path d="M2 20h20"/><path d="M5 20V10"/><path d="M9 20V4"/><path d="M13 20v-8"/><path d="M17 20V8"/></svg>層級管理</div>
      <div class="action-item" data-action="reset" style="display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#EA580C;transition:background .15s"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EA580C" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>歸零禁言次數</div>
    `;
    document.body.appendChild(menu);
    menu.querySelectorAll('.action-item').forEach(item => {
      item.addEventListener('mouseenter', function(){ this.style.background='#F3F4F6'; });
      item.addEventListener('mouseleave', function(){ this.style.background=''; });
      item.addEventListener('click', function(){
        const action = this.dataset.action;
        menu.style.display='none';
        const userIdx = +menu.dataset.idx;
        if(action==='detail') openUserDetail(userIdx);
        else if(action==='status') alert('狀態管理 - '+allUsers[userIdx].acct);
        else if(action==='vip') alert('VIP管理 - '+allUsers[userIdx].acct);
        else if(action==='manual') alert('人工存提 - '+allUsers[userIdx].acct);
        else if(action==='level') openLevelModal(userIdx);
        else if(action==='reset') alert('歸零禁言次數 - '+allUsers[userIdx].acct);
      });
    });
    document.addEventListener('click', function(){ menu.style.display='none'; });
  }
  menu.dataset.idx = idx;
  const rect = e.currentTarget.getBoundingClientRect();
  menu.style.display = 'block';
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.left = (rect.left - 120) + 'px';
  // Prevent overflow
  const menuRect = menu.getBoundingClientRect();
  if(menuRect.right > window.innerWidth) menu.style.left = (window.innerWidth - menuRect.width - 8) + 'px';
  if(menuRect.bottom > window.innerHeight) menu.style.top = (rect.top - menuRect.height - 4) + 'px';
}
// === Level Management Modal ===
function openLevelModal(idx) {
  const u = allUsers[idx];
  let modal = document.getElementById('levelModal');
  if(!modal) {
    modal = document.createElement('div');
    modal.id = 'levelModal';
    modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center';
    modal.innerHTML = `<div style="background:#fff;width:480px;max-width:90vw;border-radius:10px;overflow:hidden;border:1px solid #E8E8E8">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #E5E7EB">
        <span style="font-size:15px;font-weight:600;color:#111827">層級管理</span>
        <button id="levelModalClose" style="background:none;border:none;cursor:pointer;color:#666;padding:4px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      </div>
      <div id="levelModalBody" style="padding:20px"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #E5E7EB;background:#F9FAFB">
        <button id="levelModalCancel" style="padding:7px 16px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;font-size:13px;color:#374151;cursor:pointer">取消</button>
        <button id="levelModalSave" style="padding:7px 16px;border:none;border-radius:6px;background:#1F2937;font-size:13px;color:#fff;cursor:pointer">確認變更</button>
      </div>
    </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', function(e){ if(e.target===modal) modal.style.display='none'; });
    document.getElementById('levelModalClose').addEventListener('click', function(){ modal.style.display='none'; });
    document.getElementById('levelModalCancel').addEventListener('click', function(){ modal.style.display='none'; });
    document.getElementById('levelModalSave').addEventListener('click', function(){
      const selected = modal.querySelector('.level-opt.selected');
      if(selected) {
        const newLevel = selected.dataset.level;
        allUsers[+modal.dataset.idx].level = newLevel;
        modal.style.display='none';
        alert('已將用戶層級變更為「'+newLevel+'」');
      }
    });
  }
  modal.dataset.idx = idx;
  const levels = ['預設','VVIP','貴賓','高風險','觀察中'];
  const currentLevel = u.level || '預設';
  document.getElementById('levelModalBody').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:#6B7280;margin-bottom:4px">用戶帳號</div>
      <div style="font-size:14px;font-weight:500;color:#111827">${u.acct} (${u.nick})</div>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:12px;color:#6B7280;margin-bottom:8px">選擇層級</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${levels.map(lv => {
          const isActive = currentLevel === lv;
          const isDanger = lv==='高風險'||lv==='觀察中';
          const bg = isActive ? (isDanger ? '#FEE2E2' : '#F0FDF4') : '#fff';
          const border = isActive ? (isDanger ? '#FECACA' : '#BBF7D0') : '#E5E7EB';
          const color = isActive ? (isDanger ? '#DC2626' : '#16A34A') : '#374151';
          return '<span class="level-opt'+(isActive?' selected':'')+'" data-level="'+lv+'" style="display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid '+border+';background:'+bg+';color:'+color+';cursor:pointer">'+(isActive?'<svg width=\'12\' height=\'12\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'3\'><polyline points=\'20 6 9 17 4 12\'/></svg>':'')+lv+'</span>';
        }).join('')}
      </div>
    </div>`;
  // Click to select
  modal.querySelectorAll('.level-opt').forEach(opt => {
    opt.addEventListener('click', function(){
      modal.querySelectorAll('.level-opt').forEach(o => {
        const lv2 = o.dataset.level;
        const isDanger2 = lv2==='高風險'||lv2==='觀察中';
        o.classList.remove('selected');
        o.style.background='#fff'; o.style.borderColor='#E5E7EB'; o.style.color='#374151';
        o.innerHTML = lv2;
      });
      this.classList.add('selected');
      const lv = this.dataset.level;
      const isDanger = lv==='高風險'||lv==='觀察中';
      this.style.background = isDanger?'#FEE2E2':'#F0FDF4';
      this.style.borderColor = isDanger?'#FECACA':'#BBF7D0';
      this.style.color = isDanger?'#DC2626':'#16A34A';
      this.innerHTML = '<svg width=\'12\' height=\'12\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'3\'><polyline points=\'20 6 9 17 4 12\'/></svg>'+lv;
    });
  });
  modal.style.display = 'flex';
}
</script>
