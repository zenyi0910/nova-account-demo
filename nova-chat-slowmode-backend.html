<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nova 後台 - 系統設定（安全相關）慢速模式</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:ui-sans-serif,system-ui,sans-serif;background:#f8fafc;min-height:100vh;display:flex}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#f5c842,#e8a020);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub .sidebar-item{transform:translateY(-4px);opacity:0;transition:transform .3s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub.open .sidebar-item{transform:translateY(0);opacity:1}
.sidebar-sub.open .sidebar-item:nth-child(1){transition-delay:0.03s}
.sidebar-sub.open .sidebar-item:nth-child(2){transition-delay:0.06s}
.sidebar-sub.open .sidebar-item:nth-child(3){transition-delay:0.09s}
.sidebar-sub.open .sidebar-item:nth-child(4){transition-delay:0.12s}
.sidebar-sub.open .sidebar-item:nth-child(5){transition-delay:0.15s}
.sidebar-sub.open .sidebar-item:nth-child(6){transition-delay:0.18s}
.sidebar-sub.open .sidebar-item:nth-child(7){transition-delay:0.21s}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item:hover{color:#111827}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-user-avatar{width:32px;height:32px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#374151}
.sidebar-user-info{flex:1;min-width:0}
.sidebar-user-name{font-size:13px;font-weight:600;color:#111827}
.sidebar-user-role{font-size:11px;color:#6B7280}
.main{flex:1;padding:24px 32px;overflow-y:auto;margin-left:250px}
.breadcrumb{font-size:12px;color:#94a3b8;margin-bottom:20px}
.breadcrumb a{color:#2563eb;text-decoration:none}
.warning-bar{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:13px;color:#92400e;margin-bottom:20px;display:flex;align-items:center;gap:8px}
/* Tabs - match system: bg #f1f2f4, active white+shadow */
.tabs{display:flex;gap:0;background:#f1f2f4;border-radius:10px;padding:3px;margin-bottom:24px;width:fit-content}
.tabs button{padding:8px 16px;font-size:12px;font-weight:500;border:none;background:transparent;color:#64748b;cursor:pointer;border-radius:7px;transition:all .2s;white-space:nowrap}
.tabs button.active{background:#fff;color:#1e293b;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* Card - match system: flex flex-col gap-6 py-6 bg-white rounded-lg */
.settings-list{display:flex;flex-direction:column;gap:16px}
.setting-card{background:#fff;border-radius:10px;padding:24px 0;display:flex;flex-direction:column;gap:24px}
.card-header{padding:0 24px;display:grid;gap:6px}
.card-title{font-size:14px;font-weight:600;color:#1e293b;line-height:1}
.card-desc{font-size:12px;color:#94a3b8}
.card-content{padding:0 24px}
.card-value{margin-top:8px;padding:8px;background:#f9fafb;border-radius:6px}
.card-value pre{font-size:12px;white-space:pre-wrap;font-family:inherit;color:#1e293b}
/* Footer with edit btn - match system: flex justify-end px-6, teal btn */
.card-footer{padding:0 24px;display:flex;justify-content:flex-end;align-items:center;gap:8px}
.btn-edit{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 12px;height:32px;font-size:12px;font-weight:500;border:1px solid #e5e7eb;background:#14b8a6;color:rgba(255,255,255,.9);border-radius:6px;cursor:pointer;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.btn-edit:hover{opacity:.7}
.btn-edit svg{width:14px;height:14px}

</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="breadcrumb"><a href="#">首頁</a> / 基本設定 / 系統設定</div>
  <div class="warning-bar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>

  <div class="tabs">
    <button>一般設定</button>
    <button>功能設定</button>
    <button class="active">安全相關設定</button>
    <button>內容管理設定</button>
    <button>第三方整合設定</button>
    <button>公會風控設定</button>
  </div>

  <div class="settings-list">
    <div class="setting-card">
      <div class="card-header"><div class="card-title">最大登入嘗試次數</div><div class="card-desc">最大登入嘗試次數</div></div>
      <div class="card-content"><div class="card-value"><pre>5</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
    <div class="setting-card">
      <div class="card-header"><div class="card-title">登入鎖定時間（分鐘）</div><div class="card-desc">登入失敗鎖定時間（分鐘）</div></div>
      <div class="card-content"><div class="card-value"><pre>30</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
    <div class="setting-card">
      <div class="card-header"><div class="card-title">驗證碼有效期（分鐘）</div><div class="card-desc">手機驗證碼有效期（分鐘）</div></div>
      <div class="card-content"><div class="card-value"><pre>5</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
    <div class="setting-card">
      <div class="card-header"><div class="card-title">帳號鎖定時間（分鐘）</div><div class="card-desc">帳號鎖定時間（分鐘）</div></div>
      <div class="card-content"><div class="card-value"><pre>15</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
    <div class="setting-card">
      <div class="card-header"><div class="card-title">IP 鎖定時間（分鐘）</div><div class="card-desc">IP 鎖定時間（分鐘）</div></div>
      <div class="card-content"><div class="card-value"><pre>60</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
    <div class="setting-card">
      <div class="card-header"><div class="card-title">單一帳號最大登入失敗次數</div><div class="card-desc">單一帳號最大登入失敗次數</div></div>
      <div class="card-content"><div class="card-value"><pre>5</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
    <div class="setting-card">
      <div class="card-header"><div class="card-title">單一 IP 最大登入失敗次數</div><div class="card-desc">單一 IP 最大登入失敗次數</div></div>
      <div class="card-content"><div class="card-value"><pre>20000</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
    <div class="setting-card">
      <div class="card-header"><div class="card-title">手機驗證碼長度</div><div class="card-desc">手機驗證碼長度</div></div>
      <div class="card-content"><div class="card-value"><pre>6</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
    <!-- NEW: Slow Mode -->
    <div class="setting-card">
      <div class="card-header"><div class="card-title">聊天公頻慢速模式（Slow Mode）</div><div class="card-desc">兩次發言之間的冷卻時間（秒），0 = 關閉。範圍：0 ~ 36000</div></div>
      <div class="card-content"><div class="card-value"><pre>60</pre></div></div>
      <div class="card-footer"><button class="btn-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>編輯</button></div>
    </div>
  </div>
</main>
<script src="components/sidebar.js"></script>
</body>
</html>
