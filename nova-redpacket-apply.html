<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>星運娛樂城 - 紅包申請</title>
<link rel="stylesheet" href="css/frontend.css?v=e5b9c11">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;height:100vh;overflow:hidden;background:radial-gradient(circle at center,#ffeb3b 0%,#f44336 70%,#b71c1c 100%);display:flex;justify-content:center;align-items:center}
.phone-frame{position:relative;width:440px;height:90vh;max-height:900px;border-radius:40px;border:10px solid #1a1a1a;background:#000;box-shadow:0 0 0 3px #333,0 0 60px rgba(0,0,0,.5);overflow:hidden}
@media(max-width:500px){.phone-frame{width:100vw;height:100vh;max-height:none;border-radius:0;border:none;box-shadow:none}.phone-frame::before,.phone-frame::after{display:none}.phone-frame iframe{border-radius:0}}
.phone-frame::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:80px;height:22px;background:#1a1a1a;border-radius:12px;z-index:100;pointer-events:none}
.phone-frame::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:100px;height:4px;background:#555;border-radius:3px;z-index:100;pointer-events:none}
.phone-frame iframe{width:100%;height:100%;border:none;border-radius:30px;display:block}
.rp-overlay{position:absolute;inset:0;background:oklab(0 0 0 / 0.8);border-radius:30px;z-index:200;display:flex;align-items:center;justify-content:center;overflow:hidden}
.rp-dialog{position:relative;width:100%;max-width:400px;height:100%;display:flex;flex-direction:column;align-items:center;padding:60px 16px 16px;overflow:hidden}
.rp-dialog-header{position:relative;width:100%;min-width:300px}
.rp-dialog-header img{position:absolute;top:-8px;z-index:40;width:100%;height:72px;object-fit:contain}
.rp-dialog-title{position:absolute;z-index:50;top:16px;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);white-space:nowrap}
.rp-dialog-card{width:100%;flex:1;min-height:0;overflow-y:auto;margin-top:32px;padding:24px 8px 20px;background:#fafafa;border:8px solid rgb(244,182,63);border-radius:24px;scrollbar-width:none}
.rp-dialog-card::-webkit-scrollbar{display:none}
.rp-dialog-close{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:72px;height:72px;border-radius:9999px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:4px;z-index:10}
.rp-dialog-close-inner{width:64px;height:64px;border-radius:9999px;background:#fafafa;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 8px 0 rgba(174,108,108,.48),inset -2px -4px 2px 0 rgba(210,184,184,1),inset 0 2px 1px 0 rgba(255,253,247,.48)}
.rp-filter{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:12px;padding:0 4px}
.rp-filter-input{background:rgb(255,248,228);border:1px solid rgb(205,194,162);border-radius:10px;padding:8px 10px;font-size:12px;color:#452201;width:100%;outline:none;font-family:inherit}
.rp-filter-input::placeholder{color:rgba(69,34,1,.4)}
.rp-filter-select{background:rgb(255,248,228);border:1px solid rgb(205,194,162);border-radius:10px;padding:8px 10px;font-size:12px;color:#452201;width:100%;outline:none;-webkit-appearance:none;font-family:inherit;cursor:pointer}
.rp-filter-btn{border:none;border-radius:24px;padding:8px 0;font-size:12px;font-weight:500;cursor:pointer}
.rp-filter-btn.search{background:oklch(0.623 0.214 259.815);color:#fff}
.rp-filter-btn.clear{background:#fafafa;color:#452201;box-shadow:0 2px 4px rgba(0,0,0,.1)}
.rp-list{display:flex;flex-direction:column;gap:8px;padding:0 4px}
.rp-item{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:10px 12px;font-size:11px;color:#452201}
.rp-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rp-item-order{font-weight:600;color:#d97706;font-size:12px}
.rp-item-status{padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:500}
.status-pending{background:#FEF3C7;color:#92400E}
.status-approved{background:#DCFCE7;color:#166534}
.status-rejected{background:#FEE2E2;color:#991B1B}
.status-expired{background:#F3F4F6;color:#6B7280}
.rp-item-body{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px}
.rp-item-body .label{color:rgba(69,34,1,.5)}
.rp-item-body .val{font-weight:500}
.rp-item-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid rgba(0,0,0,.04)}
.rp-item-footer .time{font-size:10px;color:rgba(69,34,1,.4)}
.rp-item-footer .detail-btn{background:none;border:1px solid #d97706;border-radius:8px;padding:4px 10px;font-size:10px;color:#d97706;cursor:pointer;font-weight:500}
</style>
</head>
<body>
<div class="phone-frame">
<iframe src="nova-lobby.html"></iframe>
<div class="rp-overlay">
<div class="rp-dialog">
  <div class="rp-dialog-header">
    <img src="assets/dialog_header.png" alt="">
    <span class="rp-dialog-title">紅包申請</span>
  </div>
  <div class="rp-dialog-card">
    <div class="rp-filter">
      <input class="rp-filter-input" type="text" placeholder="紅包訂單編號">
      <input class="rp-filter-input" type="text" placeholder="申請人">
      <select class="rp-filter-select"><option value="">類型(全部)</option><option>一組</option><option>多組</option><option>上傳</option></select>
      <select class="rp-filter-select"><option value="">狀態(全部)</option><option>待審核</option><option>已通過</option><option>已拒絕</option><option>已失效</option></select>
      <button class="rp-filter-btn search">查詢</button>
      <button class="rp-filter-btn clear">清除</button>
    </div>
    <div class="rp-list" id="rpList"></div>
  </div>
  <button class="rp-dialog-close" onclick="window.location.href='nova-frontend-demo.html'"><div class="rp-dialog-close-inner"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#452201" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></div></button>
</div>
</div>
</div>

<script>
var mockData=[
  {time:'2026/05/31 14:30',user:'QAtest6改改',order:'RP202605310001',type:'一組',amount:'15,000',status:'pending'},
  {time:'2026/05/31 11:20',user:'QAtest6改改',order:'RP202605310002',type:'多組',amount:'65,000',status:'approved'},
  {time:'2026/05/30 16:45',user:'Player002',order:'RP202605300001',type:'上傳',amount:'120,000',status:'approved'},
  {time:'2026/05/30 09:10',user:'QAtest6改改',order:'RP202605300002',type:'一組',amount:'10,000',status:'rejected'},
  {time:'2026/05/29 20:30',user:'GuildMaster01',order:'RP202605290001',type:'多組',amount:'200,000',status:'pending'},
  {time:'2026/05/29 15:00',user:'Player002',order:'RP202605290002',type:'一組',amount:'5,000',status:'approved'},
  {time:'2026/05/28 18:20',user:'GuildMaster01',order:'RP202605280001',type:'上傳',amount:'88,000',status:'expired'},
  {time:'2026/05/28 10:05',user:'QAtest6改改',order:'RP202605280002',type:'多組',amount:'45,000',status:'approved'},
  {time:'2026/05/27 14:50',user:'Player002',order:'RP202605270001',type:'一組',amount:'30,000',status:'approved'},
  {time:'2026/05/27 09:30',user:'GuildMaster01',order:'RP202605270002',type:'多組',amount:'150,000',status:'rejected'}
];
var statusLabel={pending:'待審核',approved:'已通過',rejected:'已拒絕',expired:'已失效'};
function render(){
  var html='';
  mockData.forEach(function(r){
    html+='<div class="rp-item">';
    html+='<div class="rp-item-header"><span class="rp-item-order">'+r.order+'</span><span class="rp-item-status status-'+r.status+'">'+statusLabel[r.status]+'</span></div>';
    html+='<div class="rp-item-body"><div><span class="label">申請人</span> <span class="val">'+r.user+'</span></div><div><span class="label">類型</span> <span class="val">'+r.type+'</span></div><div><span class="label">申請金幣</span> <span class="val">'+r.amount+'</span></div></div>';
    html+='<div class="rp-item-footer"><span class="time">'+r.time+'</span><button class="detail-btn" data-order="'+r.order+'">詳情</button></div>';
    html+='</div>';
  });
  document.getElementById('rpList').innerHTML=html;
  document.querySelectorAll('.detail-btn').forEach(function(btn){
    btn.addEventListener('click',function(){alert('（Demo）查看詳情：'+this.dataset.order);});
  });
}
render();
</script>
</body>
</html>
