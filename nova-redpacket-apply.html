<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 紅包申請</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub .sidebar-item{transform:translateY(-4px);opacity:0;transition:transform .3s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub.open .sidebar-item{transform:translateY(0);opacity:1}
.sidebar-sub.open .sidebar-item:nth-child(1){transition-delay:0.03s}
.sidebar-sub.open .sidebar-item:nth-child(2){transition-delay:0.06s}
.sidebar-sub.open .sidebar-item:nth-child(3){transition-delay:0.09s}
.sidebar-sub.open .sidebar-item:nth-child(4){transition-delay:0.12s}
.sidebar-sub.open .sidebar-item:nth-child(5){transition-delay:0.15s}
.sidebar-sub.open .sidebar-item:nth-child(6){transition-delay:0.18s}
.sidebar-sub.open .sidebar-item:nth-child(7){transition-delay:0.21s}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item:hover{color:#111827}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;cursor:pointer}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}
.filter-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px 16px;align-items:end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px}
.filter-group label{font-size:11px;font-weight:500;color:#6B7280}
.filter-input{display:flex;align-items:center;gap:6px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:7px 10px;font-size:13px;color:#374151}
.filter-input svg{width:14px;height:14px;color:#9CA3AF;flex-shrink:0}
.filter-input input{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;width:100%}
.filter-input input::placeholder{color:#9CA3AF}
.filter-input select{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;cursor:pointer;-webkit-appearance:none;width:100%}
.filter-actions{grid-column:4;display:flex;gap:8px;align-items:flex-end;justify-content:flex-end}
.btn-search{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#fff;background:#1F2937}
.btn-search:hover{background:#111827}
.btn-search svg{width:14px;height:14px}
.btn-reset{padding:7px 14px;border-radius:6px;border:1px solid #E5E7EB;cursor:pointer;font-size:13px;font-family:inherit;color:#374151;background:#fff}
.btn-reset:hover{background:#F3F4F6}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.data-table th{background:#F5F5F5;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;border-bottom:1px solid #E5E7EB;white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:12px;vertical-align:middle;color:#6a7282;white-space:nowrap}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:#FAFAFA}
.status-pending{color:#92400E;background:#FEF3C7;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500;display:inline-block}
.status-approved{color:#166534;background:#DCFCE7;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500;display:inline-block}
.status-rejected{color:#991B1B;background:#FEE2E2;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500;display:inline-block}
.status-expired{color:#6B7280;background:#F3F4F6;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500;display:inline-block}
.btn-detail{background:none;border:none;color:#4DD0C2;cursor:pointer;font-size:12px;font-weight:500;text-decoration:underline}
.btn-detail:hover{color:#26A69A}
.pagination-bar{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:12px;color:#6B7280}
.pagination-bar .page-btns{display:flex;gap:4px}
.pagination-bar .page-btns button{width:28px;height:28px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;cursor:pointer;font-size:12px;color:#374151;display:flex;align-items:center;justify-content:center}
.pagination-bar .page-btns button.active{background:#1F2937;color:#fff;border-color:#1F2937}
.pagination-bar .page-btns button:disabled{opacity:.4;cursor:not-allowed}
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
.sidebar{transition:transform .3s cubic-bezier(.25,.1,.25,1)}
.main{transition:margin-left .3s cubic-bezier(.25,.1,.25,1)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed;z-index:100;transition:transform .3s}
.sidebar.show{transform:translateX(0)}
.main{margin-left:0}
.content{padding:12px}
.filter-card{grid-template-columns:1fr;gap:8px}
.filter-actions{grid-column:1;justify-content:flex-start}
.data-table{display:block;overflow-x:auto}
}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>

<div class="main">
  <div class="topbar">
    <button class="topbar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">公會管理</a><span class="sep">&gt;</span><span class="current">紅包申請</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2h14a2 2 0 002-2v-2"/><path d="M16 12H3"/><path d="m12 8 4 4-4 4"/></svg><h1>紅包申請</h1><div class="spacer"></div></div>
    <div class="filter-card">
      <div class="filter-group"><label>申請人</label><div class="filter-input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="搜尋申請人帳號"></div></div>
      <div class="filter-group"><label>紅包訂單編號</label><div class="filter-input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="搜尋訂單編號"></div></div>
      <div class="filter-group"><label>類型</label><div class="filter-input"><select><option value="">全部</option><option value="single">一組</option><option value="multi">多組</option><option value="upload">上傳</option></select></div></div>
      <div class="filter-group"><label>紅包狀態</label><div class="filter-input"><select><option value="">全部</option><option value="pending">待審核</option><option value="approved">已通過</option><option value="rejected">已拒絕</option><option value="expired">已失效</option></select></div></div>
      <div class="filter-group"><label>申請日期</label><div class="filter-input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><input type="text" placeholder="選擇日期範圍"></div></div>
      <div class="filter-actions"><button class="btn-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>搜尋</button><button class="btn-reset">重置</button></div>
    </div>

    <div class="pagination-bar"><span>第 1 頁，共 15 筆資料</span><span>每頁顯示 <select style="border:1px solid #E5E7EB;border-radius:4px;padding:2px 4px;font-size:12px"><option>10</option><option>20</option><option>50</option></select> 筆</span></div>
    <table class="data-table">
      <thead><tr><th>申請時間</th><th>申請人</th><th>紅包訂單編號</th><th>類型</th><th>申請金幣</th><th>紅包狀態</th><th>操作</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pagination-bar"><div><select style="border:1px solid #E5E7EB;border-radius:4px;padding:2px 4px;font-size:12px"><option>第 1 頁</option><option>第 2 頁</option></select></div><div class="page-btns"><button disabled>&lt;</button><button class="active">1</button><button>2</button><button>&gt;</button></div></div>
  </div>
</div>

<script>
var mockData=[
  {time:'2026/05/31 14:30',user:'QAtest6改改',order:'RP202605310001',type:'一組',amount:'15,000',status:'pending'},
  {time:'2026/05/31 11:20',user:'QAtest6改改',order:'RP202605310002',type:'多組',amount:'65,000',status:'approved'},
  {time:'2026/05/30 16:45',user:'Player002',order:'RP202605300001',type:'上傳',amount:'120,000',status:'approved'},
  {time:'2026/05/30 09:10',user:'QAtest6改改',order:'RP202605300002',type:'一組',amount:'10,000',status:'rejected'},
  {time:'2026/05/29 20:30',user:'GuildMaster01',order:'RP202605290001',type:'多組',amount:'200,000',status:'pending'},
  {time:'2026/05/29 15:00',user:'Player002',order:'RP202605290002',type:'一組',amount:'5,000',status:'approved'},
  {time:'2026/05/28 18:20',user:'GuildMaster01',order:'RP202605280001',type:'上傳',amount:'88,000',status:'expired'},
  {time:'2026/05/28 10:05',user:'QAtest6改改',order:'RP202605280002',type:'多組',amount:'45,000',status:'approved'},
  {time:'2026/05/27 14:50',user:'Player002',order:'RP202605270001',type:'一組',amount:'30,000',status:'approved'},
  {time:'2026/05/27 09:30',user:'GuildMaster01',order:'RP202605270002',type:'多組',amount:'150,000',status:'rejected'},
  {time:'2026/05/26 17:40',user:'QAtest6改改',order:'RP202605260001',type:'上傳',amount:'75,000',status:'approved'},
  {time:'2026/05/26 11:15',user:'Player002',order:'RP202605260002',type:'一組',amount:'8,000',status:'approved'},
  {time:'2026/05/25 16:00',user:'GuildMaster01',order:'RP202605250001',type:'多組',amount:'320,000',status:'pending'},
  {time:'2026/05/25 08:45',user:'QAtest6改改',order:'RP202605250002',type:'一組',amount:'12,000',status:'expired'},
  {time:'2026/05/24 19:20',user:'Player002',order:'RP202605240001',type:'上傳',amount:'55,000',status:'approved'}
];
var statusMap={pending:'<span class="status-pending">待審核</span>',approved:'<span class="status-approved">已通過</span>',rejected:'<span class="status-rejected">已拒絕</span>',expired:'<span class="status-expired">已失效</span>'};
function renderTable(){
  var html='';
  mockData.forEach(function(r){
    html+='<tr><td>'+r.time+'</td><td>'+r.user+'</td><td>'+r.order+'</td><td>'+r.type+'</td><td>'+r.amount+'</td><td>'+statusMap[r.status]+'</td><td><button class="btn-detail" onclick="alert('（Demo）查看詳情：'+r.order+'')">詳情</button></td></tr>';
  });
  document.getElementById('tableBody').innerHTML=html;
}
renderTable();

document.querySelector('.topbar-toggle')?.addEventListener('click',function(){
  var isMobile=window.innerWidth<=768;
  if(isMobile){document.querySelector('.sidebar').classList.toggle('show');}
  else{document.body.classList.toggle('sidebar-collapsed');}
});
</script>
</body>
</html>
