<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 前台 - 紅包申請</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.container{width:100%;max-width:480px}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:16px}
.header h1{font-size:18px;font-weight:700}
.header .back{color:#9CA3AF;cursor:pointer;font-size:14px;text-decoration:none}
.wallet-card{background:linear-gradient(135deg,#2d2d5e,#1e1e3f);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;margin-bottom:16px}
.wallet-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#9CA3AF;margin-bottom:4px}
.wallet-row .val{color:#fff;font-weight:600;font-size:15px}
.wallet-row .val.warn{color:#F59E0B}
.tabs{display:flex;background:rgba(255,255,255,.05);border-radius:8px;padding:3px;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:8px;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;color:#9CA3AF;transition:all .2s}
.tab.active{background:#4DD0C2;color:#1a1a2e;font-weight:600}
.form-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#9CA3AF;margin-bottom:4px;font-weight:500}
.form-input{width:100%;padding:10px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:14px;font-family:inherit}
.form-input:focus{outline:none;border-color:#4DD0C2}
.form-input::placeholder{color:#6B7280}
.form-select{width:100%;padding:10px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:14px;font-family:inherit;-webkit-appearance:none}
.form-select option{background:#1a1a2e;color:#fff}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(77,208,194,.08);border:1px solid rgba(77,208,194,.2);border-radius:8px;margin-bottom:16px}
.total-bar .label{font-size:13px;color:#9CA3AF}
.total-bar .amount{font-size:18px;font-weight:700;color:#4DD0C2}
.submit-btn{width:100%;padding:14px;background:#4DD0C2;color:#1a1a2e;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.target-group{display:flex;gap:8px;flex-wrap:wrap}
.target-radio{display:flex;align-items:center;gap:4px;font-size:12px;color:#ccc;cursor:pointer}
.target-radio input{accent-color:#4DD0C2}
.multi-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.multi-table th{background:rgba(255,255,255,.06);padding:6px 8px;text-align:left;color:#9CA3AF;font-weight:500}
.multi-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.06)}
.multi-table input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:4px 6px;color:#fff;font-size:12px;font-family:inherit}
.add-row-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:6px 12px;background:rgba(77,208,194,.1);border:1px dashed rgba(77,208,194,.3);border-radius:6px;color:#4DD0C2;font-size:12px;cursor:pointer;font-family:inherit}
.record-list{margin-top:16px}
.record-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.record-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.record-top .id{font-size:11px;color:#6B7280;font-family:monospace}
.record-top .status{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.status-pending{background:rgba(245,158,11,.15);color:#F59E0B}
.status-approved{background:rgba(16,185,129,.15);color:#10B981}
.status-rejected{background:rgba(239,68,68,.15);color:#EF4444}
.record-row{display:flex;justify-content:space-between;font-size:12px;color:#9CA3AF;margin-bottom:2px}
.record-row .val{color:#fff}
.sn-list{margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06)}
.sn-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:3px 0}
.sn-item code{color:#4DD0C2;font-family:monospace;cursor:pointer}
.sn-item .copy-btn{color:#6B7280;font-size:10px;cursor:pointer;padding:2px 6px;border:1px solid rgba(255,255,255,.1);border-radius:4px}
.sn-item .copy-btn:hover{color:#4DD0C2;border-color:#4DD0C2}
.section-title{font-size:14px;font-weight:600;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-title .badge{font-size:11px;background:rgba(77,208,194,.15);color:#4DD0C2;padding:2px 8px;border-radius:4px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a class="back" href="nova-lobby.html">< 返回</a>
    <h1>紅包申請</h1>
    <span style="width:40px"></span>
  </div>

  <div class="wallet-card">
    <div class="wallet-row"><span>身上金幣</span><span class="val" id="walletGold">1,000,000</span></div>
    <div class="wallet-row"><span>凍結金幣</span><span class="val warn" id="walletFrozen">300,000</span></div>
    <div class="wallet-row"><span>可用金幣</span><span class="val">700,000</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('single')">一組</div>
    <div class="tab" onclick="switchTab('multi')">多組</div>
    <div class="tab" onclick="switchTab('upload')">上傳</div>
  </div>

  <!-- 一組模式 -->
  <div id="tabSingle" class="form-card">
    <div class="form-group"><label>紅包數量</label><input class="form-input" type="number" id="sQty" placeholder="請輸入紅包數量" oninput="calcTotal()"></div>
    <div class="form-group"><label>每包點數</label><input class="form-input" type="number" id="sPerPack" placeholder="請輸入每包點數" oninput="calcTotal()"></div>
    <div class="form-group"><label>領取次數</label><input class="form-input" type="number" id="sTimes" placeholder="請輸入領取次數" value="1" oninput="calcTotal()"></div>
    <div class="form-group"><label>可領取對象</label>
      <div class="target-group">
        <label class="target-radio"><input type="radio" name="sTarget" value="全部會員" checked>全部會員</label>
        <label class="target-radio"><input type="radio" name="sTarget" value="副會長">副會長</label>
        <label class="target-radio"><input type="radio" name="sTarget" value="會員">會員</label>
        <label class="target-radio"><input type="radio" name="sTarget" value="指定帳號">指定帳號</label>
      </div>
    </div>
  </div>

  <!-- 多組模式 -->
  <div id="tabMulti" class="form-card" style="display:none">
    <table class="multi-table">
      <thead><tr><th>數量</th><th>每包點數</th><th>次數</th><th>小計</th><th></th></tr></thead>
      <tbody id="multiBody">
        <tr><td><input type="number" value="3" oninput="calcMultiTotal()"></td><td><input type="number" value="1000" oninput="calcMultiTotal()"></td><td><input type="number" value="5" oninput="calcMultiTotal()"></td><td class="subtotal">15,000</td><td style="cursor:pointer;color:#EF4444" onclick="removeMultiRow(this)">x</td></tr>
        <tr><td><input type="number" value="5" oninput="calcMultiTotal()"></td><td><input type="number" value="2000" oninput="calcMultiTotal()"></td><td><input type="number" value="3" oninput="calcMultiTotal()"></td><td class="subtotal">30,000</td><td style="cursor:pointer;color:#EF4444" onclick="removeMultiRow(this)">x</td></tr>
      </tbody>
    </table>
    <button class="add-row-btn" onclick="addMultiRow()">+ 新增一組</button>
    <div style="font-size:11px;color:#6B7280;margin-top:6px">最多 30 組</div>
  </div>

  <!-- 上傳模式 -->
  <div id="tabUpload" class="form-card" style="display:none">
    <div class="form-group"><label>CSV 檔案上傳</label>
      <div style="border:2px dashed rgba(255,255,255,.12);border-radius:8px;padding:24px;text-align:center;cursor:pointer" onclick="alert('模擬上傳成功：已解析 8 組紅包資料')">
        <div style="color:#6B7280;font-size:13px;margin-bottom:8px">點擊或拖放 CSV 檔案至此處</div>
        <div style="color:#4DD0C2;font-size:12px">支援 .csv 格式，最多 100 組</div>
      </div>
    </div>
    <div style="font-size:11px;color:#6B7280">CSV 欄位：紅包數量, 每包點數, 領取次數, 可領取對象</div>
    <a href="#" style="font-size:11px;color:#4DD0C2;text-decoration:none" onclick="alert('下載範例 CSV')">下載範例檔案</a>
  </div>

  <div class="total-bar">
    <span class="label">本次申請總金額</span>
    <span class="amount" id="totalAmount">$0</span>
  </div>

  <button class="submit-btn" onclick="submitApplication()">提交紅包申請</button>

  <!-- 申請紀錄 -->
  <div class="section-title">申請紀錄 <span class="badge">5 筆</span></div>
  <div class="record-list" id="recordList"></div>
</div>

<script>
var currentTab = 'single';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active', ['single','multi','upload'][i] === tab);
  });
  document.getElementById('tabSingle').style.display = tab==='single'?'block':'none';
  document.getElementById('tabMulti').style.display = tab==='multi'?'block':'none';
  document.getElementById('tabUpload').style.display = tab==='upload'?'block':'none';
  if (tab==='multi') calcMultiTotal();
  else if (tab==='single') calcTotal();
  else document.getElementById('totalAmount').textContent = '$0';
}

function calcTotal() {
  var qty = parseInt(document.getElementById('sQty').value) || 0;
  var perPack = parseInt(document.getElementById('sPerPack').value) || 0;
  var times = parseInt(document.getElementById('sTimes').value) || 1;
  var total = qty * perPack * times;
  document.getElementById('totalAmount').textContent = '$' + total.toLocaleString();
}

function calcMultiTotal() {
  var rows = document.querySelectorAll('#multiBody tr');
  var grand = 0;
  rows.forEach(function(tr) {
    var inputs = tr.querySelectorAll('input');
    var qty = parseInt(inputs[0].value) || 0;
    var pp = parseInt(inputs[1].value) || 0;
    var times = parseInt(inputs[2].value) || 1;
    var sub = qty * pp * times;
    tr.querySelector('.subtotal').textContent = sub.toLocaleString();
    grand += sub;
  });
  document.getElementById('totalAmount').textContent = '$' + grand.toLocaleString();
}

function addMultiRow() {
  var tbody = document.getElementById('multiBody');
  if (tbody.rows.length >= 30) { alert('最多 30 組'); return; }
  var tr = document.createElement('tr');
  tr.innerHTML = '<td><input type="number" value="1" oninput="calcMultiTotal()"></td><td><input type="number" value="1000" oninput="calcMultiTotal()"></td><td><input type="number" value="1" oninput="calcMultiTotal()"></td><td class="subtotal">1,000</td><td style="cursor:pointer;color:#EF4444" onclick="removeMultiRow(this)">x</td>';
  tbody.appendChild(tr);
  calcMultiTotal();
}

function removeMultiRow(el) {
  var tbody = document.getElementById('multiBody');
  if (tbody.rows.length <= 1) return;
  el.closest('tr').remove();
  calcMultiTotal();
}

function submitApplication() {
  var totalText = document.getElementById('totalAmount').textContent.replace(/[$,]/g,'');
  var total = parseInt(totalText) || 0;
  if (total <= 0) { alert('請填寫紅包申請資料'); return; }
  if (total > 700000) { alert('身上可用金幣不足'); return; }
  alert('紅包申請已提交，等待審核');
}

// 申請紀錄 mock
var records = [
  {id:'RP20260520001',mode:'一組',amount:50000,time:'2026-05-20 09:30',status:'pending',sns:[]},
  {id:'RP20260519002',mode:'多組',amount:150000,time:'2026-05-19 14:20',status:'approved',sns:['SN20260519002-001','SN20260519002-002','SN20260519002-003']},
  {id:'RP20260517004',mode:'上傳',amount:80000,time:'2026-05-17 11:00',status:'approved',sns:['SN20260517004-001','SN20260517004-002','SN20260517004-003','SN20260517004-004','SN20260517004-005']},
  {id:'RP20260518003',mode:'一組',amount:20000,time:'2026-05-18 22:00',status:'rejected',reason:'金額異常，請確認後重新申請',sns:[]},
  {id:'RP20260512009',mode:'一組',amount:25000,time:'2026-05-12 09:00',status:'approved',sns:['SN20260512009-001','SN20260512009-002']},
];

function renderRecords() {
  var html = '';
  records.forEach(function(r) {
    var statusCls = 'status-' + r.status;
    var statusText = {pending:'待審核',approved:'已通過',rejected:'已駁回'}[r.status];
    html += '<div class="record-item">';
    html += '<div class="record-top"><span class="id">' + r.id + '</span><span class="status ' + statusCls + '">' + statusText + '</span></div>';
    html += '<div class="record-row"><span>申請模式</span><span class="val">' + r.mode + '</span></div>';
    html += '<div class="record-row"><span>總金額</span><span class="val">$' + r.amount.toLocaleString() + '</span></div>';
    html += '<div class="record-row"><span>申請時間</span><span class="val">' + r.time + '</span></div>';
    if (r.status === 'rejected' && r.reason) {
      html += '<div class="record-row"><span>駁回原因</span><span style="color:#EF4444">' + r.reason + '</span></div>';
    }
    if (r.status === 'approved' && r.sns.length) {
      html += '<div class="sn-list">';
      r.sns.forEach(function(sn) {
        html += '<div class="sn-item"><code onclick="navigator.clipboard.writeText(\'' + sn + '\')">' + sn + '</code><span class="copy-btn" onclick="navigator.clipboard.writeText(\'' + sn + '\')">複製</span></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  document.getElementById('recordList').innerHTML = html;
}

renderRecords();
</script>
</body>
</html>
