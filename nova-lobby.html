<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#FFFDE7}
img{display:block;max-width:100%;user-select:none;-webkit-user-drag:none}
button{border:none;background:none;cursor:pointer;font:inherit}

/* Header */
.header{position:fixed;top:0;left:0;right:0;height:56px;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 12px}
.header-left{display:flex;align-items:center;gap:8px}
.avatar{width:40px;height:40px;border-radius:50%;border:2px solid #f4b63f;overflow:hidden;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.avatar img{width:100%;height:100%;object-fit:cover;background:#e2e8f0}
.user-info{display:flex;flex-direction:column;gap:2px}
.username{font-weight:800;color:#fff;font-size:13px;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.user-badges{display:flex;gap:4px;align-items:center}
.badge-my{background:#fff;border-radius:4px;padding:2px 6px;font-size:10px;color:#333;box-shadow:0 0 3px rgba(0,0,0,.3),inset -1px -1px 2px #aaa;display:flex;align-items:center;gap:3px}
.badge-vip{background:linear-gradient(to bottom,#fde047,#f59e0b,#eab308);border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;color:#78350f;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.header-right{display:flex;align-items:center;gap:8px}
.coin-display{display:flex;align-items:center;gap:4px}
.coin-icon{width:24px;height:24px}
.coin-amount{display:flex;align-items:center;gap:6px;background:#991b1b;border:1px solid #ef4444;border-radius:20px;padding:4px 12px;min-width:75px;justify-content:center}
.coin-amount span{color:#fff;font-size:13px;font-weight:700}
.coin-refresh{color:rgba(255,255,255,.8);cursor:pointer}
.settings-btn{width:24px;height:24px;color:#fff}

/* Banner Carousel */
.banner-section{position:relative;width:100%;height:200px;overflow:hidden;margin-top:0}
.banner-track{display:flex;width:200%;height:100%;animation:bannerSlide 8s infinite}
@keyframes bannerSlide{0%,40%{transform:translateX(0)}50%,90%{transform:translateX(-50%)}100%{transform:translateX(0)}}
.banner-slide{width:50%;height:100%;flex-shrink:0;position:relative}
.banner-slide img{width:100%;height:100%;object-fit:cover}
.banner-overlay-l{position:absolute;inset:0;width:80px;background:linear-gradient(to right,rgba(0,0,0,.2),transparent)}
.banner-overlay-r{position:absolute;top:0;bottom:0;right:0;width:80px;background:linear-gradient(to left,rgba(0,0,0,.2),transparent)}
.banner-nav{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.banner-nav.prev{left:8px}
.banner-nav.next{right:8px}

/* Marquee */
.marquee-bar{position:relative;height:40px;display:flex;align-items:center;padding:0 12px;background:linear-gradient(to bottom,transparent,rgba(0,0,0,.1),#fefce8 80%)}
.marquee-icon{color:#fefce8;margin-right:8px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.25))}
.marquee-track{flex:1;overflow:hidden;height:20px;position:relative}
.marquee-content{display:flex;white-space:nowrap;animation:marqueeScroll 30s linear infinite;position:absolute}
@keyframes marqueeScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-content span{margin:0 24px;font-size:12px;color:#fefce8;text-shadow:0 1px 1px rgba(0,0,0,.25);font-family:monospace}

/* Tabs */
.tabs-section{display:flex;justify-content:center;padding:12px 0 8px;position:relative;z-index:2}
.tabs-list{display:flex;align-items:center;background:#fff;border-radius:24px;padding:3px;box-shadow:1px 1px 6px #c1b295,inset -1px -1px 7px #eee1c7}
.tab-btn{min-width:48px;padding:6px 12px;border-radius:24px;font-size:13px;font-weight:500;color:#333;transition:all .2s}
.tab-btn.active{background:#991b1b;color:#fff;box-shadow:inset 2px 2px 4px #ff0000,inset -3px -3px 6px #500000}
.tab-btn svg{width:16px;height:16px}

/* Recommend Section */
.recommend-section{padding:16px 12px;overflow:hidden}
.recommend-card{position:relative;border:4px solid #fde68a;border-radius:48px;padding:40px 16px 16px;background:url("https://d1c05r0acxw2a.cloudfront.net/uploads/attachments/88f01e841c1df13423eb8729dac576e287a8d4cd261f0e7b37465aa01ef6c189.jpg") center/cover;background-color:#1a1a2e}
.recommend-header{position:absolute;top:-24px;left:50%;transform:translateX(-50%);width:180px;height:56px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:28px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.recommend-header p{color:#fff;font-size:16px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.recommend-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.recommend-grid .game-card:first-child{grid-row:span 2}

/* Game Grid */
.game-section{padding:0 12px 100px}
.game-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.game-card{position:relative;border-radius:24px;overflow:hidden;aspect-ratio:1;box-shadow:2px 4px 8px rgba(69,34,1,.32),inset 0 -3px 0 #7f3f02;cursor:pointer;transition:transform .15s}
.game-card:active{transform:scale(.95)}
.game-card img{width:100%;height:100%;object-fit:cover}
.game-card::after{content:'';position:absolute;inset:0;border-radius:24px;box-shadow:inset -4px -6px 6px rgba(0,0,0,.3),inset 1px 2px 6px rgba(255,253,247,1);pointer-events:none}
.game-badge{position:absolute;top:0;right:-2px;width:20px;height:20px;border-radius:50%;box-shadow:inset -2px -3px 2px rgba(0,0,0,.2),inset 1px 2px 1px rgba(255,253,247,1);z-index:3}
.game-players{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:10px;font-weight:700;color:#fff;padding:2px 8px;border-radius:0 0 24px 24px;background:linear-gradient(to bottom,rgba(116,223,255,.8),rgba(24,144,177,.9))}

/* Footer Nav */
.footer-nav{position:fixed;bottom:0;left:0;right:0;height:70px;z-index:40;display:flex;align-items:flex-end;justify-content:space-around;padding:0 16px 12px;background:linear-gradient(to top,#fefce8 60%,transparent)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;color:#78350f;font-weight:500;padding:4px 8px}
.nav-btn img{width:20px;height:20px;object-fit:contain}
.nav-btn.store{position:relative;top:-16px}
.nav-btn.store img{width:48px;height:48px}

/* Chat Bubble */
.chat-bubble{position:fixed;right:12px;bottom:90px;width:56px;height:56px;border-radius:50%;background:#fafafa;box-shadow:0 4px 8px rgba(174,108,108,.48),inset -2px -4px 2px rgba(210,184,184,1),inset 0 2px 1px rgba(255,253,247,.48);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#452201;font-size:10px;z-index:45;cursor:pointer}
.chat-bubble svg{width:22px;height:22px}
.chat-badge{position:absolute;top:-4px;right:-4px;width:20px;height:20px;background:#f87171;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.2)}
</style>
