<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 遊戲維護設定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}

.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub .sidebar-item{transform:translateY(-4px);opacity:0;transition:transform .3s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub.open .sidebar-item{transform:translateY(0);opacity:1}
.sidebar-sub.open .sidebar-item:nth-child(1){transition-delay:0.03s}
.sidebar-sub.open .sidebar-item:nth-child(2){transition-delay:0.06s}
.sidebar-sub.open .sidebar-item:nth-child(3){transition-delay:0.09s}
.sidebar-sub.open .sidebar-item:nth-child(4){transition-delay:0.12s}
.sidebar-sub.open .sidebar-item:nth-child(5){transition-delay:0.15s}
.sidebar-sub.open .sidebar-item:nth-child(6){transition-delay:0.18s}
.sidebar-sub.open .sidebar-item:nth-child(7){transition-delay:0.21s}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item:hover{color:#111827}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}
.btn-batch,.btn-export{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-batch{background:#fff;color:#374151;border:1px solid #D1D5DB}
.btn-batch:hover{background:#F3F4F6;border-color:#9CA3AF}
.btn-batch svg,.btn-export svg{width:14px;height:14px}
.btn-export{background:#1F2937;color:#fff;border:1px solid #1F2937}
.btn-export:hover{background:#374151}
.filter-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-actions{order:999;margin-left:auto;display:flex;gap:8px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px;max-width:200px}
.filter-group.filter-wide{min-width:280px;max-width:360px}
.filter-group label{font-size:11px;font-weight:500;color:#6B7280}
.filter-input{display:flex;align-items:center;gap:6px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:7px 10px;font-size:13px;color:#374151;min-width:130px}
.filter-input svg{width:14px;height:14px;color:#9CA3AF;flex-shrink:0}
.filter-input input{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;width:100%}
.filter-input input::placeholder{color:#9CA3AF}
.filter-input select{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;cursor:pointer;-webkit-appearance:none;width:100%}
.btn-search{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#fff;background:#1F2937}
.btn-search:hover{background:#111827}
.btn-search svg{width:14px;height:14px}
.btn-reset{padding:7px 14px;border-radius:6px;border:1px solid #E5E7EB;cursor:pointer;font-size:13px;font-family:inherit;color:#374151;background:#fff}
.btn-reset:hover{background:#F3F4F6}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.data-table th{background:#F5F5F5;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;border-bottom:1px solid #E5E7EB}
.data-table td{padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:#FAFAFA}
.toggle{position:relative;width:36px;height:20px;border-radius:10px;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:#26A69A}
.toggle.off{background:#D1D5DB}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:18px}
.toggle.off::after{left:2px}
.toggle-label{font-size:11px;margin-left:4px}
.toggle-label.on{color:#16a34a}
.toggle-label.off{color:#9CA3AF}
.btn-edit{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px;border-radius:4px}
.btn-edit:hover{color:#374151}
.btn-edit svg{width:16px;height:16px}
.status-badge{display:inline-block;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500}
.status-online{background:#DCFCE7;color:#166534}
.status-maint{background:#FEF3C7;color:#92400E}
.status-offline{background:#FEE2E2;color:#991B1B}
.pagination-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;color:#6B7280}


.sidebar-user{position:relative;cursor:pointer}
.user-chevron{width:14px;height:14px;color:#9CA3AF;margin-left:auto;flex-shrink:0;transition:transform .2s}
.sidebar-user.open .user-chevron{transform:rotate(0deg);color:#4338CA}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200;opacity:0;transform:translateX(-4px);transition:opacity .2s ease,transform .2s ease}
.sidebar-user.open .user-popover{display:block;opacity:1;transform:translateX(0)}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none;transition:background .15s}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
.sidebar{transition:transform .3s cubic-bezier(.25,.1,.25,1)}
.main{transition:margin-left .3s cubic-bezier(.25,.1,.25,1)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed;z-index:100;transition:transform .3s}
.sidebar.show{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.main{margin-left:0}
.topbar{padding:0 12px}
.content{padding:12px}
.filter-card{flex-direction:column;}
.filter-group{max-width:100%}
.filter-actions{margin-left:0;width:100%;justify-content:flex-start}
.filter-group{width:100%}
.filter-input{width:100%}
.data-table{display:block;overflow-x:auto;white-space:nowrap}
}
.filter-error{font-size:11px;color:#DC2626;margin-top:3px;display:none}
.filter-group.has-error .filter-error{display:block}
.filter-group.has-error .filter-input{border-color:#DC2626}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>


<div class="main">
  <div class="topbar">
    <button class="topbar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">公會管理</a><span class="sep">&gt;</span><span class="current">紅包審核</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg><h1>紅包審核</h1><div class="spacer"></div><button class="btn-batch" id="batchBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>批次操作</button><button class="btn-export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>匯出報表</button></div>
    <div class="filter-card">
      <div class="filter-group" data-rule="keyword"><label>公會名稱</label><div class="filter-input"><input type="text" placeholder="搜尋公會名稱"></div><div class="filter-error"></div></div>
      <div class="filter-group filter-wide" data-rule="order"><label>紅包訂單編號</label><div class="filter-input"><input type="text" placeholder="搜尋紅包訂單編號"></div><div class="filter-error"></div></div>
      <div class="filter-group"><label>公會等級</label><div class="filter-input"><select><option value="">全部</option><option value="Lv1">Lv1</option><option value="Lv2">Lv2</option><option value="Lv3">Lv3</option><option value="Lv4">Lv4</option><option value="Lv5">Lv5</option></select></div></div>
      <div class="filter-actions"><button class="btn-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>搜尋</button><button class="btn-reset">重置</button></div>
    </div>
    <div class="pagination-bar"><span>共 12 筆待審核紅包</span></div>
    <table class="data-table"><thead><tr><th>公會</th><th>發起人</th><th>紅包金額</th><th>數量</th><th>申請時間</th><th>狀態</th></tr></thead><tbody>
      <tr><td style="font-weight:500">龍之谷</td><td>Abk7382</td><td>$50,000</td><td>100 個</td><td style="color:#6B7280">2026-05-05 09:30</td><td><span class="status-badge status-maint">待審核</span></td></tr>
      <tr><td style="font-weight:500">皇家俱樂部</td><td>Wnp9012</td><td>$100,000</td><td>200 個</td><td style="color:#6B7280">2026-05-05 08:00</td><td><span class="status-badge status-online">已通過</span></td></tr>
      <tr><td style="font-weight:500">星辰戰隊</td><td>Mhx6677</td><td>$20,000</td><td>50 個</td><td style="color:#6B7280">2026-05-04 22:00</td><td><span class="status-badge status-offline">已拒絕</span></td></tr>
    </tbody></table>
  </div>
</div>

<script>

document.querySelector('.topbar-toggle')?.addEventListener('click',function(){
  const isMobile=window.innerWidth<=768;
  if(isMobile){
    document.querySelector('.sidebar').classList.toggle('show');
    let ov=document.querySelector('.sidebar-overlay');
    if(!ov){ov=document.createElement('div');ov.className='sidebar-overlay';document.body.appendChild(ov);ov.addEventListener('click',function(){document.querySelector('.sidebar').classList.remove('show');ov.classList.remove('show');});}
    ov.classList.toggle('show');
  }else{
    document.body.classList.toggle('sidebar-collapsed');
  }
});

function toggleUserMenu(){const el=document.querySelector('.sidebar-user');el.classList.toggle('open');event.stopPropagation();}
document.addEventListener('click',function(e){const u=document.querySelector('.sidebar-user');if(u&&!u.contains(e.target))u.classList.remove('open');});
function toggleSub(id){const el=document.getElementById(id);el.classList.toggle('open');const chev=el.previousElementSibling?.querySelector('.sidebar-chevron');if(chev)chev.classList.toggle('open');}

// Field validation
document.querySelector('.btn-search')?.addEventListener('click', function(e) {
  let valid = true;
  document.querySelectorAll('.filter-error').forEach(el => el.textContent = '');
  document.querySelectorAll('.filter-group[data-rule]').forEach(group => {
    const rule = group.dataset.rule;
    const input = group.querySelector('input');
    if (!input) return;
    const val = input.value.trim();
    if (!val) return;
    let errorMsg = '';
    switch(rule) {
      case 'account':
        const accounts = val.split(',').map(s => s.trim()).filter(s => s);
        for (const acc of accounts) {
          if (!/^[a-zA-Z0-9_]{2,20}$/.test(acc)) { errorMsg = '帳號格式：2~20字元英數底線'; break; }
        }
        break;
      case 'nickname':
        if (val.length < 1 || val.length > 16) errorMsg = '暱稱長度：1~16字元';
        break;
      case 'order':
        if (!/^[a-zA-Z0-9_-]{4,30}$/.test(val)) errorMsg = '編號格式：4~30字元英數';
        break;
      case 'phone':
        if (!/^09\d{8}$/.test(val)) errorMsg = '格式：09開頭共10碼';
        break;
      case 'date':
        if (val.includes('~')) {
          const parts = val.split('~').map(s => s.trim());
          const dateRe = /^\d{4}-\d{2}-\d{2}$/;
          if (!dateRe.test(parts[0]) || !dateRe.test(parts[1])) errorMsg = '格式：YYYY-MM-DD ~ YYYY-MM-DD';
          else if (parts[0] > parts[1]) errorMsg = '開始日期不可大於結束日期';
        } else {
          if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) errorMsg = '格式：YYYY-MM-DD ~ YYYY-MM-DD';
        }
        break;
      case 'keyword':
        if (val.length < 1) errorMsg = '請輸入搜尋內容';
        break;
      case 'amount':
        if (!/^\d+(\.\d{1,2})?$/.test(val)) errorMsg = '請輸入有效金額';
        break;
    }
    if (errorMsg) {
      valid = false;
      const errEl = group.querySelector('.filter-error');
      if (errEl) errEl.textContent = errorMsg;
    }
  });
});
document.querySelector('.btn-reset')?.addEventListener('click', function() {
  document.querySelectorAll('.filter-group input').forEach(i => i.value = '');
  document.querySelectorAll('.filter-group select').forEach(s => s.selectedIndex = 0);
  document.querySelectorAll('.filter-error').forEach(el => el.textContent = '');
});

// === Batch Operation Mode ===
(function(){
  const btn = document.getElementById('batchBtn');
  if(!btn) return;
  const pageHeader = document.querySelector('.page-header');
  const exportBtn = document.querySelector('.btn-export');
  const batchActions = document.createElement('span');
  batchActions.id = 'batchActions';
  batchActions.style.cssText = 'display:none;align-items:center;gap:6px';
  batchActions.innerHTML = `
    <button id="batchClose" class="btn-batch" style="background:#6B7280;color:#fff;border-color:#6B7280"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>關閉批次操作</button>
    <button id="batchApprove" class="btn-batch" style="background:#16A34A;color:#fff;border-color:#16A34A"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>批次通過(<span id="batchCount1">0</span>)</button>
    <button id="batchReject" class="btn-batch" style="background:#DC2626;color:#fff;border-color:#DC2626"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>批次拒絕(<span id="batchCount2">0</span>)</button>`;
  pageHeader.insertBefore(batchActions, exportBtn);
  function getCount(){ return document.querySelectorAll('.batch-checkbox:checked').length; }
  function updateCounts(){ const c=getCount(); document.getElementById('batchCount1').textContent=c; document.getElementById('batchCount2').textContent=c; }
  function enterBatch(){
    btn.style.display='none'; batchActions.style.display='flex';
    const table=document.querySelector('.data-table'); const hr=table.querySelector('thead tr');
    const th=document.createElement('th'); th.style.cssText='width:40px;text-align:center';
    th.innerHTML='<input type="checkbox" id="batchSelectAll" style="width:16px;height:16px;cursor:pointer;accent-color:#6366F1">';
    hr.insertBefore(th,hr.firstChild);
    table.querySelectorAll('tbody tr').forEach(tr=>{const td=document.createElement('td');td.style.cssText='text-align:center';td.innerHTML='<input type="checkbox" class="batch-checkbox" style="width:16px;height:16px;cursor:pointer;accent-color:#6366F1">';tr.insertBefore(td,tr.firstChild);});
    document.getElementById('batchSelectAll').addEventListener('change',function(){document.querySelectorAll('.batch-checkbox').forEach(cb=>{cb.checked=this.checked;});updateCounts();});
    table.addEventListener('change',function(e){if(e.target.classList.contains('batch-checkbox')){updateCounts();const all=document.querySelectorAll('.batch-checkbox');const chk=document.querySelectorAll('.batch-checkbox:checked');document.getElementById('batchSelectAll').checked=all.length===chk.length;}});
  }
  function exitBatch(){
    btn.style.display='flex'; batchActions.style.display='none';
    const table=document.querySelector('.data-table'); const hr=table.querySelector('thead tr');
    if(hr.firstChild&&hr.firstChild.querySelector('#batchSelectAll'))hr.removeChild(hr.firstChild);
    table.querySelectorAll('tbody tr').forEach(tr=>{const f=tr.firstChild;if(f&&f.querySelector('.batch-checkbox'))tr.removeChild(f);});
  }
  btn.addEventListener('click',enterBatch);
  document.getElementById('batchClose').addEventListener('click',exitBatch);
  document.getElementById('batchApprove').addEventListener('click',function(){const c=getCount();if(!c){alert('請先勾選項目');return;}alert('已批次通過 '+c+' 筆紅包申請');exitBatch();});
  document.getElementById('batchReject').addEventListener('click',function(){const c=getCount();if(!c){alert('請先勾選項目');return;}alert('已批次拒絕 '+c+' 筆紅包申請');exitBatch();});
})();
</script>
</body>
</html>
