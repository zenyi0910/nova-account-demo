<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入數據 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="card" style="padding:24px">
<div class="card-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<div>
<div class="card-title">登入人數</div>
<div style="font-size:12px;color:#94A3B8">統計每小時登入的不重複人數</div>
</div>
<div style="display:flex;align-items:center;gap:8px">
<span style="font-size:28px;font-weight:700;color:#1E293B">0</span>
<span style="font-size:12px;color:#3B82F6;border:1px solid #3B82F6;border-radius:4px;padding:2px 8px">今日最新</span>
</div>
</div>
<div style="height:240px"><canvas id="chartLogin"></canvas></div>
</div>
<div class="card" style="padding:24px;margin-top:20px">
<div class="card-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<div>
<div class="card-title">遊戲人數</div>
<div style="font-size:12px;color:#94A3B8">統計每小時至少有一次投注的不重複玩家</div>
</div>
<div style="display:flex;align-items:center;gap:8px">
<span style="font-size:28px;font-weight:700;color:#1E293B">0</span>
<span style="font-size:12px;color:#3B82F6;border:1px solid #3B82F6;border-radius:4px;padding:2px 8px">今日最新</span>
</div>
</div>
<div style="height:240px"><canvas id="chartGame"></canvas></div>
</div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '管理總覽', title: '登入數據' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
<script src="components/charts.js"></script>
<script>
const hours = Array.from({length:9}, (_,i) => i + ':00');
createLineChart(document.getElementById('chartLogin'), {
  labels: hours,
  yTitle: '人數',
  datasets: [
    { label: '今日', data: [0,0,0,0,0,0,0,0,0], color: '#EC4899', dash: [5,5] },
    { label: '7天前', data: [2,1,0,1,3,5,4,3,2], color: '#EF4444' },
    { label: '30天前', data: [3,2,1,2,4,6,5,4,3], color: '#8B5CF6', dash: [5,5] }
  ]
});
createLineChart(document.getElementById('chartGame'), {
  labels: hours,
  yTitle: '人數',
  datasets: [
    { label: '今日', data: [0,0,0,0,0,0,0,0,0], color: '#EC4899', dash: [5,5] },
    { label: '7天前', data: [1,0,0,1,2,4,3,2,1], color: '#EF4444' },
    { label: '30天前', data: [2,1,0,1,3,5,4,3,2], color: '#8B5CF6', dash: [5,5] }
  ]
});
</script>
</body>
</html>
