<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入數據 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="chart-grid">
<div class="chart-card"><h3 class="chart-title">登入人數</h3><div class="chart-value">0</div><div class="chart-subtitle">今日最新</div><div class="chart-area"><svg viewBox="0 0 400 120" preserveAspectRatio="none" style="width:100%;height:100%;display:block"><path d="M0 100 L50 85 L100 90 L150 70 L200 60 L250 55 L300 40 L350 35 L400 20" fill="none" stroke="#3B82F6" stroke-width="2"/><path d="M0 100 L50 85 L100 90 L150 70 L200 60 L250 55 L300 40 L350 35 L400 20 L400 120 L0 120Z" fill="url(#areaBlue)" opacity=".2"/><defs><linearGradient id="areaBlue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/></linearGradient></defs></svg></div></div>
<div class="chart-card"><h3 class="chart-title">遊戲人數</h3><div class="chart-value">0</div><div class="chart-subtitle">今日最新</div><div class="chart-area"><svg viewBox="0 0 400 120" preserveAspectRatio="none" style="width:100%;height:100%;display:block"><path d="M0 90 L50 80 L100 75 L150 65 L200 50 L250 45 L300 30 L350 25 L400 15" fill="none" stroke="#10B981" stroke-width="2"/><path d="M0 90 L50 80 L100 75 L150 65 L200 50 L250 45 L300 30 L350 25 L400 15 L400 120 L0 120Z" fill="url(#areaGreen)" opacity=".2"/><defs><linearGradient id="areaGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/></linearGradient></defs></svg></div></div>
</div>
<div class="card" style="margin-top:20px;padding:20px 24px"><ul style="font-size:13px;color:#475569;line-height:2;list-style:disc;padding-left:20px">
<li><strong>登入人數：</strong> 統計每小時遊戲的人數。即使同一個人重複登入多次，也只會計算為 1 人。</li>
<li><strong>遊戲人數：</strong> 統計每小時內至少有過一次投注行為的不重複玩家。</li></ul></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '管理總覽', title: '登入數據' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
</body>
</html>
