<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金幣總量趨勢 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">月份</label><input type="text" class="filter-input" value="2026 年 5月" readonly></div>
<div class="filter-group"><label class="filter-label">VIP 等級</label><select class="filter-select"><option>全部 VIP</option></select></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="card"><div class="card-title">金幣總量趨勢</div><div class="card-desc">系統貨幣流通與儲備構成分析</div>
<div style="height:300px"><canvas id="chartTrend"></canvas></div></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '金幣數據分析', title: '金幣總量趨勢' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
<script src="components/charts.js"></script>
<script>
createLineChart(document.getElementById('chartTrend'), {
  labels: ['05/01','05/03','05/05','05/07','05/09','05/11','05/13','05/15'],
  yTitle: '幣量',
  datasets: [
    { label: '全部 UID 持幣總額', data: [3e9,3e9,3e9,3e9,3e9,3e9,3e9,3e9], color: '#3B82F6' },
    { label: '金幣數值', data: [2.8e9,2.75e9,2.7e9,2.65e9,2.6e9,2.55e9,2.5e9,2.4e9], color: '#F59E0B' },
    { label: '星幣數值', data: [2e8,2.5e8,3e8,3.5e8,4e8,4.5e8,5e8,6e8], color: '#8B5CF6' }
  ]
});
</script>
</body>
</html>
