<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易明細 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">日期範圍</label><input type="text" class="filter-input" value="2026/05/01 - 2026/05/16" readonly></div>
<div class="filter-group"><label class="filter-label">VIP 等級</label><select class="filter-select"><option>全部 VIP</option></select></div>
<div class="filter-group"><label class="filter-label">儲值方式</label><select class="filter-select"><option>全部方式</option></select></div>
<div class="filter-group"><label class="filter-label">裝置平台</label><select class="filter-select"><option>全部平台</option></select></div>
<div class="filter-group"><label class="filter-label">幣別</label><select class="filter-select"><option>全部幣別</option></select></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="card"><div class="card-title">交易明細報表</div><div class="card-desc">監控每日儲值、贈禮流向及後台發幣等風險控制關鍵指標。</div>
<button class="btn btn-outline" style="margin-bottom:16px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>匯出 CSV</button>
<div class="table-wrap"><table><thead><tr><th>日期</th><th>儲值總額</th><th>贈禮總額</th><th>贈禮人數</th><th>收禮人數</th><th>後台發幣</th><th>系統補償</th><th>手續費總額</th></tr></thead>
<tbody><tr><td colspan="8" style="text-align:center;padding:40px;color:#94A3B8"><h3 style="margin:0">暫無相關數據</h3><p style="margin:4px 0 0">請嘗試調整查詢條件</p></td></tr></tbody></table></div>
<p style="font-size:13px;color:#64748B;margin-top:12px">* 贈禮與收禮人數為不重複用戶計算。</p>
<div class="pagination"><div>共 0 筆</div><div style="display:flex;gap:4px"><button class="page-btn active">1</button></div></div></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '風控管理', title: '交易明細' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
</body>
</html>
