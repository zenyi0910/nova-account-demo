<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時 KPI 牆 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<!-- Row 1: GGR + GIFT (2 col with charts) -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">
<div class="card" style="padding:24px">
<div style="display:flex;justify-content:space-between;align-items:flex-start">
<div><h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748B;margin:0">GGR</h3>
<div style="display:flex;align-items:baseline;gap:12px;margin-top:8px"><span style="font-size:32px;font-weight:700">4,281,160</span><span style="font-size:12px;color:#10B981;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:20px;padding:2px 10px">+12.3%</span></div></div>
<div style="display:flex;gap:8px;font-size:11px;background:#F8FAFC;border-radius:12px;padding:4px 8px"><span style="color:#64748B">金幣 <b>78%</b></span><span style="color:#64748B">星幣 <b>22%</b></span></div>
</div>
<div style="height:180px;margin-top:16px"><canvas id="chartGgr"></canvas></div>
</div>
<div class="card" style="padding:24px">
<div style="display:flex;justify-content:space-between;align-items:flex-start">
<div><h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748B;margin:0">GIFT</h3>
<div style="display:flex;align-items:baseline;gap:12px;margin-top:8px"><span style="font-size:32px;font-weight:700">156,800</span><span style="font-size:12px;color:#10B981;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:20px;padding:2px 10px">+5.7%</span></div></div>
<div style="display:flex;gap:8px;font-size:11px;background:#F8FAFC;border-radius:12px;padding:4px 8px"><span style="color:#64748B">金幣 <b>72%</b></span><span style="color:#64748B">星幣 <b>28%</b></span></div>
</div>
<div style="height:180px;margin-top:16px"><canvas id="chartGift"></canvas></div>
</div>
</div>
<!-- Row 2: REVENUE full-width (bar+line mixed) -->
<div class="card" style="padding:24px;margin-bottom:24px">
<div style="display:flex;justify-content:space-between;align-items:flex-start">
<div><h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748B;margin:0">REVENUE 營收</h3>
<div style="display:flex;align-items:baseline;gap:12px;margin-top:8px"><span style="font-size:32px;font-weight:700">641,000</span><span style="font-size:12px;color:#10B981;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:20px;padding:2px 10px">+8.5%</span></div></div>
<div style="display:flex;gap:8px;font-size:11px;background:#F8FAFC;border-radius:12px;padding:4px 8px"><span style="color:#64748B">金幣 <b>65%</b></span><span style="color:#64748B">星幣 <b>35%</b></span></div>
</div>
<div style="height:220px;margin-top:16px"><canvas id="chartRevenue"></canvas></div>
</div>
<!-- Row 3: 4 mini cards (no charts) -->
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:24px">
<div class="card" style="padding:20px">
<h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748B;margin:0 0 8px">RTP 殺率</h3>
<div style="font-size:28px;font-weight:700">92.5%</div>
<div style="margin-top:8px"><span style="font-size:12px;color:#EF4444;font-weight:600">↓ 7.5%</span></div>
</div>
<div class="card" style="padding:20px">
<h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748B;margin:0 0 8px">PU 付費用戶</h3>
<div style="font-size:28px;font-weight:700">3</div>
<div style="margin-top:8px"><span style="font-size:12px;color:#10B981;font-weight:600">+50%</span></div>
</div>
<div class="card" style="padding:20px">
<h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748B;margin:0 0 8px">NU 新註冊</h3>
<div style="font-size:28px;font-weight:700">2</div>
<div style="margin-top:8px"><span style="font-size:12px;color:#10B981;font-weight:600">+100%</span></div>
</div>
<div class="card" style="padding:20px">
<h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748B;margin:0 0 8px">LU 登入用戶</h3>
<div style="font-size:28px;font-weight:700">16</div>
<div style="margin-top:8px"><span style="font-size:12px;color:#10B981;font-weight:600">+14%</span></div>
</div>
</div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '管理總覽', title: '即時 KPI 牆' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
<script src="components/charts.js"></script>
<script>
const h = Array.from({length:12}, (_,i) => (i*2));
const lineOpts = (yTitle) => ({
  responsive: true, maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: { legend: { position: 'top', align: 'start', labels: { usePointStyle: true, pointStyle: 'circle', padding: 12, font: { size: 10 } } }, tooltip: TOOLTIP_STYLE },
  scales: { x: { display: true, title: { display: true, text: '時', font: { size: 10 }, color: '#94A3B8' }, grid: { display: false }, ticks: { font: { size: 9 }, color: '#94A3B8' } }, y: { display: true, title: { display: true, text: yTitle, font: { size: 10 }, color: '#94A3B8' }, grid: { color: '#F1F5F9' }, ticks: { font: { size: 9 }, color: '#94A3B8' } } }
});
function kpiLine(id, datasets, yTitle='幣量') {
  new Chart(document.getElementById(id), {
    type: 'line',
    data: { labels: h, datasets: datasets.map(ds => ({
      label: ds.label, data: ds.data, borderColor: ds.color, backgroundColor: ds.color+'20',
      borderWidth: 1.5, pointRadius: 2, pointBackgroundColor: ds.color, tension: 0.3, fill: false
    }))},
    options: lineOpts(yTitle)
  });
}
// GGR + GIFT: 3 lines each
const ggrGold = [120,95,60,45,80,150,210,280,350,420,380,310];
const ggrStar = [30,25,15,10,20,40,55,70,90,105,95,80];
const ggrAll = ggrGold.map((v,i) => v + ggrStar[i]);
kpiLine('chartGgr', [
  { label: '金幣', data: ggrGold, color: '#10B981' },
  { label: '星幣', data: ggrStar, color: '#3B82F6' },
  { label: 'ALL', data: ggrAll, color: '#8B5CF6' }
]);
const giftGold = [5,3,2,1,4,8,12,15,18,20,16,13];
const giftStar = [2,1,0,1,2,3,5,6,8,9,7,5];
const giftAll = giftGold.map((v,i) => v + giftStar[i]);
kpiLine('chartGift', [
  { label: '金幣', data: giftGold, color: '#10B981' },
  { label: '星幣', data: giftStar, color: '#3B82F6' },
  { label: 'ALL', data: giftAll, color: '#8B5CF6' }
]);
// REVENUE: bar (platforms) + line (total)
new Chart(document.getElementById('chartRevenue'), {
  type: 'bar',
  data: { labels: h.map(v => v+':00'), datasets: [
    { label: 'Android', data: [0,0,0,0,0,5,12,18,25,30,22,15], backgroundColor: '#EC4899', order: 2 },
    { label: 'iOS', data: [0,0,0,0,2,8,15,22,30,35,28,18], backgroundColor: '#86EFAC', order: 2 },
    { label: 'PC', data: [0,0,0,0,1,3,6,8,12,15,10,7], backgroundColor: '#A78BFA', order: 2 },
    { label: 'Other', data: [0,0,0,0,0,1,2,3,4,5,3,2], backgroundColor: '#CBD5E1', order: 2 },
    { label: '總計', data: [0,0,0,0,3,17,35,51,71,85,63,42], type: 'line', borderColor: '#10B981', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 2, order: 1 }
  ]},
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'top', align: 'start', labels: { usePointStyle: true, padding: 12, font: { size: 10 } } }, tooltip: TOOLTIP_STYLE },
    scales: { x: { stacked: true, grid: { display: false }, ticks: { font: { size: 9 }, color: '#94A3B8' } }, y: { stacked: true, grid: { color: '#F1F5F9' }, ticks: { font: { size: 9 }, color: '#94A3B8' } } }
  }
});
</script>
</body>
</html>
