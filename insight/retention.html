<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留存率 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">日期範圍</label><input type="text" class="filter-input" value="2026/05/15 - 2026/05/15" readonly></div>
<div class="filter-group"><label class="filter-label">玩家來源</label><select class="filter-select"><option>全部來源</option></select></div>
<div class="filter-group"><label class="filter-label">裝置平台</label><select class="filter-select"><option>全部平台</option></select></div>
<div class="filter-group"><label class="filter-label">數據展示單位</label><button class="btn btn-primary" style="font-size:12px">百分比 (%)</button><button class="btn btn-outline" style="font-size:12px">實際數量 (人)</button></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="card"><div class="card-title">留存率熱力圖報表</div><div class="card-desc">追蹤用戶留存表現及趨勢變化。當前展示： 百分比 (%)</div>
<div class="table-wrap"><table><thead><tr><th>註冊日期</th><th>NU (新增)</th><th>Day +1 R1</th><th>Day +2 R2</th><th>Day +3 R3</th><th>Day +4 R4</th><th>Day +5 R5</th><th>Day +6 R6</th><th>Day +7 R7</th><th>Day +14 R14</th><th>Day +30 R30</th></tr></thead>
<tbody><tr><td colspan="11" style="text-align:center;padding:40px;color:#94A3B8"><h3 style="margin:0">暫無相關數據</h3><p style="margin:4px 0 0">請嘗試調整查詢條件</p></td></tr></tbody></table></div>
<div class="card-desc" style="margin-top:12px;color:#F59E0B">* 留存率計算方式：( X / Y ) × 100%（其中 X 為該日留存人數，Y 為註冊日新增人數）。</div>
<div class="pagination"><div>共 0 筆</div><div style="display:flex;gap:4px"><button class="page-btn active">1</button></div></div></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '運營數據分析', title: '留存率' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
</body>
</html>
