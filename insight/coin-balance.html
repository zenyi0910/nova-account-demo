<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餘額分佈 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">日期範圍</label><input type="text" class="filter-input" value="2026/05/15 - 2026/05/15" readonly></div>
<div class="filter-group"><label class="filter-label">VIP 等級</label><select class="filter-select"><option>全部 VIP</option></select></div>
<div class="filter-group"><label class="filter-label">幣別</label><select class="filter-select"><option>全部幣別</option></select></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="card"><div class="card-title">玩家持幣餘額分佈</div><div class="card-desc">分析各餘額區間內，星幣與金幣持有玩家的構成比例。</div>
<div style="font-size:11px;color:#F59E0B;margin-bottom:12px">★ 點擊星幣、金幣及背景區塊檢視明細</div>
<div style="height:300px"><canvas id="chartBalance"></canvas></div></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '金幣數據分析', title: '餘額分佈' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
<script src="components/charts.js"></script>
<script>
createBarChart(document.getElementById('chartBalance'), {
  labels: ['0-100','100-1K','1K-10K','10K-100K','100K-1M','1M+'],
  yTitle: '人數',
  datasets: [
    { label: '星幣', data: [180,95,60,28,8,3], color: '#EF4444' },
    { label: '金幣', data: [523,285,178,82,25,5], color: '#3B82F6' }
  ]
});
</script>
</body>
</html>
