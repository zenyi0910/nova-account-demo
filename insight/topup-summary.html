<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儲值總表 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">日期範圍</label><input type="text" class="filter-input" value="2026/05/15 - 2026/05/15" readonly></div>
<div class="filter-group"><label class="filter-label">VIP 等級</label><select class="filter-select"><option>全部 VIP</option></select></div>
<div class="filter-group"><label class="filter-label">儲值方式</label><select class="filter-select"><option>全部方式</option></select></div>
<div class="filter-group"><label class="filter-label">裝置平台</label><select class="filter-select"><option>全部平台</option></select></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="card"><div class="card-title">儲值總覽趨勢</div><div class="card-desc">每日儲值總額、贈禮總額與付費人數分析</div><div style="height:260px"><canvas id="chartTopup"></canvas></div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px">
<div class="card" style="padding:24px"><div class="card-title">儲值分佈</div><div class="card-desc">分析玩家儲值金額的區間與人數佔比。</div><div style="height:200px"><canvas id="chartDist"></canvas></div></div>
<div class="card" style="padding:24px"><div class="card-title">渠道儲值佔比</div><div class="card-desc">分析各儲值管道的金額貢獻度與佔比。</div><div style="font-size:11px;color:#F59E0B;margin-bottom:8px">＊點擊區塊檢視明細</div><div style="height:200px"><canvas id="chartChannel"></canvas></div></div>
</div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '儲值報表', title: '儲值總表' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
<script src="components/charts.js"></script>
<script>
const ctx = document.getElementById('chartTopup');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['05/15'],
    datasets: [
      { label: '儲值總額', data: [0], borderColor: '#3B82F6', backgroundColor: '#3B82F620', borderWidth: 2, fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#3B82F6', yAxisID: 'y' },
      { label: '贈禮總額', data: [0], borderColor: '#10B981', backgroundColor: '#10B98120', borderWidth: 2, fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#10B981', yAxisID: 'y' },
      { label: '付費人數', data: [0], borderColor: '#F59E0B', backgroundColor: '#F59E0B20', borderWidth: 2, fill: false, tension: 0.3, pointRadius: 4, pointStyle: 'circle', pointBackgroundColor: '#F59E0B', yAxisID: 'y1' }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'top', align: 'center', labels: { usePointStyle: true, padding: 16, font: { size: 11 } } }, tooltip: TOOLTIP_STYLE },
    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#94A3B8' } },
      y: { position: 'left', grid: { color: '#F1F5F9' }, ticks: { font: { size: 11 }, color: '#94A3B8' }, title: { display: true, text: '幣量', font: { size: 11 }, color: '#64748B' } },
      y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { font: { size: 11 }, color: '#94A3B8', callback: v => v + ' 人' }, title: { display: true, text: '付費人數（人）', font: { size: 11 }, color: '#64748B' } }
    }
  }
});
// 儲值分佈 bar chart
new Chart(document.getElementById('chartDist'), {
  type: 'bar',
  data: { labels: ['0-100','101-500','501-1K','1K-5K','5K+'], datasets: [{ label: '人數', data: [0,0,0,0,0], backgroundColor: '#3B82F6' }] },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#F1F5F9' }, title: { display: true, text: '人數' } } } }
});
// 渠道佔比 doughnut
new Chart(document.getElementById('chartChannel'), {
  type: 'doughnut',
  data: { labels: ['Apple Pay','Google Pay','信用卡','超商代碼','ATM'], datasets: [{ data: [0,0,0,0,0], backgroundColor: ['#3B82F6','#10B981','#F59E0B','#8B5CF6','#EC4899'] }] },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 10 }, padding: 8 } } } }
});
</script>
</body>
</html>
