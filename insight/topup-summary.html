<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儲值總表 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">日期範圍</label><input type="text" class="filter-input" value="2026/04/28 - 2026/05/05" readonly></div>
<div class="filter-group"><label class="filter-label">VIP 等級</label><select class="filter-select"><option>全部 VIP</option></select></div>
<div class="filter-group"><label class="filter-label">儲值方式</label><select class="filter-select"><option>全部方式</option></select></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="card"><div class="card-title">儲值趨勢</div><div class="card-desc">每日儲值金額與筆數走勢</div><div style="height:240px"><canvas id="chartTopup"></canvas></div></div>
<div class="card"><div class="card-title">儲值總表</div><div class="card-desc">追蹤整體儲值表現與用戶付費行為。</div>
<div class="table-wrap"><table><thead><tr><th>日期</th><th>總儲值金額</th><th>儲值人數</th><th>儲值次數</th><th>ARPU</th><th>ARPPU</th><th>首儲人數</th><th>首儲金額</th></tr></thead>
<tbody><tr><td>2026/05/05</td><td>5,755</td><td>5</td><td>7</td><td>5.26</td><td>1,151.00</td><td>2</td><td>650</td></tr>
<tr><td>2026/05/04</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
<tr><td>2026/05/03</td><td>2,100</td><td>3</td><td>4</td><td>420.00</td><td>700.00</td><td>1</td><td>150</td></tr>
<tr><td>2026/05/02</td><td>3,200</td><td>4</td><td>5</td><td>800.00</td><td>800.00</td><td>1</td><td>500</td></tr></tbody></table></div>
<div class="pagination"><div>共 4 筆</div><div style="display:flex;gap:4px"><button class="page-btn active">1</button></div></div></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '儲值報表', title: '儲值總表' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
<script src="components/charts.js"></script>
<script>
const ctx = document.getElementById('chartTopup');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['05/10','05/11','05/12','05/13','05/14','05/15','05/16'],
    datasets: [
      { label: '儲值總額', data: [8000,9500,7200,11000,9800,10500,8500], borderColor: '#3B82F6', backgroundColor: '#3B82F620', borderWidth: 2, fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#3B82F6', yAxisID: 'y' },
      { label: '贈禮總額', data: [2000,1800,2500,3000,2200,2800,1900], borderColor: '#10B981', backgroundColor: '#10B98120', borderWidth: 2, fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#10B981', yAxisID: 'y' },
      { label: '付費人數', data: [12,15,10,18,14,16,12], borderColor: '#F59E0B', backgroundColor: '#F59E0B20', borderWidth: 2, fill: false, tension: 0.3, pointRadius: 4, pointStyle: 'circle', pointBackgroundColor: '#F59E0B', yAxisID: 'y1' }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'top', align: 'center', labels: { usePointStyle: true, padding: 16, font: { size: 11 } } }, tooltip: TOOLTIP_STYLE },
    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#94A3B8' } },
      y: { position: 'left', grid: { color: '#F1F5F9' }, ticks: { font: { size: 11 }, color: '#94A3B8' }, title: { display: true, text: '幣量', font: { size: 11 }, color: '#64748B' } },
      y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { font: { size: 11 }, color: '#94A3B8', callback: v => v + ' 人' }, title: { display: true, text: '付費人數（人）', font: { size: 11 }, color: '#64748B' } }
    }
  }
});
</script>
</body>
</html>
