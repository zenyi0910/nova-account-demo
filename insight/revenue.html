<!DOCTYPE html>
<html lang="zh-TW">
<head>

<div class="layout">

<div class="content">

<div class="card-desc" style="margin-top:12px;color:#F59E0B">* 指標定義：ARPPU = 營收/PU, ARPU = 營收/AU, 付費率 = (PU/AU) × 100%。</div>
<div class="pagination"><div>共 1 筆</div><div style="display:flex;gap:4px"><button class="page-btn active">1</button></div></div></div>
</div>
</div>
</div>
