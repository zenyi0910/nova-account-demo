<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲明細 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">日期範圍</label><input type="text" class="filter-input" value="2026/05/15 - 2026/05/15" readonly></div>
<div class="filter-group"><label class="filter-label">VIP 等級</label><select class="filter-select"><option>全部 VIP</option></select></div>
<div class="filter-group"><label class="filter-label">遊戲類別</label><select class="filter-select"><option>選擇類別</option></select></div>
<div class="filter-group"><label class="filter-label">遊戲名稱</label><select class="filter-select" disabled><option>請先選擇遊戲類別</option></select></div>
<div class="filter-group"><label class="filter-label">幣別</label><select class="filter-select"><option>全部幣別</option></select></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="card"><div class="card-title">遊戲明細</div><div class="card-desc">分析每日遊戲活躍人數、投注金額、RTP 與獲利表現。</div>
<div class="table-wrap"><table><thead><tr><th>日期</th><th>遊戲人數</th><th>押注總額</th><th>贏分總額</th><th>RTP</th><th>Net Win</th><th>局數</th><th>平均押注</th><th>平均局數</th></tr></thead>
<tbody><tr><td>2026-05-15</td><td>5</td><td>56,689,100</td><td>52,407,940</td><td>92.5</td><td>+4,281,160</td><td>8,951</td><td>6,333.3</td><td>1,790.2</td></tr></tbody></table></div>
<p style="font-size:13px;color:#64748B;margin-top:12px">* RTP = 贏分 / 押注 × 100。Net Win 為正數表示平台盈利，負數表示平台支出。</p>
<div class="pagination"><div>共 1 筆</div><div style="display:flex;gap:4px"><button class="page-btn active">1</button></div></div></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '遊戲數據', title: '遊戲明細' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
</body>
</html>
