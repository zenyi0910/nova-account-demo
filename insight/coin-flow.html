<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產出與消耗 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">日期範圍</label><input type="text" class="filter-input" value="2026/04/28 - 2026/05/05" readonly></div>
<div class="filter-group"><label class="filter-label">幣種</label><select class="filter-select"><option>金幣</option><option>星幣</option></select></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="flow-grid">
<div class="flow-card"><h4>總產出</h4><div class="flow-val green">600,165</div></div>
<div class="flow-card"><h4>總消耗</h4><div class="flow-val red">485,200</div></div></div>
<div class="card"><div class="card-title">產出與消耗趨勢</div><div class="card-desc">近 7 日金幣產出與消耗走勢</div><div style="height:240px"><canvas id="chartFlow"></canvas></div></div>
<div class="card"><div class="card-title">產出與消耗</div><div class="card-desc">追蹤金幣的產出來源與消耗去向。</div>
<div class="table-wrap"><table><thead><tr><th>日期</th><th>產出金額</th><th>消耗金額</th><th>淨流量</th><th>產出來源</th></tr></thead>
<tbody><tr><td>2026/05/05</td><td>600,165</td><td>485,200</td><td>+114,965</td><td>儲值轉換</td></tr>
<tr><td>2026/05/04</td><td>0</td><td>12,500</td><td>-12,500</td><td>-</td></tr>
<tr><td>2026/05/03</td><td>210,000</td><td>185,000</td><td>+25,000</td><td>儲值轉換</td></tr></tbody></table></div>
<div class="pagination"><div>共 3 筆</div><div style="display:flex;gap:4px"><button class="page-btn active">1</button></div></div></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '金幣數據分析', title: '產出與消耗' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
<script src="components/charts.js"></script>
<script>
createBarChart(document.getElementById('chartFlow'), {
  labels: ['05/10','05/11','05/12','05/13','05/14','05/15','05/16'],
  yTitle: '幣量',
  datasets: [
    { label: '活動贈送', data: [50000,45000,60000,55000,48000,52000,200000000], color: '#10B981' },
    { label: '遊戲押注', data: [80000,75000,90000,85000,78000,82000,70000], color: '#EF4444' },
    { label: '淨趨勢線', data: [0,-2000,5000,2000,-1000,1000,199955000], color: '#3B82F6', type: 'line' }
  ]
});
</script>
