<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玩家排行榜 - Nova Analytics</title>
<link rel="stylesheet" href="components/styles.css">
</head>
<body>
<div class="layout">
<aside class="sidebar" id="insightSidebar"></aside>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="document.getElementById('insightSidebar').classList.remove('mobile-open');this.classList.remove('show')"></div>
<div class="main">
<header class="topbar" id="insightTopbar"></header>
<div class="content">
<div class="filter-section"><div class="filter-row">
<div class="filter-group"><label class="filter-label">日期範圍</label><input type="text" class="filter-input" value="2026/05/01 - 2026/05/16" readonly></div>
<div class="filter-group"><label class="filter-label">幣別</label><select class="filter-select"><option>全部幣別</option></select></div>
<button class="btn btn-primary">查詢</button><button class="btn btn-outline">重置</button></div></div>
<div class="card"><div class="card-title">玩家贏分排行榜</div><div class="card-desc">分析排行期間內，玩家的輸贏表現、押注倍率與帳戶狀態。</div>
<div class="table-wrap"><table><thead><tr><th>No.</th><th>帳號</th><th>玩家暱稱</th><th>贏分</th><th>押注</th><th>倍率</th><th>Net Win</th><th>餘額</th><th>儲值</th><th>贈禮</th><th>收禮</th></tr></thead>
<tbody><tr><td colspan="11" style="text-align:center;padding:40px;color:#94A3B8"><h3 style="margin:0">暫無相關數據</h3><p style="margin:4px 0 0">請嘗試調整查詢條件</p></td></tr></tbody></table></div>
<div style="display:flex;align-items:center;gap:8px;margin-top:12px"><span style="font-size:13px;color:#64748B">顯示排名：</span><select class="filter-select" style="width:auto"><option>前 100 名</option></select></div>
<div class="pagination"><div>共 0 筆</div><div style="display:flex;gap:4px"><button class="page-btn active">1</button></div></div></div>
</div>
</div>
</div>
<script>window.INSIGHT_PAGE = { group: '遊戲數據', title: '玩家排行榜' };</script>
<script src="components/sidebar.js"></script>
<script src="components/header.js"></script>
</body>
</html>
