<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Nova 前台 - 公頻慢速模式</title>
<style>
:root{
  --brand-primary:#4DD0C2;--brand-gold:#f4b63f;--brand-red:#991b1b;
  --text-primary:#452201;--text-secondary:rgba(69,34,1,.6);--text-white:#fff;
  --bg-page:#FFEABB;
  --radius-full:9999px;
  --font-stack:ui-sans-serif,system-ui,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:var(--font-stack);background:#1a1a1a;overflow:hidden;display:flex;justify-content:center;align-items:center}
.phone-frame{position:relative;width:430px;height:932px;max-height:95vh;border-radius:50px;border:10px solid #1a1a1a;background:#000;box-shadow:0 0 0 3px #333,0 0 60px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column;margin:0 auto}
.phone-frame::before{content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:90px;height:24px;background:#1a1a1a;border-radius:14px;z-index:100;pointer-events:none}
.phone-frame::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:120px;height:4px;background:#555;border-radius:3px;z-index:100;pointer-events:none}
@media(max-width:500px){.phone-frame{width:100vw;height:100vh;max-height:none;border-radius:0;border:none;box-shadow:none}.phone-frame::before,.phone-frame::after{display:none}}
.mobile-frame{width:100%;height:100%;position:relative;background:var(--bg-page);display:flex;flex-direction:column;border-radius:40px;overflow:hidden}

/* Tabs */
.chat-tabs{display:flex;align-items:center;gap:6px;padding:40px 12px 8px;background:var(--bg-page);position:relative}
.chat-tabs .back-tab{background:#C44A3A;color:#fff;border:none;border-radius:0 9999px 9999px 0;padding:2px 14px 2px 4px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;width:80px;height:48px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 16px rgba(196,74,58,.48),inset -2px -4px 2px rgba(160,38,28,1),inset 0 2px 1px rgba(255,200,180,.3);position:absolute;left:0}
.chat-tabs .tab-group{display:flex;width:220px;gap:4px;background:rgba(255,255,255,0.87);border-radius:9999px;padding:4px 8px;margin:0 auto}
.chat-tabs .tab-group button{flex:1;padding:7px 0;font-size:14px;font-weight:600;color:var(--text-primary);background:transparent;border:none;border-radius:20px;cursor:pointer;transition:all .2s;position:relative}
.chat-tabs .tab-group button.active{color:#fff;background:#2B7FFF;font-weight:700}
.chat-tabs .tab-group button .notif{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#ef4444;border-radius:50%}

/* Messages */
.chat-messages{flex:1;padding:12px 16px 100px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.date-divider{text-align:center;font-size:12px;color:#666;margin:4px 0;background:rgba(0,0,0,.05);display:inline-block;padding:2px 10px;border-radius:9999px;align-self:center}
.msg-row{display:flex;gap:8px;align-items:flex-start}
.msg-row.self{flex-direction:row-reverse}
.msg-row.self .msg-content{align-items:flex-end;flex-direction:row-reverse}
.msg-row.self .msg-content .bubble{background:#d1fae5}
.msg-row.self .msg-meta{align-items:flex-end}
.msg-row .avatar{width:48px;height:48px;border-radius:50%;background:#e5e7eb;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.msg-row .avatar img{width:100%;height:100%;object-fit:cover}
.msg-content{display:flex;flex-wrap:wrap;align-items:flex-end;gap:4px}
.msg-content .sender{font-size:11px;color:var(--text-secondary);margin-bottom:2px;width:100%;display:flex;align-items:center;gap:4px}
.msg-content .bubble{background:#fff;border:none;border-radius:16px;padding:4px 12px;font-size:14px;color:var(--text-primary);max-width:240px;word-break:break-all}
.msg-content .time{font-size:10px;color:rgba(69,34,1,.3)}
.msg-content .reply-link{font-size:11px;color:rgba(69,34,1,.3);cursor:pointer}
.msg-meta{display:flex;flex-direction:column;align-items:flex-start;gap:2px;align-self:flex-end;padding-bottom:2px}

/* System announcement */
.system-msg{align-self:center;background:rgba(0,0,0,.06);border-radius:8px;padding:4px 12px;font-size:11px;color:#666;text-align:center}

/* Input bar */
.chat-input-bar{position:sticky;bottom:0;background:#E5E7EB;border-top:none;padding:8px 8px 20px;display:flex;flex-direction:column;gap:8px;z-index:10;border-radius:16px 16px 0 0;margin:0 4px}
.chat-input-row{display:flex;align-items:center;gap:8px;background:transparent;border-radius:0;padding:0;height:44px}
.img-btn{width:44px;height:44px;border-radius:10px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#4A8FE7}
.img-btn svg{width:24px;height:24px}
.input-wrap{position:relative;flex:1;display:flex;align-items:center;background:#fff;border-radius:16px;padding:0;height:38px}
.input-wrap input{flex:1;border:none;border-radius:16px;padding:4px 36px 4px 12px;font-size:14px;outline:none;color:var(--text-primary);background:transparent;height:38px}
.input-wrap input::placeholder{color:#999}
.emoji-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#452201}
.emoji-btn svg{width:22px;height:22px}
.send-btn{background:#B0B0B0;color:#fff;border:none;border-radius:9999px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;width:80px;height:44px;box-shadow:0 4px 8px rgba(0,0,0,.15),inset 0 1px 1px rgba(255,255,255,.3);transition:background .2s}
.send-btn.active{background:#4A8FE7;box-shadow:0 4px 8px rgba(74,143,231,.4),inset 0 1px 1px rgba(255,255,255,.3)}
.send-btn.cooldown{background:#B0B0B0;cursor:not-allowed;opacity:.7}

/* Cooldown overlay on input */
.cooldown-notice{display:none;align-items:center;justify-content:center;gap:6px;font-size:12px;color:#666;padding:4px 0}
.cooldown-notice.show{display:flex}
.cooldown-notice svg{width:14px;height:14px;color:#999}
.cooldown-timer{font-weight:700;color:#C44A3A;font-size:13px}

/* Step bar */
.step-bar{position:fixed;top:8px;right:8px;z-index:300}
.step-toggle{background:rgba(0,0,0,.75);color:#fbbf24;border:none;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
.step-panel{display:none;position:absolute;top:28px;right:0;background:rgba(0,0,0,.85);padding:8px 10px;border-radius:8px;flex-direction:column;gap:3px;min-width:140px}
.step-bar.open .step-panel{display:flex}
.step-bar .step{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap}
.step-bar .step.active{color:#fbbf24;font-weight:600}
.step-bar .step-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3)}
.step-bar .step.active .step-dot{background:#fbbf24}
.step-nav{display:flex;gap:4px;margin-top:4px}
.step-nav button{padding:3px 8px;border-radius:4px;font-size:10px;border:none;cursor:pointer}
.step-nav .prev-step{background:rgba(255,255,255,.15);color:#fff}
.step-nav .next-step{background:#fbbf24;color:#452201;font-weight:600}
</style>
</head>
<body>
<div class="phone-frame">
<div class="mobile-frame">
  <div class="chat-tabs">
    <button class="back-tab">&lt; 回列表</button>
    <div class="tab-group">
      <button class="active">公頻</button>
      <button>私聊</button>
      <button>公會</button>
      <button>公告<span class="notif"></span></button>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="date-divider">06/24（二）</div>
    <div class="system-msg">系統公告：慢速模式已開啟，每次發言間隔 60 秒</div>

    <div class="msg-row">
      <div class="avatar"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#60a5fa"/><circle cx="18" cy="20" r="2" fill="#fff"/><circle cx="30" cy="20" r="2" fill="#fff"/><path d="M18 30 Q24 35 30 30" stroke="#fff" stroke-width="2" fill="none"/></svg></div>
      <div class="msg-content">
        <div class="sender">玩家A</div>
        <div class="bubble">大家早安！今天有什麼活動嗎？</div>
        <div class="msg-meta"><div class="time">上午 08:30</div></div>
      </div>
    </div>

    <div class="msg-row">
      <div class="avatar"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#f97316"/><circle cx="18" cy="20" r="2" fill="#fff"/><circle cx="30" cy="20" r="2" fill="#fff"/><path d="M18 28 Q24 33 30 28" stroke="#fff" stroke-width="2" fill="none"/></svg></div>
      <div class="msg-content">
        <div class="sender">Lucky777</div>
        <div class="bubble">聽說今天有加倍活動</div>
        <div class="msg-meta"><div class="time">上午 08:31</div></div>
      </div>
    </div>

    <div class="msg-row self">
      <div class="msg-content">
        <div class="bubble">好期待！等等來玩</div>
        <div class="msg-meta"><div class="time">上午 08:32</div></div>
      </div>
    </div>

    <div class="msg-row">
      <div class="avatar"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" fill="#a855f7"/><circle cx="18" cy="20" r="2" fill="#fff"/><circle cx="30" cy="20" r="2" fill="#fff"/><path d="M20 29 Q24 32 28 29" stroke="#fff" stroke-width="1.5" fill="none"/></svg></div>
      <div class="msg-content">
        <div class="sender">大贏家</div>
        <div class="bubble">公頻人好多～</div>
        <div class="msg-meta"><div class="time">上午 08:33</div></div>
      </div>
    </div>
  </div>

  <!-- Input bar (no redpacket btn for public channel) -->
  <div class="chat-input-bar">
    <div class="cooldown-notice" id="cooldownNotice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>冷卻中，請等待 <span class="cooldown-timer" id="cooldownTimer">60</span> 秒後再發言</span>
    </div>
    <div class="chat-input-row">
      <button class="img-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></button>
      <div class="input-wrap">
        <input type="text" placeholder="請輸入訊息" id="msgInput">
        <button class="emoji-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
      </div>
      <button class="send-btn" id="sendBtn">送出</button>
    </div>
  </div>
</div>
</div>

<!-- Step navigation -->
<div class="step-bar" id="stepBar">
  <button class="step-toggle" onclick="document.getElementById('stepBar').classList.toggle('open')">Step <span id="stepNum">1</span>/4 ▾</button>
  <div class="step-panel">
    <div class="step active" data-step="1"><span class="step-dot"></span>1.公頻正常</div>
    <div class="step" data-step="2"><span class="step-dot"></span>2.送出訊息</div>
    <div class="step" data-step="3"><span class="step-dot"></span>3.冷卻倒數</div>
    <div class="step" data-step="4"><span class="step-dot"></span>4.冷卻結束</div>
    <div class="step-nav">
      <button class="prev-step" onclick="prevStep()">‹</button>
      <button class="next-step" onclick="nextStep()">›</button>
    </div>
  </div>
</div>

<script>
const COOLDOWN_SEC = 60;
let currentStep = 1;
let cooldownInterval = null;
let cooldownRemaining = 0;

const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const cooldownNotice = document.getElementById('cooldownNotice');
const cooldownTimer = document.getElementById('cooldownTimer');
const chatMessages = document.getElementById('chatMessages');

// Send btn active state
msgInput.addEventListener('input', () => {
  if (cooldownRemaining <= 0) {
    sendBtn.classList.toggle('active', msgInput.value.trim().length > 0);
  }
});

// Send message
sendBtn.addEventListener('click', () => {
  if (sendBtn.classList.contains('cooldown')) return;
  const text = msgInput.value.trim();
  if (!text) return;
  appendMyMsg(text);
  msgInput.value = '';
  sendBtn.classList.remove('active');
  startCooldown();
});

function appendMyMsg(text) {
  const now = new Date();
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const period = h < 12 ? '上午' : '下午';
  const h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  const timeStr = `${period} ${String(h12).padStart(2,'0')}:${m}`;
  const row = document.createElement('div');
  row.className = 'msg-row self';
  row.innerHTML = `<div class="msg-content"><div class="bubble">${text}</div><div class="msg-meta"><div class="time">${timeStr}</div></div></div>`;
  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function startCooldown() {
  cooldownRemaining = COOLDOWN_SEC;
  sendBtn.classList.add('cooldown');
  sendBtn.classList.remove('active');
  sendBtn.textContent = COOLDOWN_SEC + 's';
  msgInput.disabled = true;
  msgInput.placeholder = '冷卻中...';
  cooldownNotice.classList.add('show');
  cooldownTimer.textContent = COOLDOWN_SEC;

  cooldownInterval = setInterval(() => {
    cooldownRemaining--;
    sendBtn.textContent = cooldownRemaining + 's';
    cooldownTimer.textContent = cooldownRemaining;
    if (cooldownRemaining <= 0) {
      endCooldown();
    }
  }, 1000);
}

function endCooldown() {
  clearInterval(cooldownInterval);
  cooldownRemaining = 0;
  sendBtn.classList.remove('cooldown');
  sendBtn.textContent = '送出';
  msgInput.disabled = false;
  msgInput.placeholder = '請輸入訊息';
  cooldownNotice.classList.remove('show');
}

// Step control
function setStep(n) {
  currentStep = n;
  document.querySelectorAll('.step').forEach(s => s.classList.toggle('active', +s.dataset.step === n));
  document.getElementById('stepNum').textContent = n;
  // Reset
  endCooldown();
  msgInput.value = '';

  if (n === 1) {
    // Normal state - public channel ready
  }
  if (n === 2) {
    // Just sent a message
    appendMyMsg('大家一起加油！');
    startCooldown();
  }
  if (n === 3) {
    // Mid-cooldown (simulate 45s remaining)
    cooldownRemaining = 45;
    sendBtn.classList.add('cooldown');
    sendBtn.textContent = '45s';
    msgInput.disabled = true;
    msgInput.placeholder = '冷卻中...';
    cooldownNotice.classList.add('show');
    cooldownTimer.textContent = '45';
    cooldownInterval = setInterval(() => {
      cooldownRemaining--;
      sendBtn.textContent = cooldownRemaining + 's';
      cooldownTimer.textContent = cooldownRemaining;
      if (cooldownRemaining <= 0) endCooldown();
    }, 1000);
  }
  if (n === 4) {
    // Cooldown ended, ready to send again
    endCooldown();
    msgInput.value = '又可以發言了';
    sendBtn.classList.add('active');
  }
}
function nextStep() { if (currentStep < 4) setStep(currentStep + 1); }
function prevStep() { if (currentStep > 1) setStep(currentStep - 1); }
</script>
</body>
</html>
