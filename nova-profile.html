<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星運娛樂城 - 個人中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-red:#76090a;--brown:#452201;--gold:#f4b63f;--teal:#2bb5a0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg-red);color:#fff;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:url('https://www.kcfgmtb.com/assets/login_bg-Bi1SMT6m.png') center top/auto 100% repeat-x;position:relative;display:flex;flex-direction:column}
.profile-header{padding:24px 14px 16px;text-align:center;position:relative}
.profile-avatar{width:72px;height:72px;border-radius:50%;padding:3px;background:rgba(250,250,250,.9);margin:0 auto 10px;display:flex;align-items:center;justify-content:center}
.profile-avatar-inner{width:100%;height:100%;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--brown)}
.profile-name{font-size:18px;font-weight:700}
.profile-id{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.vip-badge{display:inline-block;background:linear-gradient(135deg,#9b59b6,#7a2090);color:#fff;font-size:10px;padding:3px 12px;border-radius:12px;font-weight:600;margin-top:6px}
.settings-btn{position:absolute;top:16px;right:14px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);padding:4px}
.settings-btn svg{width:20px;height:20px}
.balance-row{display:flex;gap:8px;margin:0 14px 14px}
.balance-box{flex:1;border-radius:12px;padding:3px;background:rgba(250,250,250,.9)}
.balance-inner{border-radius:9px;background:linear-gradient(135deg,#8b0a1e,#5a0612);padding:14px;text-align:center}
.bal-label{font-size:10px;color:rgba(255,255,255,.4)}
.bal-value{font-size:18px;font-weight:700;color:var(--gold);margin-top:4px}
.bal-sub{font-size:9px;color:rgba(255,255,255,.25);margin-top:2px}
.action-row{display:flex;gap:8px;margin:0 14px 14px}
.action-btn{flex:1;border-radius:9999px;padding:3px;background:rgba(250,250,250,.9);border:none;cursor:pointer;font-family:inherit}
.action-btn:active{transform:scale(.97)}
.action-inner{border-radius:9999px;padding:10px;text-align:center;font-size:13px;font-weight:600}
.action-inner.teal{background:var(--teal);color:#fff}
.action-inner.gold{background:var(--gold);color:var(--brown)}
.action-inner.outline{background:transparent;color:var(--brown);border:1px solid rgba(69,34,1,.15)}
.content{flex:1;overflow-y:auto}
.menu-section{margin:0 14px 14px}
.menu-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.3);margin-bottom:8px;padding-left:4px}
.menu-card{border-radius:14px;padding:3px;background:rgba(250,250,250,.9);overflow:hidden}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(0,0,0,.04)}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:rgba(0,0,0,.03)}
.menu-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-icon svg{width:16px;height:16px}
.menu-label{flex:1;font-size:13px;font-weight:500;color:var(--brown)}
.menu-arrow{color:rgba(69,34,1,.2)}
.menu-arrow svg{width:16px;height:16px}
.menu-badge{background:#e74c3c;color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;padding:0 4px}
.vip-progress{margin:0 14px 14px;border-radius:14px;padding:3px;background:rgba(250,250,250,.9)}
.vip-inner{border-radius:11px;padding:14px;background:linear-gradient(135deg,rgba(155,89,182,.08),rgba(122,32,144,.04))}
.vip-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.vip-current{font-size:13px;font-weight:600;color:var(--brown)}
.vip-next{font-size:11px;color:rgba(69,34,1,.4)}
.vip-bar{height:6px;border-radius:3px;background:rgba(0,0,0,.06);overflow:hidden}
.vip-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#9b59b6,#7a2090);width:65%}
.vip-info{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:rgba(69,34,1,.3)}
.tab-bar{display:flex;align-items:center;justify-content:space-around;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.06);padding:6px 0 env(safe-area-inset-bottom,8px);position:sticky;bottom:0;z-index:50}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 10px;color:rgba(255,255,255,.3);transition:color .15s;background:none;border:none;font-family:inherit;text-decoration:none}
.tab-item.active{color:var(--gold)}
.tab-item svg{width:20px;height:20px}
.tab-item span{font-size:9px}
</style>
</head>
<body>
