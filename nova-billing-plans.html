<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 儲值金額表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F8F9FB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid oklch(0.922 0 0);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-sub{font-size:10px;color:#9CA3AF;font-weight:500}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;cursor:pointer}
.sidebar-user .user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.user-chevron{width:14px;height:14px;color:#9CA3AF;margin-left:auto;flex-shrink:0;transition:transform .2s}
.sidebar-user.open .user-chevron{transform:rotate(0deg);color:#4338CA}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200;opacity:0;transform:translateX(-4px);transition:opacity .2s ease,transform .2s ease}
.sidebar-user.open .user-popover{display:block;opacity:1;transform:translateX(0)}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none;transition:background .15s}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid oklch(0.922 0 0);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header h4{font-size:18px;font-weight:600;color:#111827}
.tips-box{display:flex;align-items:flex-start;gap:8px;padding:12px 16px;background:#F0F9FF;border:none;border-left:4px solid #38BDF8;border-radius:8px;font-size:13px;color:#0369A1;margin-bottom:16px}
.tips-box svg{color:#38BDF8;flex-shrink:0;margin-top:2px}
.tips-box span{font-weight:600;color:#0C4A6E}
.user-avatar{width:36px;height:36px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-weight:600;color:#4338CA;font-size:14px;cursor:pointer;margin-left:auto}

/* Mind Map Tree */
.mindmap-wrap{overflow:hidden;padding:20px;position:relative;cursor:grab;min-height:calc(100vh - 200px)}
.mindmap-inner{position:relative;transform-origin:0 0;display:inline-block}
.mindmap-wrap.dragging{cursor:grabbing}
.mm-zoom-controls{position:fixed;right:32px;bottom:32px;display:flex;flex-direction:column;gap:4px;z-index:20;background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);padding:6px}
.mm-zoom-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:18px;color:#374151;font-weight:600}
.mm-zoom-btn:hover{background:#F3F4F6}
.mm-zoom-range{writing-mode:vertical-lr;direction:rtl;width:32px;height:80px;margin:4px 0;cursor:pointer;accent-color:#4338CA}
.mindmap{display:inline-flex;flex-direction:column;gap:24px;position:relative;z-index:1}
.mm-provider-group{margin-bottom:8px}
.mm-row{display:flex;align-items:center;gap:0}
.mm-children{display:flex;flex-direction:column;gap:6px;margin-left:60px}
.mm-method-group{display:flex;align-items:center}
.mm-method-group > .mm-children{margin-left:50px;display:flex;flex-direction:column;align-items:flex-start}
.mm-node{position:relative;padding:10px 16px;border-radius:10px;cursor:pointer;white-space:nowrap;margin:4px 0;transition:transform .15s,box-shadow .15s;font-size:13px;display:flex;align-items:center;gap:8px}
.mm-node:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.mm-node.active{box-shadow:0 0 0 2px #4338CA}

/* L1 供應商 */
.mm-l1{background:linear-gradient(135deg,#6366F1,#4338CA);color:#fff;font-weight:600;font-size:12px;border-radius:10px;padding:8px 12px;min-width:80px;max-width:160px;justify-content:center;text-align:center}
.mm-l1 .mm-code{background:rgba(0,0,0,.06);color:#6B7280}

/* L2 支付方式 */
.mm-l2{background:#EEF2FF;border:1px solid #C7D2FE;color:#4338CA;font-weight:500;font-size:11px;padding:6px 10px;width:120px;min-width:120px;max-width:120px;justify-content:center;text-align:center}

/* L3 儲值金額表 */
.mm-l3{background:#F9FAFB;border:2px solid #D1D5DB;color:#374151;font-size:12px;width:240px;min-width:240px;max-width:240px;padding:8px 14px;cursor:pointer;transition:box-shadow .15s;display:flex;align-items:center;gap:6px}
.mm-l3 .mm-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mm-l3 .mm-actions{display:flex;align-items:center;gap:2px;margin-left:auto;flex-shrink:0}
.mm-l3:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.mm-l3.empty{background:#E6FFF9;border:2px dashed #00D5BE;color:#065F46;width:240px;min-width:240px;max-width:240px;cursor:pointer}
.mm-l3.empty:hover{border-color:#059669;color:#059669;background:#D1FAE5}

/* L4 付款通道 */
.mm-l4{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF;font-size:11px;padding:6px 10px;min-width:100px;max-width:150px;display:flex;align-items:center;justify-content:center;gap:4px}

.mm-billing-group{display:flex;align-items:center}
.mm-billing-group > .mm-children{margin-left:50px}

.mm-tag{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:500;position:absolute;top:-8px;right:-4px;white-space:nowrap;line-height:1.4}
.mm-tag-on{background:#D1FAE5;color:#065F46}
.mm-tag-off{background:#FEE2E2;color:#DC2626}
.mm-node.is-off .mm-name{color:rgba(107,114,128,.5)}.mm-node.is-off .mm-code{color:rgba(107,114,128,.4)}
.mm-tag-shared{background:#E0E7FF;color:#3730A3}
.mm-amounts{font-size:10px;color:#6B7280;padding:2px 6px;border-radius:8px;font-weight:500}
.mm-unlink{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:700;color:#DC2626;cursor:pointer;line-height:1;z-index:5;background:#fff;border-radius:50%;width:18px;height:18px;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.mm-link-zone{position:relative;width:50px;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:stretch}
.mm-link-zone:hover .mm-unlink{display:flex}
.mm-l4-row{display:flex;align-items:center}

/* Legend 右側固定 */
.mm-legend-right{position:fixed;right:32px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:20}
.mm-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#6B7280}
.mm-legend-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.mm-code{font-size:9px;background:rgba(0,0,0,.06);color:#6B7280;padding:2px 6px;border-radius:3px;position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.mm-node:hover .mm-code{opacity:1}
.mm-name{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.mm-node:hover .mm-name{white-space:normal;overflow:visible;text-overflow:unset}
.mm-node:hover{z-index:10;position:relative}
.mm-edit-btn{font-size:11px;margin-left:auto;padding:2px 4px;cursor:pointer;opacity:.5;transition:opacity .15s;display:flex;align-items:center}
.mm-edit-btn:hover{opacity:1}
.mm-view-btn{font-size:11px;padding:2px 4px;cursor:pointer;color:#4338CA;opacity:.7;transition:opacity .15s;display:flex;align-items:center}
.mm-view-btn:hover{opacity:1}
.mm-add{background:#fff;border:2px dashed #D1D5DB;color:#6B7280;font-size:12px;cursor:pointer;text-align:center;display:flex;align-items:center;gap:6px}
.mm-add:hover{border-color:#4338CA;color:#4338CA;background:#EEF2FF}

/* Toggle switch */
.mm-toggle{display:inline-flex;align-items:center;cursor:pointer;flex-shrink:0}
.mm-toggle-track{width:28px;height:16px;border-radius:8px;background:#D1D5DB;position:relative;transition:background .2s}
.mm-toggle.on .mm-toggle-track{background:#00D5BE}
.mm-toggle-thumb{width:12px;height:12px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.mm-toggle.on .mm-toggle-thumb{left:14px}
.mm-toggle-text{font-size:11px;font-weight:500}
.mm-toggle-text.on{color:#14b8a6}
.mm-toggle-text.off{color:rgba(107,114,128,.5)}

/* Modal footer */
.modal-footer{display:flex;justify-content:flex-end;gap:12px;padding:16px 24px;border-top:1px solid #E5E7EB}
.btn-close-modal{padding:8px 20px;border:1px solid #D1D5DB;border-radius:8px;background:#fff;color:#374151;cursor:pointer;font-size:13px}
.btn-close-modal:hover{background:#F9FAFB}
.btn-edit-modal{padding:8px 20px;border:none;border-radius:8px;background:#1F2937;color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px}
.btn-edit-modal:hover{background:#111827}
.bp-info-card{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:16px}
.bp-info-card h5{margin:0 0 12px;font-size:14px;color:#374151}
.bp-info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F3F4F6;font-size:13px}
.bp-info-row:last-child{border-bottom:none}
.bp-label{color:#6B7280}
.bp-input{width:80px;padding:4px 8px;border:1px solid #D1D5DB;border-radius:6px;font-size:13px;text-align:right}
.bp-input.sm{width:70px}
.bp-edit-form{margin-bottom:16px}
.bp-form-row{display:flex;gap:16px;margin-bottom:12px}
.bp-form-field{flex:1}
.bp-form-field.full{flex:1 1 100%}
.bp-form-field label{display:block;font-size:12px;color:#374151;margin-bottom:4px;font-weight:500}
.bp-form-field .req{color:#EF4444;margin-left:2px}
.bp-select{width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:8px;font-size:13px;background:#fff;appearance:auto}
.btn-del{padding:4px;border:none;border-radius:4px;background:none;color:#DC2626;cursor:pointer;display:inline-flex;align-items:center}
.btn-del:hover{background:#FEE2E2}
.btn-sort{padding:4px;border:none;border-radius:4px;background:none;color:#6B7280;cursor:pointer;display:inline-flex;align-items:center}
.btn-sort:hover{background:#F3F4F6;color:#374151}
.bp-actions{display:flex;gap:4px;align-items:center;white-space:nowrap}
.bp-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bp-card-header h5{margin:0}
.btn-sort-header{padding:6px 12px;border:1px solid #D1D5DB;border-radius:6px;background:#fff;color:#374151;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-sort-header:hover{background:#F3F4F6}
.btn-del-text{border:none;background:none;color:#DC2626;font-size:13px;cursor:pointer;padding:4px 8px}
.btn-del-text:hover{text-decoration:underline}
.bp-add-row{text-align:center;padding:10px;color:#6B7280;font-size:13px;cursor:pointer;border-top:1px solid #F3F4F6;margin-top:8px}
.bp-add-row:hover{color:#4338CA}
.bp-status-row{display:flex;align-items:center;gap:12px;margin-top:16px;padding:12px 0;border-top:1px solid #E5E7EB}
.bp-status-text{font-size:13px;color:#6B7280}
.bp-status-text.on{color:#059669}

/* SVG Lines */
.mm-lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.mm-lines path{fill:none;stroke:#D1D5DB;stroke-width:1.5}

/* Legend */
.legend{display:flex;gap:16px;margin-bottom:12px;font-size:12px;color:#6B7280;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:12px;height:12px;border-radius:4px}
.mm-filter{margin-bottom:16px;background:rgba(99,102,241,.03);border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mm-filter-label{font-size:12px;font-weight:500;color:#111827;margin-bottom:6px}
.mm-filter-row{display:flex;align-items:center;gap:8px}
.mm-filter-row select{padding:8px 12px;border:none;border-radius:8px;font-size:13px;color:#6B7280;background:#fff;min-width:180px;appearance:auto;box-shadow:none}
.mm-filter-actions{display:flex;gap:8px;margin-left:auto}
.btn-search{padding:8px 16px;background:#111827;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-search:hover{background:#374151}
.btn-reset{padding:8px 16px;background:#F3F4F6;color:#111827;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-reset:hover{background:#E5E7EB}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:90vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #E5E7EB}
.modal-header h3{font-size:16px;font-weight:600}
.modal-header .close{background:none;border:none;font-size:20px;cursor:pointer;color:#6B7280;padding:4px 8px}
.modal-body{padding:24px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:#F9FAFB;padding:10px 12px;text-align:left;font-weight:600;color:#374151;border-bottom:1px solid #E5E7EB}
.data-table td{padding:10px 12px;border-bottom:1px solid #F3F4F6;color:#374151}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js?v=4"></script>

<div class="main">
  <div class="topbar">
    <nav class="breadcrumb">
      <a href="#">首頁</a><span class="sep">/</span>
      <a href="nova-payment-management.html">三方支付設定</a><span class="sep">/</span>
      <span class="current">儲值金額表</span>
    </nav>
    <div class="user-avatar" style="margin-left:auto">C</div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <h4>儲值金額表</h4>
    </div>
    <div class="tips-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2v1"/><path d="M12 7a4 4 0 0 0-4 4c0 1.5.8 2.8 2 3.4V17h4v-2.6c1.2-.6 2-1.9 2-3.4a4 4 0 0 0-4-4z"/></svg>
      <span>Tips</span> 該功能僅支援金幣類型。
    </div>
    <div class="mm-filter">
      <div class="mm-filter-label">供應商</div>
      <div class="mm-filter-row">
        <select id="providerFilter">
          <option value="all">全部供應商</option>
        </select>
        <div class="mm-filter-label" style="margin-left:16px">狀態</div>
        <select id="billingFilter">
          <option value="all">選擇啟用狀態</option>
          <option value="on">啟用中</option>
          <option value="off">停用中</option>
        </select>
        <div class="mm-filter-actions">
          <button class="btn-search" onclick="applyFilter()">搜尋</button>
          <button class="btn-reset" onclick="resetFilter()">重置</button>
        </div>
      </div>
    </div>
    <div class="mindmap-wrap" id="mindmapWrap">
      <div class="mindmap-inner" id="mindmapInner">
        <svg class="mm-lines" id="mmLines"></svg>
        <div class="mindmap" id="mindmap"></div>
      </div>
    </div>
    <!-- Zoom Controls -->
    <div class="mm-zoom-controls">
      <button class="mm-zoom-btn" onclick="zoomIn()" title="放大">+</button>
      <input type="range" class="mm-zoom-range" id="zoomRange" min="30" max="150" value="100" oninput="setZoom(this.value)">
      <button class="mm-zoom-btn" onclick="zoomOut()" title="縮小">−</button>
    </div>
    <!-- Legend 右側居中 -->
    <div class="mm-legend-right">
      <div class="mm-legend-item"><div class="mm-legend-dot" style="background:linear-gradient(135deg,#6366F1,#4338CA)"></div>供應商</div>
      <div class="mm-legend-item"><div class="mm-legend-dot" style="background:#EEF2FF;border:1px solid #C7D2FE"></div>支付方式</div>
      <div class="mm-legend-item"><div class="mm-legend-dot" style="background:#F9FAFB;border:2px solid #D1D5DB"></div>儲值金額表</div>
      <div class="mm-legend-item"><div class="mm-legend-dot" style="background:#EFF6FF;border:1px solid #BFDBFE"></div>付款通道</div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h3 id="detailTitle">儲值金額表明細</h3><button class="close" onclick="closeDetailModal()">&times;</button></div>
    <div class="modal-body" id="detailTable"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

    <script src="js/billing-plans.js?v=18"></script>
</body>
</html>
