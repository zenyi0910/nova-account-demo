<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 活動設定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}

.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub .sidebar-item{transform:translateY(-4px);opacity:0;transition:transform .3s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub.open .sidebar-item{transform:translateY(0);opacity:1}
.sidebar-sub.open .sidebar-item:nth-child(1){transition-delay:0.03s}
.sidebar-sub.open .sidebar-item:nth-child(2){transition-delay:0.06s}
.sidebar-sub.open .sidebar-item:nth-child(3){transition-delay:0.09s}
.sidebar-sub.open .sidebar-item:nth-child(4){transition-delay:0.12s}
.sidebar-sub.open .sidebar-item:nth-child(5){transition-delay:0.15s}
.sidebar-sub.open .sidebar-item:nth-child(6){transition-delay:0.18s}
.sidebar-sub.open .sidebar-item:nth-child(7){transition-delay:0.21s}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item:hover{color:#111827}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}
.btn-batch,.btn-export{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-batch{background:#fff;color:#374151;border:1px solid #D1D5DB}
.btn-batch:hover{background:#F3F4F6;border-color:#9CA3AF}
.btn-batch svg,.btn-export svg{width:14px;height:14px}
.btn-export{background:#1F2937;color:#fff;border:1px solid #1F2937}
.btn-export:hover{background:#374151}
.btn-add{background:#2BB5A0;color:#fff;border:1px solid #2BB5A0;display:flex;align-items:center;gap:6px;padding:0 12px;height:32px;border-radius:8px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer}
.btn-add:hover{background:#249E8B}
.btn-add svg{width:14px;height:14px}
.tabs{display:flex;gap:0;background:#F1F2F4;border-radius:10px;padding:3px;margin-bottom:16px}
.tab-btn{flex:1;padding:6px 16px;border:1px solid transparent;border-radius:8px;background:none;font-size:12px;font-weight:500;color:#393939;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.tab-btn.active{background:#fff;color:#393939;box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px -1px rgba(0,0,0,.1)}
.tips-box{background:#F0FDF9;border:1px solid #99F6E4;border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-size:13px;color:#0F766E}
.tips-box svg{width:16px;height:16px;color:#14B8A6;flex-shrink:0}
.tips-box strong{font-weight:600}
.filter-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-actions{order:999;margin-left:auto;display:flex;gap:8px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px;max-width:200px}
.filter-group.filter-wide{min-width:280px;max-width:360px}
.filter-group label{font-size:11px;font-weight:500;color:#6B7280}
.filter-input{display:flex;align-items:center;gap:6px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:7px 10px;font-size:13px;color:#374151;min-width:130px}
.filter-input svg{width:14px;height:14px;color:#9CA3AF;flex-shrink:0}
.filter-input input{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;width:100%}
.filter-input input::placeholder{color:#9CA3AF}
.filter-input select{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;cursor:pointer;-webkit-appearance:none;width:100%}
.btn-search{display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#fff;background:#393939}
.btn-search:hover{background:#2a2a2a}
.btn-search svg{width:14px;height:14px}
.btn-reset{padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;color:#111;background:#E8E9EB}
.btn-reset:hover{background:#D4D5D7}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.data-table th{background:#F5F5F5;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;border-bottom:1px solid #E5E7EB}
.data-table td{padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:#FAFAFA}
.toggle{position:relative;width:32px;height:18px;border-radius:9999px;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:#2BB5A0}
.toggle.off{background:#D4D4D8}
.toggle::after{content:'';position:absolute;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:16px}
.toggle.off::after{left:2px}
.toggle-label{font-size:11px;margin-left:4px}
.toggle-label.on{color:#16a34a}
.toggle-label.off{color:#9CA3AF}
.btn-edit{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px;border-radius:4px}
.btn-edit:hover{color:#374151}
.btn-edit svg{width:16px;height:16px}
.btn-delete{background:none;border:none;cursor:pointer;color:#DC2626;padding:4px;border-radius:4px}
.btn-delete:hover{color:#991B1B}
.btn-delete svg{width:16px;height:16px}
.btn-more{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px;border-radius:4px;position:relative}
.btn-more:hover{color:#374151}
.btn-more svg{width:16px;height:16px}
.more-menu{display:none;position:absolute;top:100%;right:0;background:#fff;border:1px solid #E5E7EB;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);padding:4px;min-width:120px;z-index:50}
.more-menu.open{display:block}
.more-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:4px;font-size:13px;color:#374151;cursor:pointer;white-space:nowrap}
.more-menu-item:hover{background:#F3F4F6}
.ad-badge{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:#22D3EE}
.display-status{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 6px}
.display-status.on{color:#06B6D4}
.display-status.off{color:#9CA3AF}
.activity-img{width:48px;height:48px;border-radius:6px;overflow:hidden;background:#F3F4F6}
.activity-img img{width:100%;height:100%;object-fit:cover}
.activity-link{color:#2563EB;font-weight:500;font-size:12px;cursor:pointer;text-decoration:none}
.activity-link:hover{text-decoration:underline}
.currency-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500}
.currency-gold{color:#F59E0B}
.currency-star{color:#4F46E5}
.action-cell{display:flex;align-items:center;gap:4px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;width:900px;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid #E5E7EB}
.modal-header h2{font-size:16px;font-weight:600;color:#111827;flex:1}
.modal-close{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.modal-close svg{width:18px;height:18px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.form-row{display:flex;gap:16px;margin-bottom:14px}
.form-group{flex:1;display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:500;color:#374151}
.form-group label .req{color:#DC2626}
.form-group input,.form-group select,.form-group textarea{border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;background:#F9FAFB;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#2BB5A0}
.form-group textarea{min-height:100px;resize:vertical}
.form-group .hint{font-size:11px;color:#9CA3AF;margin-top:2px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid #E5E7EB}
.modal-footer .btn-cancel{padding:8px 16px;border-radius:8px;border:none;background:#E8E9EB;color:#111;font-size:13px;cursor:pointer;font-family:inherit}
.modal-footer .btn-save{padding:8px 16px;border-radius:8px;border:none;background:#2BB5A0;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.checkbox-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:#374151}
.status-badge{display:inline-block;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500}
.status-online{background:#DCFCE7;color:#166534}
.status-maint{background:#FEF3C7;color:#92400E}
.status-offline{background:#FEE2E2;color:#991B1B}
.pagination-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;color:#6B7280}


.sidebar-user{position:relative;cursor:pointer}
.user-chevron{width:14px;height:14px;color:#9CA3AF;margin-left:auto;flex-shrink:0;transition:transform .2s}
.sidebar-user.open .user-chevron{transform:rotate(0deg);color:#4338CA}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200;opacity:0;transform:translateX(-4px);transition:opacity .2s ease,transform .2s ease}
.sidebar-user.open .user-popover{display:block;opacity:1;transform:translateX(0)}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none;transition:background .15s}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
.sidebar{transition:transform .3s cubic-bezier(.25,.1,.25,1)}
.main{transition:margin-left .3s cubic-bezier(.25,.1,.25,1)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed;z-index:100;transition:transform .3s}
.sidebar.show{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.main{margin-left:0}
.topbar{padding:0 12px}
.content{padding:12px}
.filter-card{flex-direction:column;}
.filter-group{max-width:100%}
.filter-actions{margin-left:0;width:100%;justify-content:flex-start}
.filter-group{width:100%}
.filter-input{width:100%}
.data-table{display:block;overflow-x:auto;white-space:nowrap}
}
.filter-error{font-size:11px;color:#DC2626;margin-top:3px;display:none}
.filter-group.has-error .filter-error{display:block}
.filter-group.has-error .filter-input{border-color:#DC2626}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>


<div class="main">
  <div class="topbar">
    <button class="topbar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">活動與任務</a><span class="sep">&gt;</span><span class="current">活動設定</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><h1>活動設定</h1><div class="spacer"></div><button class="btn-add" id="addBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span id="addBtnText">新增 - 登入活動</span></button></div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="0">登入活動</button>
      <button class="tab-btn" data-tab="1">一般活動</button>
      <button class="tab-btn" data-tab="2">儲值優惠</button>
      <button class="tab-btn" data-tab="3">其他活動</button>
    </div>
    <div class="tips-box" id="tipsBox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span><strong>Tips</strong>&nbsp;登入活動僅支援金幣類型。</span></div>
    <div class="filter-card">
      <div class="filter-group"><label>活動名稱</label><div class="filter-input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="搜尋活動名稱"></div></div>
      <div class="filter-group"><label>狀態</label><div class="filter-input"><select><option value="">選擇狀態</option><option value="啟用">啟用</option><option value="停用">停用</option></select></div></div>
      <div class="filter-group"><label>開始時間</label><div class="filter-input date-picker-trigger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="date-display">選擇時間日期</span></div></div>
      <div class="filter-group"><label>結束時間</label><div class="filter-input date-picker-trigger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="date-display">選擇時間日期</span></div></div>
      <div class="filter-group"><label>幣別</label><div class="filter-input"><select><option value="">選擇幣別</option><option value="金幣">金幣</option><option value="星幣">星幣</option></select></div></div>
      <div class="filter-actions"><button class="btn-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>搜尋</button><button class="btn-reset">重置</button></div>
    </div>
    <div class="pagination-bar"><span id="pageInfo">第 1 頁，共 3 筆資料</span><span style="flex:1"></span><span style="font-size:12px;color:#6B7280">每頁顯示</span><select style="border:1px solid #E5E7EB;border-radius:4px;padding:2px 6px;font-size:12px;margin:0 4px"><option>20</option><option>50</option><option>100</option></select><span style="font-size:12px;color:#6B7280">筆</span></div>
    <table class="data-table" id="actTable"><thead><tr><th>活動圖片</th><th>標題</th><th>形式</th><th style="cursor:pointer">開始時間 ↕</th><th style="cursor:pointer">結束時間 ↕</th><th>狀態</th><th>顯示</th><th>幣別</th><th>操作</th></tr></thead><tbody id="actBody"></tbody></table>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
      <select style="border:1px solid #E5E7EB;border-radius:4px;padding:4px 8px;font-size:12px"><option>第 1 頁</option></select>
      <div style="display:flex;gap:4px"><button class="btn-batch" style="padding:4px 8px;min-width:30px;justify-content:center" disabled>&lt;</button><button class="btn-export" style="padding:4px 8px;min-width:30px;justify-content:center">1</button><button class="btn-batch" style="padding:4px 8px;min-width:30px;justify-content:center" disabled>&gt;</button></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header"><h2 id="modalTitle">編輯活動</h2><button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>活動標題<span class="req">*</span></label><input type="text" id="editTitle" placeholder="請輸入活動標題"></div>
        <div class="form-group"><label>狀態</label><div style="display:flex;align-items:center;gap:6px;padding:8px 0"><button class="toggle on" id="editStatus" onclick="this.classList.toggle('on');this.classList.toggle('off')"></button><span class="toggle-label on" id="editStatusLabel">啟用</span></div></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>活動形式<span class="req">*</span></label><select id="editForm"><option>純文字</option><option>抽抽樂</option><option>儲值</option><option>加入捷徑</option></select></div>
        <div class="form-group"><label>幣別<span class="req">*</span></label><select id="editCurrency"><option>金幣</option><option>星幣</option><option>金幣, 星幣</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>開始時間<span class="req">*</span></label><input type="datetime-local" id="editStart"></div>
        <div class="form-group"><label>結束時間 <span class="checkbox-wrap"><input type="checkbox" id="editNoLimit"><span>不限時</span></span></label><input type="datetime-local" id="editEnd"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>活動內容<span class="req">*</span></label><textarea id="editContent" placeholder="請輸入活動內容"></textarea></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>連結</label><input type="url" id="editLink" placeholder="請輸入連結網址"><div class="hint">注意：若填寫「連結」，則「連結按鈕名稱」為必填。</div></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>連結按鈕名稱</label><input type="text" id="editLinkName" placeholder="請輸入連結按鈕名稱"></div>
        <div class="form-group"><label>顯示模式<span class="req">*</span></label><select id="editDisplayMode"><option>每次登入皆顯示</option><option>僅顯示一次</option></select></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="closeModal();alert('已儲存')">儲存</button></div>
  </div>
</div>

<script>
function openModal(title){
  document.getElementById('modalTitle').textContent='編輯'+tabConfig[currentTab].name;
  document.getElementById('editTitle').value=title||'';
  document.getElementById('editModal').classList.add('open');
}
function closeModal(){document.getElementById('editModal').classList.remove('open');}
document.querySelector('.topbar-toggle')?.addEventListener('click',function(){
  const isMobile=window.innerWidth<=768;
  if(isMobile){
    document.querySelector('.sidebar').classList.toggle('show');
    let ov=document.querySelector('.sidebar-overlay');
    if(!ov){ov=document.createElement('div');ov.className='sidebar-overlay';document.body.appendChild(ov);ov.addEventListener('click',function(){document.querySelector('.sidebar').classList.remove('show');ov.classList.remove('show');});}
    ov.classList.toggle('show');
  }else{document.body.classList.toggle('sidebar-collapsed');}
});
function toggleUserMenu(){const el=document.querySelector('.sidebar-user');el.classList.toggle('open');event.stopPropagation();}
document.addEventListener('click',function(e){const u=document.querySelector('.sidebar-user');if(u&&!u.contains(e.target))u.classList.remove('open');document.querySelectorAll('.more-menu.open').forEach(m=>m.classList.remove('open'));});
function toggleSub(id){const el=document.getElementById(id);el.classList.toggle('open');const chev=el.previousElementSibling?.querySelector('.sidebar-chevron');if(chev)chev.classList.toggle('open');}

// Tab data
const tabConfig=[
  {name:'登入活動',tips:'登入活動僅支援金幣類型。',data:[
    {img:'https://picsum.photos/seed/pig/100/100',title:'每日抽抽樂',ad:true,form:'抽抽樂',start:'2025-09-02 23:59',end:'2026-05-24 23:59',on:false,display:'已停用',currency:['金幣']},
    {img:'https://picsum.photos/seed/treasure/100/100',title:'QAtest2登入活動',ad:false,form:'抽抽樂',start:'2026-02-10 00:00',end:'2026-05-07 13:30',on:false,display:'已停用',currency:['金幣']},
    {img:'https://picsum.photos/seed/lion/100/100',title:'QAtest登入活動',ad:false,form:'抽抽樂',start:'2026-02-10 00:00',end:'2026-03-24 14:18',on:false,display:'已停用',currency:['金幣']}
  ]},
  {name:'一般活動',tips:'',data:[
    {img:'https://picsum.photos/seed/a1/100/100',title:'歡迎加入公會獲取金幣',ad:true,form:'純文字',start:'2026-01-29 00:00',end:'不限時',on:true,display:'顯示中',currency:['金幣','星幣']},
    {img:'https://picsum.photos/seed/a2/100/100',title:'加入捷徑 送1000',ad:true,form:'加入捷徑',start:'2026-02-23 00:00',end:'不限時',on:true,display:'顯示中',currency:['金幣','星幣']},
    {img:'https://picsum.photos/seed/a3/100/100',title:'QAtest其他活動純文字全選',ad:false,form:'純文字',start:'2026-02-10 00:00',end:'2026-02-11 10:10',on:false,display:'已停用',currency:['金幣','星幣']}
  ]},
  {name:'儲值優惠',tips:'儲值優惠僅支援金幣類型。',data:[
    {img:'https://picsum.photos/seed/s1/100/100',title:'儲值優惠活動',ad:true,form:'儲值',start:'2026-02-06 00:00',end:'不限時',on:true,display:'顯示中',currency:['金幣']},
    {img:'https://picsum.photos/seed/s2/100/100',title:'QAtest儲值優惠',ad:false,form:'儲值',start:'2026-02-10 00:00',end:'2026-04-02 15:18',on:false,display:'已停用',currency:['金幣']}
  ]},
  {name:'其他活動',tips:'其他活動只贈送金幣。',data:[
    {img:'https://picsum.photos/seed/o1/100/100',title:'歡迎加入公會獲取金幣',ad:true,form:'純文字',start:'2026-01-29 00:00',end:'不限時',on:true,display:'顯示中',currency:['金幣','星幣']},
    {img:'https://picsum.photos/seed/o2/100/100',title:'QAtest其他活動純文字全選',ad:false,form:'純文字',start:'2026-02-10 00:00',end:'2026-02-11 10:10',on:false,display:'已停用',currency:['金幣','星幣']},
    {img:'https://picsum.photos/seed/o3/100/100',title:'加入捷徑 送1000',ad:true,form:'加入捷徑',start:'2026-02-23 00:00',end:'不限時',on:true,display:'顯示中',currency:['金幣','星幣']},
    {img:'https://picsum.photos/seed/o4/100/100',title:'其他活動-移除廣告開關',ad:true,form:'純文字',start:'2026-02-24 00:00',end:'2026-02-24 09:12',on:false,display:'已停用',currency:['金幣','星幣']}
  ]}
];

let currentTab=0;
function renderTab(idx){
  currentTab=idx;
  const cfg=tabConfig[idx];
  document.getElementById('addBtnText').textContent='新增 - '+cfg.name;
  const tips=document.getElementById('tipsBox');
  if(cfg.tips){tips.style.display='flex';tips.querySelector('span').innerHTML='<strong>Tips</strong>&nbsp;'+cfg.tips;}
  else{tips.style.display='none';}
  document.getElementById('pageInfo').textContent='第 1 頁，共 '+cfg.data.length+' 筆資料';
  const body=document.getElementById('actBody');
  body.innerHTML=cfg.data.map(r=>{
    const imgHtml=r.img?`<div class="activity-img"><img src="${r.img}" alt=""></div>`:`<div class="activity-img"></div>`;
    const toggleCls=r.on?'on':'off';
    const toggleLabel=r.on?'啟用':'停用';
    const displayHtml=r.on?`<span class="display-status on"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.062 12.348a1 1 0 010-.696 10.75 10.75 0 0119.876 0 1 1 0 010 .696 10.75 10.75 0 01-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>顯示中</span>`:`<span class="display-status off"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-.722-3.25"/><path d="M2 8a10.645 10.645 0 0020 0"/><path d="m20 15-1.726-2.05"/><path d="m4 15 1.726-2.05"/><path d="m9 18 .722-3.25"/></svg>已停用</span>`;
    const currHtml=r.currency.map(c=>c==='金幣'?'<span class="currency-badge currency-gold"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M14.83 14.83a4 4 0 11 0-5.66"/></svg>金幣</span>':'<span class="currency-badge currency-star"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M14.83 14.83a4 4 0 11 0-5.66"/></svg>星幣</span>').join('<br>');
    return `<tr>
      <td>${imgHtml}</td>
      <td><a class="activity-link">${r.title}</a></td>
      <td>${r.form}</td>
      <td style="color:#6B7280;font-size:12px">${r.start}</td>
      <td style="color:#6B7280;font-size:12px">${r.end}</td>
      <td><div style="display:flex;align-items:center;gap:4px"><button class="toggle ${toggleCls}" onclick="this.classList.toggle('on');this.classList.toggle('off')"></button><span class="toggle-label ${toggleCls}">${toggleLabel}</span></div></td>
      <td>${displayHtml}</td>
      <td>${currHtml}</td>
      <td><div class="action-cell"><button class="btn-edit" title="編輯"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="btn-delete" title="刪除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button><button class="btn-more" onclick="event.stopPropagation();this.querySelector('.more-menu').classList.toggle('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><div class="more-menu"><div class="more-menu-item" onclick="event.stopPropagation();alert('開啟活動詳情頁')">檢視詳情</div></div></button></div></td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    renderTab(+this.dataset.tab);
  });
});
renderTab(0);

document.querySelector('.btn-reset')?.addEventListener('click',function(){
  document.querySelectorAll('.filter-group input').forEach(i=>i.value='');
  document.querySelectorAll('.filter-group select').forEach(s=>s.selectedIndex=0);
});
document.getElementById('addBtn').addEventListener('click',function(){alert('開啟新增「'+tabConfig[currentTab].name+'」表單');});
document.querySelector('.btn-search').addEventListener('click',function(){alert('搜尋條件已送出');});
document.querySelector('#actTable').addEventListener('click',function(e){
  const btn=e.target.closest('button');
  const menuItem=e.target.closest('.more-menu-item');
  if(menuItem){alert('開啟活動詳情頁');return;}
  if(!btn)return;
  if(btn.classList.contains('btn-edit')){const title=btn.closest('tr').querySelector('.activity-link')?.textContent||'';openModal(title);}
  else if(btn.classList.contains('btn-delete')){if(confirm('確定刪除此活動？'))alert('已刪除');}
});
</script>
<script src="components/date-picker.js"></script>
</body>
</html>
