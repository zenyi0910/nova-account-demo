<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日期時間選擇器 - Nova 後台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F9FAFB;padding:40px;color:#111827}

.demo-container{max-width:1200px;margin:0 auto}
.demo-header{margin-bottom:30px}
.demo-header h1{font-size:24px;font-weight:600;margin-bottom:8px}
.demo-header p{color:#6B7280;font-size:14px}

.input-wrapper{position:relative;margin-bottom:20px}
.date-input{width:100%;max-width:400px;padding:10px 40px 10px 14px;border:1px solid #D1D5DB;border-radius:8px;font-size:14px;cursor:pointer;background:#fff}
.date-input:hover{border-color:#9CA3AF}
.date-input:focus{outline:none;border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.calendar-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#6B7280;pointer-events:none}

/* Date Time Picker Popup */
.datetime-picker{display:none;position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1px solid #E5E7EB;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.12);padding:20px;z-index:1000;width:580px}
.datetime-picker.show{display:flex;gap:16px}

/* Calendar Section */
.calendar-section{flex:1}
.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.calendar-header h3{font-size:15px;font-weight:600;color:#111827}
.calendar-nav{display:flex;gap:8px}
.calendar-nav button{width:32px;height:32px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.calendar-nav button:hover{background:#F3F4F6;border-color:#D1D5DB}
.calendar-nav svg{width:16px;height:16px;color:#6B7280}

.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.calendar-weekday{text-align:center;font-size:12px;font-weight:500;color:#6B7280;padding:8px 0}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:6px;cursor:pointer;transition:all .15s;color:#374151}
.calendar-day:hover{background:#F3F4F6}
.calendar-day.other-month{color:#D1D5DB}
.calendar-day.selected{background:#6366F1;color:#fff;font-weight:600}
.calendar-day.today{border:1px solid #6366F1}
.calendar-day.in-range{background:#EEF2FF;color:#6366F1}

/* Time Picker Section */
.time-section{border-top:1px solid #E5E7EB;padding-top:16px;display:flex;gap:12px;align-items:center}
.time-group{flex:1}
.time-group label{display:block;font-size:12px;font-weight:500;color:#6B7280;margin-bottom:6px}
.time-inputs{display:flex;align-items:center;gap:6px}
.time-input{width:50px;padding:8px;border:1px solid #D1D5DB;border-radius:6px;text-align:center;font-size:14px;font-weight:500}
.time-input:focus{outline:none;border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.time-separator{font-size:16px;font-weight:600;color:#9CA3AF}
.time-range-separator{font-size:14px;color:#9CA3AF;padding:0 8px}

/* Quick Select Section - 右側快速選擇區 */
.quick-select{width:140px;display:flex;flex-direction:column;gap:8px;border-left:1px solid #E5E7EB;padding-left:16px}
.quick-select-title{font-size:12px;font-weight:600;color:#6B7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.quick-btn{padding:8px 12px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;font-size:13px;color:#374151;cursor:pointer;transition:all .15s;text-align:left;font-weight:500}
.quick-btn:hover{background:#F3F4F6;border-color:#D1D5DB}
.quick-btn.active{background:#EEF2FF;border-color:#6366F1;color:#6366F1}

/* Action Buttons */
.picker-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid #E5E7EB}
.btn-cancel,.btn-confirm{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-cancel{background:#fff;border:1px solid #D1D5DB;color:#374151}
.btn-cancel:hover{background:#F3F4F6}
.btn-confirm{background:#6366F1;border:1px solid #6366F1;color:#fff}
.btn-confirm:hover{background:#4F46E5}

/* Result Display */
.result-box{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:16px;margin-top:20px}
.result-box h3{font-size:14px;font-weight:600;margin-bottom:8px}
.result-box pre{font-size:13px;color:#6B7280;font-family:'SF Mono',Monaco,monospace;line-height:1.6}
</style>
</head>
<body>

<div class="demo-container">
  <div class="demo-header">
    <h1>日期時間選擇器元件</h1>
    <p>Nova 後台通用日期時間選擇器，右側快速選擇區充分利用空間</p>
  </div>

  <div class="input-wrapper">
    <input type="text" class="date-input" id="dateInput" placeholder="選擇日期範圍" readonly>
    <svg class="calendar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>

    <div class="datetime-picker" id="datetimePicker">
      <div class="calendar-section">
        <div class="calendar-header">
          <h3 id="currentMonth">2026年5月</h3>
          <div class="calendar-nav">
            <button id="prevMonth">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
            <button id="nextMonth">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
          <div class="calendar-weekday">日</div>
          <div class="calendar-weekday">一</div>
          <div class="calendar-weekday">二</div>
          <div class="calendar-weekday">三</div>
          <div class="calendar-weekday">四</div>
          <div class="calendar-weekday">五</div>
          <div class="calendar-weekday">六</div>
        </div>

        <div class="time-section">
          <div class="time-group">
            <label>起始</label>
            <div class="time-inputs">
              <input type="text" class="time-input" id="startHour" value="00" maxlength="2">
              <span class="time-separator">:</span>
              <input type="text" class="time-input" id="startMinute" value="00" maxlength="2">
            </div>
          </div>
          <span class="time-range-separator">—</span>
          <div class="time-group">
            <label>結束</label>
            <div class="time-inputs">
              <input type="text" class="time-input" id="endHour" value="23" maxlength="2">
              <span class="time-separator">:</span>
              <input type="text" class="time-input" id="endMinute" value="59" maxlength="2">
            </div>
          </div>
        </div>

        <div class="picker-actions">
          <button class="btn-cancel" id="btnCancel">取消</button>
          <button class="btn-confirm" id="btnConfirm">確定</button>
        </div>
      </div>

      <div class="quick-select">
        <div class="quick-select-title">快速選擇</div>
        <button class="quick-btn" data-range="today">今天</button>
        <button class="quick-btn" data-range="yesterday">昨天</button>
        <button class="quick-btn" data-range="last7days">最近7天</button>
        <button class="quick-btn" data-range="last30days">最近30天</button>
        <button class="quick-btn" data-range="thisMonth">本月</button>
        <button class="quick-btn" data-range="lastMonth">上個月</button>
        <button class="quick-btn" data-range="thisYear">今年</button>
      </div>
    </div>
  </div>

  <div class="result-box">
    <h3>選擇結果</h3>
    <pre id="resultDisplay">尚未選擇日期範圍</pre>
  </div>
</div>

<script>
const dateInput = document.getElementById('dateInput');
const picker = document.getElementById('datetimePicker');
const calendarGrid = document.getElementById('calendarGrid');
const currentMonthEl = document.getElementById('currentMonth');
const prevMonthBtn = document.getElementById('prevMonth');
const nextMonthBtn = document.getElementById('nextMonth');
const btnCancel = document.getElementById('btnCancel');
const btnConfirm = document.getElementById('btnConfirm');
const resultDisplay = document.getElementById('resultDisplay');
const quickBtns = document.querySelectorAll('.quick-btn');

let currentYear = 2026;
let currentMonth = 4; // 0-indexed (4 = May)
let selectedStart = null;
let selectedEnd = null;
let tempStart = null;
let tempEnd = null;

// Toggle picker
dateInput.addEventListener('click', () => {
  picker.classList.toggle('show');
  if (picker.classList.contains('show')) {
    renderCalendar();
  }
});

// Close picker when clicking outside
document.addEventListener('click', (e) => {
  if (!dateInput.contains(e.target) && !picker.contains(e.target)) {
    picker.classList.remove('show');
  }
});

// Month navigation
prevMonthBtn.addEventListener('click', () => {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  renderCalendar();
});

nextMonthBtn.addEventListener('click', () => {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  renderCalendar();
});

  // Render calendar - append day cells directly to grid (after weekday headers)
function renderCalendar() {
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay = new Date(currentYear, currentMonth + 1, 0);
  const prevLastDay = new Date(currentYear, currentMonth, 0);
  
  const firstDayOfWeek = firstDay.getDay();
  const lastDate = lastDay.getDate();
  const prevLastDate = prevLastDay.getDate();
  
  currentMonthEl.textContent = `${currentYear}年${currentMonth + 1}月`;
  
  // Remove old day cells, keep weekday headers
  calendarGrid.querySelectorAll('.calendar-day').forEach(el => el.remove());
  
  const today = new Date();
  
  // Previous month days
  for (let i = firstDayOfWeek - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'calendar-day other-month';
    el.textContent = prevLastDate - i;
    calendarGrid.appendChild(el);
  }
  
  // Current month days
  for (let day = 1; day <= lastDate; day++) {
    const date = new Date(currentYear, currentMonth, day);
    const dateStr = formatDate(date);
    const el = document.createElement('div');
    let classes = 'calendar-day';
    
    if (date.toDateString() === today.toDateString()) classes += ' today';
    if (tempStart && dateStr === formatDate(tempStart)) classes += ' selected';
    if (tempEnd && dateStr === formatDate(tempEnd)) classes += ' selected';
    if (tempStart && tempEnd && date > tempStart && date < tempEnd) classes += ' in-range';
    
    el.className = classes;
    el.dataset.date = dateStr;
    el.textContent = day;
    el.addEventListener('click', () => {
      const d = new Date(el.dataset.date);
      if (!tempStart || (tempStart && tempEnd)) {
        tempStart = d;
        tempEnd = null;
      } else {
        if (d < tempStart) { tempEnd = tempStart; tempStart = d; }
        else { tempEnd = d; }
      }
      quickBtns.forEach(b => b.classList.remove('active'));
      renderCalendar();
    });
    calendarGrid.appendChild(el);
  }
  
  // Next month days
  const totalCells = firstDayOfWeek + lastDate;
  const remainingDays = (totalCells <= 35 ? 35 : 42) - totalCells;
  for (let day = 1; day <= remainingDays; day++) {
    const el = document.createElement('div');
    el.className = 'calendar-day other-month';
    el.textContent = day;
    calendarGrid.appendChild(el);
  }
}

// Quick select buttons
quickBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const range = btn.dataset.range;
    const today = new Date();
    
    quickBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    switch(range) {
      case 'today':
        tempStart = new Date(today);
        tempEnd = new Date(today);
        break;
      case 'yesterday':
        tempStart = new Date(today.setDate(today.getDate() - 1));
        tempEnd = new Date(tempStart);
        break;
      case 'last7days':
        tempEnd = new Date();
        tempStart = new Date(tempEnd);
        tempStart.setDate(tempStart.getDate() - 6);
        break;
      case 'last30days':
        tempEnd = new Date();
        tempStart = new Date(tempEnd);
        tempStart.setDate(tempStart.getDate() - 29);
        break;
      case 'thisMonth':
        tempStart = new Date(today.getFullYear(), today.getMonth(), 1);
        tempEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        break;
      case 'lastMonth':
        tempStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        tempEnd = new Date(today.getFullYear(), today.getMonth(), 0);
        break;
      case 'thisYear':
        tempStart = new Date(today.getFullYear(), 0, 1);
        tempEnd = new Date(today.getFullYear(), 11, 31);
        break;
    }
    
    renderCalendar();
  });
});

// Confirm button
btnConfirm.addEventListener('click', () => {
  if (tempStart && tempEnd) {
    selectedStart = tempStart;
    selectedEnd = tempEnd;
    
    const startStr = formatDateTime(selectedStart, 
      document.getElementById('startHour').value,
      document.getElementById('startMinute').value
    );
    const endStr = formatDateTime(selectedEnd,
      document.getElementById('endHour').value,
      document.getElementById('endMinute').value
    );
    
    dateInput.value = `${startStr} ~ ${endStr}`;
    resultDisplay.textContent = `起始：${startStr}\n結束：${endStr}`;
    picker.classList.remove('show');
  }
});

// Cancel button
btnCancel.addEventListener('click', () => {
  tempStart = selectedStart;
  tempEnd = selectedEnd;
  picker.classList.remove('show');
});

// Helper functions
function formatDate(date) {
  return date.toISOString().split('T')[0];
}

function formatDateTime(date, hour, minute) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d} ${hour}:${minute}`;
}

// Time input validation
document.querySelectorAll('.time-input').forEach(input => {
  input.addEventListener('input', (e) => {
    let val = e.target.value.replace(/\D/g, '');
    const max = e.target.id.includes('Hour') ? 23 : 59;
    if (parseInt(val) > max) val = String(max);
    e.target.value = val.padStart(2, '0');
  });
});

// Initialize
renderCalendar();
</script>

</body>
</html>
