<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星運娛樂城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brown:#452201;--line-green:#06c755;--sms-red:#e74c3c;--phone-purple:#4f46e5;--account-orange:#f5a623;--tg-blue:#4e9edb;--gold-border:#f4b63f;--bg-red:#76090a}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;background:var(--bg-red);color:#fff;min-height:100dvh;overflow-x:hidden}
.app{min-height:max(100dvh,600px);max-width:100%;margin:0 auto;position:relative;display:flex;flex-direction:column;align-items:center;background:url('https://www.kcfgmtb.com/assets/login_bg-Bi1SMT6m.png') center top/auto 100% repeat-x}

/* 旋轉光效 */
.light-wrap{position:absolute;left:50%;bottom:0;transform:translateX(-50%) translateY(50%);width:min(760px,60vw);aspect-ratio:1;z-index:0;overflow:hidden;pointer-events:none}
.light-wrap img{width:100%;animation:slowSpin 20s linear infinite}
@keyframes slowSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* 金幣 */
.coins{position:absolute;bottom:-8px;left:0;right:0;height:max(15vh,60px);z-index:2;pointer-events:none}
.coins img{width:100%;height:100%;object-fit:cover;object-position:top}

/* Logo */
.logo-wrap{position:relative;z-index:1;margin-top:max(6vh,30px);animation:fadeIn .6s ease}
.logo-wrap img{height:min(30dvh,270px);min-height:200px;width:auto;object-fit:contain;display:block}

/* 按鈕區 */
.login-area{position:relative;z-index:1;width:60%;min-width:240px;max-width:768px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;margin-top:8px;animation:fadeIn .6s ease .1s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* 全寬按鈕（LINE / 簡訊）*/
.btn-row{display:flex;gap:8px;width:100%}
.btn-full{flex:1;height:48px;border-radius:9999px;border:none;cursor:pointer;padding:4px;background:rgba(250,250,250,.9);display:inline-flex;align-items:center;justify-content:center;transition:transform .15s}
.btn-full:active{transform:scale(.97)}
.btn-full-inner{width:100%;height:100%;display:flex;align-items:center;gap:8px;justify-content:center;border-radius:9999px;color:#fff;font-size:12px;font-weight:600;padding:0 16px}
.btn-full-inner.line{background:var(--line-green)}
.btn-full-inner.sms{background:var(--sms-red)}
.btn-full-inner img,.btn-full-inner svg{width:24px;height:24px;flex-shrink:0}

/* 圓形按鈕列 */
.circle-row{display:flex;align-items:center;width:100%;justify-content:space-between;margin-top:20px}
.circle-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.btn-circle{width:72px;height:72px;border-radius:9999px;border:none;cursor:pointer;padding:4px;background:rgba(250,250,250,.9);display:inline-flex;align-items:center;justify-content:center;transition:transform .15s}
.btn-circle:active{transform:scale(.93)}
.btn-circle-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9999px;color:#fff;gap:2px}
.btn-circle-inner svg,.btn-circle-inner img{width:24px;height:24px}
.btn-circle-inner span{font-size:10px;font-weight:600}
.btn-circle-inner.phone{background:var(--phone-purple)}
.btn-circle-inner.account{background:var(--account-orange)}
.btn-circle-inner.telegram{background:var(--tg-blue)}
.circle-label{position:absolute;left:50%;transform:translateX(-50%);top:100%;margin-top:4px;white-space:nowrap;font-size:10px;color:var(--brown);text-shadow:0 0 4px rgba(255,255,255,.5)}

/* 客服連結 */
.cs-link{margin-top:32px;display:flex;align-items:center;gap:4px;font-size:14px;color:var(--brown);cursor:pointer;position:relative;z-index:1}
.cs-link:hover{text-decoration:underline}
.cs-link svg{width:16px;height:16px}

/* 右側浮動按鈕 */
.float-btns{position:absolute;top:116px;right:2px;display:flex;flex-direction:column;gap:4px;z-index:10}
.float-btn{width:36px;height:36px;border-radius:9999px;border:none;cursor:pointer;background:rgba(75,85,99,.6);display:flex;align-items:center;justify-content:center;color:#fff;transition:background .15s}
.float-btn:hover{background:rgba(75,85,99,.8)}
.float-btn svg{width:18px;height:18px}

/* 年齡驗證 */
.age-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.age-overlay.hidden{display:none}
.age-dialog{position:relative;width:100%;max-width:400px;padding:0 16px}
.age-ribbon{position:absolute;top:-8px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:center;justify-content:center;width:100%;height:72px;pointer-events:none}
.age-ribbon-text{position:relative;z-index:51;font-size:18px;font-weight:600;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.3);letter-spacing:2px}
.age-card{background:#fafafa;border:8px solid var(--gold-border);border-radius:24px;padding:32px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.age-limit-img{width:100%;height:56px;object-fit:contain}
.age-text{font-size:12px;font-weight:600;color:var(--brown);text-align:center;line-height:1.5}
.age-btns{display:flex;gap:8px;width:100%;justify-content:center}
.age-btn{width:120px;height:48px;border-radius:9999px;border:none;cursor:pointer;padding:4px;background:transparent}
.age-btn-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:9999px;font-size:12px;font-weight:600;color:#fff}
.age-btn-inner.under{background:#ff842f}
.age-btn-inner.over{background:#3b82f6}
.age-check{display:flex;align-items:center;gap:8px;cursor:pointer}
.age-checkbox{width:20px;height:20px;border-radius:8px;border:1px solid #ddd;background:#fff;appearance:none;-webkit-appearance:none;cursor:pointer;position:relative}
.age-checkbox:checked::after{content:'\\2713';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#111}
.age-check span{font-size:14px;color:#111}

/* 帳號登入 Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-dialog{position:relative;width:100%;max-width:360px;padding:0 16px}
.modal-ribbon{position:absolute;top:-8px;left:50%;transform:translateX(-50%);z-index:50;width:100%;height:72px;display:flex;align-items:center;justify-content:center;pointer-events:none}
.modal-ribbon-text{font-size:18px;font-weight:600;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.modal-card{background:#fafafa;border:8px solid var(--gold-border);border-radius:24px;padding:36px 20px 20px;display:flex;flex-direction:column;gap:12px}
.modal-input{width:100%;padding:12px 14px;border-radius:9999px;border:1px solid #e5e5e5;background:#f5f0e8;font-size:13px;font-family:inherit;color:#333;outline:none}
.modal-input::placeholder{color:#aaa}
.modal-input-wrap{position:relative}
.modal-input-wrap .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999}
.modal-input-wrap .toggle-pw svg{width:18px;height:18px}
.modal-note{font-size:11px;color:#999;text-align:center}
.modal-submit{width:100%;padding:12px;border-radius:9999px;border:none;cursor:pointer;background:#2bb5a0;color:#fff;font-size:14px;font-weight:600;font-family:inherit}
.modal-close{display:flex;justify-content:center;margin-top:12px}
.modal-close-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:none;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
</style>
</head>

      <div class="modal-input-wrap">

        <button class="toggle-pw" onclick="togglePw()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 01-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
      </div>
      <div class="modal-note">注意：本功能僅供已完成帳號綁定者使用</div>
      <button class="modal-submit" onclick="alert('登入中...')">登入</button>
    </div>
    <div class="modal-close"><button class="modal-close-btn" onclick="closeAccountModal()">&times;</button></div>
  </div>
</div>

<script>
function closeAge(){document.getElementById('ageOverlay').classList.add('hidden')}
function openAccountModal(){document.getElementById('accountModal').classList.remove('hidden')}
function closeAccountModal(){document.getElementById('accountModal').classList.add('hidden')}
function togglePw(){const i=document.getElementById('pwInput');i.type=i.type==='password'?'text':'password'}
</script>
</body>
</html>
