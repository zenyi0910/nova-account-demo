<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>星運娛樂城 - 登入</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}

.login-container{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:32px}

/* Logo */
.logo-section{text-align:center}
.logo-text{font-size:28px;font-weight:800;color:#fbbf24;text-shadow:0 2px 8px rgba(251,191,36,.4);letter-spacing:2px}
.logo-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;letter-spacing:4px}

/* Form */
.login-form{width:100%;display:flex;flex-direction:column;gap:16px}
.input-group{position:relative}
.input-group input{width:100%;height:48px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:0 16px 0 44px;font-size:14px;color:#fff;outline:none;transition:border-color .2s}
.input-group input::placeholder{color:rgba(255,255,255,.4)}
.input-group input:focus{border-color:#fbbf24}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);width:20px;height:20px}
.input-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);width:20px;height:20px;cursor:pointer}

.login-options{display:flex;justify-content:space-between;align-items:center}
.remember-me{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.6)}
.remember-me input[type="checkbox"]{width:14px;height:14px;accent-color:#fbbf24}
.forgot-pwd{font-size:12px;color:#fbbf24;text-decoration:none}

.login-btn{width:100%;height:48px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:12px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(245,158,11,.3);transition:transform .15s,box-shadow .15s}
.login-btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(245,158,11,.2)}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;width:100%;color:rgba(255,255,255,.3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.15)}

/* Social */
.social-login{display:flex;gap:16px;justify-content:center}
.social-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.social-btn:hover{background:rgba(255,255,255,.15)}
.social-btn svg{width:22px;height:22px;color:#fff}

/* Register */
.register-link{font-size:13px;color:rgba(255,255,255,.6)}
.register-link a{color:#fbbf24;text-decoration:none;font-weight:600}

/* Footer */
.login-footer{position:fixed;bottom:16px;text-align:center;font-size:11px;color:rgba(255,255,255,.3)}
</style>
</head>
<body>

<div class="login-container">
<div class="logo-section">
<div class="logo-text">星運娛樂城</div>
<div class="logo-sub">NOVA ENTERTAINMENT</div>
</div>

<form class="login-form" onsubmit="return false">
<div class="input-group">
<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
<input type="text" placeholder="請輸入帳號" value="QAtest5">
</div>
<div class="input-group">
<svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
<input type="password" placeholder="請輸入密碼" value="••••••••">
<svg class="input-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</div>
<div class="login-options">
<label class="remember-me"><input type="checkbox" checked>記住帳號</label>
<a href="#" class="forgot-pwd">忘記密碼？</a>
</div>
<button class="login-btn" onclick="window.location.href='nova-lobby.html'">登入</button>
</form>

<div class="divider">或使用其他方式登入</div>

<div class="social-login">
<button class="social-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></button>
<button class="social-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/></svg></button>
<button class="social-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></button>
</div>

<p class="register-link">還沒有帳號？<a href="#">立即註冊</a></p>
</div>

<div class="login-footer">Copyright 2024 Nova Entertainment. All rights reserved.</div>

</body>
</html>
