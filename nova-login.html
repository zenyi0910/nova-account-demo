<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>星運娛樂城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow-x:hidden;max-width:100vw}
body{background:#76090A;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
img{display:block;max-width:100%;user-select:none;-webkit-user-drag:none}
button{border:none;cursor:pointer;font:inherit}

/* Background pattern */
.bg-pattern{position:fixed;inset:0;background:url('assets/login_bg.png') repeat-x center top/auto 100%;pointer-events:none}

/* Light rotate effect */
.light-rotate{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:760px;height:760px;opacity:.15;animation:spin 20s linear infinite;pointer-events:none}
@keyframes spin{from{transform:translateX(-50%) rotate(0deg)}to{transform:translateX(-50%) rotate(360deg)}}

/* Coins at bottom */
.coins-bottom{position:fixed;bottom:0;left:0;right:0;height:95px;background:url('assets/coins.png') repeat-x center bottom/auto 95px;pointer-events:none;z-index:1}

/* Main content */
.login-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:40px 24px 120px;width:100%;max-width:400px}

/* Logo */
.logo{width:280px;margin-bottom:24px}

/* Login buttons */
.login-buttons{width:100%;display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.btn-main{width:100%;height:48px;border-radius:9999px;display:flex;align-items:center;padding:0 16px;gap:10px;font-size:14px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .15s}
.btn-main:active{transform:scale(.97)}
.btn-line{background:rgba(250,250,250,.9);color:#fff}
.btn-line .inner{width:100%;height:100%;display:flex;align-items:center;gap:10px;background:#06c755;border-radius:9999px;padding:0 16px}
.btn-sms{background:rgba(250,250,250,.9);color:#fff}
.btn-sms .inner{width:100%;height:100%;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#e74c3c,#f39c12);border-radius:9999px;padding:0 16px}
.btn-icon{width:24px;height:24px;flex-shrink:0}

/* Circle buttons */
.circle-buttons{display:flex;gap:20px;justify-content:center;margin-bottom:24px}
.circle-btn{display:flex;flex-direction:column;align-items:center;gap:6px;background:none;color:#fff}
.circle-btn .icon-wrap{width:72px;height:72px;border-radius:50%;background:rgba(250,250,250,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .15s}
.circle-btn:active .icon-wrap{transform:scale(.95)}
.circle-btn .icon-inner{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.circle-btn span{font-size:11px;font-weight:500;color:#fff}
.circle-btn .sub{font-size:9px;color:#ffd700}
.phone-icon{background:linear-gradient(135deg,#8b5cf6,#6366f1)}
.account-icon{background:linear-gradient(135deg,#f59e0b,#d97706)}
.telegram-icon{background:linear-gradient(135deg,#0088cc,#229ED9)}

/* Contact */
.contact-link{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:12px;z-index:10;cursor:pointer}
.contact-link svg{width:14px;height:14px}

/* Top right buttons */
.top-btns{position:fixed;top:12px;right:12px;display:flex;gap:8px;z-index:10}
.top-btn{width:36px;height:36px;border-radius:14px;background:rgba(100,100,100,.6);display:flex;align-items:center;justify-content:center}
.top-btn svg{width:18px;height:18px;color:#fff}

/* Account Dialog */
.dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:24px}
.dialog-overlay.active{display:flex}
.dialog{background:#fffbf0;border-radius:20px;width:100%;max-width:320px;padding:28px 24px 24px;position:relative;border:3px solid #f4b63f}
.dialog-ribbon{position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;padding:8px 28px;border-radius:20px;font-size:14px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.dialog-form{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.dialog-form label{font-size:12px;color:#333;font-weight:600}
.dialog-form input{width:100%;height:42px;background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:0 14px;font-size:13px;outline:none;color:#333}
.dialog-form input:focus{border-color:#f59e0b}
.dialog-note{font-size:10px;color:#94a3b8;margin-top:2px}
.dialog-submit{width:100%;height:42px;background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff;border-radius:9999px;font-size:14px;font-weight:700;margin-top:8px;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.dialog-submit:active{transform:scale(.97)}
.dialog-close{position:absolute;bottom:-48px;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#94a3b8;cursor:pointer}
.input-wrap{position:relative}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<img class="light-rotate" src="assets/light_rotate.png" alt="">
<div class="coins-bottom"></div>

<div class="top-btns">
<button class="top-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
<button class="top-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg></button>
</div>

<div class="login-content">
<img class="logo" src="assets/logo_l.png" alt="星運娛樂城">

<div class="login-buttons">
<button class="btn-main btn-line"><div class="inner"><svg class="btn-icon" viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596a.61.61 0 0 1-.199.031c-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595a.6.6 0 0 1 .194-.033c.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>LINE</div></button>
<button class="btn-main btn-sms"><div class="inner"><svg class="btn-icon" viewBox="0 0 24 24" fill="#fff"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>簡訊</div></button>
</div>

<div class="circle-buttons">
<button class="circle-btn"><div class="icon-wrap"><div class="icon-inner phone-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="5" y="1" width="14" height="22" rx="3"/><circle cx="12" cy="18" r="1" fill="#fff"/></svg></div></div><span>手機</span><span class="sub">星城會員專屬</span></button>
<button class="circle-btn" onclick="document.querySelector('.dialog-overlay').classList.add('active')"><div class="icon-wrap"><div class="icon-inner account-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div></div><span>帳號</span></button>
<button class="circle-btn"><div class="icon-wrap"><div class="icon-inner telegram-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg></div></div><span>Telegram</span></button>
</div>
</div>

<div class="contact-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>聯絡客服</div>

<!-- Account Login Dialog -->
<div class="dialog-overlay">
<div class="dialog">
<div class="dialog-ribbon">帳號</div>
<form class="dialog-form" onsubmit="window.location.href='nova-lobby.html';return false">
<label>帳號</label>
<input type="text" placeholder="請輸入帳號" value="QAtest5">
<label>密碼</label>
<div class="input-wrap">
<input type="password" placeholder="請輸入密碼" value="a1234567">
<svg class="pwd-toggle" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
</div>
<p class="dialog-note">注意：本功能僅供已完成帳號綁定者使用</p>
<button type="submit" class="dialog-submit">登入</button>
</form>
<div class="dialog-close" onclick="this.closest('.dialog-overlay').classList.remove('active')">&#10005;</div>
</div>
</div>

</body>
</html>
