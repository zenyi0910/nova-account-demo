<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 快速儲值</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}
.tips-box{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(37,99,235,0.04);border:1px solid rgba(37,99,235,0.15);border-radius:8px;font-size:13px;color:#1E40AF;margin-bottom:16px}
.filter-bar{display:flex;gap:10px;margin-bottom:14px;align-items:center}
.filter-select{padding:7px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:13px;font-family:inherit;color:#374151;background:#fff}
.btn-search{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#fff;background:#0D9488}
.btn-reset{padding:7px 14px;border-radius:6px;border:1px solid #E5E7EB;cursor:pointer;font-size:13px;font-family:inherit;color:#374151;background:#fff}
.btn-add{padding:7px 14px;border-radius:6px;border:none;background:#16a34a;color:#fff;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.pagination-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;color:#6B7280}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.data-table th{background:#F5F5F5;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;border-bottom:1px solid #E5E7EB}
.data-table td{padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:#FAFAFA}
.toggle{position:relative;width:36px;height:20px;border-radius:10px;cursor:pointer;transition:background .2s;border:none;display:inline-block}
.toggle.on{background:#26A69A}.toggle.off{background:#D1D5DB}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:18px}.toggle.off::after{left:2px}
.toggle-label{font-size:11px;margin-left:4px}
.toggle-label.on{color:#0D9488}.toggle-label.off{color:#9CA3AF}
.vip-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;margin:1px 2px}
.vip-tag.green{background:#DCFCE7;color:#166534}
.vip-tag.red{background:#FEE2E2;color:#991B1B}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;display:inline-flex;align-items:center}
.btn-icon:hover{background:#F3F4F6}
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.show{transform:translateX(0)}.main{margin-left:0}}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>

<div class="main">
  <div class="topbar">
    <button class="topbar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">商城管理</a><span class="sep">&gt;</span><span class="current">快速儲值</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <h1>快速儲值</h1>
      <span class="spacer"></span>
      <button class="btn-add" onclick="alert('新增快速儲值')">+ 新增快速儲值</button>
    </div>

    <div class="tips-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M12 2v5"/><path d="M14.829 15.998a3 3 0 1 1-5.658 0"/><path d="M20.92 14.606A1 1 0 0 1 20 16H4a1 1 0 0 1-.92-1.394l3-7A1 1 0 0 1 7 7h10a1 1 0 0 1 .92.606z"/></svg>該功能是定義金幣類型。</div>

    <div class="filter-bar">
      <select class="filter-select"><option value="">選擇啟用狀態</option><option>啟用</option><option>停用</option></select>
      <button class="btn-search">搜尋</button>
      <button class="btn-reset">重置</button>
    </div>

    <div class="pagination-bar"><span>第 1 頁，共 2 筆資料</span><span>每頁顯示 20 筆</span></div>
    <table class="data-table">
      <thead><tr><th>項目名稱</th><th>使用 VIP</th><th>狀態</th><th>操作</th></tr></thead>
      <tbody>
        <tr>
          <td style="font-weight:500">快速儲值1</td>
          <td><span class="vip-tag green">全 VIP1</span><span class="vip-tag green">全 VIP2</span><span class="vip-tag green">全 VIP3</span><span class="vip-tag green">全 VIP4</span><span class="vip-tag green">全 VIP5</span><span class="vip-tag green">全 VIP6</span></td>
          <td><button class="toggle off"></button><span class="toggle-label off">停用</span></td>
          <td><button class="btn-icon" title="刪除"><svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button><button class="btn-icon" title="更多"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button></td>
        </tr>
        <tr>
          <td style="font-weight:500">快速儲值2</td>
          <td><span class="vip-tag red">全 VIP1</span><span class="vip-tag red">全 VIP2</span><span class="vip-tag red">全 VIP3</span><span class="vip-tag red">全 VIP4</span><span class="vip-tag red">全 VIP5</span><span class="vip-tag red">全 VIP6</span></td>
          <td><button class="toggle on"></button><span class="toggle-label on">啟用</span></td>
          <td><button class="btn-icon" title="刪除"><svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button><button class="btn-icon" title="更多"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
document.querySelector('.topbar-toggle')?.addEventListener('click', function(){
  if(window.innerWidth<=768){document.querySelector('.sidebar').classList.toggle('show');}
  else{document.body.classList.toggle('sidebar-collapsed');}
});
function toggleSub(id){const el=document.getElementById(id);el.classList.toggle('open');const chev=el.previousElementSibling?.querySelector('.sidebar-chevron');if(chev)chev.classList.toggle('open');}
document.querySelectorAll('.toggle').forEach(t=>{
  t.addEventListener('click',function(){
    this.classList.toggle('on');this.classList.toggle('off');
    const lbl=this.nextElementSibling;
    if(this.classList.contains('on')){lbl.textContent='啟用';lbl.className='toggle-label on';}
    else{lbl.textContent='停用';lbl.className='toggle-label off';}
  });
});
</script>
</body>
</html>
