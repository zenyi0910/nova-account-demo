<script>
// Mock data generator
function genData(gran){
  const rows=[];const now=new Date(2026,5,9);
  const count=gran==='day'?50:gran==='week'?12:gran==='month'?6:3;
  for(let i=0;i<count;i++){
    let dateStr='';
    if(gran==='day'){const d=new Date(now);d.setDate(d.getDate()-count+1+i);dateStr=d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');}
    else if(gran==='week'){const d=new Date(now);d.setDate(d.getDate()-7*(count-1-i));const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);dateStr=mon.getFullYear()+'/'+(mon.getMonth()+1).toString().padStart(2,'0')+'/'+mon.getDate().toString().padStart(2,'0');}
    else if(gran==='month'){const d=new Date(2026,i,1);dateStr=d.getFullYear()+'/'+(d.getMonth()+1)+'月';}
    else{dateStr=(2024+i)+'年';}
    const rev=Math.floor(Math.random()*50000)+5000;
    const pu=Math.floor(Math.random()*80)+10;
    const dau=Math.floor(Math.random()*500)+100;
    const nu=Math.floor(Math.random()*50)+5;
    const arppu=Math.round(rev/pu);
    const arpu=Math.round(rev/dau);
    const payRate=((pu/dau)*100).toFixed(2);
    const gift=Math.floor(Math.random()*10000);
    const giftP=Math.floor(Math.random()*20);
    const firstPay=Math.floor(Math.random()*10);
    const ccu=Math.floor(Math.random()*200)+50;
    const pcu=Math.floor(Math.random()*150)+30;
    rows.push([dateStr,rev,pu,dau,nu,arppu,arpu,payRate,gift,giftP,firstPay,ccu,pcu]);
  }
  return rows;
}
let currentData=genData('day');let currentGran='day';let sortCol=-1;let sortAsc=true;

function renderTable(){
  const tbody=document.getElementById('tableBody');
  const tfoot=document.getElementById('tableFoot');
  let html='';
  currentData.forEach(r=>{
    html+='<tr><td>'+r[0]+'</td><td><a href="javascript:void(0)">'+r[1].toLocaleString()+'</a></td>';
    for(let i=2;i<r.length;i++){html+='<td>'+(i===7?r[i]+'%':r[i].toLocaleString())+'</td>';}
    html+='</tr>';
  });
  tbody.innerHTML=html;
  // Compute totals and averages
  const sumIdx=[1,2,3,4,8,9,10];const avgIdx=[5,6,7];
  const sums=new Array(13).fill(0);
  currentData.forEach(r=>{for(let i=1;i<13;i++)sums[i]+=parseFloat(r[i]);});
  const n=currentData.length||1;
  let sumRow='<tr><td style="font-weight:700">總和</td>';
  let avgRow='<tr><td style="font-weight:700">平均</td>';
  for(let i=1;i<13;i++){
    if(sumIdx.includes(i)){sumRow+='<td>'+Math.round(sums[i]).toLocaleString()+'</td>';} else{sumRow+='<td>-</td>';}
    if(avgIdx.includes(i)){avgRow+='<td>'+(sums[i]/n).toFixed(i===7?2:0)+(i===7?'%':'')+'</td>';} else{avgRow+='<td>-</td>';}
  }
  sumRow+='</tr>';avgRow+='</tr>';
  tfoot.innerHTML=sumRow+avgRow;
  document.getElementById('pageInfo').textContent='共 '+currentData.length+' 筆';
  document.getElementById('pageDetail').textContent='第 1 頁 / 1 頁';
}

function switchGran(el,gran){
  document.querySelectorAll('.gran-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');currentGran=gran;currentData=genData(gran);sortCol=-1;renderTable();
}
function sortTable(col){
  if(sortCol===col){sortAsc=!sortAsc;}else{sortCol=col;sortAsc=true;}
  currentData.sort((a,b)=>{const va=typeof a[col]==='string'?a[col]:a[col];const vb=typeof b[col]==='string'?b[col]:b[col];if(typeof va==='number')return sortAsc?va-vb:vb-va;return sortAsc?va.localeCompare(vb):vb.localeCompare(va);});
  renderTable();
}
function doQuery(){currentData=genData(currentGran);renderTable();alert('已重新查詢');}
function doReset(){document.querySelectorAll('.filter-select').forEach(s=>s.selectedIndex=0);currentData=genData('day');document.querySelectorAll('.gran-btn').forEach((b,i)=>{b.classList.toggle('active',i===0);});currentGran='day';renderTable();}
function exportCSV(){
  const headers=['日期','Revenue','PU','DAU','NU','ARPPU','ARPU','Pay Rate(%)','贈禮金額','贈禮人數','首儲人數','CCU','PCU'];
  let csv='\uFEFF'+headers.join(',')+'\n';
  currentData.forEach(r=>{csv+=r.join(',')+'\n';});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='revenue_report_'+currentGran+'.csv';a.click();URL.revokeObjectURL(url);
}
renderTable();
</script>
