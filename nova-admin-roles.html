<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 角色設定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:12px 8px 4px;text-transform:uppercase;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:#374151;font-size:13px;transition:background .15s;text-decoration:none}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#F3F4F6;font-weight:600;color:#111827}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:20px;overflow:hidden;max-height:0;transition:max-height .2s}
.sidebar-sub.open{max-height:200px}
.sidebar-sub .sidebar-item{font-size:12px;padding:6px 10px}
.sidebar-user{margin-top:auto;padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb a:hover{color:#374151}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}
.btn-add{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:#fff;background:#16a34a;box-shadow:0 1px 3px rgba(22,163,74,.2);transition:background .15s}
.btn-add:hover{background:#15803d}
.btn-add svg{width:16px;height:16px}
.filter-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;font-weight:500;color:#6B7280}
.filter-input{display:flex;align-items:center;gap:6px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:7px 10px;font-size:13px;color:#374151;min-width:180px}
.filter-input svg{width:14px;height:14px;color:#9CA3AF;flex-shrink:0}
.filter-input input{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;width:100%}
.filter-input input::placeholder{color:#9CA3AF}
.btn-search{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#fff;background:#1F2937}
.btn-search:hover{background:#111827}
.btn-search svg{width:14px;height:14px}
.btn-reset{padding:7px 14px;border-radius:6px;border:1px solid #E5E7EB;cursor:pointer;font-size:13px;font-family:inherit;color:#374151;background:#fff}
.btn-reset:hover{background:#F3F4F6}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.data-table th{background:#F5F5F5;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;border-bottom:1px solid #E5E7EB}
.data-table td{padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:#FAFAFA}
.link-teal{color:#009688;cursor:pointer;font-weight:500;background:none;border:none;font-size:13px;font-family:inherit}
.link-teal:hover{text-decoration:underline}
.btn-edit{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px;border-radius:4px}
.btn-edit:hover{color:#374151}
.btn-edit svg{width:16px;height:16px}
.btn-del{background:none;border:none;cursor:pointer;color:#EF4444;padding:4px;border-radius:4px}
.btn-del:hover{color:#DC2626}
.btn-del svg{width:16px;height:16px}
.perm-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;margin:2px}
.perm-full{background:#DCFCE7;color:#166534}
.perm-read{background:#DBEAFE;color:#1E40AF}
.perm-none{background:#F3F4F6;color:#9CA3AF}
.pagination-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;color:#6B7280}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">N</div><div class="logo-text"><div class="logo-name">Nova</div><div class="logo-sub">測試後台</div></div></div>
  <div class="sidebar-group">
    <div class="sidebar-group-label">開發工具</div>
    <a class="sidebar-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>UI 元件</a>
  </div>
  <div class="sidebar-group">
    <div class="sidebar-group-label">首頁</div>
    <a class="sidebar-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>首頁</a>
  </div>
  <div class="sidebar-group">
    <div class="sidebar-group-label">前台管理</div>
    <div class="sidebar-item" onclick="toggleSub('gamesSub')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>遊戲管理<svg class="sidebar-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
    <div class="sidebar-sub" id="gamesSub"><a class="sidebar-item" href="nova-game-management.html">遊戲維護設定</a></div>
    <div class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>商城管理<svg class="sidebar-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
    <div class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用戶管理<svg class="sidebar-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
  </div>
  <div class="sidebar-group">
    <div class="sidebar-group-label">後台管理</div>
    <div class="sidebar-item" onclick="toggleSub('permSub')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>權限設定<svg class="sidebar-chevron open" id="permChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
    <div class="sidebar-sub open" id="permSub">
      <a class="sidebar-item active" href="nova-admin-roles.html">角色設定</a>
      <a class="sidebar-item" href="nova-admin-users.html">帳號設定</a>
    </div>
  </div>
  <div class="sidebar-user"><div class="user-avatar">一</div><div class="user-info"><div class="user-role">一般管理員</div><div class="user-name">admin</div></div></div>
</nav>

<div class="main">
  <div class="topbar">
    <button class="topbar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">權限設定</a><span class="sep">&gt;</span><span class="current">角色設定</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <h1>角色設定</h1>
      <div class="spacer"></div>
      <button class="btn-add" onclick="showRoleModal('add')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增角色</button>
    </div>
    <div class="filter-card">
      <div class="filter-group"><label>角色名稱</label><div class="filter-input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="搜尋角色名稱" id="searchRole"></div></div>
      <button class="btn-search" onclick="filterRoles()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>搜尋</button>
      <button class="btn-reset" onclick="resetRoleFilter()">重置</button>
    </div>
    <div class="pagination-bar"><span id="rolePageInfo">共 6 筆角色</span></div>
    <div id="roleTableWrap"></div>
  </div>
</div>

<!-- Role Modal -->
<div id="roleModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center">
<div style="background:#fff;border-radius:12px;width:560px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)">
  <div style="padding:20px 24px;border-bottom:1px solid #E5E7EB;display:flex;justify-content:space-between;align-items:center">
    <h3 id="roleModalTitle" style="font-size:16px;font-weight:600;color:#111827">新增角色</h3>
    <button onclick="closeRoleModal()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:20px">&times;</button>
  </div>
  <div style="padding:24px">
    <div style="margin-bottom:16px"><label style="display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px">角色名稱</label><input id="rmName" type="text" style="width:100%;padding:8px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:13px;font-family:inherit;outline:none" placeholder="請輸入角色名稱"></div>
    <div style="margin-bottom:16px"><label style="display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px">備註</label><input id="rmNote" type="text" style="width:100%;padding:8px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:13px;font-family:inherit;outline:none" placeholder="選填"></div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:8px">權限設定</label>
      <div id="permGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:6px"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px">
      <button onclick="closeRoleModal()" style="padding:8px 16px;border-radius:6px;border:1px solid #E5E7EB;cursor:pointer;font-size:13px;font-family:inherit;color:#374151;background:#fff">取消</button>
      <button onclick="saveRole()" style="padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:#fff;background:#16a34a">儲存</button>
    </div>
  </div>
</div>
</div>

<script>
const permModules=['遊戲管理','商城管理','公會管理','內容發布','活動管理','任務管理','三方支付設定','用戶管理','基本設定','各式報表','禁用語管理','紅包申請','角色設定','帳號設定'];
const roles=[
  {name:'Admin',note:'系統管理員',members:8,perms:permModules.reduce((o,m)=>(o[m]='full',o),{})},
  {name:'RD_Test',note:'研發測試',members:3,perms:{...permModules.reduce((o,m)=>(o[m]='read',o),{}),'遊戲管理':'full','基本設定':'full'}},
  {name:'CS_Support',note:'客服支援',members:4,perms:{...permModules.reduce((o,m)=>(o[m]='none',o),{}),'用戶管理':'read','各式報表':'read','禁用語管理':'full'}},
  {name:'allenNoGame',note:'無遊戲權限',members:1,perms:{...permModules.reduce((o,m)=>(o[m]='read',o),{}),'遊戲管理':'none'}},
  {name:'Marketing',note:'行銷部門',members:2,perms:{...permModules.reduce((o,m)=>(o[m]='none',o),{}),'活動管理':'full','內容發布':'full','各式報表':'read'}},
  {name:'Auditor',note:'稽核',members:1,perms:permModules.reduce((o,m)=>(o[m]='read',o),{})}
];
function permBadge(level){
  if(level==='full')return '<span class="perm-badge perm-full">完整</span>';
  if(level==='read')return '<span class="perm-badge perm-read">唯讀</span>';
  return '<span class="perm-badge perm-none">無</span>';
}
function renderRoles(data){
  const topPerms=['遊戲管理','用戶管理','活動管理','各式報表'];
  let html='<table class="data-table"><thead><tr><th>角色名稱</th><th>備註</th><th>帳號數</th>';
  topPerms.forEach(p=>html+=`<th>${p}</th>`);
  html+='<th>操作</th></tr></thead><tbody>';
  data.forEach((r,i)=>{
    html+=`<tr><td><button class="link-teal" onclick="showRoleDetail(${i})">${r.name}</button></td><td style="color:#6B7280">${r.note}</td><td>${r.members}</td>`;
    topPerms.forEach(p=>html+=`<td>${permBadge(r.perms[p]||'none')}</td>`);
    html+=`<td style="white-space:nowrap"><button class="btn-edit" onclick="showRoleModal('edit',${i})" title="編輯"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="btn-del" onclick="delRole(${i})" title="刪除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('roleTableWrap').innerHTML=html;
  document.getElementById('rolePageInfo').textContent=`共 ${data.length} 筆角色`;
}
function filterRoles(){
  const q=document.getElementById('searchRole').value.toLowerCase();
  renderRoles(q?roles.filter(r=>r.name.toLowerCase().includes(q)):roles);
}
function resetRoleFilter(){document.getElementById('searchRole').value='';renderRoles(roles);}
function showRoleDetail(i){const r=roles[i];let msg=`角色：${r.name}\n備註：${r.note}\n帳號數：${r.members}\n\n權限：\n`;permModules.forEach(m=>msg+=`  ${m}: ${r.perms[m]||'none'}\n`);alert(msg);}
let editRoleIdx=-1;
function showRoleModal(mode,idx){
  editRoleIdx=mode==='edit'?idx:-1;
  document.getElementById('roleModalTitle').textContent=mode==='edit'?'編輯角色':'新增角色';
  const r=mode==='edit'?roles[idx]:{name:'',note:'',perms:{}};
  document.getElementById('rmName').value=r.name;
  document.getElementById('rmNote').value=r.note;
  let grid='';
  permModules.forEach(m=>{
    const v=r.perms[m]||'none';
    grid+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:#F9FAFB;border-radius:4px"><span style="font-size:12px">${m}</span><select style="font-size:11px;border:1px solid #E5E7EB;border-radius:4px;padding:2px 4px" data-perm="${m}"><option value="full" ${v==='full'?'selected':''}>完整</option><option value="read" ${v==='read'?'selected':''}>唯讀</option><option value="none" ${v==='none'?'selected':''}>無</option></select></div>`;
  });
  document.getElementById('permGrid').innerHTML=grid;
  document.getElementById('roleModalOverlay').style.display='flex';
}
function closeRoleModal(){document.getElementById('roleModalOverlay').style.display='none';}
function saveRole(){alert(editRoleIdx>=0?'角色已更新':'角色已新增');closeRoleModal();}
function delRole(i){if(confirm(`確定刪除角色「${roles[i].name}」？`)){roles.splice(i,1);renderRoles(roles);}}
function toggleSub(id){const el=document.getElementById(id);el.classList.toggle('open');const chev=el.previousElementSibling?.querySelector('.sidebar-chevron');if(chev)chev.classList.toggle('open');}
renderRoles(roles);
</script>
</body>
</html>
