<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 測試後台 - 角色設定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:rgb(249,249,249);color:#393939;font-size:14px;display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:250px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;height:100vh;position:fixed;top:0;left:0;z-index:100;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #e5e7eb}
.sidebar-logo .logo-icon{width:32px;height:32px;background:#393939;border-radius:8px;display:flex;align-items:center;justify-content:center}
.sidebar-logo .logo-icon svg{width:18px;height:18px;fill:#fff}
.sidebar-logo .logo-text{font-size:14px;font-weight:600;color:#393939}
.sidebar-logo .logo-sub{font-size:11px;color:#999;margin-left:4px}
.sidebar-group{padding:12px 0 0}
.sidebar-group-title{font-size:11px;color:#999;padding:0 20px 8px;font-weight:500;text-transform:uppercase}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:#393939;text-decoration:none;font-size:13px;transition:background .15s}
.sidebar-item:hover{background:#f5f5f5}
.sidebar-item svg{width:18px;height:18px;opacity:.6;flex-shrink:0}
.sidebar-item .arrow{margin-left:auto;transition:transform .2s}
.sidebar-item .arrow.open{transform:rotate(90deg)}
.sidebar-submenu{display:none;padding-left:28px}
.sidebar-submenu.open{display:block}
.sidebar-submenu a{display:block;padding:8px 20px;font-size:13px;color:#666;text-decoration:none;transition:background .15s}
.sidebar-submenu a:hover{background:#f5f5f5}
.sidebar-submenu a.active{background:#ece9e6;color:#393939;font-weight:500}
.sidebar-user{margin-top:auto;border-top:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;gap:10px}
.sidebar-user .avatar{width:32px;height:32px;background:#e5e7eb;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#666}
.sidebar-user .user-info{flex:1}
.sidebar-user .user-name{font-size:13px;font-weight:500}
.sidebar-user .user-role{font-size:11px;color:#999}

/* Main */
.main{margin-left:250px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;padding:12px 24px;border-bottom:1px solid #e5e7eb;background:#fff}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;margin-right:12px}
.hamburger svg{width:20px;height:20px;color:#393939}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#999}
.breadcrumb a{color:#999;text-decoration:none}
.breadcrumb a:hover{color:#393939}
.breadcrumb .sep{color:#ccc}
.breadcrumb .current{color:#393939}
.warning-bar{background:#fff8e1;color:#b45309;font-size:12px;padding:6px 24px;border-bottom:1px solid #e5e7eb}

.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{display:flex;align-items:center;gap:10px}
.page-title svg{width:20px;height:20px;color:#393939}
.page-title h4{font-size:16px;font-weight:600;color:#393939}
.btn-add{display:flex;align-items:center;gap:6px;background:oklch(0.704 0.14 182.503);color:rgba(255,255,255,.9);border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-weight:500;transition:opacity .15s}
.btn-add:hover{opacity:.85}
.btn-add svg{width:14px;height:14px}

/* Filter */
.filter-bar{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filter-group label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.filter-group .input-wrap{position:relative}
.filter-group .input-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#999}
.filter-group input{padding:8px 12px 8px 32px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;width:220px;outline:none}
.filter-group input:focus{border-color:#999}
.btn-search{display:flex;align-items:center;gap:6px;background:#393939;color:#f5f5f5;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-weight:500}
.btn-search svg{width:14px;height:14px}
.btn-reset{background:#ededed;color:#393939;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer}

/* Pagination info */
.pagination-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:12px;color:#666}
.page-size{display:flex;align-items:center;gap:6px}
.page-size select{border:1px solid #e5e7eb;border-radius:6px;padding:4px 8px;font-size:12px;outline:none}

/* Table */
.table-wrap{background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
table{width:100%;border-collapse:collapse}
th{background:rgba(57,57,57,.05);color:#393939;font-size:12px;font-weight:500;padding:0 12px;height:40px;text-align:left;white-space:nowrap}
td{font-size:14px;padding:12px;height:49px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
.link{color:#2563eb;cursor:pointer;text-decoration:none}
.link:hover{text-decoration:underline}
.text-muted{color:#999}

/* Action buttons */
.action-btns{display:flex;gap:8px}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;transition:background .15s}
.btn-icon:hover{background:#f5f5f5}
.btn-icon.edit svg{width:16px;height:16px;color:#666}
.btn-icon.delete svg{width:16px;height:16px;color:#e53935}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:16px 0}
.pagination button{min-width:32px;height:32px;border:1px solid #e5e7eb;background:#fff;border-radius:6px;cursor:pointer;font-size:13px;color:#393939;display:flex;align-items:center;justify-content:center}
.pagination button:hover{background:#f5f5f5}
.pagination button.active{background:#393939;color:#fff;border-color:#393939}
.pagination button:disabled{opacity:.4;cursor:default}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #e5e7eb}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;padding:4px}
.modal-close svg{width:20px;height:20px;color:#666}
.modal-body{padding:24px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid #e5e7eb}
.btn-cancel{background:#ededed;color:#393939;border:none;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer}
.btn-save{background:#393939;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer}
.btn-save:hover{opacity:.85}
.btn-danger{background:#e53935;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer}

/* Form */
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#393939}
.form-row input,.form-row textarea{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none}
.form-row input:focus,.form-row textarea:focus{border-color:#999}
.form-row textarea{resize:vertical;min-height:60px}

/* Permission tree */
.perm-tree{max-height:300px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:8px;padding:12px}
.perm-group{margin-bottom:8px}
.perm-group-header{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;font-weight:500;cursor:pointer}
.perm-group-header input[type=checkbox]{accent-color:#393939}
.perm-children{padding-left:24px}
.perm-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.perm-item input[type=checkbox]{accent-color:#393939}
.perm-count{font-size:12px;color:#999;margin-left:auto}

/* Delete confirm */
.delete-confirm{text-align:center;padding:20px 0}
.delete-confirm p{margin-bottom:8px;font-size:14px}
.delete-confirm .role-name{font-weight:600;color:#e53935}

/* RWD */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:99}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0}
  .hamburger{display:flex}
  .filter-bar{flex-direction:column;align-items:stretch}
  .filter-group input{width:100%}
  .table-wrap{overflow-x:auto}
  table{min-width:700px}
  .page-header{flex-direction:column;gap:12px;align-items:flex-start}
}
</style>
</head>

  {id:10,name:'ReadOnly',accounts:['viewer01','viewer02'],permCount:12,allPerms:false,updater:'superadmin',note:'唯讀角色'},
  {id:11,name:'Finance',accounts:['fin01'],permCount:22,allPerms:false,updater:'Rachel',note:'財務角色'},
  {id:12,name:'DevOps',accounts:[],permCount:45,allPerms:false,updater:'superadmin',note:'維運角色'},
  {id:13,name:'Editor',accounts:['editor01','editor02','editor03'],permCount:30,allPerms:false,updater:'paul11',note:'編輯角色'},
  {id:14,name:'Auditor',accounts:['audit01'],permCount:40,allPerms:false,updater:'Steven',note:'稽核角色'},
  {id:15,name:'Support',accounts:['sup01','sup02'],permCount:15,allPerms:false,updater:'admin',note:'技術支援'},
  {id:16,name:'Manager',accounts:['mgr01'],permCount:70,allPerms:false,updater:'Rachel',note:'主管角色'},
  {id:17,name:'Analyst',accounts:[],permCount:28,allPerms:false,updater:'superadmin',note:'分析師'},
  {id:18,name:'Tester',accounts:['tester01','tester02'],permCount:50,allPerms:false,updater:'paul11',note:'測試角色'},
  {id:19,name:'Designer',accounts:['design01'],permCount:8,allPerms:false,updater:'Steven',note:'設計師'},
  {id:20,name:'Intern',accounts:['intern01'],permCount:5,allPerms:false,updater:'admin',note:'實習生'}
];

let filteredRoles = [...roles];
let currentPage = 1;
let pageSize = 20;
let editingRole = null;
let deletingRole = null;

// === Render ===
function renderTable(){
  const start = (currentPage-1)*pageSize;
  const page = filteredRoles.slice(start, start+pageSize);
  const tbody = document.getElementById('roleTableBody');
  tbody.innerHTML = page.map(r => `<tr>
    <td><span class="link" onclick="showDetail(${r.id})">${r.name}</span></td>
    <td>${r.accounts.length ? `<span class="link" onclick="showAccounts(${r.id})">${r.accounts.length}位</span>` : '<span class="text-muted">-</span>'}</td>
    <td>${r.allPerms ? '全部權限' : r.permCount+' / '+totalPerms}</td>
    <td>${r.updater}</td>
    <td>${r.note || '<span class="text-muted">-</span>'}</td>
    <td><div class="action-btns">
      <button class="btn-icon edit" title="編輯" onclick="showEditRole(${r.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="btn-icon delete" title="刪除" onclick="showDelete(${r.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
    </div></td>
  </tr>`).join('');
  document.getElementById('pageInfo').textContent = `第 ${currentPage} 頁，共 ${filteredRoles.length} 筆資料`;
  renderPagination();
}

function renderPagination(){
  const total = Math.ceil(filteredRoles.length / pageSize) || 1;
  const el = document.getElementById('pagination');
  let html = `<button ${currentPage<=1?'disabled':''} onclick="goPage(${currentPage-1})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>`;
  for(let i=1;i<=total;i++) html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  html += `<button ${currentPage>=total?'disabled':''} onclick="goPage(${currentPage+1})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>`;
  el.innerHTML = html;
}

function goPage(p){ currentPage=p; renderTable(); }

// === Search ===
function doSearch(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filteredRoles = q ? roles.filter(r => r.name.toLowerCase().includes(q)) : [...roles];
  currentPage = 1;
  renderTable();
}
function doReset(){
  document.getElementById('searchInput').value = '';
  filteredRoles = [...roles];
  currentPage = 1;
  renderTable();
}

// === Modal helpers ===
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
function openModal(id){ document.getElementById(id).classList.add('show'); }

// === Detail ===
function showDetail(id){
  const r = roles.find(x=>x.id===id);
  if(!r) return;
  editingRole = r;
  document.getElementById('detailTitle').textContent = r.name + ' - 角色詳細資訊';
  let html = `<div style="margin-bottom:16px">
    <div style="display:grid;grid-template-columns:100px 1fr;gap:8px;font-size:13px">
      <span style="color:#999">角色名稱</span><span style="font-weight:500">${r.name}</span>
      <span style="color:#999">套用帳號</span><span>${r.accounts.length ? r.accounts.length+'位' : '-'}</span>
      <span style="color:#999">權限數</span><span>${r.allPerms ? '全部權限' : r.permCount+' / '+totalPerms}</span>
      <span style="color:#999">最後更新</span><span>${r.updater}</span>
      <span style="color:#999">備註</span><span>${r.note||'-'}</span>
    </div>
  </div>`;
  if(r.accounts.length){
    html += `<div style="margin-top:12px"><div style="font-size:13px;font-weight:500;margin-bottom:8px">套用帳號列表</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${r.accounts.map(a=>`<span style="background:#f5f5f5;padding:4px 10px;border-radius:6px;font-size:12px">${a}</span>`).join('')}</div></div>`;
  }
  document.getElementById('detailBody').innerHTML = html;
  openModal('detailModal');
}

function showEditFromDetail(){
  closeModal('detailModal');
  if(editingRole) showEditRole(editingRole.id);
}

// === Accounts ===
function showAccounts(id){
  const r = roles.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('accountsTitle').textContent = r.name + ' - 套用帳號 ('+r.accounts.length+'位)';
  document.getElementById('accountsBody').innerHTML = r.accounts.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:8px">${r.accounts.map(a=>`<span style="background:#f5f5f5;padding:6px 14px;border-radius:8px;font-size:13px">${a}</span>`).join('')}</div>`
    : '<p style="color:#999;text-align:center">無套用帳號</p>';
  openModal('accountsModal');
}

// === Permission tree ===
function renderPermTree(selected){
  const sel = new Set(selected||[]);
  return permissions.map((g,gi) => {
    const allChecked = g.children.every(c => sel.has(g.name+'.'+c));
    return `<div class="perm-group">
      <div class="perm-group-header">
        <input type="checkbox" data-group="${gi}" ${allChecked?'checked':''} onchange="togglePermGroup(${gi},this.checked)">
        <span>${g.name}</span>
        <span class="perm-count">${g.children.filter(c=>sel.has(g.name+'.'+c)).length}/${g.children.length}</span>
      </div>
      <div class="perm-children">${g.children.map((c,ci) => `<div class="perm-item">
        <input type="checkbox" data-group="${gi}" data-child="${ci}" ${sel.has(g.name+'.'+c)?'checked':''} onchange="updatePermCount()">
        <span>${c}</span>
      </div>`).join('')}</div>
    </div>`;
  }).join('');
}

function togglePermGroup(gi, checked){
  document.querySelectorAll(`input[data-group="${gi}"][data-child]`).forEach(cb => cb.checked = checked);
  updatePermCount();
}

function updatePermCount(){
  const checked = document.querySelectorAll('.perm-tree input[type=checkbox][data-child]:checked').length;
  document.getElementById('permCount').textContent = checked + ' / ' + totalPerms;
  // Update group checkboxes
  permissions.forEach((g,gi) => {
    const groupCb = document.querySelector(`input[data-group="${gi}"]:not([data-child])`);
    const children = document.querySelectorAll(`input[data-group="${gi}"][data-child]`);
    const allChecked = Array.from(children).every(c => c.checked);
    if(groupCb) groupCb.checked = allChecked;
  });
}

// === Add/Edit ===
function showAddRole(){
  editingRole = null;
  document.getElementById('editTitle').textContent = '新增角色';
  document.getElementById('editName').value = '';
  document.getElementById('editNote').value = '';
  document.getElementById('permTree').innerHTML = renderPermTree([]);
  document.getElementById('permCount').textContent = '0 / ' + totalPerms;
  openModal('editModal');
}

function showEditRole(id){
  const r = roles.find(x=>x.id===id);
  if(!r) return;
  editingRole = r;
  document.getElementById('editTitle').textContent = '編輯角色 - ' + r.name;
  document.getElementById('editName').value = r.name;
  document.getElementById('editNote').value = r.note;
  // Generate selected perms (simulate)
  const selected = [];
  let count = 0;
  for(const g of permissions){
    for(const c of g.children){
      if(r.allPerms || count < r.permCount){ selected.push(g.name+'.'+c); }
      count++;
    }
  }
  document.getElementById('permTree').innerHTML = renderPermTree(selected);
  document.getElementById('permCount').textContent = (r.allPerms ? totalPerms : r.permCount) + ' / ' + totalPerms;
  openModal('editModal');
}

function saveRole(){
  const name = document.getElementById('editName').value.trim();
  if(!name){ alert('請輸入角色名稱'); return; }
  closeModal('editModal');
  // Demo: just show success
  renderTable();
}

// === Delete ===
function showDelete(id){
  const r = roles.find(x=>x.id===id);
  if(!r) return;
  deletingRole = r;
  document.getElementById('deleteRoleName').textContent = '「' + r.name + '」？';
  openModal('deleteModal');
}

function confirmDelete(){
  if(!deletingRole) return;
  const idx = roles.findIndex(x=>x.id===deletingRole.id);
  if(idx>=0) roles.splice(idx,1);
  filteredRoles = [...roles];
  closeModal('deleteModal');
  renderTable();
}

// === Sidebar ===
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function toggleSubmenu(key){
  const sub = document.getElementById('sub-'+key);
  const arrow = document.getElementById('arrow-'+key);
  sub.classList.toggle('open');
  arrow.classList.toggle('open');
}

// === Page size ===
document.getElementById('pageSize').addEventListener('change', function(){
  pageSize = parseInt(this.value);
  currentPage = 1;
  renderTable();
});

// === Init ===
renderTable();
</script>
