<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 角色設定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}

.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub .sidebar-item{transform:translateY(-4px);opacity:0;transition:transform .3s cubic-bezier(.25,.1,.25,1),opacity .25s ease}
.sidebar-sub.open .sidebar-item{transform:translateY(0);opacity:1}
.sidebar-sub.open .sidebar-item:nth-child(1){transition-delay:0.03s}
.sidebar-sub.open .sidebar-item:nth-child(2){transition-delay:0.06s}
.sidebar-sub.open .sidebar-item:nth-child(3){transition-delay:0.09s}
.sidebar-sub.open .sidebar-item:nth-child(4){transition-delay:0.12s}
.sidebar-sub.open .sidebar-item:nth-child(5){transition-delay:0.15s}
.sidebar-sub.open .sidebar-item:nth-child(6){transition-delay:0.18s}
.sidebar-sub.open .sidebar-item:nth-child(7){transition-delay:0.21s}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item:hover{color:#111827}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb a:hover{color:#374151}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}
.btn-add{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:#fff;background:#16a34a;box-shadow:0 1px 3px rgba(22,163,74,.2);transition:background .15s}
.btn-add:hover{background:#15803d}
.btn-add svg{width:16px;height:16px}
.filter-card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-actions{order:999;margin-left:auto;display:flex;gap:8px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px;max-width:200px}
.filter-group.filter-wide{min-width:280px;max-width:360px}
.filter-group label{font-size:11px;font-weight:500;color:#6B7280}
.filter-input{display:flex;align-items:center;gap:6px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:7px 10px;font-size:13px;color:#374151;min-width:180px}
.filter-input svg{width:14px;height:14px;color:#9CA3AF;flex-shrink:0}
.filter-input input{border:none;background:none;outline:none;font-size:13px;color:#374151;font-family:inherit;width:100%}
.filter-input input::placeholder{color:#9CA3AF}
.btn-search{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;color:#fff;background:#1F2937}
.btn-search:hover{background:#111827}
.btn-search svg{width:14px;height:14px}
.btn-reset{padding:7px 14px;border-radius:6px;border:1px solid #E5E7EB;cursor:pointer;font-size:13px;font-family:inherit;color:#374151;background:#fff}
.btn-reset:hover{background:#F3F4F6}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.data-table th{background:#F5F5F5;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;border-bottom:1px solid #E5E7EB}
.data-table td{padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:#FAFAFA}
.link-teal{color:#009688;cursor:pointer;font-weight:500;background:none;border:none;font-size:13px;font-family:inherit}
.link-teal:hover{text-decoration:underline}
.btn-edit{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px;border-radius:4px}
.btn-edit:hover{color:#374151}
.btn-edit svg{width:16px;height:16px}
.btn-del{background:none;border:none;cursor:pointer;color:#EF4444;padding:4px;border-radius:4px}
.btn-del:hover{color:#DC2626}
.btn-del svg{width:16px;height:16px}
.perm-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;margin:2px}
.perm-full{background:#DCFCE7;color:#166534}
.perm-read{background:#DBEAFE;color:#1E40AF}
.perm-none{background:#F3F4F6;color:#9CA3AF}
.pagination-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;color:#6B7280}


.sidebar-user{position:relative;cursor:pointer}
.user-chevron{width:14px;height:14px;color:#9CA3AF;margin-left:auto;flex-shrink:0;transition:transform .2s}
.sidebar-user.open .user-chevron{transform:rotate(0deg);color:#4338CA}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200;opacity:0;transform:translateX(-4px);transition:opacity .2s ease,transform .2s ease}
.sidebar-user.open .user-popover{display:block;opacity:1;transform:translateX(0)}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none;transition:background .15s}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
.sidebar{transition:transform .3s cubic-bezier(.25,.1,.25,1)}
.main{transition:margin-left .3s cubic-bezier(.25,.1,.25,1)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed;z-index:100;transition:transform .3s}
.sidebar.show{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.main{margin-left:0}
.topbar{padding:0 12px}
.content{padding:12px}
.filter-card{flex-direction:column;}
.filter-group{max-width:100%}
.filter-actions{margin-left:0;width:100%;justify-content:flex-start}
.filter-group{width:100%}
.filter-input{width:100%}
.data-table{display:block;overflow-x:auto;white-space:nowrap}
}
.filter-error{font-size:11px;color:#DC2626;margin-top:3px;display:none}
.filter-group.has-error .filter-error{display:block}
.filter-group.has-error .filter-input{border-color:#DC2626}
/* Role Modal */
.role-modal{background:#fff;border-radius:10px;width:90vw;max-width:1100px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.role-modal.fullscreen{width:100vw;max-width:100vw;max-height:100vh;height:100vh;border-radius:0}
.rm-header{padding:16px 20px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rm-header h3{font-size:15px;font-weight:600;color:#1F2937}
.rm-header-actions{display:flex;align-items:center;gap:4px}
.rm-icon-btn{background:none;border:none;cursor:pointer;color:#9CA3AF;padding:6px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.rm-icon-btn:hover{background:#F3F4F6;color:#374151}
.rm-body{padding:20px;overflow-y:auto;flex:1}
.rm-form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.rm-field label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
.rm-field input{width:100%;padding:8px 12px;border:1px solid #E5E7EB;border-radius:6px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.rm-field input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.rm-req{color:#DC2626;margin-left:2px}
.rm-perm-section{border:1px solid #E5E7EB;border-radius:8px;padding:16px}
.rm-perm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rm-perm-header label{font-size:13px;font-weight:500;color:#374151}
.rm-collapse-btn{font-size:12px;padding:4px 12px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;cursor:pointer;color:#374151;font-family:inherit}
.rm-collapse-btn:hover{background:#F3F4F6}
.rm-perm-grid{max-height:500px;overflow-y:auto;space-y:12px}
.rm-perm-group{margin-bottom:12px}
.rm-perm-group-title{display:flex;align-items:center;gap:8px;padding-bottom:8px}
.rm-perm-group-title label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;color:#374151}
.rm-perm-group-title input[type="checkbox"]{width:16px;height:16px;accent-color:#00bba7;cursor:pointer}
.rm-perm-items{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-left:24px}
.rm-perm-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:4px;cursor:pointer;transition:background .1s}
.rm-perm-item:hover{background:#F9FAFB}
.rm-perm-item input[type="checkbox"]{width:14px;height:14px;accent-color:#00bba7;cursor:pointer;flex-shrink:0}
.rm-perm-item span{font-size:12px;color:#374151}
.rm-expandable-item{flex-wrap:wrap;position:relative}
.rm-expand-btn{font-size:10px;color:#6B7280;cursor:pointer;margin-left:6px;user-select:none}
.rm-expand-children{padding:4px 0 4px 20px}
.rm-perm-items-expandable{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-left:24px;align-items:start}
.rm-exp-col{display:flex;flex-direction:column}
.rm-child-item{display:flex;align-items:center;gap:6px;padding:4px 8px;font-size:12px;color:#374151}
.rm-child-item input[type="checkbox"]{width:14px;height:14px;accent-color:#00bba7;cursor:pointer}
.rm-footer{padding:16px 20px;border-top:1px solid #E5E7EB;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.btn-outline{padding:8px 16px;border-radius:6px;border:1px solid #D1D5DB;background:#fff;color:#6B7280;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-outline:hover{background:#F9FAFB}
.btn-dark{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:6px;border:none;background:#393939;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-dark:hover{background:#1F2937}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>


<div class="main">
  <div class="topbar">
    <button class="topbar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">帳號管理</a><span class="sep">&gt;</span><span class="current">角色設定</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <h1>角色設定</h1>
      <div class="spacer"></div>
      <button class="btn-add" onclick="showRoleModal('add')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增角色</button>
    </div>
    <div class="filter-card">
      <div class="filter-group" data-rule="keyword"><label>角色名稱</label><div class="filter-input"><input type="text" placeholder="搜尋角色名稱"></div><div class="filter-error"></div></div>
      <div class="filter-actions"><button class="btn-search" onclick="filterRoles()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>搜尋</button>
      <button class="btn-reset" onclick="resetRoleFilter()">重置</button></div>
    </div>
    <div class="pagination-bar"><span id="rolePageInfo">共 6 筆角色</span></div>
    <div id="roleTableWrap"></div>
  </div>
</div>

<!-- Role Modal -->
<div id="roleModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center">
<div class="role-modal">
  <div class="rm-header">
    <h3 id="roleModalTitle">角色-新增</h3>
    <div class="rm-header-actions">
      <button class="rm-icon-btn" onclick="toggleRoleModalSize()" title="切換視窗大小"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M15 3h6v6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/><path d="M9 21H3v-6"/></svg></button>
      <button class="rm-icon-btn" onclick="closeRoleModal()" title="關閉視窗"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
  </div>
  <div class="rm-body">
    <div class="rm-form-row">
      <div class="rm-field"><label>角色名稱<span class="rm-req">*</span></label><input id="rmName" type="text" placeholder="輸入角色名稱"></div>
      <div class="rm-field"><label>備註</label><input id="rmNote" type="text" placeholder="輸入備註"></div>
    </div>
    <div class="rm-perm-section">
      <div class="rm-perm-header"><label>權限設定<span class="rm-req">*</span></label><button class="rm-collapse-btn" onclick="togglePermSection()">收合</button></div>
      <div id="permGrid" class="rm-perm-grid"></div>
    </div>
  </div>
  <div class="rm-footer">
    <button class="btn-outline" onclick="closeRoleModal()">取消</button>
    <button class="btn-dark" onclick="saveRole()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增</button>
  </div>
</div>
</div>

<script>
const permGroups = {
  '遊戲管理':{items:['娛樂城-查詢檢視','娛樂城-異動','遊戲維護-查詢檢視','遊戲維護-包含新增、排序與異動','遊戲設定-查詢檢視','遊戲設定-包含新增、排序與異動','遊戲設定-刪除','轉帳額度確認-查詢檢視','轉帳額度確認-異動'],order:['items']},
  '商城管理':['一般儲值-查詢檢視','一般儲值-包含新增、停/啟用與異動','一般儲值-刪除','快速儲值-查詢檢視','快速儲值-包含新增、停/啟用與異動','快速儲值-刪除'],
  '公會管理':['公會列表-查詢檢視','公會列表-調整等級','貢獻查詢-查詢檢視','提領監控-查詢檢視','操作紀錄-查詢檢視'],
  '內容發布':['橫幅管理-查詢檢視','橫幅管理-包含新增、排序、停/啟用與異動','橫幅管理-刪除','公告管理-查詢檢視','公告燈管理-包含新增、排序、停/啟用與異動','公告燈管理-刪除','跑馬燈管理-查詢檢視','跑馬燈管理-包含新增、排序、停/啟用與異動','跑馬燈管理-刪除'],
  '活動管理':['登入活動-查詢檢視','登入活動-包含新增、停/啟用與異動','登入活動-刪除','儲值活動-查詢檢視','儲值活動-包含新增、停/啟用與異動','儲值活動-刪除','廣告排序清單-查詢檢視','廣告排序清單-排序','一般活動-查詢檢視','一般活動-包含新增、排序、停/啟用與異動','一般活動-刪除','其他活動-查詢檢視','其他活動-包含新增、停/啟用與異動','其他活動-刪除'],
  '任務管理':['任務設定-查詢檢視','任務設定-包含新增、停/啟用與異動','任務設定-刪除'],
  '帳務管理':{items:['供應商-查詢檢視','供應商-包含新增、停/啟用與異動','支付管理-查詢檢視','支付管理-包含新增、停/啟用與異動','儲值金額表-查詢檢視','儲值金額表-包含新增、停/啟用與異動'],order:['items']},

  {name:'Admin',note:'管理員角色',members:28,perms:permModuleNames.reduce((o,m)=>(o[m]='full',o),{})},
  {name:'RD_Test',note:'RD測試角色',members:2,perms:{...permModuleNames.reduce((o,m)=>(o[m]='read',o),{}),'遊戲管理':'full','基本設定':'full'}},
  {name:'QA',note:'星運營運測試',members:1,perms:{...permModuleNames.reduce((o,m)=>(o[m]='read',o),{}),'用戶管理':'full','各式報表':'full'}},
  {name:'allenNoGame',note:'沒有遊戲權限',members:2,perms:{...permModuleNames.reduce((o,m)=>(o[m]='read',o),{}),'遊戲管理':'none'}},
  {name:'Marketing',note:'行銷部門',members:2,perms:{...permModuleNames.reduce((o,m)=>(o[m]='none',o),{}),'活動管理':'full','內容發布':'full','各式報表':'read'}},
  {name:'Auditor',note:'稽核',members:1,perms:permModuleNames.reduce((o,m)=>(o[m]='read',o),{})}

function renderRoles(data){
  let html='<table class="data-table"><thead><tr><th>角色名稱</th><th>套用帳號</th><th>權限數</th><th>最後更新人員</th><th>備註</th><th>操作</th></tr></thead><tbody>';
  const updaters=['Rachel','paul11','Steven','superadmin','superadmin','superadmin'];
  data.forEach((r,i)=>{
    const total=Object.values(permGroups).reduce((s,v)=>s+(Array.isArray(v)?v.length:(v.items?v.items.length:0)+(v.expandable?Object.values(v.expandable).reduce((a,b)=>a+b.length,0)+Object.keys(v.expandable).length:0)),0);
    const count=r.perms[permModuleNames[0]]==='full'?'全部權限':`${Math.floor(Math.random()*60+10)} / ${total}`;
    html+=`<tr><td><button class="link-teal" onclick="showRoleModal('edit',${i})">${r.name}</button></td><td>${r.members>0?r.members+'位':'-'}</td><td>${count}</td><td>${updaters[i]||'superadmin'}</td><td style="color:#6B7280">${r.note}</td>`;
    html+=`<td style="white-space:nowrap"><button class="btn-edit" onclick="showRoleModal('edit',${i})" title="編輯"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg></button><button class="btn-del" onclick="delRole(${i})" title="刪除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg></button></td></tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('roleTableWrap').innerHTML=html;
  document.getElementById('rolePageInfo').textContent=`共 ${data.length} 筆角色`;
}
function filterRoles(){
  const input=document.querySelector('.filter-input input');
  const q=input?input.value.toLowerCase():'';
  renderRoles(q?roles.filter(r=>r.name.toLowerCase().includes(q)):roles);
}
function resetRoleFilter(){const input=document.querySelector('.filter-input input');if(input)input.value='';renderRoles(roles);}
let editRoleIdx=-1;
function renderPermGrid(){
  let html='';
  permModuleNames.forEach(group=>{
    const val=permGroups[group];
    html+=`<div class="rm-perm-group"><div class="rm-perm-group-title"><label><input type="checkbox" onchange="toggleGroupAll(this,'${group}')"><span>${group}</span></label></div>`;
    if(Array.isArray(val)){
      html+=`<div class="rm-perm-items">`;
      val.forEach(p=>{html+=`<div class="rm-perm-item" onclick="togglePermClick(event)"><input type="checkbox" data-group="${group}" data-perm="${p}" onchange="handlePermDep(this)"><span>${p}</span></div>`;});
      html+=`</div>`;
    } else if(val.expandable || val.items){
      const renderItems = ()=>{
        if(val.items){
          html+=`<div class="rm-perm-items">`;
          val.items.forEach(p=>{html+=`<div class="rm-perm-item" onclick="togglePermClick(event)"><input type="checkbox" data-group="${group}" data-perm="${p}" onchange="handlePermDep(this)"><span>${p}</span></div>`;});
          html+=`</div>`;
        }
      };
      const renderExpandable = ()=>{
        if(val.expandable){
          const entries = Object.entries(val.expandable);
          html+=`<div class="rm-perm-items-expandable">`;
          entries.forEach(([label,children])=>{
            const id='exp_'+label.replace(/[^a-z0-9]/gi,'_');
            html+=`<div class="rm-exp-col"><div class="rm-perm-item" onclick="togglePermClick(event)"><input type="checkbox" data-group="${group}" data-perm="${label}" onchange="handlePermDep(this)"><span>${label}</span><span class="rm-expand-btn" onclick="toggleExpand(event,'${id}')">▶</span></div>`;
            html+=`<div class="rm-expand-children" id="${id}" style="display:none">`;
            children.forEach(c=>{html+=`<div class="rm-child-item" onclick="togglePermClick(event)"><input type="checkbox" data-group="${group}" data-perm="${c}" onchange="handlePermDep(this)"><span>${c}</span></div>`;});
            html+=`</div></div>`;
          });
          html+=`</div>`;
        }
      };
      const order = val.order || ['items','expandable'];
      order.forEach(k=>{if(k==='items')renderItems();else renderExpandable();});
    }
    html+=`</div>`;
  });
  return html;
}
function toggleExpand(e,id){
  e.stopPropagation();
  const el=document.getElementById(id);
  const btn=e.target;
  if(el.style.display==='none'){el.style.display='';btn.textContent='▼';}
  else{el.style.display='none';btn.textContent='▶';}
}
function togglePermClick(e){
  if(e.target.tagName==='INPUT'||e.target.classList.contains('rm-expand-btn'))return;
  const cb=e.currentTarget.querySelector('input[type="checkbox"]');
  if(cb){cb.checked=!cb.checked;cb.dispatchEvent(new Event('change'));}
}
function handlePermDep(cb){
  const perm=cb.dataset.perm;
  const group=cb.dataset.group;
  const grid=document.getElementById('permGrid');
  // 勾異動/新增時自動勾查詢檢視
  if(cb.checked&&!perm.endsWith('-查詢檢視')&&!perm.endsWith('-檢視')){
    const prefix=perm.split('-')[0];
    const viewCb=grid.querySelector(`input[data-perm="${prefix}-查詢檢視"]`);
    if(viewCb)viewCb.checked=true;
  }
  // 取消查詢檢視時自動取消同前綴的所有異動權限
  if(!cb.checked&&(perm.endsWith('-查詢檢視')||perm.endsWith('-檢視'))){
    const prefix=perm.split('-')[0];
    grid.querySelectorAll(`input[data-group="${group}"]`).forEach(function(other){
      if(other.dataset.perm.startsWith(prefix+'-')&&other.dataset.perm!==perm){
        other.checked=false;
      }
    });
  }
}
function toggleGroupAll(el,group){
  const grid=document.getElementById('permGrid');
  grid.querySelectorAll(`input[data-group="${group}"]`).forEach(cb=>cb.checked=el.checked);
}
function togglePermSection(){
  const grid=document.getElementById('permGrid');
  const btn=document.querySelector('.rm-collapse-btn');
  if(grid.style.display==='none'){grid.style.display='';btn.textContent='收合';}
  else{grid.style.display='none';btn.textContent='展開';}
}
function showRoleModal(mode,idx){
  editRoleIdx=mode==='edit'?idx:-1;
  document.getElementById('roleModalTitle').textContent=mode==='edit'?'角色-編輯':'角色-新增';
  const r=mode==='edit'?roles[idx]:{name:'',note:''};
  document.getElementById('rmName').value=r.name;
  document.getElementById('rmNote').value=r.note;
  document.getElementById('permGrid').innerHTML=renderPermGrid();
  document.getElementById('permGrid').style.display='';
  document.querySelector('.rm-collapse-btn').textContent='收合';
  document.getElementById('roleModalOverlay').style.display='flex';
}
function closeRoleModal(){document.getElementById('roleModalOverlay').style.display='none';const m=document.querySelector('.role-modal');m.classList.remove('fullscreen');}
function toggleRoleModalSize(){document.querySelector('.role-modal').classList.toggle('fullscreen');}
function saveRole(){alert(editRoleIdx>=0?'角色已更新':'角色已新增');closeRoleModal();}
function delRole(i){if(confirm(`確定刪除角色「${roles[i].name}」？`)){roles.splice(i,1);renderRoles(roles);}}

// Field validation
document.querySelector('.btn-search')?.addEventListener('click', function(e) {
  let valid = true;
  document.querySelectorAll('.filter-error').forEach(el => el.textContent = '');
  document.querySelectorAll('.filter-group[data-rule]').forEach(group => {
    const rule = group.dataset.rule;
    const input = group.querySelector('input');
    if (!input) return;
    const val = input.value.trim();
    if (!val) return;
    let errorMsg = '';
    switch(rule) {
      case 'account':
        const accounts = val.split(',').map(s => s.trim()).filter(s => s);
        for (const acc of accounts) {
          if (!/^[a-zA-Z0-9_]{2,20}$/.test(acc)) { errorMsg = '帳號格式：2~20字元英數底線'; break; }
        }
        break;
      case 'nickname':
        if (val.length < 1 || val.length > 16) errorMsg = '暱稱長度：1~16字元';
        break;
      case 'order':
        if (!/^[a-zA-Z0-9_-]{4,30}$/.test(val)) errorMsg = '編號格式：4~30字元英數';
        break;
      case 'phone':
        if (!/^09\d{8}$/.test(val)) errorMsg = '格式：09開頭共10碼';
        break;
      case 'date':
        if (val.includes('~')) {
          const parts = val.split('~').map(s => s.trim());
          const dateRe = /^\d{4}-\d{2}-\d{2}$/;
          if (!dateRe.test(parts[0]) || !dateRe.test(parts[1])) errorMsg = '格式：YYYY-MM-DD ~ YYYY-MM-DD';
          else if (parts[0] > parts[1]) errorMsg = '開始日期不可大於結束日期';
        } else {
          if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) errorMsg = '格式：YYYY-MM-DD ~ YYYY-MM-DD';
        }
        break;
      case 'keyword':
        if (val.length < 1) errorMsg = '請輸入搜尋內容';
        break;
      case 'amount':
        if (!/^\d+(\.\d{1,2})?$/.test(val)) errorMsg = '請輸入有效金額';
        break;
    }
    if (errorMsg) {
      valid = false;
      const errEl = group.querySelector('.filter-error');
      if (errEl) errEl.textContent = errorMsg;
    }
  });
});
document.querySelector('.btn-reset')?.addEventListener('click', function() {
  document.querySelectorAll('.filter-group input').forEach(i => i.value = '');
  document.querySelectorAll('.filter-group select').forEach(s => s.selectedIndex = 0);
  document.querySelectorAll('.filter-error').forEach(el => el.textContent = '');
});
