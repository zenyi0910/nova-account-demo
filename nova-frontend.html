<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星運娛樂城 - 遊戲大廳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;background:#1a0a0e;color:#fff;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:linear-gradient(180deg,#2a0a12 0%,#1a0a0e 100%);position:relative;display:flex;flex-direction:column}

/* Header */
.header{background:linear-gradient(135deg,#8b0a1e,#5a0612);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(245,200,66,.15)}
.header-left{display:flex;align-items:center;gap:8px}
.header-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f5a623,#e8891a);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#452201;border:2px solid rgba(245,200,66,.4)}
.header-info .username{font-size:13px;font-weight:600}
.header-info .vip-row{display:flex;align-items:center;gap:6px;margin-top:2px}
.vip-badge{background:linear-gradient(135deg,#9b59b6,#7a2090);color:#fff;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;box-shadow:0 2px 6px rgba(155,89,182,.4)}
.header-right{display:flex;align-items:center;gap:6px}
.coin-display{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.4);border-radius:20px;padding:4px 10px 4px 4px;border:1px solid rgba(245,200,66,.2)}
.coin-icon{width:20px;height:20px;background:linear-gradient(135deg,#f5c842,#e8a820);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#8b6914}
.coin-amount{font-size:11px;font-weight:600;color:#f5c842}
.btn-deposit{border-radius:9999px;border:none;cursor:pointer;padding:2px;background:transparent}
.btn-deposit-inner{background:#2bb5a0;color:#fff;border-radius:9999px;padding:6px 14px;font-size:11px;font-weight:600;box-shadow:0 4px 8px rgba(43,181,160,.4),inset -1px -2px 2px rgba(30,150,130,.8),inset 0 1px 1px rgba(255,253,247,.3)}

/* Banner */
.banner-wrap{position:relative;overflow:hidden}
.banner-track{display:flex;transition:transform .4s ease}
.banner-slide{min-width:100%;aspect-ratio:16/7;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.banner-slide .bg{position:absolute;inset:0}
.banner-slide .inner{position:relative;z-index:1;text-align:center;padding:16px}
.banner-slide h2{font-size:18px;font-weight:700;color:#f5c842;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.banner-slide p{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px}
.banner-dots{display:flex;justify-content:center;gap:6px;padding:8px 0;background:rgba(0,0,0,.2)}
.banner-dots .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .2s}
.banner-dots .dot.active{background:#f5c842;width:16px;border-radius:3px}

/* Marquee */
.marquee-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(245,200,66,.06);border-bottom:1px solid rgba(245,200,66,.08);overflow:hidden}
.marquee-icon svg{width:16px;height:16px;fill:#f5c842;flex-shrink:0}
.marquee-text{white-space:nowrap;animation:marquee 25s linear infinite;font-size:11px;color:rgba(255,255,255,.5)}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Game tabs */
.game-tabs{display:flex;gap:0;padding:10px 14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.game-tabs::-webkit-scrollbar{display:none}
.game-tab{padding:8px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.game-tab.active{color:#f5c842;border-bottom-color:#f5c842;font-weight:600}

/* Game grid */
.game-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px;flex:1}
.game-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s;aspect-ratio:3/4;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.game-card:active{transform:scale(.95)}
.game-card .game-img{width:100%;height:68%;display:block;position:relative;overflow:hidden}
.game-card .game-img-bg{width:100%;height:100%;object-fit:cover}
.game-card .game-info{padding:6px 8px}
.game-card .game-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-card .game-players{font-size:9px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:3px;margin-top:2px}
.game-card .game-players svg{width:8px;height:8px;fill:#4dc9a0}
.game-tag{position:absolute;top:4px;left:4px;font-size:8px;padding:2px 6px;border-radius:3px;font-weight:600;z-index:2}
.tag-hot{background:#e74c3c;color:#fff}
.tag-new{background:#4dc9a0;color:#fff}
.tag-rec{background:#f5c842;color:#452201}
.game-fav{position:absolute;top:4px;right:4px;width:18px;height:18px;cursor:pointer;z-index:2}
.game-fav svg{width:14px;height:14px;fill:none;stroke:rgba(255,255,255,.3);stroke-width:2}
.game-fav.liked svg{fill:#e74c3c;stroke:#e74c3c}

/* Bottom tab bar */
.tab-bar{display:flex;align-items:center;justify-content:space-around;background:linear-gradient(0deg,#1a0a0e,#2a0a12);border-top:1px solid rgba(245,200,66,.1);padding:6px 0 env(safe-area-inset-bottom,8px);position:sticky;bottom:0;z-index:50}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 10px;color:rgba(255,255,255,.35);transition:color .15s;background:none;border:none;font-family:inherit;text-decoration:none}
.tab-item.active{color:#f5c842}
.tab-item svg{width:20px;height:20px}
.tab-item span{font-size:9px}

/* Chat bubble */
.chat-bubble{position:fixed;bottom:70px;right:16px;width:44px;height:44px;background:#2bb5a0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(43,181,160,.4);z-index:40}
.chat-bubble svg{width:22px;height:22px;fill:#fff}
.chat-badge{position:absolute;top:-2px;right:-2px;background:#e74c3c;color:#fff;font-size:8px;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:600}

.content{flex:1;overflow-y:auto}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-avatar">Q</div>
      <div class="header-info">
        <div class="username">QAtest6</div>
        <div class="vip-row"><span class="vip-badge">VIP3</span></div>
      </div>
    </div>
    <div class="header-right">
      <div class="coin-display">

        <span class="coin-amount">148,927,558</span>

        <div class="btn-deposit-inner">儲值</div>

  <div class="content">
    <!-- Banner -->
    <div class="banner-wrap">
      <div class="banner-track" id="bannerTrack">
        <div class="banner-slide"><div class="bg" style="background:linear-gradient(135deg,#8b0a1e,#c41230)"></div><div class="inner"><h2>首儲加碼 最高翻倍</h2><p>限時活動開跑，錯過再等一年</p></div></div>
        <div class="banner-slide"><div class="bg" style="background:linear-gradient(135deg,#1a3a6a,#2a5a9a)"></div><div class="inner"><h2>每日簽到 領取獎勵</h2><p>連續簽到 7 天送 VIP 體驗券</p></div></div>
        <div class="banner-slide"><div class="bg" style="background:linear-gradient(135deg,#4a1060,#7a2090)"></div><div class="inner"><h2>紅包雨 隨機掉落</h2><p>手慢就沒了，立即參與</p></div></div>
      </div>
    </div>
    <div class="banner-dots" id="bannerDots">
      <div class="dot active" onclick="goSlide(0)"></div>
      <div class="dot" onclick="goSlide(1)"></div>
      <div class="dot" onclick="goSlide(2)"></div>
    </div>

    <!-- Marquee -->
    <div class="marquee-bar">
      <div class="marquee-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
      <div style="overflow:hidden;flex:1"><span class="marquee-text">恭喜會員 A***8 在百家樂贏得 1,280,000！恭喜會員 K***2 在埃及三秘寶中獎 888,000！首儲加碼活動火熱進行中！&nbsp;&nbsp;&nbsp;&nbsp;恭喜會員 A***8 在百家樂贏得 1,280,000！恭喜會員 K***2 在埃及三秘寶中獎 888,000！</span></div>
    </div>

    <!-- Game Tabs -->
    <div class="game-tabs" id="gameTabs">
      <button class="game-tab active" onclick="switchTab(this,'all')">全部</button>
      <button class="game-tab" onclick="switchTab(this,'fav')">最愛</button>
      <button class="game-tab" onclick="switchTab(this,'slot')">電子</button>
      <button class="game-tab" onclick="switchTab(this,'live')">真人</button>
      <button class="game-tab" onclick="switchTab(this,'sport')">體育</button>
      <button class="game-tab" onclick="switchTab(this,'chess')">棋牌</button>
      <button class="game-tab" onclick="switchTab(this,'lottery')">彩票</button>
      <button class="game-tab" onclick="switchTab(this,'fish')">捕魚</button>
    </div>

    <!-- Game Grid -->
    <div class="game-grid" id="gameGrid"></div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <button class="tab-item" onclick="openModal('otherModal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      <span>其他</span>
    </button>
    <a class="tab-item" href="nova-promo.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>活動</span>
    </a>
    <button class="tab-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>大廳</span>
    </button>
    <a class="tab-item" href="nova-deposit.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      <span>商城</span>
    </a>
    <a class="tab-item" href="nova-profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </a>
  </div>
</div>

<!-- Chat bubble -->
<div class="chat-bubble" onclick="alert('客服聊天')">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  <div class="chat-badge">4</div>
</div>

<script>
const gameData=[
{name:'埃及三秘寶',type:'slot',players:891,tag:'hot',fav:false,bg:'#3a1a2a'},
{name:'財神倍倍發',type:'slot',players:1334,tag:'',fav:true,bg:'#2a1a3a'},
{name:'印加祖瑪',type:'slot',players:1000,tag:'rec',fav:false,bg:'#1a2a3a'},
{name:'財富金幣',type:'slot',players:680,tag:'',fav:false,bg:'#2a2a1a'},
{name:'阿茲特克神話',type:'slot',players:523,tag:'new',fav:false,bg:'#1a3a2a'},
{name:'百家樂 A廳',type:'live',players:2100,tag:'hot',fav:true,bg:'#1a1a3a'},
{name:'龍虎鬥',type:'live',players:890,tag:'',fav:false,bg:'#3a1a1a'},
{name:'足球盤口',type:'sport',players:456,tag:'',fav:false,bg:'#1a2a1a'},
{name:'寶石之王',type:'slot',players:320,tag:'new',fav:false,bg:'#2a1a4a'},
{name:'德州撲克',type:'chess',players:780,tag:'hot',fav:true,bg:'#1a3a3a'},
{name:'水果派對',type:'slot',players:650,tag:'',fav:false,bg:'#3a2a1a'},
{name:'金龍獻瑞',type:'slot',players:430,tag:'rec',fav:false,bg:'#4a1a1a'},
{name:'百家樂 B廳',type:'live',players:1560,tag:'',fav:false,bg:'#1a1a4a'},
{name:'時時彩',type:'lottery',players:290,tag:'',fav:false,bg:'#2a1a2a'},
{name:'麻將胡了',type:'chess',players:1200,tag:'hot',fav:true,bg:'#1a2a2a'},
{name:'甜蜜糖果屋',type:'slot',players:870,tag:'',fav:false,bg:'#3a1a3a'},
{name:'籃球盤口',type:'sport',players:340,tag:'',fav:false,bg:'#1a3a1a'},
{name:'海盜寶藏',type:'slot',players:560,tag:'new',fav:false,bg:'#2a2a3a'},
{name:'二十一點',type:'chess',players:410,tag:'',fav:false,bg:'#1a2a4a'},
{name:'星際探險',type:'slot',players:280,tag:'new',fav:false,bg:'#3a1a4a'},
{name:'捕魚達人',type:'fish',players:920,tag:'hot',fav:false,bg:'#1a3a4a'},
{name:'深海獵手',type:'fish',players:670,tag:'',fav:false,bg:'#2a3a1a'},
{name:'輪盤',type:'live',players:380,tag:'',fav:false,bg:'#4a1a2a'},
{name:'骰寶',type:'live',players:290,tag:'',fav:false,bg:'#1a4a2a'},
{name:'幸運777',type:'slot',players:1100,tag:'rec',fav:false,bg:'#3a2a2a'},
{name:'瘋狂水果機',type:'slot',players:750,tag:'',fav:false,bg:'#2a1a1a'},
{name:'三公',type:'chess',players:320,tag:'',fav:false,bg:'#1a1a2a'},
{name:'北京賽車',type:'lottery',players:180,tag:'',fav:false,bg:'#2a3a3a'},
{name:'炸金花',type:'chess',players:560,tag:'',fav:true,bg:'#3a3a1a'},
{name:'鬥地主',type:'chess',players:890,tag:'hot',fav:false,bg:'#1a2a3a'},
{name:'歐冠盤口',type:'sport',players:420,tag:'',fav:false,bg:'#2a1a3a'},
{name:'棒球盤口',type:'sport',players:210,tag:'',fav:false,bg:'#3a2a3a'},
{name:'黃金礦工',type:'fish',players:340,tag:'new',fav:false,bg:'#1a4a3a'},
{name:'龍王捕魚',type:'fish',players:510,tag:'',fav:false,bg:'#2a4a1a'},
{name:'六合彩',type:'lottery',players:150,tag:'',fav:false,bg:'#4a2a1a'},
{name:'快三',type:'lottery',players:230,tag:'',fav:false,bg:'#1a2a4a'}
];
let currentTab='all';
function getFiltered(){
  if(currentTab==='all') return gameData;
  if(currentTab==='fav') return gameData.filter(g=>g.fav);
  return gameData.filter(g=>g.type===currentTab);
}
function renderGames(){
  const games=getFiltered();
  document.getElementById('gameGrid').innerHTML=games.map((g,i)=>{
    const tagHTML=g.tag==='hot'?'<div class="game-tag tag-hot">HOT</div>':
      g.tag==='new'?'<div class="game-tag tag-new">NEW</div>':
      g.tag==='rec'?'<div class="game-tag tag-rec">推薦</div>':'';
    return `<div class="game-card" onclick="alert('啟動：${g.name}')">
      <div class="game-img"><div class="game-img-bg" style="width:100%;height:100%;background:linear-gradient(135deg,${g.bg},${g.bg}88)"></div></div>
      ${tagHTML}
      <div class="game-fav ${g.fav?'liked':''}" onclick="event.stopPropagation();toggleFav(${i})">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </div>
      <div class="game-info">
        <div class="game-name">${g.name}</div>
        <div class="game-players"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/></svg>${g.players.toLocaleString()}人</div>
      </div>
    </div>`;
  }).join('');
}
function switchTab(el,tab){
  document.querySelectorAll('.game-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab=tab;
  renderGames();
}
function toggleFav(idx){gameData[idx].fav=!gameData[idx].fav;renderGames();}
let slideIdx=0;
function goSlide(i){
  slideIdx=i;
  document.getElementById('bannerTrack').style.transform=`translateX(-${i*100}%)`;
  document.querySelectorAll('.banner-dots .dot').forEach((d,j)=>d.classList.toggle('active',j===i));
}
setInterval(()=>goSlide((slideIdx+1)%3),4000);
function openModal(id){alert('功能 Demo')}
renderGames();
</script>
</body>
</html>
