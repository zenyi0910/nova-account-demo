<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 娛樂城管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#fff;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid oklch(0.922 0 0);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid oklch(0.922 0 0);display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;cursor:pointer}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-sub{font-size:10px;color:#9CA3AF;font-weight:500}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E0E7FF;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#4338CA;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:#6B7280}
.user-chevron{width:14px;height:14px;color:#9CA3AF;transform:rotate(180deg);transition:transform .2s}
.sidebar-user.open .user-chevron{transform:rotate(0deg);color:#4338CA}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200;opacity:0;transform:translateX(-4px);transition:opacity .2s ease,transform .2s ease}
.sidebar-user.open .user-popover{display:block;opacity:1;transform:translateX(0)}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none;transition:background .15s}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid oklch(0.922 0 0);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.topbar-warning{margin-left:auto;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #F59E0B;border-radius:6px;background:#FFFBEB;font-size:12px;color:#92400E}
.topbar-warning svg{width:14px;height:14px;color:#F59E0B}
.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#6B7280}
.page-header h1{font-size:18px;font-weight:600;color:#111827}
.page-header .spacer{flex:1}

/* Tabs */
.hall-tabs{display:flex;gap:0;border-bottom:1px solid oklch(0.922 0 0);margin-bottom:20px}
.hall-tab{padding:10px 20px;font-size:13px;font-weight:500;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.hall-tab:hover{color:#374151}
.hall-tab.active{color:#393939;border-bottom-color:#393939;font-weight:600}
.hall-tab .tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#F3F4F6;font-size:10px;font-weight:600;color:#6B7280;margin-left:6px}
.hall-tab.active .tab-badge{background:#393939;color:#fff}

/* Hall Panel */
.hall-panel{display:none}
.hall-panel.active{display:block}

/* Info Banner */
.info-banner{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:rgba(57,57,57,0.03);border:1px solid oklch(0.922 0 0);border-radius:10px;margin-bottom:20px;font-size:12px;color:#475569}
.info-banner svg{width:16px;height:16px;color:#6B7280;flex-shrink:0;margin-top:1px}

/* Section Card */
.sect-card{background:#fff;border:1px solid oklch(0.922 0 0);border-radius:10px;padding:18px 20px;margin-bottom:16px}
.sect-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sect-header svg{width:16px;height:16px;color:#6B7280}
.sect-header h3{font-size:14px;font-weight:600;color:#111827}
.sect-header .spacer{flex:1}
.sect-header .badge-count{font-size:11px;background:#F3F4F6;color:#6B7280;padding:2px 8px;border-radius:4px;font-weight:500}

/* Toggle Switch */
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{position:relative;width:36px;height:20px;border-radius:10px;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:oklch(0.777 0.152 181.912)}
.toggle.off{background:#D1D5DB}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:18px}
.toggle.off::after{left:2px}
.toggle-text{font-size:12px;font-weight:500}
.toggle-text.on{color:oklch(0.704 0.14 182.503)}
.toggle-text.off{color:#9CA3AF}

/* Status */
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:500}
.status-badge.online{background:#DCFCE7;color:#166534}
.status-badge.maint{background:#FEF3C7;color:#92400E}
.status-badge.offline{background:#FEE2E2;color:#991B1B}
.status-badge.upcoming{background:#DBEAFE;color:#1E40AF}
.status-dot{width:6px;height:6px;border-radius:50%}
.status-dot.online{background:#16A34A}
.status-dot.maint{background:#D97706}
.status-dot.offline{background:#DC2626}
.status-dot.upcoming{background:#2563EB}

/* Buttons */
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn svg{width:14px;height:14px}
.btn-primary{background:#393939;color:#fff}
.btn-primary:hover{background:#1a1a1a}
.btn-outline{border:1px solid oklch(0.922 0 0);background:#fff;color:#374151}
.btn-outline:hover{background:#F9FAFB}
.btn-danger{border:1px solid #FCA5A5;background:#fff;color:#DC2626}
.btn-danger:hover{background:#FEF2F2}
.btn-success{border:1px solid #86EFAC;background:#fff;color:#059669}
.btn-success:hover{background:#F0FDF4}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-warn{border:1px solid #FDE68A;background:#FFFBEB;color:#92400E}
.btn-warn:hover{background:#FEF3C7}

/* Quick Actions Row */
.quick-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(57,57,57,0.03);border-radius:8px;margin-bottom:10px;flex-wrap:wrap}
.quick-row label{font-size:13px;color:#374151;font-weight:500;min-width:70px}
.quick-row .spacer{flex:1}

/* Schedule */
.sched-list{margin-top:10px}
.sched-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;margin-bottom:8px}
.sched-item svg{width:14px;height:14px;color:#D97706;flex-shrink:0}
.sched-info{flex:1;font-size:12px;color:#92400E}
.sched-time{font-weight:600}
.sched-action{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.sched-action.off{background:#FEE2E2;color:#991B1B}
.sched-action.on{background:#DCFCE7;color:#166534}
.sched-form{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;align-items:end;padding:12px 14px;background:#F9FAFB;border:1px solid oklch(0.922 0 0);border-radius:8px;margin-top:10px}
.sched-form .sf-group{display:flex;flex-direction:column;gap:3px}
.sched-form .sf-group label{font-size:11px;color:#6B7280;font-weight:500}
.sched-form .sf-group input,.sched-form .sf-group select{padding:6px 10px;border:1px solid oklch(0.922 0 0);border-radius:5px;font-size:12px;font-family:inherit}

/* Currency Inline */
.curr-section{margin-top:12px}
.curr-row{display:grid;grid-template-columns:80px 1fr 1fr 1fr auto;gap:10px;align-items:center;padding:10px 14px;border-radius:8px;margin-bottom:8px}
.curr-row.gold-row{background:rgba(217,119,6,0.04);border:1px solid rgba(217,119,6,0.15)}
.curr-row.star-row{background:rgba(124,58,237,0.04);border:1px solid rgba(124,58,237,0.15)}
.curr-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.curr-label .coin-dot{width:8px;height:8px;border-radius:50%}
.coin-dot.gold{background:#D97706}
.coin-dot.star{background:#7C3AED}
.curr-field{display:flex;flex-direction:column;gap:2px}
.curr-field label{font-size:10px;color:#6B7280}
.curr-field input{padding:5px 8px;border:1px solid oklch(0.922 0 0);border-radius:4px;font-size:12px;width:100%;font-family:inherit}
.curr-field input:focus{outline:none;border-color:#393939}
.curr-toggle{display:flex;align-items:center;gap:6px}

/* Game Table */
.game-table{width:100%;border-collapse:collapse}
.game-table th{background:rgba(57,57,57,0.05);padding:8px 12px;text-align:left;font-size:11px;font-weight:500;color:#393939;border-bottom:1px solid oklch(0.922 0 0)}
.game-table td{padding:8px 12px;border-bottom:1px solid oklch(0.922 0 0);font-size:12px;vertical-align:middle}
.game-table tr:last-child td{border-bottom:none}
.game-table tr:hover td{background:rgba(243,244,246,0.4)}
.game-name-link{color:oklch(0.546 0.245 262.881);font-weight:500;cursor:pointer}
.game-name-link:hover{text-decoration:underline}
.override-val{color:#D97706;font-weight:500}
.original-val{color:#9CA3AF;font-size:11px;text-decoration:line-through;margin-left:4px}

/* Override indicator */
.ov-indicator{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#D97706;background:#FFFBEB;padding:1px 6px;border-radius:3px;margin-left:6px}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:9999;transform:translateX(120%);opacity:0;transition:all .3s;visibility:hidden}
.toast.show{transform:translateX(0);opacity:1;visibility:visible}
.toast.success{background:#393939}
.toast.error{background:#DC2626}
.toast.warning{background:#D97706}

/* Responsive */
.sidebar-collapsed .sidebar{transform:translateX(-250px)}
.sidebar-collapsed .main{margin-left:0}
.sidebar{transition:transform .3s cubic-bezier(.25,.1,.25,1)}
.main{transition:margin-left .3s cubic-bezier(.25,.1,.25,1)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);position:fixed;z-index:100}
.sidebar.show{transform:translateX(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.main{margin-left:0}
.topbar{padding:0 12px}
.content{padding:12px}
.curr-row{grid-template-columns:1fr;gap:8px}
.sched-form{grid-template-columns:1fr 1fr;gap:8px}
.hall-tabs{overflow-x:auto}
}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>

<div class="main">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebarMobile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">遊戲管理</a><span class="sep">&gt;</span><span class="current">娛樂城管理</span></div>
    <div class="topbar-warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>提醒：資料與紀錄僅供測試用途</div>
  </div>
  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <h1>娛樂城管理</h1>
      <div class="spacer"></div>
      <button class="btn btn-outline" onclick="openGlobalModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>遊戲共用設定</button>
    </div>

    <!-- Priority Info -->
    <div class="info-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <div>設定優先順序：<strong>娛樂廳設定</strong>（最高）&gt; <strong>遊戲共用設定</strong>（基底）&gt; 遊戲原始值。廳級覆蓋不會修改遊戲本身的原始設定值，取消覆蓋後自動恢復。</div>
    </div>

    <!-- Hall Tabs -->
    <div class="hall-tabs" id="hallTabs"></div>
    <!-- Hall Panels -->
    <div id="hallPanels"></div>
  </div>
</div>

<!-- Global Settings Modal -->
<div class="modal-overlay" id="globalModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;width:90%;max-width:540px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid oklch(0.922 0 0)">
      <h3 style="font-size:15px;font-weight:600">遊戲共用設定（基底值）</h3>
      <button onclick="closeGlobalModal()" style="width:28px;height:28px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:18px;color:#6B7280">&times;</button>
    </div>
    <div style="padding:20px;overflow-y:auto;flex:1">
      <div style="padding:10px 12px;background:rgba(57,57,57,0.03);border:1px solid oklch(0.922 0 0);border-radius:6px;font-size:12px;color:#475569;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0;margin-top:1px;color:#6B7280"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>此為所有娛樂廳的基底設定。娛樂廳可個別覆蓋這些值，覆蓋後以廳級設定為準。</span>
      </div>
      <div id="globalFormContent"></div>
    </div>
    <div style="padding:14px 20px;border-top:1px solid oklch(0.922 0 0);display:flex;justify-content:flex-end;gap:8px">
      <button class="btn btn-outline" onclick="closeGlobalModal()">取消</button>
      <button class="btn btn-primary" onclick="saveGlobal()">儲存共用設定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === Data Model ===
const globalSettings = {
  gold: {enabled:true, min:10, max:100000, rate:'1:1'},
  star: {enabled:true, min:100, max:50000, rate:'10:1'},
  vipLimit: '不限制',
  gameStatus: '使用中'
};

const halls = [
  {
    id:'VA', name:'VA 娛樂城', status:'on',
    gold:{enabled:true, min:10, max:100000, rate:'1:1'},
    star:{enabled:true, min:100, max:50000, rate:'10:1'},
    schedules:[{action:'off',start:'2026-05-10T03:00',end:'2026-05-10T05:00',note:'例行維護'}],
    games:[

      {name:'財神倍倍發 X4096',cat:'電動',status:'即將上線',vip:'不限制',goldMin:10,goldMax:80000,starMin:100,starMax:40000},
      {name:'印加祖瑪 豪華版',cat:'電動',status:'停用中',vip:'不限制',goldMin:10,goldMax:50000,starMin:0,starMax:0},
      {name:'財富金幣',cat:'電動',status:'使用中',vip:'不限制',goldMin:10,goldMax:100000,starMin:100,starMax:50000},
      {name:'阿茲特克神話',cat:'電動',status:'使用中',vip:'不限制',goldMin:10,goldMax:100000,starMin:100,starMax:50000},
      {name:'自摸無雙 2',cat:'電動',status:'使用中',vip:'不限制',goldMin:5,goldMax:50000,starMin:50,starMax:25000},
      {name:'自摸無雙3',cat:'電動',status:'使用中',vip:'不限制',goldMin:5,goldMax:50000,starMin:50,starMax:25000},
      {name:'法老祕寶',cat:'電動',status:'使用中',vip:'不限制',goldMin:10,goldMax:80000,starMin:100,starMax:40000},
      {name:'印加女神',cat:'電動',status:'使用中',vip:'不限制',goldMin:10,goldMax:80000,starMin:100,starMax:40000},

// === Render ===
function renderAll(){renderTabs();renderPanels();}

function renderTabs(){
  const c=document.getElementById('hallTabs');
  c.innerHTML=halls.map((h,i)=>{
    const on=h.games.filter(g=>g.status==='使用中').length;
    return `<div class="hall-tab ${i===0?'active':''}" onclick="switchTab('${h.id}')">${h.name}<span class="tab-badge">${on}/${h.games.length}</span></div>`;
  }).join('');
}

function renderPanels(){
  const c=document.getElementById('hallPanels');
  c.innerHTML=halls.map((h,i)=>`<div class="hall-panel ${i===0?'active':''}" id="panel-${h.id}">${renderHall(h)}</div>`).join('');
}

function renderHall(hall){
  const sc=hall.status==='on'?'online':'offline';
  const st=hall.status==='on'?'運行中':'已關閉';

  // Schedule HTML
  let schedHtml='<div style="color:#9CA3AF;font-size:12px;padding:6px 0">尚無排程</div>';
  if(hall.schedules.length>0){
    schedHtml=hall.schedules.map((s,i)=>`
      <div class="sched-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div class="sched-info">
          <span class="sched-time">${fmtDT(s.start)}</span>
          ${s.end?' ~ <span class="sched-time">'+fmtDT(s.end)+'</span>':' (手動恢復)'}
          <span class="sched-action ${s.action}">${s.action==='off'?'關閉':'開啟'}</span>
          ${s.note?'<span style="margin-left:6px;color:#6B7280;font-style:italic">'+s.note+'</span>':''}
        </div>
        <button class="btn btn-sm btn-outline" onclick="delSched('${hall.id}',${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>`).join('');
  }

  // Games table
  const gamesHtml=hall.games.map(g=>{
    const goldOv=hall.gold.enabled&&(g.goldMin!==hall.gold.min||g.goldMax!==hall.gold.max);
    const starOv=hall.star.enabled&&g.starMin>0&&(g.starMin!==hall.star.min||g.starMax!==hall.star.max);
    const sb=g.status==='使用中'?'online':g.status==='維護中'?'maint':g.status==='停用中'?'offline':'upcoming';
    return `<tr>
      <td><span class="game-name-link">${g.name}</span></td>
      <td>${g.cat}</td>
      <td><span class="status-badge ${sb}"><span class="status-dot ${sb}"></span>${g.status}</span></td>
      <td>${g.vip}</td>
      <td>${goldOv?'<span class="override-val">$'+hall.gold.min.toLocaleString()+'~$'+hall.gold.max.toLocaleString()+'</span><span class="original-val">$'+g.goldMin.toLocaleString()+'~$'+g.goldMax.toLocaleString()+'</span>':'$'+g.goldMin.toLocaleString()+'~$'+g.goldMax.toLocaleString()}</td>
      <td>${g.starMin>0?(starOv?'<span class="override-val">$'+hall.star.min.toLocaleString()+'~$'+hall.star.max.toLocaleString()+'</span><span class="original-val">$'+g.starMin.toLocaleString()+'~$'+g.starMax.toLocaleString()+'</span>':'$'+g.starMin.toLocaleString()+'~$'+g.starMax.toLocaleString()):'<span style="color:#9CA3AF">-</span>'}</td>
    </tr>`;
  }).join('');

  return `
    <!-- Section 1: Status + Quick Toggle + Schedule (integrated) -->
    <div class="sect-card">
      <div class="sect-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <h3>廳狀態與開關控制</h3>
        <div class="spacer"></div>
        <span class="status-badge ${sc}"><span class="status-dot ${sc}"></span>${st}</span>
      </div>
      <!-- Quick toggle row -->
      <div class="quick-row">
        <label>即時開關</label>
        <div class="toggle-wrap">
          <button class="toggle ${hall.status}" onclick="toggleHall('${hall.id}')"></button>
          <span class="toggle-text ${hall.status}">${hall.status==='on'?'啟用':'停用'}</span>
        </div>
        <div class="spacer"></div>
        <button class="btn btn-sm ${hall.status==='on'?'btn-danger':'btn-success'}" onclick="toggleHall('${hall.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
          ${hall.status==='on'?'立即關閉':'立即開啟'}
        </button>
      </div>
      <!-- Inline schedule -->
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid oklch(0.922 0 0)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;color:#6B7280"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span style="font-size:13px;font-weight:600;color:#374151">排程開關</span>
          <span class="badge-count">${hall.schedules.length}</span>
        </div>
        <div class="sched-list">${schedHtml}</div>
        <div class="sched-form" id="schedForm-${hall.id}">
          <div class="sf-group"><label>動作</label><select id="sa-${hall.id}"><option value="off">關閉</option><option value="on">開啟</option></select></div>
          <div class="sf-group"><label>開始時間</label><input type="datetime-local" id="ss-${hall.id}"></div>
          <div class="sf-group"><label>結束時間</label><input type="datetime-local" id="se-${hall.id}"></div>
          <div class="sf-group"><label>備註</label><input type="text" id="sn-${hall.id}" placeholder="例：版本更新"></div>
          <button class="btn btn-sm btn-primary" onclick="addSched('${hall.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增</button>
        </div>
      </div>
    </div>

    <!-- Section 2: Currency Settings (inline, no modal) -->
    <div class="sect-card">
      <div class="sect-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 100 4h4a2 2 0 110 4H8"/><path d="M12 18V6"/></svg>
        <h3>幣種設定（廳級覆蓋）</h3>
        <div class="spacer"></div>
        <button class="btn btn-sm btn-outline" onclick="saveCurrency('${hall.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>儲存</button>
      </div>
      <div class="curr-section">
        <div class="curr-row gold-row">
          <div class="curr-label"><div class="coin-dot gold"></div>金幣</div>
          <div class="curr-field"><label>最低投注</label><input type="number" id="gm-${hall.id}" value="${hall.gold.min}"></div>
          <div class="curr-field"><label>最高投注</label><input type="number" id="gx-${hall.id}" value="${hall.gold.max}"></div>
          <div class="curr-field"><label>兌換比率</label><input type="text" id="gr-${hall.id}" value="${hall.gold.rate}"></div>
          <div class="curr-toggle"><button class="toggle ${hall.gold.enabled?'on':'off'}" onclick="toggleCurr('${hall.id}','gold')"></button><span class="toggle-text ${hall.gold.enabled?'on':'off'}">${hall.gold.enabled?'啟用':'停用'}</span></div>
        </div>
        <div class="curr-row star-row">
          <div class="curr-label"><div class="coin-dot star"></div>星幣</div>
          <div class="curr-field"><label>最低投注</label><input type="number" id="sm-${hall.id}" value="${hall.star.min}"></div>
          <div class="curr-field"><label>最高投注</label><input type="number" id="sx-${hall.id}" value="${hall.star.max}"></div>
          <div class="curr-field"><label>兌換比率</label><input type="text" id="sr-${hall.id}" value="${hall.star.rate}"></div>
          <div class="curr-toggle"><button class="toggle ${hall.star.enabled?'on':'off'}" onclick="toggleCurr('${hall.id}','star')"></button><span class="toggle-text ${hall.star.enabled?'on':'off'}">${hall.star.enabled?'啟用':'停用'}</span></div>
        </div>
      </div>
    </div>

    <!-- Section 3: Game List -->
    <div class="sect-card">
      <div class="sect-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <h3>廳內遊戲（${hall.games.length}）</h3>
        <div class="spacer"></div>
        <span style="font-size:11px;color:#6B7280">覆蓋值以橘色標示，刪除線為原始值</span>
      </div>
      <div style="overflow-x:auto">
        <table class="game-table">
          <thead><tr><th>遊戲名稱</th><th>種類</th><th>狀態</th><th>VIP限制</th><th>金幣投注範圍</th><th>星幣投注範圍</th></tr></thead>
          <tbody>${gamesHtml}</tbody>
        </table>
      </div>
    </div>`;
}


// === Interactions ===
function switchTab(id){
  document.querySelectorAll('.hall-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.hall-panel').forEach(p=>p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function toggleHall(id){
  const h=halls.find(x=>x.id===id);
  h.status=h.status==='on'?'off':'on';
  renderPanels();
  document.querySelectorAll('.hall-tab').forEach(t=>{if(t.textContent.includes(h.name))t.click();});
  showToast(h.name+(h.status==='on'?' 已開啟':' 已關閉'),h.status==='on'?'success':'warning');
}

function addSched(id){
  const h=halls.find(x=>x.id===id);
  const act=document.getElementById('sa-'+id).value;
  const start=document.getElementById('ss-'+id).value;
  const end=document.getElementById('se-'+id).value;
  const note=document.getElementById('sn-'+id).value;
  if(!start){showToast('請選擇開始時間','error');return;}
  h.schedules.push({action:act,start,end,note});
  renderPanels();
  switchToTab(id);
  showToast('排程已新增：'+h.name,'success');
}

function delSched(id,idx){
  const h=halls.find(x=>x.id===id);
  h.schedules.splice(idx,1);
  renderPanels();
  switchToTab(id);
  showToast('排程已刪除','warning');
}

function toggleCurr(id,type){
  const h=halls.find(x=>x.id===id);
  h[type].enabled=!h[type].enabled;
  renderPanels();
  switchToTab(id);
  showToast((type==='gold'?'金幣':'星幣')+(h[type].enabled?' 已啟用':' 已停用'),h[type].enabled?'success':'warning');
}

function saveCurrency(id){
  const h=halls.find(x=>x.id===id);
  h.gold.min=parseInt(document.getElementById('gm-'+id).value)||0;
  h.gold.max=parseInt(document.getElementById('gx-'+id).value)||0;
  h.gold.rate=document.getElementById('gr-'+id).value;
  h.star.min=parseInt(document.getElementById('sm-'+id).value)||0;
  h.star.max=parseInt(document.getElementById('sx-'+id).value)||0;
  h.star.rate=document.getElementById('sr-'+id).value;
  showToast('幣種設定已儲存：'+h.name,'success');
}

    <div style="margin-bottom:14px">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">
        <div><label style="font-size:11px;color:#6B7280;display:block;margin-bottom:3px">預設最低投注</label><input type="number" id="ggm" value="${globalSettings.gold.min}" style="width:100%;padding:6px 10px;border:1px solid oklch(0.922 0 0);border-radius:5px;font-size:12px"></div>
        <div><label style="font-size:11px;color:#6B7280;display:block;margin-bottom:3px">預設最高投注</label><input type="number" id="ggx" value="${globalSettings.gold.max}" style="width:100%;padding:6px 10px;border:1px solid oklch(0.922 0 0);border-radius:5px;font-size:12px"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

        <div><label style="font-size:11px;color:#6B7280;display:block;margin-bottom:3px">預設最高投注</label><input type="number" id="gsx" value="${globalSettings.star.max}" style="width:100%;padding:6px 10px;border:1px solid oklch(0.922 0 0);border-radius:5px;font-size:12px"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="font-size:11px;color:#6B7280;display:block;margin-bottom:3px">預設兌換比率</label><input type="text" id="gsr" value="${globalSettings.star.rate}" style="width:100%;padding:6px 10px;border:1px solid oklch(0.922 0 0);border-radius:5px;font-size:12px"></div>
        <div><label style="font-size:11px;color:#6B7280;display:block;margin-bottom:3px">預設狀態</label><select id="gss" style="width:100%;padding:6px 10px;border:1px solid oklch(0.922 0 0);border-radius:5px;font-size:12px"><option value="on" ${globalSettings.star.enabled?'selected':''}>啟用</option><option value="off" ${!globalSettings.star.enabled?'selected':''}>停用</option></select></div>
      </div>
    </div>`;
  document.getElementById('globalModal').style.display='flex';
}

function closeGlobalModal(){document.getElementById('globalModal').style.display='none';}

function saveGlobal(){
  globalSettings.gold.min=parseInt(document.getElementById('ggm').value)||0;
  globalSettings.gold.max=parseInt(document.getElementById('ggx').value)||0;
  globalSettings.gold.rate=document.getElementById('ggr').value;
  globalSettings.gold.enabled=document.getElementById('ggs').value==='on';
  globalSettings.star.min=parseInt(document.getElementById('gsm').value)||0;
  globalSettings.star.max=parseInt(document.getElementById('gsx').value)||0;
  globalSettings.star.rate=document.getElementById('gsr').value;
  globalSettings.star.enabled=document.getElementById('gss').value==='on';
  closeGlobalModal();
  showToast('遊戲共用設定已更新','success');
}

function switchToTab(id){
  document.querySelectorAll('.hall-tab').forEach((t,i)=>t.classList.toggle('active',halls[i].id===id));
  document.querySelectorAll('.hall-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

function fmtDT(dt){
  if(!dt)return '';
  const d=new Date(dt);
  return d.toLocaleDateString('zh-TW')+' '+d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type+' show';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.className='toast';},2500);
}

// Sidebar
function toggleSidebarMobile(){
  const isMobile=window.innerWidth<=768;
  if(isMobile){
    document.querySelector('.sidebar').classList.toggle('show');
    let ov=document.querySelector('.sidebar-overlay');
    if(!ov){ov=document.createElement('div');ov.className='sidebar-overlay';document.body.appendChild(ov);ov.addEventListener('click',function(){document.querySelector('.sidebar').classList.remove('show');ov.classList.remove('show');});}
    ov.classList.toggle('show');
  }else{
    document.body.classList.toggle('sidebar-collapsed');
  }
}
function toggleUserMenu(){const el=document.querySelector('.sidebar-user');el.classList.toggle('open');event.stopPropagation();}
document.addEventListener('click',function(e){const u=document.querySelector('.sidebar-user');if(u&&!u.contains(e.target))u.classList.remove('open');});
function toggleSub(id){const el=document.getElementById(id);el.classList.toggle('open');const chev=el.previousElementSibling?.querySelector('.sidebar-chevron');if(chev)chev.classList.toggle('open');}

// Init
renderAll();
