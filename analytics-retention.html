const maxDays=11;
function renderTable(){
  thead.innerHTML='<tr><th>註冊日期</th><th>NU (新增)</th>'+Array.from({length:maxDays},(_, i)=>`<th>Day +${i+1} R${i+1}</th>`).join('')+'</tr>';
  tbody.innerHTML='';
  data.forEach(r=>{
    const tr=document.createElement('tr');
    let cells=`<td>${r.date}</td><td>${r.nu}</td>`;
    for(let i=0;i<maxDays;i++){
      const v=r.days[i];
      if(v===null||v===undefined){cells+='<td>—</td>';}
      else{const h=heatColor(v);cells+=`<td style="background:${h.bg};color:${h.color}"><div style="font-weight:600">${v}%</div><div style="font-size:11px;opacity:.7">${r.counts[i]}</div></td>`;}
    }
    tr.innerHTML=cells;
    tbody.appendChild(tr);
  });
  // 平均留存率列（sticky）
  const avgTr=document.createElement('tr');
  avgTr.className='sticky-summary sticky-summary-avg';
  avgTr.style.fontWeight='600';avgTr.style.background='#F8FAFC';
  let html='<td style="background:#F8FAFC">平均</td><td style="background:#F8FAFC">'+Math.round(data.reduce((s,r)=>s+r.nu,0)/data.length)+'</td>';
  for(let i=0;i<maxDays;i++){
    const vals=data.map(r=>r.days[i]).filter(v=>v!==null&&v!==undefined);
    if(vals.length===0){html+='<td style="background:#F8FAFC">—</td>';}
    else{const avg=(vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1);const h=heatColor(parseFloat(avg));html+=`<td style="background:${h.bg||'#F8FAFC'};color:${h.color}">${avg}%</td>`;}
  }
  avgTr.innerHTML=html;tbody.appendChild(avgTr);
  // 總和列（sticky）
  const sumTr=document.createElement('tr');
  sumTr.className='sticky-summary sticky-summary-sum';
  sumTr.style.fontWeight='600';sumTr.style.background='#F1F5F9';
  let sumHtml='<td style="background:#F1F5F9">總和</td><td style="background:#F1F5F9">'+data.reduce((s,r)=>s+r.nu,0)+'</td>';
  for(let i=0;i<maxDays;i++){
    const vals=data.map(r=>r.counts&&r.counts[i]!==null&&r.counts[i]!==undefined?r.counts[i]:0);
    const hasData=data.some(r=>r.days[i]!==null&&r.days[i]!==undefined);
    sumHtml+=hasData?`<td style="background:#F1F5F9">${vals.reduce((s,v)=>s+v,0)}</td>`:'<td style="background:#F1F5F9">—</td>';
  }
  sumTr.innerHTML=sumHtml;tbody.appendChild(sumTr);
  // 更新筆數
  document.querySelector('.page-info-text').textContent='共 '+data.length+' 筆（含平均、總和共 '+(data.length+2)+' 列）';
}

document.getElementById('exportBtn').addEventListener('click',function(){
  const groupBy=document.getElementById('groupBySelect').value;
  const dateRange=document.querySelector('input[readonly]').value;
  const source=document.querySelector('select[multiple]').selectedOptions.length===1?'全部來源':'已選擇 '+document.querySelector('select[multiple]').selectedOptions.length+' 項';
  const platform=document.querySelectorAll('.filter-select')[1].value;
  
  let csv='留存率熱力圖報表 (Group by: '+groupBy+')\n';
  csv+='日期範圍: '+dateRange+' | 玩家來源: '+source+' | 裝置平台: '+platform+'\n\n';
  
  // 表頭
  csv+=',註冊日期';
  for(let i=1;i<=maxDays;i++)csv+=',Day +'+i+',,';
  csv+='\n,';
  for(let i=0;i<=maxDays;i++)csv+=',留存率,人數';
  csv+='\n';
  
  // 資料列
  data.forEach(r=>{
    csv+=r.date+','+r.nu;
    r.days.forEach((v,i)=>{
      if(v===null)csv+=',,-';
      else csv+=','+(v/100).toFixed(3)+','+r.counts[i];
    });
    csv+='\n';
  });
  
  // 加權平均列
  csv+='加權平均 / 總和,'+data.reduce((s,r)=>s+r.nu,0);
  for(let i=0;i<maxDays;i++){
    const colIdx=String.fromCharCode(67+i*2);
    csv+=',=SUM('+colIdx+(5)+':'+colIdx+(data.length+4)+')/B'+(data.length+5)+',=SUM('+colIdx+(5)+':'+colIdx+(data.length+4)+')';
  }
  
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download='留存率_'+groupBy+'_'+new Date().toISOString().slice(0,10)+'.csv';
  link.click();
});
