function renderTable(){
  thead.innerHTML='<tr><th>註冊日期</th><th>NU (新增)</th>'+Array.from({length:maxDays},(_, i)=>`<th>Day +${i+1}<span class="th-sub">R${i+1}</span></th>`).join('')+'</tr>';
  tbody.innerHTML='';
  const start=(currentPage-1)*perPage;
  const end=start+perPage;
  const pageData=data.slice(start,end);
  pageData.forEach(r=>{
    const tr=document.createElement('tr');
    let cells=`<td>${r.date}</td><td>${r.nu}</td>`;
    for(let i=0;i<maxDays;i++){
      const v=r.days[i];
      if(v===null||v===undefined){cells+='<td>—</td>';}
      else{const h=heatColor(v);cells+=`<td style="background:${h.bg};color:${h.color};cursor:pointer" onclick="showPlayerModal('${r.date}',${i+1},${r.counts[i]})"><div style="font-weight:600">${v}%</div><div style="font-size:11px;opacity:.7">${r.counts[i]}</div></td>`;}
    }
    tr.innerHTML=cells;
    tbody.appendChild(tr);
  });
  // 平均留存率列（sticky）
  const avgTr=document.createElement('tr');
  avgTr.className='sticky-summary sticky-summary-avg';
  avgTr.style.fontWeight='600';avgTr.style.background='#F8FAFC';
  let html='<td>平均</td><td>'+Math.round(data.reduce((s,r)=>s+r.nu,0)/data.length)+'</td>';
  for(let i=0;i<maxDays;i++){
    const vals=data.map(r=>r.days[i]).filter(v=>v!==null&&v!==undefined);
    if(vals.length===0){html+='<td>—</td>';}
    else{const avg=(vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1);html+=`<td>${avg}%</td>`;}
  }
  avgTr.innerHTML=html;tbody.appendChild(avgTr);
  // 總和列（sticky）
  const sumTr=document.createElement('tr');
  sumTr.className='sticky-summary sticky-summary-sum';
  sumTr.style.fontWeight='600';sumTr.style.background='#F1F5F9';
  let sumHtml='<td>總和</td><td>'+data.reduce((s,r)=>s+r.nu,0)+'</td>';
  for(let i=0;i<maxDays;i++){
    const vals=data.map(r=>r.counts&&r.counts[i]!==null&&r.counts[i]!==undefined?r.counts[i]:0);
    const hasData=data.some(r=>r.days[i]!==null&&r.days[i]!==undefined);
    sumHtml+=hasData?`<td>${vals.reduce((s,v)=>s+v,0)}</td>`:'<td>—</td>';
  }
  sumTr.innerHTML=sumHtml;tbody.appendChild(sumTr);
  // 更新分頁
  const totalPages=Math.ceil(data.length/perPage);
  document.querySelector('.page-info-text').textContent='共 '+data.length+' 筆';
  document.querySelector('.page-info-page').textContent='第 '+currentPage+' 頁 / '+totalPages+' 頁';
  const pageNav=document.querySelector('.page-nav');
  pageNav.innerHTML='';
  const btns=[
    {label:'«',page:1,disabled:currentPage===1},
    {label:'‹',page:currentPage-1,disabled:currentPage===1}
  ];
  const startPage=Math.max(1,currentPage-2);
  const endPage=Math.min(totalPages,currentPage+2);
  for(let i=startPage;i<=endPage;i++){
    btns.push({label:i,page:i,active:i===currentPage});
  }
  btns.push({label:'›',page:currentPage+1,disabled:currentPage===totalPages});
  btns.push({label:'»',page:totalPages,disabled:currentPage===totalPages});
  btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='page-btn'+(b.active?' active':'');
    btn.textContent=b.label;
    btn.disabled=b.disabled;
    if(!b.disabled&&!b.active)btn.onclick=()=>{currentPage=b.page;renderTable()};
    pageNav.appendChild(btn);
  });
}

function genPlayer(seed){
  const s=(seed*9301+49297)%233280;
  const idx=s%20;
  const vip=Math.floor((s%10)+1);
  const deposit=(Math.floor(s%50)+1)*1000;
  const acct='U'+String(100000+s%90000);
  return{acct,nick:fakeNicks[idx],vip:'VIP'+vip,deposit:deposit.toLocaleString()};
}

    btns.forEach(function(b){var btn=document.createElement('button');btn.textContent=b.l;btn.style.cssText='width:26px;height:26px;border:1px solid '+(b.a?'#2563EB':'#E5E7EB')+';border-radius:50%;background:'+(b.a?'#2563EB':'#fff')+';color:'+(b.a?'#fff':'#64748B')+';font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center';if(b.d)btn.disabled=true,btn.style.opacity='.4';else btn.onclick=function(){modalPage=b.p;renderModal()};pagerEl.appendChild(btn);});
  }
  window.exportPlayerCSV=function(){var csv='帳號,暱稱,VIP,累積儲值\n';for(var i=0;i<count;i++){var p=genPlayer(date.replace(/\//g,'')*1000+day*100+i);csv+=p.acct+','+p.nick+','+p.vip+','+p.deposit+'\n';}var blob=new Blob(['\uFEFF'+csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='留存玩家_'+date.replace(/\//g,'')+'_Day'+day+'.csv';a.click();};
  renderModal();
  overlay.style.display='flex';
}

document.getElementById('exportBtn').addEventListener('click',function(){
  const groupBy=document.getElementById('groupBySelect').value;
  const dateRange=document.querySelector('input[readonly]').value;
  const source=document.querySelector('select[multiple]').selectedOptions.length===1?'全部來源':'已選擇 '+document.querySelector('select[multiple]').selectedOptions.length+' 項';
  const platform=document.querySelectorAll('.filter-select')[1].value;
  
  let csv='留存率熱力圖報表 (Group by: '+groupBy+')\n';
  csv+='日期範圍: '+dateRange+' | 玩家來源: '+source+' | 裝置平台: '+platform+'\n\n';
  
  // 表頭
  csv+=',註冊日期';
  for(let i=1;i<=maxDays;i++)csv+=',Day +'+i+',,';
  csv+='\n,';
  for(let i=0;i<=maxDays;i++)csv+=',留存率,人數';
  csv+='\n';
  
  // 資料列
  data.forEach(r=>{
    csv+=r.date+','+r.nu;
    r.days.forEach((v,i)=>{
      if(v===null)csv+=',,-';
      else csv+=','+(v/100).toFixed(3)+','+r.counts[i];
    });
    csv+='\n';
  });
  
  // 加權平均列
  csv+='加權平均 / 總和,'+data.reduce((s,r)=>s+r.nu,0);
  for(let i=0;i<maxDays;i++){
    const colIdx=String.fromCharCode(67+i*2);
    csv+=',=SUM('+colIdx+(5)+':'+colIdx+(data.length+4)+')/B'+(data.length+5)+',=SUM('+colIdx+(5)+':'+colIdx+(data.length+4)+')';
  }
  
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download='留存率_'+groupBy+'_'+new Date().toISOString().slice(0,10)+'.csv';
  link.click();
});
</script>
</div>
</div>
