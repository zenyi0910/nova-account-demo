<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 遊戲共用設定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F8F9FB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid oklch(0.922 0 0);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden;transition:transform .3s}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid oklch(0.922 0 0);display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;cursor:pointer}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-sub{font-size:10px;color:#9CA3AF;font-weight:500}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .3s}
.topbar{background:#fff;border-bottom:1px solid oklch(0.922 0 0);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.topbar-toggle{background:none;border:none;cursor:pointer;color:#6B7280;padding:4px}
.topbar-toggle svg{width:20px;height:20px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.content{padding:24px;flex:1;max-width:1200px}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.page-header h4{font-size:18px;font-weight:600;color:#111827}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:4px;border:1px solid oklch(0.922 0 0);transition:all .15s}
.btn-add{background:oklch(0.777 0.152 181.912);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500}
.btn-add:hover{background:oklch(0.7 0.152 181.912)}
.btn-outline{background:#fff;color:#374151}
.btn-outline:hover{background:#F3F4F6}
.btn-dark{background:#393939;color:#fff;border:none}
.btn-dark:hover{background:#1a1a1a}
.table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.table-header .count{font-size:13px;color:#6B7280}
.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid oklch(0.922 0 0);border-radius:8px;overflow:hidden}
.data-table th{background:#FAFAFA;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;border-bottom:1px solid oklch(0.922 0 0)}
.data-table td{padding:10px 14px;border-bottom:1px solid oklch(0.95 0 0);font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#FAFBFC}
.tag-img{width:32px;height:32px;border-radius:6px;object-fit:cover;border:1px solid oklch(0.922 0 0)}
.btn-icon-action{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.btn-icon-action.edit{color:#2563EB}
.btn-icon-action.edit:hover{background:#EFF6FF}
.btn-icon-action.delete{color:#DC2626}
.btn-icon-action.delete:hover{background:#FEF2F2}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{padding:16px 20px;border-bottom:1px solid oklch(0.922 0 0);display:flex;align-items:center;gap:10px}
.modal-header h3{font-size:15px;font-weight:600;flex:1}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#6B7280;padding:4px 8px;border-radius:4px}
.modal-close:hover{background:#F3F4F6}
.modal-expand{background:none;border:none;font-size:16px;cursor:pointer;color:#6B7280;padding:4px 8px;border-radius:4px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid oklch(0.922 0 0);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.form-group input{width:100%;padding:8px 12px;border:1px solid oklch(0.922 0 0);border-radius:6px;font-size:13px;font-family:inherit}
.form-group input:focus{outline:none;border-color:#393939}
.upload-area{border:2px dashed oklch(0.85 0 0);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:border-color .2s}
.upload-area:hover{border-color:oklch(0.777 0.152 181.912)}
.upload-icon{color:oklch(0.777 0.152 181.912);margin-bottom:8px}
.upload-text{font-size:13px;color:oklch(0.6 0.1 181.912);font-weight:500;margin-bottom:4px}
.upload-hint{font-size:11px;color:#9CA3AF}
.upload-btn{margin-top:12px;padding:6px 14px;border:1px solid oklch(0.922 0 0);border-radius:6px;font-size:12px;background:#fff;cursor:pointer;font-family:inherit}
.btn-cancel{background:#8B7E2A;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500}
.btn-cancel:hover{background:#6F6520}
.toast{position:fixed;bottom:24px;right:24px;background:#1F2937;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="components/sidebar.js"></script>
<div class="main">
  <div class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebarMobile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg></button>
    <div class="breadcrumb"><a href="#">首頁</a><span class="sep">&gt;</span><a href="#">遊戲管理</a><span class="sep">&gt;</span><span class="current">遊戲共用設定</span></div>
  </div>
  <div class="content">
    <div class="page-header">
      <h4>遊戲共用設定</h4>
      <span style="flex:1"></span>
      <button class="btn-add" onclick="openAddIconModal()">+ 新增</button>
    </div>
    <div class="table-header">
      <span class="count">總共 <strong id="totalCount">8</strong> 筆資料</span>
    </div>
    <table class="data-table">
      <thead>
        <tr>
          <th style="width:60px">順序</th>
          <th style="width:60px">圖片</th>
          <th>標籤名稱</th>
          <th style="width:100px">操作</th>
        </tr>
      </thead>
      <tbody id="tagTableBody"></tbody>
    </table>
  </div>
</div>

<!-- Modal: Icon新增 -->
<div class="modal-overlay" id="addIconModal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3>遊戲共用設定 - Icon新增</h3>
      <button class="modal-expand">⤢</button>
      <button class="modal-close" onclick="closeModal('addIconModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Icon名稱 <span style="color:#EF4444">*</span></label>
        <input type="text" id="iconName" placeholder="請輸入Icon名稱">
      </div>
      <div class="form-group">
        <label>Logo圖片 <span style="color:#EF4444">*</span></label>
        <div class="upload-area" onclick="document.getElementById('iconFile').click()">
          <div class="upload-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="40" height="40"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
          <div class="upload-text">點擊或拖放圖片至此處</div>
          <div class="upload-hint">支援 JPG、PNG、GIF、WEBP 格式，最大 10MB</div>
          <button class="upload-btn" type="button">選擇圖片</button>
        </div>
        <input type="file" id="iconFile" accept="image/*" style="display:none">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('addIconModal')">取消</button>
      <button class="btn btn-dark" onclick="submitAddIcon()">+ 新增</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 標籤資料
const tags = [
  {name:'刮刮樂', img:'https://picsum.photos/seed/scratch/64/64'},
  {name:'連消', img:'https://picsum.photos/seed/chain/64/64'},
  {name:'推薦', img:'https://picsum.photos/seed/recommend/64/64'},
  {name:'星幣', img:'https://picsum.photos/seed/star/64/64'},
  {name:'最新', img:'https://picsum.photos/seed/new/64/64'},
  {name:'刮刮樂', img:'https://picsum.photos/seed/scratch2/64/64'},
  {name:'熱門', img:'https://picsum.photos/seed/hot/64/64'},
  {name:'限制', img:'https://picsum.photos/seed/limit/64/64'}
];

function renderTable() {
  const tbody = document.getElementById('tagTableBody');
  document.getElementById('totalCount').textContent = tags.length;
  tbody.innerHTML = tags.map((t, i) => 
    '<tr>' +
    '<td style="text-align:center;color:#6B7280">' + (i + 1) + '</td>' +
    '<td><img class="tag-img" src="' + t.img + '" alt="' + t.name + '"></td>' +
    '<td style="font-weight:500">' + t.name + '</td>' +
    '<td><div style="display:flex;gap:6px">' +
    '<button class="btn-icon-action edit" onclick="editTag(' + i + ')" title="編輯"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
    '<button class="btn-icon-action delete" onclick="deleteTag(' + i + ')" title="刪除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' +
    '</div></td>' +
    '</tr>'
  ).join('');
}

function openAddIconModal() {
  document.getElementById('addIconModal').classList.add('show');
  document.getElementById('iconName').value = '';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function submitAddIcon() {
  const name = document.getElementById('iconName').value.trim();
  if (!name) { showToast('請輸入 Icon 名稱', 'error'); return; }
  tags.push({name: name, img: 'https://picsum.photos/seed/' + name + '/64/64'});
  renderTable();
  closeModal('addIconModal');
  showToast('已新增「' + name + '」');
}

function editTag(idx) {
  const newName = prompt('修改標籤名稱：', tags[idx].name);
  if (newName && newName.trim()) {
    tags[idx].name = newName.trim();
    renderTable();
    showToast('已更新標籤');
  }
}

function deleteTag(idx) {
  if (confirm('確定要刪除「' + tags[idx].name + '」？')) {
    tags.splice(idx, 1);
    renderTable();
    showToast('已刪除標籤');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
renderTable();
</script>
</body>
</html>
