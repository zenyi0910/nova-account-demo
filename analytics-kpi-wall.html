<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時 KPI 牆 - Nova Analytics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F9FAFB;color:#1E293B;font-size:14px;line-height:1.5;min-height:100vh}
a{color:#3B82F6;text-decoration:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-right:1px solid rgba(148,163,184,.15);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10;transition:width .3s ease}
.sidebar.collapsed{width:60px}
.sidebar.collapsed .sidebar-logo-text{display:none}
.sidebar.collapsed .menu-item{justify-content:center;padding:12px 0;font-size:0;overflow:hidden}
.sidebar.collapsed .menu-item svg{font-size:initial;width:20px;height:20px}
.sidebar.collapsed .menu-item span{display:none}
.sidebar.collapsed .menu-group-title{display:none}
.sidebar.collapsed .sidebar-user-info{display:none}
.sidebar.collapsed .sidebar-user{justify-content:center;padding:12px 0}
.main.sidebar-collapsed{margin-left:60px}
.sidebar-logo{padding:16px 20px;border-bottom:1px solid rgba(148,163,184,.15);display:flex;align-items:center;gap:12px;position:relative}
.sidebar-logo-icon{width:40px;height:40px;flex-shrink:0}
.sidebar-logo-icon img{width:40px;height:40px;display:block}
.sidebar-logo-text{display:flex;flex-direction:column;line-height:1.2}
.sidebar-logo-text .logo-nova{font-size:20px;font-weight:700;background:linear-gradient(to right,#3B82F6,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-logo-text .logo-analytics{font-size:10px;font-weight:400;color:#94A3B8;letter-spacing:0.2em;text-transform:uppercase}
.sidebar-menu{flex:1;padding:12px 8px;overflow-y:auto}
.menu-group{padding:4px 0}
.menu-group-title{padding:8px 12px;font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.menu-item{display:flex;align-items:center;padding:9px 12px;color:#64748B;cursor:pointer;transition:all .2s;font-size:13px;gap:8px;border-radius:8px;margin:1px 0;border-left:3px solid transparent;text-decoration:none}
.menu-item:hover{background:rgba(59,130,246,.08);color:#334155;border-left-color:rgba(59,130,246,.3)}
.menu-item.active{background:rgba(59,130,246,.1);color:#3B82F6;font-weight:500;border-left-color:#3B82F6}
.menu-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:0;border-top:1px solid rgba(148,163,184,.15)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:all .2s}
.sidebar-user:hover{background:rgba(59,130,246,.06)}
.sidebar-user-info{flex:1;min-width:0}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column}
.topbar{height:56px;background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(148,163,184,.12);display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:5;gap:12px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#94A3B8}
.breadcrumb span.current{color:#1E293B;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.topbar-icon-btn{width:36px;height:36px;border:1px solid rgba(148,163,184,.15);border-radius:10px;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#64748B;transition:all .2s}
.topbar-icon-btn:hover{background:#fff;color:#334155;border-color:rgba(59,130,246,.3)}
.content{padding:28px;flex:1}
.card{background:rgba(255,255,255,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:16px;padding:24px;box-shadow:0 4px 12px rgba(0,0,0,.05);margin-bottom:20px}
.card-title{font-size:16px;font-weight:700;color:#0F172A;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:4px;height:20px;background:#2563EB;border-radius:2px}
.card-desc{font-size:13px;color:#64748B;margin-top:4px}
.filter-section{background:rgba(255,255,255,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:16px;padding:24px;box-shadow:0 4px 12px rgba(0,0,0,.05);margin-bottom:20px}
.filter-row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-label{font-size:12px;font-weight:500;color:#64748B}
.filter-input,.filter-select{padding:8px 14px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;outline:none;min-width:160px;background:#fff}
.filter-select{cursor:pointer}
.filter-input:focus,.filter-select:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid transparent;transition:all .2s;font-weight:500}
.btn-primary{background:#2563EB;color:#fff;border:none;font-weight:700}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:#fff;color:#64748B;border:1px solid #E5E7EB}
.btn-outline:hover{background:#F9FAFB}
.table-wrap{overflow-x:auto;border-radius:8px}
table{width:100%;border-collapse:collapse}
th{background:#F9FAFB;padding:12px 14px;text-align:left;font-size:12px;color:#64748B;font-weight:600;border-bottom:1px solid #E5E7EB;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid #F1F5F9;font-size:13px;color:#334155}
tr:hover td{background:rgba(59,130,246,.02)}
td a{color:#2563EB;font-weight:500}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:16px;font-size:13px;color:#64748B}
.page-btn{padding:6px 11px;border:1px solid #E5E7EB;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#64748B}
.page-btn.active{background:#2563EB;color:#fff;border-color:#2563EB}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.avatar{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#06B6D4);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.sidebar-collapse-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:28px;height:28px;background:#fff;border:1px solid #E5E7EB;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#94A3B8;transition:all .2s}
.sidebar-collapse-btn:hover{border-color:#3B82F6;color:#3B82F6}
.note{font-size:13px;color:#64748B;margin-top:12px;padding:12px 16px;background:rgba(241,245,249,.5);border-radius:8px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D0D5DD;border-radius:3px}
.mobile-menu-btn{display:none;width:36px;height:36px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;align-items:center;justify-content:center;cursor:pointer;color:#64748B;flex-shrink:0}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
@media(max-width:768px){html,body{overflow-x:hidden;max-width:100vw}.sidebar{width:240px;transform:translateX(-100%);position:fixed;z-index:100}.sidebar.mobile-open{transform:translateX(0)}.main{margin-left:0}.topbar{padding:0 16px}.content{padding:16px}.filter-row{flex-direction:column}.filter-input,.filter-select{width:100%}.mobile-menu-btn{display:flex}.table-wrap{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:calc(100vw - 32px)}table{min-width:600px}.filter-section{overflow:hidden}}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.kpi-card{background:rgba(255,255,255,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:16px;padding:24px;box-shadow:0 4px 12px rgba(0,0,0,.05)}
.kpi-card h3{font-size:13px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.kpi-value{font-size:36px;font-weight:700;color:#0F172A;margin-bottom:12px}
.kpi-unit{font-size:18px;color:#64748B;margin-left:4px}
.kpi-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.kpi-label{color:#64748B;min-width:40px}
.kpi-change{display:inline-flex;align-items:center;gap:4px;font-weight:600;font-size:12px}
.kpi-change.up{color:#10B981}
.kpi-change.down{color:#EF4444}
.kpi-chart{height:80px;margin-top:16px;border-radius:8px;overflow:hidden}
.kpi-chart svg{width:100%;height:100%;display:block}
@media(max-width:768px){.kpi-grid{grid-template-columns:1fr}}
.user-popover{display:none;position:fixed;left:248px;bottom:12px;background:#fff;border:1px solid rgba(148,163,184,.15);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.12);min-width:220px;z-index:100;overflow:hidden}
.user-popover.show{display:block}
.popover-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:#374151;cursor:pointer;transition:all .15s}
.popover-item:hover{background:#F3F4F6}
.popover-logout{color:#3B82F6}
.popover-divider{height:1px;background:#E5E7EB;margin:4px 0}
.popover-user{display:flex;align-items:center;gap:10px;padding:10px 16px}
.popover-avatar{width:32px;height:32px;border-radius:50%;background:#EAB308;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;flex-shrink:0}
.popover-user-info{display:flex;flex-direction:column}
.popover-user-name{font-size:13px;font-weight:600;color:#111827}
.popover-user-email{font-size:11px;color:#6B7280}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar" id="analyticsSidebar"></aside>
<script src="components/analytics-sidebar.js"></script>
<div class="main">
<div class="topbar"><button class="mobile-menu-btn" onclick="document.getElementById('analyticsSidebar').classList.add('mobile-open');document.getElementById('sidebarOverlay').classList.add('show')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
<div class="breadcrumb"><span>管理總覽</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg><span class="current">即時 KPI 牆</span></div>
<span style="font-size:12px;color:#94A3B8;margin-left:auto;margin-right:12px">自動刷新 <span style="color:#3B82F6;font-weight:600">16:14</span></span>
<div class="topbar-right">
<div class="topbar-icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></div>
<div class="topbar-icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>
</div>
</div>
<div class="content">
<div class="kpi-grid">
<div class="kpi-card">
<h3>GIFT</h3>
<div class="kpi-value">0</div>
<div class="kpi-row"><span class="kpi-label">金幣</span><span class="kpi-change down">0%</span></div>
<div class="kpi-row"><span class="kpi-label">星幣</span><span class="kpi-change down">0%</span></div>
<div class="kpi-chart"><svg viewBox="0 0 200 60" preserveAspectRatio="none"><path d="M0 55 L30 50 L60 52 L90 48 L120 45 L150 42 L170 40 L200 38" fill="none" stroke="#3B82F6" stroke-width="2"/><path d="M0 55 L30 50 L60 52 L90 48 L120 45 L150 42 L170 40 L200 38 L200 60 L0 60Z" fill="url(#blueGrad)" opacity=".3"/><defs><linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/></linearGradient></defs></svg></div>
</div>
<div class="kpi-card">
<h3>REVENUE 營收</h3>
<div class="kpi-value">5,755</div>
<div class="kpi-row"><span class="kpi-label">金幣</span><span class="kpi-change up">100%</span></div>
<div class="kpi-row"><span class="kpi-label">星幣</span><span class="kpi-change down">0%</span></div>
<div class="kpi-chart"><svg viewBox="0 0 200 60" preserveAspectRatio="none"><path d="M0 50 L30 45 L60 40 L90 35 L120 25 L150 20 L170 15 L200 10" fill="none" stroke="#10B981" stroke-width="2"/><path d="M0 50 L30 45 L60 40 L90 35 L120 25 L150 20 L170 15 L200 10 L200 60 L0 60Z" fill="url(#greenGrad)" opacity=".3"/><defs><linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/></linearGradient></defs></svg></div>
</div>
<div class="kpi-card">
<h3>RTP 殺率</h3>
<div class="kpi-value">108<span class="kpi-unit">%</span></div>
<div class="kpi-row"><span class="kpi-change up">108%</span></div>
<div class="kpi-chart"><svg viewBox="0 0 200 60" preserveAspectRatio="none"><path d="M0 30 L30 35 L60 28 L90 32 L120 25 L150 30 L170 28 L200 26" fill="none" stroke="#F59E0B" stroke-width="2"/><path d="M0 30 L30 35 L60 28 L90 32 L120 25 L150 30 L170 28 L200 26 L200 60 L0 60Z" fill="url(#amberGrad)" opacity=".2"/><defs><linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/></linearGradient></defs></svg></div>
</div>
<div class="kpi-card">
<h3>PU 付費用戶</h3>
<div class="kpi-value">12</div>
<div class="kpi-row"><span class="kpi-change up">100%</span></div>
<div class="kpi-chart"><svg viewBox="0 0 200 60" preserveAspectRatio="none"><path d="M0 55 L30 50 L60 45 L90 40 L120 30 L150 25 L170 20 L200 15" fill="none" stroke="#8B5CF6" stroke-width="2"/><path d="M0 55 L30 50 L60 45 L90 40 L120 30 L150 25 L170 20 L200 15 L200 60 L0 60Z" fill="url(#purpleGrad)" opacity=".2"/><defs><linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/></linearGradient></defs></svg></div>
</div>
<div class="kpi-card">
<h3>NU 新註冊</h3>
<div class="kpi-value">23</div>
<div class="kpi-row"><span class="kpi-change up">15%</span></div>
<div class="kpi-chart"><svg viewBox="0 0 200 60" preserveAspectRatio="none"><path d="M0 45 L30 42 L60 38 L90 40 L120 35 L150 30 L170 28 L200 22" fill="none" stroke="#06B6D4" stroke-width="2"/><path d="M0 45 L30 42 L60 38 L90 40 L120 35 L150 30 L170 28 L200 22 L200 60 L0 60Z" fill="url(#cyanGrad)" opacity=".2"/><defs><linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/></linearGradient></defs></svg></div>
</div>
<div class="kpi-card">
<h3>LU 登入用戶</h3>
<div class="kpi-value">156</div>
<div class="kpi-row"><span class="kpi-change up">8%</span></div>
<div class="kpi-chart"><svg viewBox="0 0 200 60" preserveAspectRatio="none"><path d="M0 40 L30 38 L60 35 L90 30 L120 28 L150 25 L170 22 L200 18" fill="none" stroke="#EC4899" stroke-width="2"/><path d="M0 40 L30 38 L60 35 L90 30 L120 28 L150 25 L170 22 L200 18 L200 60 L0 60Z" fill="url(#pinkGrad)" opacity=".2"/><defs><linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EC4899"/><stop offset="100%" stop-color="#EC4899" stop-opacity="0"/></linearGradient></defs></svg></div>
</div>
</div>
</div>
</div>
</div>
</body>
