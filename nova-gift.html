<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>贈禮 — 星運娛樂城</title>
<link rel="stylesheet" href="css/frontend.css">
</head>
<body>
<div class="mobile-frame">
<div class="subpage-overlay" onclick="if(event.target===this)window.location.href='nova-lobby.html'">
<div class="subpage-dialog">
<div class="subpage-header">
<h2>贈禮</h2>
</div>
<div class="subpage-tabs">
<button class="active" onclick="switchTab(this)">贈禮</button>
<button onclick="switchTab(this)">贈禮中心</button>
<button onclick="switchTab(this)">贈禮紀錄</button>
</div>
<div class="gift-section">
<p class="gift-desc">贈送金幣給其他會員</p>
<div class="gift-form" style="padding:16px">
<div style="margin-bottom:12px">
<label style="color:rgba(255,255,255,.7);font-size:12px;display:block;margin-bottom:4px">收禮人帳號</label>
<input type="text" placeholder="輸入對方帳號" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#fff;font-size:14px">
</div>
<div style="margin-bottom:12px">
<label style="color:rgba(255,255,255,.7);font-size:12px;display:block;margin-bottom:4px">贈送金額</label>
<input type="number" placeholder="輸入金幣數量" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#fff;font-size:14px">
</div>
<p style="color:rgba(255,255,255,.4);font-size:11px;margin-bottom:16px">手續費 5%，最低贈送 100 金幣</p>
<button style="width:100%;padding:12px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">確認贈送</button>
</div>
</div>
<div class="subpage-bottom-close"><button onclick="window.location.href='nova-lobby.html'">關閉</button></div>
</div>
</div>
</div>
<script>
function switchTab(el){document.querySelectorAll('.subpage-tabs button').forEach(b=>b.classList.remove('active'));el.classList.add('active')}
</script>
</body>
</html>
