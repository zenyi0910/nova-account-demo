<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>星運娛樂城 - 贈禮</title>
<link rel="stylesheet" href="css/frontend.css">
<style>
.gift-tabs{display:flex;gap:0;background:#fff;border-radius:12px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.gift-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer}
.gift-tab.active{background:#991b1b;color:#fff}
.gift-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px}
.gift-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#fbbf24,#f59e0b);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gift-icon svg{width:24px;height:24px;color:#78350f}
.gift-info{flex:1}
.gift-info h4{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:2px}
.gift-info p{font-size:11px;color:#64748b}
.gift-btn{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border-radius:16px;padding:8px 14px;font-size:11px;font-weight:600;white-space:nowrap}
.gift-btn.claimed{background:#e2e8f0;color:#94a3b8}
.gift-empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:13px}
</style>
</head>
<body>
<header class="header">
<div class="header-left">
<button style="display:flex" onclick="window.location.href='nova-lobby.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
<span style="color:#fff;font-size:16px;font-weight:700;margin-left:8px">贈禮</span>
</div>
<div class="header-right">
<div class="coin-display">
<div class="coin-icon"><svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="10" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/><text x="12" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">$</text></svg></div>
<div class="coin-amount"><span>7,459</span></div>
</div>
</div>
</header>

<div class="page-container">
<div class="page-content">

<div class="gift-tabs">
<button class="gift-tab active">可領取</button>
<button class="gift-tab">已領取</button>
<button class="gift-tab">贈送紀錄</button>
</div>

<div class="gift-card">
<div class="gift-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg></div>
<div class="gift-info"><h4>每日登入禮</h4><p>金幣 x 100</p></div>
<button class="gift-btn">領取</button>
</div>

<div class="gift-card">
<div class="gift-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/></svg></div>
<div class="gift-info"><h4>VIP3 專屬禮包</h4><p>金幣 x 500 + 經驗值 x 200</p></div>
<button class="gift-btn">領取</button>
</div>

<div class="gift-card">
<div class="gift-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg></div>
<div class="gift-info"><h4>新手七日禮</h4><p>第3天：金幣 x 300</p></div>
<button class="gift-btn">領取</button>
</div>

<div class="gift-card">
<div class="gift-icon" style="background:linear-gradient(135deg,#94a3b8,#64748b)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/></svg></div>
<div class="gift-info"><h4>連續登入獎勵</h4><p>已連續登入 5 天</p></div>
<button class="gift-btn claimed">已領取</button>
</div>

</div>
</div>

<!-- Footer -->
<footer class="footer-fixed">
<div class="footer-inner" style="background-image:url('assets/footer_bg.png')">
<button class="footer-btn" onclick="window.location.href='nova-lobby.html'"><img src="assets/icon_other.png" alt="其他" class="footer-icon"><span>其他</span></button>
<button class="footer-btn" onclick="window.location.href='nova-leaderboard.html'"><img src="assets/icon_ranking.png" alt="排行榜" class="footer-icon"><span>排行榜</span></button>
<button class="footer-btn footer-btn-store" onclick="window.location.href='nova-shop.html'"><img src="assets/icon_store_2.png" alt="商城" class="footer-icon-store"><span>商城</span></button>
<button class="footer-btn" onclick="window.location.href='nova-gift.html'"><img src="assets/icon_gift.png" alt="贈禮" class="footer-icon"><span>贈禮</span></button>
<button class="footer-btn" onclick="window.location.href='nova-guild.html'"><img src="assets/icon_guild.png" alt="公會" class="footer-icon"><span>公會</span></button>
</div>
</footer>
</body>
</html>
