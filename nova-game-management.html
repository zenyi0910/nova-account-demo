<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 測試後台 - 遊戲維護設定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:rgb(249,249,249);color:#393939;font-size:14px;display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:250px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;height:100vh;position:fixed;top:0;left:0;z-index:100;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #e5e7eb}
.sidebar-logo .logo-icon{width:32px;height:32px;background:#393939;border-radius:8px;display:flex;align-items:center;justify-content:center}
.sidebar-logo .logo-icon svg{width:18px;height:18px;fill:#fff}
.sidebar-logo .logo-text{font-size:14px;font-weight:600;color:#393939}
.sidebar-logo .logo-sub{font-size:11px;color:#999;margin-left:4px}
.sidebar-group{padding:12px 0 0}
.sidebar-group-title{font-size:11px;color:#999;padding:0 20px 8px;font-weight:500}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:#393939;text-decoration:none;font-size:13px;transition:background .15s}
.sidebar-item:hover{background:#f5f5f5}
.sidebar-item svg{width:18px;height:18px;opacity:.6;flex-shrink:0}
.sidebar-item .arrow{margin-left:auto;transition:transform .2s}
.sidebar-item .arrow.open{transform:rotate(90deg)}
.sidebar-submenu{display:none;padding-left:28px}
.sidebar-submenu.open{display:block}
.sidebar-submenu a{display:block;padding:8px 20px;font-size:13px;color:#666;text-decoration:none;transition:background .15s}
.sidebar-submenu a:hover{background:#f5f5f5}
.sidebar-submenu a.active{background:#ece9e6;color:#393939;font-weight:500}
.sidebar-user{margin-top:auto;border-top:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;gap:10px}
.sidebar-user .avatar{width:32px;height:32px;background:#e5e7eb;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#666}
.sidebar-user .user-info{flex:1}
.sidebar-user .user-name{font-size:13px;font-weight:500}
.sidebar-user .user-role{font-size:11px;color:#999}

/* Main */
.main{margin-left:250px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;padding:12px 24px;border-bottom:1px solid #e5e7eb;background:#fff}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;margin-right:12px}
.hamburger svg{width:20px;height:20px;color:#393939}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#999}
.breadcrumb a{color:#999;text-decoration:none}
.breadcrumb a:hover{color:#393939}
.breadcrumb .sep{color:#ccc}
.breadcrumb .current{color:#393939}
.warning-bar{background:#fff8e1;color:#b45309;font-size:12px;padding:6px 24px;border-bottom:1px solid #e5e7eb}

.content{padding:24px;flex:1}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.page-header svg{width:20px;height:20px;color:#393939}
.page-header h4{font-size:16px;font-weight:600;color:#393939}

/* Maintenance banner */
.maint-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px}
.maint-banner .maint-left{display:flex;align-items:center;gap:12px}
.maint-banner .maint-icon{font-size:24px;flex-shrink:0}
.maint-banner .maint-title{font-size:14px;font-weight:600;color:#dc2626}
.maint-banner .maint-desc{font-size:12px;color:#666;margin-top:2px}
.btn-danger{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:500}
.btn-danger:hover{opacity:.85}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;width:fit-content}
.tab{padding:8px 24px;font-size:13px;cursor:pointer;background:#fff;border:none;color:#666;font-weight:500;transition:all .15s}
.tab.active{background:#393939;color:#fff}
.tab:not(.active):hover{background:#f5f5f5}

/* Filter */
.filter-bar{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filter-group label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.filter-group .input-wrap{position:relative}
.filter-group .input-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#999}
.filter-group input{padding:8px 12px 8px 32px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;width:200px;outline:none}
.filter-group input:focus{border-color:#999}
.filter-group select{padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;width:160px;outline:none;background:#fff;color:#393939;appearance:auto}
.btn-search{display:flex;align-items:center;gap:6px;background:#393939;color:#f5f5f5;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-weight:500}
.btn-search svg{width:14px;height:14px}
.btn-reset{background:#ededed;color:#393939;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer}
.btn-adv{display:flex;align-items:center;gap:4px;background:none;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;color:#666}
.btn-adv svg{width:12px;height:12px;transition:transform .2s}
.btn-adv.open svg{transform:rotate(180deg)}

/* Advanced filter */
.adv-filter{display:none;margin-bottom:16px;padding:16px;background:#fafafa;border:1px solid #e5e7eb;border-radius:8px}
.adv-filter.show{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}

/* Pagination info */
.pagination-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:12px;color:#666}
.page-size{display:flex;align-items:center;gap:6px}
.page-size select{border:1px solid #e5e7eb;border-radius:6px;padding:4px 8px;font-size:12px;outline:none}

/* Table */
.table-wrap{background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
table{width:100%;border-collapse:collapse}
th{background:rgba(57,57,57,.05);color:#393939;font-size:12px;font-weight:500;padding:0 12px;height:40px;text-align:left;white-space:nowrap}
td{font-size:14px;padding:12px;height:49px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
.link{color:#2563eb;cursor:pointer;text-decoration:none}
.link:hover{text-decoration:underline}
.text-muted{color:#999}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-active{background:#dcfce7;color:#16a34a}
.badge-inactive{background:#fee2e2;color:#dc2626}
.badge-recommend{background:#dbeafe;color:#2563eb}

/* Action buttons */
.action-btns{display:flex;gap:4px;align-items:center}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;transition:background .15s}
.btn-icon:hover{background:#f5f5f5}
.btn-icon svg{width:16px;height:16px;color:#666}
.btn-more{position:relative}
.btn-more-menu{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:120px;z-index:10;padding:4px 0}
.btn-more-menu.show{display:block}
.btn-more-menu a{display:block;padding:8px 16px;font-size:13px;color:#393939;text-decoration:none;cursor:pointer}
.btn-more-menu a:hover{background:#f5f5f5}
.btn-more-menu a.text-red{color:#dc2626}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:16px 0}
.pagination button{min-width:32px;height:32px;border:1px solid #e5e7eb;background:#fff;border-radius:6px;cursor:pointer;font-size:13px;color:#393939;display:flex;align-items:center;justify-content:center}
.pagination button:hover{background:#f5f5f5}
.pagination button.active{background:#393939;color:#fff;border-color:#393939}
.pagination button:disabled{opacity:.4;cursor:default}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #e5e7eb}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;padding:4px}
.modal-close svg{width:20px;height:20px;color:#666}
.modal-body{padding:24px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid #e5e7eb}
.btn-cancel{background:#ededed;color:#393939;border:none;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer}
.btn-save{background:#393939;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#393939}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none}
.form-row textarea{resize:vertical;min-height:60px}
.form-row .toggle-row{display:flex;align-items:center;gap:12px}
.toggle{position:relative;width:32px;height:18px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:9px;transition:.2s}
.toggle .slider:before{content:'';position:absolute;height:14px;width:14px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:#393939}
.toggle input:checked+.slider:before{transform:translateX(14px)}

/* Detail grid */
.detail-grid{display:grid;grid-template-columns:120px 1fr;gap:8px;font-size:13px}
.detail-grid .label{color:#999}
.detail-grid .value{font-weight:500}

/* RWD */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:99}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0}
  .hamburger{display:flex}
  .filter-bar{flex-direction:column;align-items:stretch}
  .filter-group input,.filter-group select{width:100%}
  .table-wrap{overflow-x:auto}
  table{min-width:800px}
  .maint-banner{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><text x="4" y="18" font-size="16" fill="white" font-weight="bold">N</text></svg></div>
    <div><span class="logo-text">Nova</span><span class="logo-sub">測試後台</span></div>
  </div>

  <div class="sidebar-group">
    <div class="sidebar-group-title">開發工具</div>
    <a class="sidebar-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>UI 元件</a>
  </div>
  <div class="sidebar-group">
    <div class="sidebar-group-title">首頁</div>
    <a class="sidebar-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>首頁</a>
  </div>

  <div class="sidebar-group">
    <div class="sidebar-group-title">前台管理</div>
    <div class="sidebar-item" onclick="toggleSubmenu('game')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>遊戲管理
      <svg class="arrow open" id="arrow-game" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="sidebar-submenu open" id="sub-game">
      <a href="#">遊戲共用設定</a>
      <a href="#" class="active">遊戲維護設定</a>
      <a href="#">遊戲推薦設定</a>
      <a href="#">遊戲排序</a>
      <a href="#">轉帳額度確認</a>
    </div>
    <div class="sidebar-item" onclick="toggleSubmenu('content')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>內容發布
      <svg class="arrow" id="arrow-content" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="sidebar-submenu" id="sub-content">
      <a href="#">輪播管理</a><a href="#">公告管理</a><a href="#">彈窗管理</a>
    </div>
    <div class="sidebar-item" onclick="toggleSubmenu('user')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4-4v2"/><circle cx="12" cy="7" r="4"/></svg>用戶管理
      <svg class="arrow" id="arrow-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="sidebar-submenu" id="sub-user">
      <a href="#">用戶列表</a>
    </div>
  </div>

  <div class="sidebar-group">
    <div class="sidebar-group-title">後台管理</div>
    <div class="sidebar-item" onclick="toggleSubmenu('perm')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>權限設定
      <svg class="arrow" id="arrow-perm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="sidebar-submenu" id="sub-perm">
      <a href="nova-admin-roles.html">角色設定</a>
      <a href="nova-admin-users.html">帳號設定</a>
    </div>
  </div>

  <div class="sidebar-user">
    <div class="avatar">一</div>
    <div class="user-info">
      <div class="user-name">一般管理員</div>
      <div class="user-role">admin</div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="header">
    <button class="hamburger" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    <div class="breadcrumb">
      <a href="#">首頁</a><span class="sep">/</span>
      <a href="#">遊戲管理</a><span class="sep">/</span>
      <span class="current">遊戲維護設定</span>
    </div>
  </div>
  <div class="warning-bar">⚠ 提醒：資料與紀錄僅供測試用途</div>

  <div class="content">
    <div class="page-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
      <h4>遊戲維護設定</h4>
    </div>

    <!-- Maintenance banner -->
    <div class="maint-banner">
      <div class="maint-left">
        <div class="maint-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div>
          <div class="maint-title">全廳維護控制</div>
          <div class="maint-desc">此操作將批次變更所選娛樂城內所有遊戲的維護狀態</div>
        </div>
      </div>
      <button class="btn-danger" onclick="openModal('maintModal')">設定娛樂城維護</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'gold')">金幣</button>
      <button class="tab" onclick="switchTab(this,'star')">星幣</button>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>遊戲名稱</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="搜尋遊戲名稱...">
        </div>
      </div>
      <div class="filter-group">
        <label>狀態</label>
        <select id="statusFilter"><option value="">選擇狀態</option><option>使用中</option><option>停用中</option><option>維護中</option></select>
      </div>
      <div class="filter-group">
        <label>種類</label>
        <select id="typeFilter"><option value="">選擇種類</option><option>電動</option><option>真人</option><option>體育</option><option>棋牌</option><option>彩票</option></select>
      </div>
      <button class="btn-search" onclick="doSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>搜尋</button>
      <button class="btn-reset" onclick="doReset()">重置</button>
      <button class="btn-adv" id="advBtn" onclick="toggleAdv()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>進階篩選</button>
    </div>

    <div class="adv-filter" id="advFilter">
      <div class="filter-group"><label>娛樂城</label><select><option value="">全部</option><option>VA</option><option>VB</option></select></div>
      <div class="filter-group"><label>VIP 等級</label><select><option value="">不限</option><option>VIP 1</option><option>VIP 2</option><option>VIP 3</option></select></div>
      <div class="filter-group"><label>標籤</label><select><option value="">全部</option><option>推薦</option><option>熱門</option><option>新遊戲</option></select></div>
    </div>

    <div class="pagination-info">
      <span id="pageInfo">第 1 頁，共 20 筆資料</span>
      <div class="page-size">每頁顯示 <select id="pageSize"><option>20</option><option>50</option><option>100</option></select> 筆</div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>序號</th><th>標籤</th><th>娛樂城</th><th>種類</th><th>遊戲名稱</th><th>狀態</th><th>VIP 等級以上</th><th>操作</th><th>備註</th>
        </tr></thead>
        <tbody id="gameTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h3 id="detailTitle">遊戲詳情</h3><button class="modal-close" onclick="closeModal('detailModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('detailModal')">關閉</button><button class="btn-save" onclick="editFromDetail()">編輯</button></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header"><h3 id="editTitle">編輯遊戲</h3><button class="modal-close" onclick="closeModal('editModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body" id="editBody"></div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('editModal')">取消</button><button class="btn-save" onclick="closeModal('editModal')">儲存</button></div>
  </div>
</div>

<!-- Maintenance Modal -->
<div class="modal-overlay" id="maintModal">
  <div class="modal" style="max-width:450px">
    <div class="modal-header"><h3>設定娛樂城維護</h3><button class="modal-close" onclick="closeModal('maintModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="form-row"><label>選擇娛樂城</label><select style="width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px"><option>VA</option><option>VB</option><option>全部</option></select></div>
      <div class="form-row"><label>維護狀態</label>
        <div class="toggle-row"><label class="toggle"><input type="checkbox"><span class="slider"></span></label><span style="font-size:13px">開啟維護模式</span></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('maintModal')">取消</button><button class="btn-danger" onclick="closeModal('maintModal')">確認設定</button></div>
  </div>
</div>

<script>
const games = [
  {id:1,tag:'-',casino:'VA',type:'電動',name:'埃及三秘寶',status:'使用中',vip:'不限制',note:''},
  {id:2,tag:'-',casino:'VA',type:'電動',name:'財神倍倍發 X4096',status:'使用中',vip:'不限制',note:''},
  {id:3,tag:'推薦',casino:'VA',type:'電動',name:'印加祖瑪 豪華版',status:'停用中',vip:'不限制',note:''},
  {id:4,tag:'-',casino:'VA',type:'電動',name:'財富金幣',status:'使用中',vip:'不限制',note:''},
  {id:5,tag:'-',casino:'VA',type:'電動',name:'阿茲特克神話',status:'使用中',vip:'不限制',note:''},
  {id:6,tag:'熱門',casino:'VA',type:'真人',name:'百家樂 A廳',status:'使用中',vip:'VIP 1',note:'高流量'},
  {id:7,tag:'-',casino:'VA',type:'真人',name:'龍虎鬥',status:'使用中',vip:'不限制',note:''},
  {id:8,tag:'-',casino:'VA',type:'體育',name:'足球盤口',status:'使用中',vip:'不限制',note:''},
  {id:9,tag:'新遊戲',casino:'VA',type:'電動',name:'寶石之王 Deluxe',status:'使用中',vip:'不限制',note:'5月上線'},
  {id:10,tag:'-',casino:'VA',type:'棋牌',name:'德州撲克',status:'使用中',vip:'VIP 2',note:''},
  {id:11,tag:'-',casino:'VB',type:'電動',name:'水果派對',status:'使用中',vip:'不限制',note:''},
  {id:12,tag:'-',casino:'VB',type:'電動',name:'金龍獻瑞',status:'維護中',vip:'不限制',note:'排程維護'},
  {id:13,tag:'推薦',casino:'VB',type:'真人',name:'百家樂 B廳',status:'使用中',vip:'不限制',note:''},
  {id:14,tag:'-',casino:'VA',type:'彩票',name:'時時彩',status:'停用中',vip:'不限制',note:'已下架'},
  {id:15,tag:'-',casino:'VA',type:'電動',name:'麻將胡了',status:'使用中',vip:'不限制',note:''},
  {id:16,tag:'熱門',casino:'VA',type:'電動',name:'甜蜜蜜糖果屋',status:'使用中',vip:'不限制',note:''},
  {id:17,tag:'-',casino:'VB',type:'體育',name:'籃球盤口',status:'使用中',vip:'VIP 1',note:''},
  {id:18,tag:'-',casino:'VA',type:'電動',name:'海盜寶藏',status:'使用中',vip:'不限制',note:''},
  {id:19,tag:'-',casino:'VA',type:'棋牌',name:'二十一點',status:'維護中',vip:'不限制',note:'系統升級'},
  {id:20,tag:'新遊戲',casino:'VB',type:'電動',name:'星際探險',status:'使用中',vip:'不限制',note:'即將上線'}
];

let filtered = [...games];
let currentPage = 1;
let pageSize = 20;
let currentGame = null;
let openMenuId = null;

function statusBadge(s){
  if(s==='使用中') return '<span class="badge badge-active">使用中</span>';
  if(s==='停用中') return '<span class="badge badge-inactive">停用中</span>';
  return '<span class="badge" style="background:#fef3c7;color:#b45309">維護中</span>';
}
function tagBadge(t){
  if(t==='-') return '<span class="text-muted">-</span>';
  if(t==='推薦') return '<span class="badge badge-recommend">推薦</span>';
  if(t==='熱門') return '<span class="badge" style="background:#fce7f3;color:#db2777">熱門</span>';
  return '<span class="badge" style="background:#e0e7ff;color:#4f46e5">'+t+'</span>';
}

function renderTable(){
  const start=(currentPage-1)*pageSize;
  const page=filtered.slice(start,start+pageSize);
  document.getElementById('gameTableBody').innerHTML=page.map(g=>`<tr>
    <td>${g.id}</td>
    <td>${tagBadge(g.tag)}</td>
    <td>${g.casino}</td>
    <td>${g.type}</td>
    <td><span class="link" onclick="showDetail(${g.id})">${g.name}</span></td>
    <td>${statusBadge(g.status)}</td>
    <td>${g.vip}</td>
    <td><div class="action-btns">
      <button class="btn-icon" title="編輯" onclick="showEdit(${g.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <div class="btn-more"><button class="btn-icon" onclick="toggleMenu(event,${g.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
      <div class="btn-more-menu" id="menu-${g.id}"><a onclick="toggleStatus(${g.id})">${g.status==='使用中'?'停用':'啟用'}</a><a onclick="setMaint(${g.id})">設為維護</a><a class="text-red" onclick="closeMenu()">取消</a></div></div>
    </div></td>
    <td>${g.note||'<span class="text-muted">-</span>'}</td>
  </tr>`).join('');
  document.getElementById('pageInfo').textContent=`第 ${currentPage} 頁，共 ${filtered.length} 筆資料`;
  renderPagination();
}

function renderPagination(){
  const total=Math.ceil(filtered.length/pageSize)||1;
  const el=document.getElementById('pagination');
  let h=`<button ${currentPage<=1?'disabled':''} onclick="goPage(${currentPage-1})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>`;
  for(let i=1;i<=total;i++) h+=`<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  h+=`<button ${currentPage>=total?'disabled':''} onclick="goPage(${currentPage+1})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>`;
  el.innerHTML=h;
}
function goPage(p){currentPage=p;renderTable();}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const st=document.getElementById('statusFilter').value;
  const tp=document.getElementById('typeFilter').value;
  filtered=games.filter(g=>{
    if(q&&!g.name.toLowerCase().includes(q)) return false;
    if(st&&g.status!==st) return false;
    if(tp&&g.type!==tp) return false;
    return true;
  });
  currentPage=1;renderTable();
}
function doReset(){
  document.getElementById('searchInput').value='';
  document.getElementById('statusFilter').value='';
  document.getElementById('typeFilter').value='';
  filtered=[...games];currentPage=1;renderTable();
}

function showDetail(id){
  const g=games.find(x=>x.id===id);if(!g)return;
  currentGame=g;
  document.getElementById('detailTitle').textContent=g.name;
  document.getElementById('detailBody').innerHTML=`<div class="detail-grid">
    <span class="label">序號</span><span class="value">${g.id}</span>
    <span class="label">標籤</span><span class="value">${g.tag}</span>
    <span class="label">娛樂城</span><span class="value">${g.casino}</span>
    <span class="label">種類</span><span class="value">${g.type}</span>
    <span class="label">遊戲名稱</span><span class="value">${g.name}</span>
    <span class="label">狀態</span><span class="value">${g.status}</span>
    <span class="label">VIP 等級</span><span class="value">${g.vip}</span>
    <span class="label">備註</span><span class="value">${g.note||'-'}</span>
  </div>`;
  openModal('detailModal');
}
function editFromDetail(){closeModal('detailModal');if(currentGame)showEdit(currentGame.id);}

function showEdit(id){
  const g=games.find(x=>x.id===id);if(!g)return;
  currentGame=g;
  document.getElementById('editTitle').textContent='編輯 - '+g.name;
  document.getElementById('editBody').innerHTML=`
    <div class="form-row"><label>遊戲名稱</label><input value="${g.name}"></div>
    <div class="form-row"><label>狀態</label><select><option ${g.status==='使用中'?'selected':''}>使用中</option><option ${g.status==='停用中'?'selected':''}>停用中</option><option ${g.status==='維護中'?'selected':''}>維護中</option></select></div>
    <div class="form-row"><label>VIP 等級以上</label><select><option ${g.vip==='不限制'?'selected':''}>不限制</option><option ${g.vip==='VIP 1'?'selected':''}>VIP 1</option><option ${g.vip==='VIP 2'?'selected':''}>VIP 2</option><option ${g.vip==='VIP 3'?'selected':''}>VIP 3</option></select></div>
    <div class="form-row"><label>標籤</label><select><option ${g.tag==='-'?'selected':''}>-</option><option ${g.tag==='推薦'?'selected':''}>推薦</option><option ${g.tag==='熱門'?'selected':''}>熱門</option><option ${g.tag==='新遊戲'?'selected':''}>新遊戲</option></select></div>
    <div class="form-row"><label>備註</label><textarea>${g.note||''}</textarea></div>`;
  openModal('editModal');
}

function toggleMenu(e,id){
  e.stopPropagation();
  closeMenu();
  const m=document.getElementById('menu-'+id);
  if(m){m.classList.add('show');openMenuId=id;}
}
function closeMenu(){
  if(openMenuId){const m=document.getElementById('menu-'+openMenuId);if(m)m.classList.remove('show');openMenuId=null;}
}
function toggleStatus(id){const g=games.find(x=>x.id===id);if(g)g.status=g.status==='使用中'?'停用中':'使用中';closeMenu();renderTable();}
function setMaint(id){const g=games.find(x=>x.id===id);if(g)g.status='維護中';closeMenu();renderTable();}

document.addEventListener('click',closeMenu);

function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

function switchTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  // Demo: just visual switch
}

function toggleAdv(){
  const f=document.getElementById('advFilter');
  const b=document.getElementById('advBtn');
  f.classList.toggle('show');b.classList.toggle('open');
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function toggleSubmenu(key){
  document.getElementById('sub-'+key).classList.toggle('open');
  document.getElementById('arrow-'+key).classList.toggle('open');
}

document.getElementById('pageSize').addEventListener('change',function(){
  pageSize=parseInt(this.value);currentPage=1;renderTable();
});

renderTable();
</script>
</body>
</html>
