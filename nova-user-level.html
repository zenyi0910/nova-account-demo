<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 用戶層級</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#f5c842,#e8a020);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;min-width:18px;min-height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item:hover{color:#111827}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;position:relative}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-chevron{width:14px;height:14px;color:#9CA3AF;margin-left:auto;flex-shrink:0}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200}
.sidebar-user.open .user-popover{display:block}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}

.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.content{padding:24px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:#111827}
.page-subtitle{font-size:13px;color:#6B7280;margin-top:2px}
.header-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#2BB5A0;color:#fff}
.btn-primary:hover{opacity:.85}
.btn-outline{background:#fff;color:#374151;border:1px solid #D0D5DD}
.btn-outline:hover{background:#F9FAFB}
.btn-danger{background:#EF4444;color:#fff}
.btn-danger:hover{opacity:.85}

.filter-section{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:16px;background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.06)}
.filter-input{padding:8px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;height:36px;min-width:200px}
.filter-select{padding:8px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;height:36px;background:#fff;cursor:pointer}

.card{background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);overflow:hidden}
.data-table{width:100%;border-collapse:collapse}
.data-table th{background:#F8FAFC;padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:#64748B;white-space:nowrap;border-bottom:1px solid #E5E7EB}
.data-table td{padding:12px 16px;border-bottom:1px solid #F1F5F9;font-size:13px;color:#374151;white-space:nowrap}
.data-table tr:hover td{background:#F8FAFC}
.badge-safe{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;background:#DCFCE7;color:#16A34A}
.badge-danger{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;background:#FEE2E2;color:#DC2626}
.badge-default{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;background:#E0F2FE;color:#0284C7}
.op-btn{padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#374151;transition:all .15s}
.op-btn:hover{background:#F3F4F6}
.op-btn.safe{color:#16A34A;border-color:#BBF7D0}
.op-btn.safe:hover{background:#F0FDF4}
.op-btn.danger{color:#DC2626;border-color:#FECACA}
.op-btn.danger:hover{background:#FEF2F2}
.sort-handle{cursor:grab;color:#9CA3AF;font-size:16px}
.member-count{color:#2563EB;cursor:pointer;text-decoration:underline}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:560px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #E5E7EB}
.modal-title{font-size:16px;font-weight:700;color:#111827}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:#F3F4F6;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B7280}
.modal-close:hover{background:#E5E7EB}
.modal-body{padding:24px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid #E5E7EB}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border:1px solid #E5E7EB;border-radius:8px;font-size:14px}
.form-input:focus{outline:none;border-color:#2BB5A0;box-shadow:0 0 0 3px rgba(43,181,160,.1)}

/* Detail view */
.detail-banner{padding:16px 24px;border-radius:10px;display:flex;align-items:center;gap:10px;margin-bottom:20px}
.detail-banner.safe{background:linear-gradient(90deg,#DCFCE7,#F0FDF4)}
.detail-banner.danger{background:linear-gradient(90deg,#FEE2E2,#FEF2F2)}
.detail-banner svg{width:20px;height:20px}
.detail-banner .text{font-size:14px;font-weight:500}
.detail-banner .toggle-link{color:#0EA5E9;font-size:13px;cursor:pointer;margin-left:8px}
.detail-banner .toggle-link:hover{text-decoration:underline}

.detail-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.detail-table th{background:#F8FAFC;padding:10px 16px;text-align:left;font-size:12px;font-weight:600;color:#64748B;border-bottom:1px solid #E5E7EB;white-space:nowrap}
.detail-table td{padding:10px 16px;border-bottom:1px solid #F1F5F9;font-size:13px}
.detail-actions{display:flex;gap:8px;margin-bottom:20px}
.pagination{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 16px;font-size:13px;color:#6B7280}
.page-btn{width:32px;height:32px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.page-btn.active{background:#2563EB;color:#fff;border-color:#2563EB}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb">
      <a href="#">營運管理</a><span class="sep">/</span>
      <a href="#">用戶管理</a><span class="sep">/</span>
      <span class="current">用戶層級</span>
    </div>
  </div>
  <div class="content" id="mainContent">
    <!-- LIST VIEW -->
    <div id="listView">
      <div class="page-header">
        <div>
          <div class="page-title">用戶層級管理</div>
          <div class="page-subtitle">共 <span id="totalCount">5</span> 個層級</div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="openAddModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>新增層級</button>
          <button class="btn btn-outline" onclick="toggleSortMode()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg><span id="sortBtnText">儲存排序</span></button>
        </div>
      </div>
      <div class="filter-section">
        <input type="text" class="filter-input" placeholder="搜尋層級名稱..." id="searchInput" oninput="filterTable()">
        <select class="filter-select" id="statusFilter" onchange="filterTable()">
          <option value="">全部狀態</option>
          <option value="safe">安全</option>
          <option value="danger">危險</option>
        </select>
      </div>
      <div class="card">
        <table class="data-table" id="levelTable">
          <thead>
            <tr>
              <th style="width:50px">排序</th>
              <th>層級名稱</th>
              <th>狀態</th>
              <th>會員數</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailView" style="display:none">
      <div class="page-header">
        <div>
          <div class="page-title"><span id="detailTitle">層級名稱</span></div>
          <div class="page-subtitle">會員層級 <span id="detailBadge"></span></div>
        </div>
        <div class="header-actions">
          <button class="btn btn-outline" onclick="showListView()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>返回列表</button>
        </div>
      </div>
      <div id="detailBanner"></div>
      <div class="detail-actions">
        <button class="btn btn-outline" onclick="openEditFromDetail()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>編輯</button>
        <button class="btn btn-outline" onclick="exportMembers()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>匯出名單</button>
        <button class="btn btn-outline" onclick="openImportModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>批次匯入</button>
        <button class="btn btn-outline" onclick="openAddMemberModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>手動新增</button>
      </div>
      <div class="filter-section" style="margin-bottom:12px">
        <input type="text" class="filter-input" placeholder="搜尋帳號或暱稱..." id="memberSearch" oninput="filterMembers()">
      </div>
      <div class="card">
        <table class="detail-table" id="memberTable">
          <thead><tr><th>帳號</th><th>暱稱</th><th>加入時間</th><th>操作</th></tr></thead>
          <tbody id="memberBody"></tbody>
        </table>
        <div class="pagination">
          <span>共 <span id="memberTotal">0</span> 筆</span>
          <button class="page-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/><path d="M7 6v12"/></svg></button>
          <button class="page-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
          <button class="page-btn active">1</button>
          <button class="page-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg></button>
          <button class="page-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/><path d="M17 6v12"/></svg></button>
        </div>
      </div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid #E5E7EB">
        <button class="btn btn-danger" id="deleteBtn" onclick="deleteLevelFromDetail()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>刪除此層級</button>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新增層級</div>
      <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">層級名稱</label>
        <input type="text" class="form-input" id="levelNameInput" placeholder="請輸入層級名稱">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addModal')">取消</button>
      <button class="btn btn-primary" onclick="saveLevel()">儲存</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">批次匯入名單</div>
      <button class="modal-close" onclick="closeModal('importModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">匯入方式</label>
        <p style="font-size:12px;color:#6B7280;margin-bottom:8px">支援 CSV / Excel，或貼上帳號（一行一筆）</p>
        <textarea class="form-input" style="height:120px;resize:vertical" placeholder="player001&#10;player002&#10;player003"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('importModal')">取消</button>
      <button class="btn btn-primary" onclick="doImport()">匯入</button>
    </div>
  </div>
</div>

<!-- Add Member Modal -->
<div class="modal-overlay" id="addMemberModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">手動新增玩家</div>
      <button class="modal-close" onclick="closeModal('addMemberModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">玩家帳號</label>
        <input type="text" class="form-input" placeholder="請輸入玩家帳號">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addMemberModal')">取消</button>
      <button class="btn btn-primary" onclick="doAddMember()">新增</button>
    </div>
  </div>
</div>

<script src="components/sidebar.js"></script>
<script>

const levels = [
  {id:1, name:'預設', status:'safe', members:162353, isDefault:true, sort:1},
  {id:2, name:'VVIP', status:'safe', members:128, isDefault:false, sort:2},
  {id:3, name:'貴賓', status:'safe', members:544, isDefault:false, sort:3},
  {id:4, name:'高風險', status:'danger', members:12, isDefault:false, sort:4},
  {id:5, name:'觀察中', status:'danger', members:3, isDefault:false, sort:5}
];

const mockMembers = [
  {account:'player001', nickname:'小明', joinedAt:'2026-06-01 14:30'},
  {account:'player002', nickname:'阿華', joinedAt:'2026-06-02 09:15'},
  {account:'player003', nickname:'大雄', joinedAt:'2026-06-03 11:20'},
  {account:'player004', nickname:'靜香', joinedAt:'2026-06-05 16:45'},
  {account:'player005', nickname:'胖虎', joinedAt:'2026-06-08 08:00'},
  {account:'player006', nickname:'小夫', joinedAt:'2026-06-10 13:22'},
  {account:'player007', nickname:'哆啦', joinedAt:'2026-06-12 10:10'},
  {account:'player008', nickname:'出木杉', joinedAt:'2026-06-15 19:30'}
];

let currentDetailId = null;
let editingId = null;

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const statusF = document.getElementById('statusFilter').value;
  const filtered = levels.filter(l => {
    if (search && !l.name.toLowerCase().includes(search)) return false;
    if (statusF && l.status !== statusF) return false;
    return true;
  });
  document.getElementById('totalCount').textContent = filtered.length;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map(l => `
    <tr data-id="${l.id}">
      <td><span class="sort-handle">⠿</span> ${l.sort}</td>
      <td>${l.name}${l.isDefault ? ' <span class="badge-default">預設</span>' : ''}</td>
      <td>${l.status === 'safe' ? '<span class="badge-safe"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>安全</span>' : '<span class="badge-danger"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>危險</span>'}</td>
      <td><span class="member-count" onclick="showDetail(${l.id})">${l.members.toLocaleString()}</span></td>
      <td>
        <button class="op-btn" onclick="showDetail(${l.id})">檢視</button>
        <button class="op-btn" onclick="openEditModal(${l.id})">編輯</button>
        ${l.status === 'safe' ? `<button class="op-btn danger" onclick="toggleStatus(${l.id})">設為危險</button>` : `<button class="op-btn safe" onclick="toggleStatus(${l.id})">設為安全</button>`}
      </td>
    </tr>
  `).join('');
}

function filterTable() { renderTable(); }

function toggleStatus(id) {
  const l = levels.find(x => x.id === id);
  if (!l) return;
  const newStatus = l.status === 'safe' ? '危險' : '安全';
  if (confirm(`確定將「${l.name}」設為${newStatus}等級？\n${l.status === 'safe' ? '該層級所有玩家將無法進行贈禮交易。' : '該層級所有玩家將恢復正常交易。'}`)) {
    l.status = l.status === 'safe' ? 'danger' : 'safe';
    renderTable();
    if (currentDetailId === id) renderDetail(id);
  }
}

function showDetail(id) {
  currentDetailId = id;
  document.getElementById('listView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  renderDetail(id);
}

function renderDetail(id) {
  const l = levels.find(x => x.id === id);
  if (!l) return;
  document.getElementById('detailTitle').textContent = l.name;
  document.getElementById('detailBadge').innerHTML = l.isDefault ? '<span class="badge-default">預設層級</span>' : '';
  const banner = document.getElementById('detailBanner');
  if (l.status === 'safe') {
    banner.innerHTML = `<div class="detail-banner safe"><svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span class="text" style="color:#16A34A">此為安全等級</span><span class="toggle-link" onclick="toggleStatus(${l.id})">設為危險等級</span></div>`;
  } else {
    banner.innerHTML = `<div class="detail-banner danger"><svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="text" style="color:#DC2626">此為危險等級（無法贈禮）</span><span class="toggle-link" onclick="toggleStatus(${l.id})">設為安全等級</span></div>`;
  }
  document.getElementById('memberTotal').textContent = mockMembers.length;
  renderMembers();
  // Delete button logic
  const deleteBtn = document.getElementById('deleteBtn');
  if (l.isDefault) {
    deleteBtn.disabled = true;
    deleteBtn.title = '預設層級不可刪除';
    deleteBtn.style.opacity = '0.5';
    deleteBtn.style.cursor = 'not-allowed';
  } else {
    deleteBtn.disabled = false;
    deleteBtn.title = '';
    deleteBtn.style.opacity = '1';
    deleteBtn.style.cursor = 'pointer';
  }
}

function renderMembers() {
  const search = (document.getElementById('memberSearch').value || '').toLowerCase();
  const filtered = mockMembers.filter(m => {
    if (search && !m.account.includes(search) && !m.nickname.includes(search)) return false;
    return true;
  });
  document.getElementById('memberBody').innerHTML = filtered.map(m => `
    <tr>
      <td style="color:#2563EB">${m.account}</td>
      <td>${m.nickname}</td>
      <td>${m.joinedAt}</td>
      <td><button class="op-btn danger" onclick="removeMember('${m.account}')">移除</button></td>
    </tr>
  `).join('');
  document.getElementById('memberTotal').textContent = filtered.length;
}

function filterMembers() { renderMembers(); }

function removeMember(account) {
  if (confirm(`確定將 ${account} 從此層級移除？`)) {
    const idx = mockMembers.findIndex(m => m.account === account);
    if (idx > -1) mockMembers.splice(idx, 1);
    renderMembers();
  }
}

function showListView() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
  currentDetailId = null;
  renderTable();
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增層級';
  document.getElementById('levelNameInput').value = '';
  document.getElementById('addModal').classList.add('open');
}

function openEditModal(id) {
  editingId = id;
  const l = levels.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = '編輯層級';
  document.getElementById('levelNameInput').value = l.name;
  document.getElementById('addModal').classList.add('open');
}

function openEditFromDetail() {
  if (currentDetailId) openEditModal(currentDetailId);
}

function saveLevel() {
  const name = document.getElementById('levelNameInput').value.trim();
  if (!name) { alert('請輸入層級名稱'); return; }
  if (editingId) {
    const l = levels.find(x => x.id === editingId);
    l.name = name;
  } else {
    levels.push({id: Date.now(), name, status:'safe', members:0, isDefault:false, sort: levels.length+1});
  }
  closeModal('addModal');
  renderTable();
  if (currentDetailId) renderDetail(currentDetailId);
}

function deleteLevelFromDetail() {
  const l = levels.find(x => x.id === currentDetailId);
  if (!l) return;
  if (l.isDefault) { alert('預設層級不可刪除'); return; }
  if (l.members > 0) { alert('已有用戶參照此設定，不可刪除'); return; }
  if (confirm(`確定刪除「${l.name}」？此操作無法復原。`)) {
    const idx = levels.findIndex(x => x.id === currentDetailId);
    levels.splice(idx, 1);
    showListView();
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openImportModal() { document.getElementById('importModal').classList.add('open'); }
function openAddMemberModal() { document.getElementById('addMemberModal').classList.add('open'); }

function doImport() {
  alert('匯入完成：成功 3 筆、重複 0 筆、失敗 0 筆');
  closeModal('importModal');
}
function doAddMember() {
  alert('新增成功');
  closeModal('addMemberModal');
}
function exportMembers() { alert('已匯出 CSV 檔案'); }
function toggleSortMode() { alert('排序已儲存'); }

// Init
renderTable();
</script>
</body>
</html>
