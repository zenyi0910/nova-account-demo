<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova 後台 - 用戶層級</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#F9FAFB;color:#1F2937;font-size:14px;display:flex;min-height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow:hidden}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#f5c842,#e8a020);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo-text .logo-name{font-size:15px;font-weight:700;color:#111827}
.logo-text .logo-sub{font-size:11px;color:#6B7280}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-group{padding:4px 8px}
.sidebar-group-label{font-size:11px;font-weight:600;color:#9CA3AF;padding:16px 10px 6px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#374151;font-size:14px;transition:background .15s;text-decoration:none;min-height:38px}
.sidebar-item:hover{background:#F3F4F6}
.sidebar-item.active{background:#EEF2FF;font-weight:600;color:#4338CA}
.sidebar-item svg{width:18px;height:18px;min-width:18px;min-height:18px;color:#6B7280;flex-shrink:0}
.sidebar-chevron{margin-left:auto;color:#9CA3AF;transition:transform .2s}
.sidebar-chevron.open{transform:rotate(90deg)}
.sidebar-sub{padding-left:14px;overflow:hidden;max-height:0;opacity:0;transition:max-height .4s cubic-bezier(.25,.1,.25,1),opacity .3s ease .05s}
.sidebar-sub.open{max-height:400px;opacity:1}
.sidebar-sub .sidebar-item{font-size:14px;padding:10px 12px;min-height:38px;color:#4B5563}
.sidebar-sub .sidebar-item:hover{color:#111827}
.sidebar-sub .sidebar-item.active{background:#EEF2FF;color:#4338CA;font-weight:600}
.sidebar-user{padding:12px 16px;border-top:1px solid #E5E7EB;display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;position:relative}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#E5E7EB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#6B7280}
.user-info .user-name{font-size:12px;font-weight:500;color:#374151}
.user-info .user-role{font-size:11px;color:#6B7280}
.user-chevron{width:14px;height:14px;color:#9CA3AF;margin-left:auto;flex-shrink:0}
.user-popover{display:none;position:fixed;bottom:16px;left:258px;width:220px;background:#fff;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05);padding:12px;z-index:200}
.sidebar-user.open .user-popover{display:block}
.user-popover-header{display:flex;align-items:center;gap:10px;padding:4px 0 8px}
.user-popover .user-avatar{width:36px;height:36px;font-size:14px}
.user-popover-info{display:flex;flex-direction:column}
.user-popover-name{font-size:13px;font-weight:600;color:#111827}
.user-popover-sub{font-size:11px;color:#6B7280}
.user-popover-divider{height:1px;background:#E5E7EB;margin:4px 0 8px}
.user-popover-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;font-size:13px;color:#374151;text-decoration:none}
.user-popover-item:hover{background:#F3F4F6}
.user-popover-item svg{width:16px;height:16px;color:#6B7280}

.main{margin-left:250px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7280}
.breadcrumb a{color:#6B7280;text-decoration:none}
.breadcrumb .sep{color:#D1D5DB}
.breadcrumb .current{color:#374151;font-weight:500}
.content{padding:24px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:#111827}
.page-subtitle{font-size:13px;color:#6B7280;margin-top:2px}
.header-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#2BB5A0;color:#fff}
.btn-primary:hover{opacity:.85}
.btn-outline{background:#fff;color:#374151;border:1px solid #E5E7EB}
.btn-outline:hover{background:#F9FAFB}
.btn-danger{background:#EF4444;color:#fff}
.btn-danger:hover{opacity:.85}
.btn-search{background:#393939;color:#fff;border:none}
.btn-search:hover{background:#4B5563}
.btn-reset{background:#fff;color:#374151;border:1px solid #E5E7EB}
.btn-reset:hover{background:#F9FAFB}

.filter-section{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:16px;background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.06)}
.filter-input{padding:8px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;height:36px;min-width:200px}
.filter-select{padding:8px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;height:36px;background:#fff;cursor:pointer}

.card{background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);overflow:hidden}
.data-table{width:100%;border-collapse:collapse}
.data-table th{background:#F8FAFC;padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:#64748B;white-space:nowrap;border-bottom:1px solid #E5E7EB}
.data-table td{padding:12px 16px;border-bottom:1px solid #F1F5F9;font-size:13px;color:#374151;white-space:nowrap}
.data-table tr:hover td{background:#F8FAFC}
.badge-safe{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;background:#DCFCE7;color:#16A34A}
.badge-danger{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;background:#FEE2E2;color:#DC2626}

.badge-default{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;background:#E0F2FE;color:#0284C7}
.op-btn{padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #E5E7EB;background:#fff;color:#374151;transition:all .15s}
.op-btn:hover{background:#F3F4F6}
.op-btn.safe{color:#16A34A;border-color:#BBF7D0}
.op-btn.safe:hover{background:#F0FDF4}
.op-btn.danger{color:#DC2626;border-color:#FECACA}
.op-btn.danger:hover{background:#FEF2F2}
.sort-handle{cursor:grab;color:#9CA3AF;font-size:16px}
.member-count{color:#2563EB;cursor:pointer;text-decoration:underline}
.level-name-link{color:#2563EB;cursor:pointer;text-decoration:none}
.level-name-link:hover{text-decoration:underline}
.icon-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;transition:background .15s}
.icon-btn:hover{background:#F3F4F6}
.icon-btn.edit{color:#2563EB}
.icon-btn.delete{color:#DC2626}
.more-menu-wrap{position:relative;display:inline-block}
.more-menu{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid #E5E7EB;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);min-width:140px;z-index:50;padding:4px}
.more-menu.open{display:block}
.more-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:13px;color:#374151;cursor:pointer;border-radius:6px;white-space:nowrap}
.more-menu-item:hover{background:#F3F4F6}
.more-menu-item.danger{color:#DC2626}
.more-menu-item.safe{color:#16A34A}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:560px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #E5E7EB}
.modal-title{font-size:16px;font-weight:700;color:#111827}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:#F3F4F6;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B7280}
.modal-close:hover{background:#E5E7EB}
.modal-body{padding:24px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid #E5E7EB}
.btn-cancel{background:#6B7280;color:#fff;border:none}
.btn-cancel:hover{background:#4B5563}
.btn-save{background:#393939;color:#fff;border:none}
.btn-save:hover{background:#1F2937}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border:1px solid #E5E7EB;border-radius:8px;font-size:14px}
.form-input:focus{outline:none;border-color:#2BB5A0;box-shadow:0 0 0 3px rgba(43,181,160,.1)}

/* Detail view */
.detail-banner{padding:16px 24px;border-radius:10px;display:flex;align-items:center;gap:10px;margin-bottom:20px}
.detail-banner.safe{background:linear-gradient(90deg,#DCFCE7,#F0FDF4)}
.detail-banner.danger{background:linear-gradient(90deg,#FEE2E2,#FEF2F2)}
.detail-banner svg{width:20px;height:20px}
.detail-banner .text{font-size:14px;font-weight:500}
.detail-banner .toggle-link{color:#0EA5E9;font-size:13px;cursor:pointer;margin-left:8px}
.detail-banner .toggle-link:hover{text-decoration:underline}

.detail-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.detail-table th{background:#F8FAFC;padding:10px 16px;text-align:left;font-size:12px;font-weight:600;color:#64748B;border-bottom:1px solid #E5E7EB;white-space:nowrap}
.detail-table td{padding:10px 16px;border-bottom:1px solid #F1F5F9;font-size:13px}
.detail-actions{display:flex;gap:8px;margin-bottom:20px}
.pagination{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 16px;font-size:13px;color:#6B7280}
.page-btn{width:32px;height:32px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.page-btn.active{background:#2563EB;color:#fff;border-color:#2563EB}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb">
      <a href="#">營運管理</a><span class="sep">/</span>
      <a href="#">用戶管理</a><span class="sep">/</span>
      <span class="current">用戶層級</span>
    </div>
  </div>
  <div class="content" id="mainContent">
    <!-- LIST VIEW -->
    <div id="listView">
      <div class="page-header">
        <div>
          <div class="page-title">用戶層級</div>
          <div class="page-subtitle"></div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="openAddModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>新增層級</button>
        </div>
      </div>
      <div class="filter-section">
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:#6B7280;font-weight:500">層級名稱</label>
          <input type="text" class="filter-input" placeholder="搜尋層級名稱..." id="searchInput" style="min-width:180px;width:180px">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:12px;color:#6B7280;font-weight:500">狀態</label>
          <select class="filter-select" id="statusFilter" onchange="filterTable()" style="min-width:160px">
            <option value="">選擇狀態</option>
            <option value="safe">安全</option>
            <option value="danger">危險</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;align-self:flex-end">
          <button class="btn btn-search" onclick="filterTable()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>搜尋</button>
          <button class="btn btn-reset" onclick="resetFilter()">重置</button>
        </div>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F1F5F9">
          <span style="font-size:13px;color:#6B7280">總共 <span id="totalCount">5</span> 筆資料</span>
          <button class="btn btn-outline" onclick="toggleSortMode()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg><span id="sortBtnText">編輯排序</span></button>
        </div>
        <table class="data-table" id="levelTable">
          <thead>
            <tr>
              <th>排序</th>
              <th>層級名稱</th>
              <th>狀態</th>
              <th>用戶數</th>
              <th style="width:120px">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- DETAIL VIEW (now as modal) -->
    <div id="detailView" style="display:none"></div>
  </div>
</div>

<!-- View/Edit Modal (system style: centered, expand+close buttons) -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailModalBox" style="width:900px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column">
    <div class="modal-header">
      <div class="modal-title" id="detailModalTitle">層級名稱</div>
      <div style="display:flex;gap:4px">
        <button class="modal-close" onclick="toggleFullscreen()" title="展開"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
        <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
      </div>
    </div>
    <div class="modal-body" style="flex:1;overflow-y:auto" id="detailModalBody"></div>
    <div class="modal-footer" id="detailModalFooter"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal" style="width:900px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新增層級</div>
      <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
    </div>
    <div class="modal-body" style="flex:1;overflow-y:auto">
      <div class="form-group">
        <label class="form-label">層級名稱</label>
        <input type="text" class="form-input" id="levelNameInput" placeholder="請輸入層級名稱">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px"><label class="form-label" style="margin:0">用戶名單</label>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline" onclick="openImportModal()" style="font-size:12px;padding:6px 12px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>匯入名單</button>
        </div>
      </div>
      <div style="border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;margin-top:8px">
        <table class="detail-table" style="margin:0">
          <thead><tr><th>帳號</th><th>暱稱</th><th>加入時間</th><th>參加活動</th><th>操作</th></tr></thead>
          <tbody><tr><td colspan="5" style="text-align:center;color:#9CA3AF;padding:24px">尚無用戶</td></tr></tbody>
        </table>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
        <input type="text" class="form-input" placeholder="輸入帳號新增..." style="flex:1;height:36px">
        <button class="btn btn-primary" onclick="alert('新增成功')" style="height:36px;white-space:nowrap">新增</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('addModal')">取消</button>
      <button class="btn btn-save" onclick="saveLevel()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>儲存</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">匯入名單</div>
      <button class="modal-close" onclick="closeModal('importModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:12px;color:#6B7280">匯入上限 ≤ 1000 帳號、支援 CSV 格式</span>
          <a href="#" onclick="downloadCsvTemplate()" style="font-size:12px;color:#2563EB">下載 CSV 範例</a>
        </div>
        <div id="dropZone" style="border:2px dashed #CBD5E1;border-radius:12px;padding:32px;text-align:center;background:#fff;cursor:pointer" ondragover="event.preventDefault();this.style.borderColor='#2BB5A0'" ondragleave="this.style.borderColor='#CBD5E1'" ondrop="handleDrop(event)">
          <div style="width:48px;height:48px;border-radius:50%;background:#E0F7F4;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#14B8A6" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
          <div style="font-size:14px;font-weight:500;color:#0F766E;margin-bottom:4px">點擊或拖放檔案至此處</div>
          <div style="font-size:12px;color:#9CA3AF;margin-bottom:12px">支援 CSV 格式</div>
          <button type="button" class="btn btn-outline" style="font-size:12px;padding:6px 14px" onclick="document.getElementById('csvFileInput').click()">選擇檔案</button>
          <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="handleFileSelect(this)">
        </div>
        <div id="uploadProgress" style="display:none;margin-top:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span id="fileName" style="font-size:12px;color:#374151"></span><span id="progressPct" style="font-size:12px;color:#6B7280">0%</span></div>
          <div style="height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden"><div id="progressBar" style="height:100%;background:#2BB5A0;border-radius:3px;width:0%;transition:width .3s"></div></div>
          <div id="uploadStatus" style="font-size:11px;color:#16A34A;margin-top:4px;display:none">✓ 格式驗證通過，可以匯入</div>
          <div id="uploadError" style="font-size:11px;color:#DC2626;margin-top:4px;display:none"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('importModal')">取消</button>
      <button class="btn btn-save" id="importBtn" disabled style="opacity:0.5;cursor:not-allowed" onclick="doImport()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>匯入</button>
    </div>
  </div>
</div>

<!-- Add Member Modal -->
<div class="modal-overlay" id="addMemberModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">手動新增用戶</div>
      <button class="modal-close" onclick="closeModal('addMemberModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">用戶帳號</label>
        <input type="text" class="form-input" placeholder="請輸入用戶帳號">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('addMemberModal')">取消</button>
      <button class="btn btn-primary" onclick="doAddMember()">新增</button>
    </div>
  </div>
</div>

<script src="components/sidebar.js"></script>
<script>

const levels = [
  {id:1, name:'預設', status:'safe', members:162353, isDefault:true, sort:1},
  {id:2, name:'VVIP', status:'safe', members:128, isDefault:false, sort:2},
  {id:3, name:'貴賓', status:'safe', members:544, isDefault:false, sort:3},
  {id:4, name:'高風險', status:'danger', members:12, isDefault:false, sort:4},
  {id:5, name:'觀察中', status:'danger', members:3, isDefault:false, sort:5}
];

const mockMembers = [
  {account:'player001', nickname:'小明', joinedAt:'2026-06-01 14:30'},
  {account:'player002', nickname:'阿華', joinedAt:'2026-06-02 09:15'},
  {account:'player003', nickname:'大雄', joinedAt:'2026-06-03 11:20'},
  {account:'player004', nickname:'靜香', joinedAt:'2026-06-05 16:45'},
  {account:'player005', nickname:'胖虎', joinedAt:'2026-06-08 08:00'},
  {account:'player006', nickname:'小夫', joinedAt:'2026-06-10 13:22'},
  {account:'player007', nickname:'哆啦', joinedAt:'2026-06-12 10:10'},
  {account:'player008', nickname:'出木杉', joinedAt:'2026-06-15 19:30'}
];

let currentDetailId = null;
let editingId = null;
let isFullscreen = false;

function toggleFullscreen() {
  const box = document.getElementById('detailModalBox');
  isFullscreen = !isFullscreen;
  if (isFullscreen) {
    box.style.width = '95vw';
    box.style.maxWidth = '95vw';
    box.style.maxHeight = '95vh';
  } else {
    box.style.width = '720px';
    box.style.maxWidth = '90vw';
    box.style.maxHeight = '85vh';
  }
}

function showDetail(id) {
  currentDetailId = id;
  renderDetailModal(id, false);
  document.getElementById('detailModal').classList.add('open');
}

function openEditModal(id) {
  currentDetailId = id;
  renderDetailModal(id, true);
  document.getElementById('detailModal').classList.add('open');
}

function renderDetailModal(id, editable) {
  const l = levels.find(x => x.id === id);
  if (!l) return;
  const title = editable ? l.name + '｜編輯用戶層級' : l.name + '｜檢視用戶層級';
  document.getElementById('detailModalTitle').textContent = title;

  const bannerHtml = l.status === 'safe'
    ? `<div class="detail-banner safe"><svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span class="text" style="color:#16A34A">此為安全等級</span>${editable ? `<span class="toggle-link" onclick="toggleStatus(${l.id})">設為危險等級</span>` : ''}</div>`
    : `<div class="detail-banner danger"><svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="text" style="color:#DC2626">此為危險等級（無法贈禮）</span>${editable ? `<span class="toggle-link" onclick="toggleStatus(${l.id})">設為安全等級</span>` : ''}</div>`;

  const nameField = editable
    ? `<div class="form-group"><label class="form-label">層級名稱</label><input type="text" class="form-input" id="editNameInput" value="${l.name}"></div>`
    : `<div class="form-group"><label class="form-label">層級名稱</label><div style="padding:10px 14px;background:#F8FAFC;border-radius:8px;font-size:14px">${l.name}</div></div>`;

  const memberRows = mockMembers.slice(0, 10).map((m, i) => `
    <tr>
      <td style="color:#2563EB">${m.account}</td>
      <td>${m.nickname}</td>
      <td>${m.joinedAt}</td>
      ${editable ? `<td><button class="icon-btn delete" onclick="removeMember('${m.account}')" title="移除"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></td>` : ''}
    </tr>`).join('');

  const tableHeaders = editable
    ? '<th>帳號</th><th>暱稱</th><th>加入時間</th><th>操作</th>'
    : '<th>帳號</th><th>暱稱</th><th>加入時間</th>';

  const activitiesHtml = `
    <div style="margin-top:16px"><label class="form-label">參加中的活動</label></div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      <a href="nova-event-settings.html" style="display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:#F0F9FF;border:1px solid #BAE6FD;border-radius:6px;color:#0369A1;font-size:12px;text-decoration:none">登入獎勵</a>
      <a href="nova-event-settings.html" style="display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:#F0F9FF;border:1px solid #BAE6FD;border-radius:6px;color:#0369A1;font-size:12px;text-decoration:none">每日簽到</a>
      <a href="nova-event-settings.html" style="display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:#F0F9FF;border:1px solid #BAE6FD;border-radius:6px;color:#0369A1;font-size:12px;text-decoration:none">儲值優惠</a>
    </div>`;

  document.getElementById('detailModalBody').innerHTML = `
    ${bannerHtml}
    ${nameField}
    <div class="form-group"><label class="form-label">用戶數</label><div style="padding:10px 14px;background:#F8FAFC;border-radius:8px;font-size:14px">${l.members.toLocaleString()} 人</div></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px"><label class="form-label" style="margin:0">用戶名單</label>
      ${editable && l.members > 0 ? `<div style="display:flex;gap:8px">
        <button class="btn btn-outline" onclick="exportMembers()" style="font-size:12px;padding:6px 12px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>匯出名單</button>
        <button class="btn btn-outline" onclick="openImportModal()" style="font-size:12px;padding:6px 12px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>匯入名單</button>
      </div>` : (editable ? `<div style="display:flex;gap:8px">
        <button class="btn btn-outline" onclick="openImportModal()" style="font-size:12px;padding:6px 12px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>匯入名單</button>
      </div>` : '')}
    </div>
    ${editable ? `<div style="display:flex;gap:8px;margin-top:8px;align-items:center">
      <input type="text" class="form-input" id="addUserInput" placeholder="輸入帳號新增..." style="flex:1;height:36px">
      <button class="btn btn-primary" onclick="doAddMember()" style="height:36px;white-space:nowrap">新增</button>
    </div>` : ''}
    <div style="border:1px solid #E5E7EB;border-radius:8px;overflow:hidden">
      <table class="detail-table" style="margin:0">
        <thead><tr>${tableHeaders}</tr></thead>
        <tbody>${memberRows}</tbody>
      </table>
    </div>
    <div class="pagination" style="justify-content:space-between">
      <span>共 ${l.members.toLocaleString()} 筆</span>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="page-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <span style="padding:0 4px;color:#9CA3AF">...</span>
        <button class="page-btn">${Math.ceil(l.members/20)}</button>
        <button class="page-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg></button>
      </div>
    </div>
    ${activitiesHtml}
  `;

  // Footer
  if (editable) {
    const canDelete = !l.isDefault;
    document.getElementById('detailModalFooter').innerHTML = `
      ${canDelete ? `<button class="btn btn-danger" onclick="deleteLevelFromDetail()" style="margin-right:auto"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>刪除</button>` : ''}
      <button class="btn btn-cancel" onclick="closeModal('detailModal')">取消</button>
      <button class="btn btn-save" onclick="saveFromDetail()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>儲存</button>`;
  } else {
    document.getElementById('detailModalFooter').innerHTML = `<button class="btn btn-outline" onclick="closeModal('detailModal')">關閉</button>`;
  }
}

function saveFromDetail() {
  const l = levels.find(x => x.id === currentDetailId);
  const input = document.getElementById('editNameInput');
  if (input && input.value.trim()) {
    l.name = input.value.trim();
  }
  closeModal('detailModal');
  renderTable();
}

function openEditFromDetail() {
  if (currentDetailId) openEditModal(currentDetailId);
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const statusF = document.getElementById('statusFilter').value;
  const filtered = levels.filter(l => {
    if (search && !l.name.toLowerCase().includes(search)) return false;
    if (statusF && l.status !== statusF) return false;
    return true;
  });
  document.getElementById('totalCount').textContent = filtered.length;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map(l => `
    <tr data-id="${l.id}">
      <td><span class="sort-handle" style="display:none">⠿</span>${l.sort}</td>
      <td><span class="level-name-link" onclick="showDetail(${l.id})">${l.name}</span></td>
      <td>${l.status === 'safe' ? '<span class="badge-safe">安全</span>' : '<span class="badge-danger">危險</span>'}</td>
      <td><span class="member-count" onclick="window.location.href='nova-user-query.html?level='+encodeURIComponent('${l.name}')">${l.members.toLocaleString()}</span></td>
      <td style="white-space:nowrap">
        <button class="icon-btn edit" title="編輯" onclick="openEditModal(${l.id})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="icon-btn delete" title="刪除" onclick="deleteLevel(${l.id})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
        <div class="more-menu-wrap">
          <button class="icon-btn" onclick="toggleMenu(event,${l.id})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
          <div class="more-menu" id="menu-${l.id}">
            <div style="padding:8px 12px;font-size:13px;font-weight:600;color:#111827;border-bottom:1px solid #E5E7EB">操作功能</div>
            <div class="more-menu-item" onclick="showDetail(${l.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><span style="color:#2563EB">檢視詳情</span></div>
            ${l.status === 'safe' ? `<div class="more-menu-item" onclick="toggleStatus(${l.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span style="color:#DC2626">設為危險</span></div>` : `<div class="more-menu-item" onclick="toggleStatus(${l.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span style="color:#16A34A">設為安全</span></div>`}
          </div>
        </div>
      </td>
    </tr>
  `).join('');
}

function toggleMenu(e, id) {
  e.stopPropagation();
  document.querySelectorAll('.more-menu.open').forEach(m => { if(m.id !== 'menu-'+id) m.classList.remove('open'); });
  document.getElementById('menu-'+id).classList.toggle('open');
}
document.addEventListener('click', () => { document.querySelectorAll('.more-menu.open').forEach(m => m.classList.remove('open')); });

function filterTable() { renderTable(); }

function toggleStatus(id) {
  const l = levels.find(x => x.id === id);
  if (!l) return;
  const newStatus = l.status === 'safe' ? '危險' : '安全';
  if (confirm(`確定將「${l.name}」設為${newStatus}等級？\n${l.status === 'safe' ? '該層級所有用戶將無法進行贈禮交易。' : '該層級所有用戶將恢復正常交易。'}`)) {
    l.status = l.status === 'safe' ? 'danger' : 'safe';
    renderTable();
    if (document.getElementById('detailModal').classList.contains('open')) {
      renderDetailModal(currentDetailId, !!document.getElementById('editNameInput'));
    }
  }
}

function renderMembers() {}
function filterMembers() {}

function removeMember(account) {
  if (confirm(`確定將 ${account} 從此層級移除？`)) {
    const idx = mockMembers.findIndex(m => m.account === account);
    if (idx > -1) mockMembers.splice(idx, 1);
    if (document.getElementById('detailModal').classList.contains('open')) {
      renderDetailModal(currentDetailId, true);
    }
  }
}

function showListView() {}

function resetFilter() {
  document.getElementById('searchInput').value = '';
  document.getElementById('statusFilter').value = '';
  renderTable();
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增層級';
  document.getElementById('levelNameInput').value = '';
  document.getElementById('addModal').classList.add('open');
}

function saveLevel() {
  const name = document.getElementById('levelNameInput').value.trim();
  if (!name) { alert('請輸入層級名稱'); return; }
  levels.push({id: Date.now(), name, status:'safe', members:0, isDefault:false, sort: levels.length+1});
  closeModal('addModal');
  renderTable();
}

function deleteLevel(id) {
  const l = levels.find(x => x.id === id);
  if (!l) return;
  if (l.isDefault) { alert('預設層級不可刪除'); return; }
  if (l.members > 0) { alert('已有用戶參照此設定，不可刪除'); return; }
  if (confirm(`確定刪除「${l.name}」？此操作無法復原。`)) {
    const idx = levels.findIndex(x => x.id === id);
    levels.splice(idx, 1);
    renderTable();
  }
}

function deleteLevelFromDetail() {
  deleteLevel(currentDetailId);
  if (!levels.find(x => x.id === currentDetailId)) closeModal('detailModal');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openImportModal() { document.getElementById('importModal').classList.add('open'); }
function openAddMemberModal() { document.getElementById('addMemberModal').classList.add('open'); }

function doImport() {
  alert('匯入完成：成功 3 筆、重複 0 筆、失敗 0 筆');
  closeModal('importModal');
  // Reset import state
  document.getElementById('uploadProgress').style.display = 'none';
  document.getElementById('importBtn').disabled = true;
  document.getElementById('importBtn').style.opacity = '0.5';
  document.getElementById('importBtn').style.cursor = 'not-allowed';
}

function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.style.borderColor = '#CBD5E1';
  const file = e.dataTransfer.files[0];
  if (file) validateAndUpload(file);
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (file) validateAndUpload(file);
}

function validateAndUpload(file) {
  const progress = document.getElementById('uploadProgress');
  const bar = document.getElementById('progressBar');
  const pct = document.getElementById('progressPct');
  const nameEl = document.getElementById('fileName');
  const status = document.getElementById('uploadStatus');
  const error = document.getElementById('uploadError');
  const importBtn = document.getElementById('importBtn');

  progress.style.display = 'block';
  status.style.display = 'none';
  error.style.display = 'none';
  nameEl.textContent = file.name;
  bar.style.width = '0%';
  pct.textContent = '0%';
  importBtn.disabled = true;
  importBtn.style.opacity = '0.5';
  importBtn.style.cursor = 'not-allowed';

  if (!file.name.endsWith('.csv')) {
    error.textContent = '✗ 格式錯誤：僅支援 CSV 格式';
    error.style.display = 'block';
    bar.style.width = '100%';
    bar.style.background = '#EF4444';
    pct.textContent = '失敗';
    return;
  }

  bar.style.background = '#2BB5A0';
  let progress_val = 0;
  const interval = setInterval(() => {
    progress_val += Math.random() * 30 + 10;
    if (progress_val >= 100) {
      progress_val = 100;
      clearInterval(interval);
      pct.textContent = '100%';
      bar.style.width = '100%';
      status.style.display = 'block';
      importBtn.disabled = false;
      importBtn.style.opacity = '1';
      importBtn.style.cursor = 'pointer';
    } else {
      pct.textContent = Math.floor(progress_val) + '%';
      bar.style.width = Math.floor(progress_val) + '%';
    }
  }, 300);
}
function doAddMember() {
  alert('新增成功');
  closeModal('addMemberModal');
}
function exportMembers() { alert('已匯出 CSV 檔案'); }
function toggleSortMode() {
  const btn = document.getElementById('sortBtnText');
  if (btn.textContent === '編輯排序') {
    btn.textContent = '儲存排序';
    document.querySelectorAll('.sort-handle').forEach(h => { h.style.display = 'inline'; h.style.cursor = 'grab'; });
  } else {
    btn.textContent = '編輯排序';
    document.querySelectorAll('.sort-handle').forEach(h => h.style.display = 'none');
  }
}
function downloadCsvTemplate() {
  const csv = '\uFEFFaccount\nplayer001\nplayer002\nplayer003\n';
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'import_template.csv'; a.click();
  URL.revokeObjectURL(url);
}

// Init
renderTable();
</script>
</body>
</html>
