<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星運娛樂城 - 公會</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;background:#0a0514;color:#333;min-height:100vh;display:flex;justify-content:center;overflow-x:hidden}
.app{width:100%;max-width:430px;min-height:100vh;background:linear-gradient(180deg,#FFF8E1 0%,#FFECB3 100%);display:flex;flex-direction:column;position:relative;padding-bottom:80px}

/* Header Tabs */
.header-tabs{background:linear-gradient(135deg,#FF8F00,#F57C00);padding:16px 16px 3px;border-radius:0 0 20px 20px;box-shadow:0 4px 12px rgba(255,143,0,.3)}
.tabs-row{display:flex;gap:0;background:rgba(255,255,255,.2);border-radius:20px;padding:3px}
.tab{flex:1;padding:10px 8px;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);text-align:center;cursor:pointer;border-radius:18px;transition:all .2s}
.tab.active{background:#fff;color:#F57C00;box-shadow:0 2px 6px rgba(0,0,0,.1)}

/* Search Bar */
.search-section{padding:16px 16px 12px;display:flex;gap:10px;align-items:center}
.search-input-wrap{flex:1;display:flex;align-items:center;background:#fff;border:1px solid #E0E0E0;border-radius:12px;padding:0 12px;height:42px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.search-input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;color:#333;background:transparent}
.search-input::placeholder{color:#BDBDBD}
.create-btn{background:linear-gradient(135deg,#66BB6A,#4CAF50);padding:10px 16px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;border:none;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(76,175,80,.3);transition:transform .15s}
.create-btn:active{transform:scale(.96)}

/* Guild List */
.guild-list{padding:0 16px}
.guild-card{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:10px;border-radius:14px;background:#fff;border:1px solid rgba(255,179,0,.2);box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s}
.guild-card:active{transform:scale(.98)}
.guild-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid #FFD700;box-shadow:0 2px 6px rgba(255,215,0,.3)}
.guild-avatar.gold{background:linear-gradient(135deg,#FFD700,#FFA000)}
.guild-avatar.silver{background:linear-gradient(135deg,#BDBDBD,#9E9E9E)}
.guild-avatar.bronze{background:linear-gradient(135deg,#A1887F,#8D6E63)}
.guild-info{flex:1;min-width:0}
.guild-name{font-size:14px;font-weight:700;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guild-level{font-size:11px;color:#FF8F00;font-weight:600;margin-top:3px}
.guild-score{display:flex;align-items:center;gap:4px}
.guild-coin{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FFA000);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#5D4037}
.guild-amount{font-size:13px;color:#666;font-weight:600}

/* Bottom Decoration */
.bottom-deco{position:fixed;bottom:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:center}
.close-x{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.close-x svg{width:16px;height:16px;color:#666}
.bottom-coins{position:fixed;bottom:0;left:0;right:0;height:40px;display:flex;align-items:flex-end;justify-content:center;gap:6px;padding-bottom:8px;pointer-events:none}
.bottom-coins span{font-size:20px}
</style>
</head>
<body>
<div class="app">
  <!-- Header Tabs -->
  <div class="header-tabs">
    <div class="tabs-row">
      <div class="tab">我的公會</div>
      <div class="tab active">所有公會</div>
      <div class="tab">公會說明</div>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-section">
    <div class="search-input-wrap">
      <input class="search-input" type="text" placeholder="請輸入公會名稱">
    </div>
    <button class="create-btn">建立公會</button>
  </div>

  <!-- Guild List -->
  <div class="guild-list">
    <div class="guild-card">
      <div class="guild-avatar gold">🏆</div>
      <div class="guild-info">
        <div class="guild-name">蛋捲公會</div>
        <div class="guild-level">Lv.10</div>
      </div>
      <div class="guild-score"><div class="guild-coin">$</div><span class="guild-amount">159,219,980</span></div>
    </div>
    <div class="guild-card">
      <div class="guild-avatar gold">🏆</div>
      <div class="guild-info">
        <div class="guild-name">vera+家++</div>
        <div class="guild-level">Lv.10</div>
      </div>
      <div class="guild-score"><div class="guild-coin">$</div><span class="guild-amount">100,327,269</span></div>
    </div>
    <div class="guild-card">
      <div class="guild-avatar gold">🏆</div>
      <div class="guild-info">
        <div class="guild-name">QA_BOWEN公會</div>
        <div class="guild-level">Lv.10</div>
      </div>
      <div class="guild-score"><div class="guild-coin">$</div><span class="guild-amount">149,578</span></div>
    </div>
    <div class="guild-card">
      <div class="guild-avatar silver">⚔️</div>
      <div class="guild-info">
        <div class="guild-name">test</div>
        <div class="guild-level">Lv.5</div>
      </div>
      <div class="guild-score"><div class="guild-coin">$</div><span class="guild-amount">10,346</span></div>
    </div>
    <div class="guild-card">
      <div class="guild-avatar bronze">🛡️</div>
      <div class="guild-info">
        <div class="guild-name">Aaron測試</div>
        <div class="guild-level">Lv.3</div>
      </div>
      <div class="guild-score"><div class="guild-coin">$</div><span class="guild-amount">1,967,044</span></div>
    </div>
    <div class="guild-card">
      <div class="guild-avatar bronze">🛡️</div>
      <div class="guild-info">
        <div class="guild-name">第一天下測試大會</div>
        <div class="guild-level">Lv.3</div>
      </div>
      <div class="guild-score"><div class="guild-coin">$</div><span class="guild-amount">1,001,775</span></div>
    </div>
    <div class="guild-card">
      <div class="guild-avatar bronze">🛡️</div>
      <div class="guild-info">
        <div class="guild-name">Mao公會</div>
        <div class="guild-level">Lv.3</div>
      </div>
      <div class="guild-score"><div class="guild-coin">$</div><span class="guild-amount">650,105</span></div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-deco">
    <div class="close-x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
  </div>
  <div class="bottom-coins">
    <span>🪙</span><span>🪙</span><span>🪙</span><span>🪙</span><span>🪙</span>
  </div>
</div>
</body>
</html>
