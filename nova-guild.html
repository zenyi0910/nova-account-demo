<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>公會 — 星運娛樂城</title>
<link rel="stylesheet" href="css/frontend.css">
</head>
<body>
<div class="mobile-frame">
<div class="subpage-overlay" onclick="if(event.target===this)window.location.href='nova-lobby.html'">
<div class="subpage-dialog">
<div class="subpage-header">
<h2>公會</h2>
</div>
<p style="color:rgba(255,255,255,.6);font-size:12px;text-align:center;margin:12px 0">加入公會獲取金幣獎勵</p>
<div class="guild-list">
<div class="guild-item">
<div class="guild-avatar">A</div>
<div class="guild-info"><div class="guild-name">星運聯盟</div><div class="guild-members">成員：128 人</div></div>
<button class="guild-join">加入</button>
</div>
<div class="guild-item">
<div class="guild-avatar">B</div>
<div class="guild-info"><div class="guild-name">幸運之星</div><div class="guild-members">成員：95 人</div></div>
<button class="guild-join">加入</button>
</div>
<div class="guild-item">
<div class="guild-avatar">C</div>
<div class="guild-info"><div class="guild-name">贏家俱樂部</div><div class="guild-members">成員：76 人</div></div>
<button class="guild-join">加入</button>
</div>
<div class="guild-item">
<div class="guild-avatar">D</div>
<div class="guild-info"><div class="guild-name">金幣獵人</div><div class="guild-members">成員：54 人</div></div>
<button class="guild-join">加入</button>
</div>
<div class="guild-item">
<div class="guild-avatar">E</div>
<div class="guild-info"><div class="guild-name">財富密碼</div><div class="guild-members">成員：42 人</div></div>
<button class="guild-join">加入</button>
</div>
</div>
<div class="subpage-bottom-close"><button onclick="window.location.href='nova-lobby.html'">關閉</button></div>
</div>
</div>
</div>
</body>
</html>
